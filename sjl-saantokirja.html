katkolla B12 tulee 0 protestoimaan päätuomarille, että maali tehtiin hänen mailallansa. Mikä on tuomio jäällä, maali vai ei? Tuomitaanko tilanteesta rangaistuksia? 3","answer":""},{"id":"10.19","rule_number":"10","question":"A-joukkueelle tulossa siirrettynä rangaistus. B- joukkueen tekee maalin ennen pelin katkaisua. A-joukkue pyytää maalin tehneen B-joukkueen pelaajan mailan mittausta. Miten päätuomari toimii?","answer":"Siirrettynä ollutta rangaistusta ei tuomita, koska B-joukkue teki maalin. Sen jälkeen päätuomari mittaa maalin tehneen B-joukkueen pelaajan mailan. Jos maila on sääntöjen vastainen, B-joukkueelle tuomitaan pieni rangaistus (maali pysyy voimassa). Jos mitattava maila on sääntöjenmukainen, A-joukkueelle tuomitaan joukkuerangaistus. Säännöt 10.5 ja 15.2"},{"id":"10.20","rule_number":"10","question":"A4 maila rikkoutuu pelin käydessä. A33, jolle on myönnetty lupa mailaan, joka ei ole pituudeltaan sääntöjenmukainen, luovuttaa tämän mailan A4:lle. Tämän jälkeen A33 luistee itse vaihtoon. Heti, kun pelikatko syntyy, B-joukkue lähestyy päätuomaria ja ilmoittaa, että haluaisivat mittauttaa A4 mailan pituuden. Onko tämä sallittua?","answer":"Päätuomarin ei tule suorittaa mittausta. Maalaisjärjen mukaan A4 ei voida vastuuttaa siitä, että ottaa vastaan mailan, jonka IIHF on poikkeusluvalla hyväksynyt A33 käyttöön. Jos A4 olisi tullut pelaajapenkiltään tämän poikkeusluvan saaneen mailan kanssa, olisi tilanne eri. Siinä tapauksessa voidaan ajatella, että he yrittävät hyötyä poikkeusluvasta mailaa kierrättämällä eri pelaajilla. Sääntö 10.1 HAKEMISTO VARUSTEET"},{"id":"10.21","rule_number":"10","question":"Maalivahdin alueella on rikkoutunut maila. Maalivahti työntää rikkoutuneen mailan maalin sisälle ottaakseen mailan pelin pois tieltä. Maila ei kuitenkaan mene kokonaan maalin sisälle vaan osa siitä, jää maaliviivan päälle. Hyökkäävä joukkue laukoo kiekon maalia kohti ja se osuu juuri siihen osaan rikkoutunutta mailaa, joka on maaliviivan päällä ja se estää kiekon menemisen maaliin. Mikä on päätuomarin ratkaisu?","answer":"Jos päätuomarin mielestä maalivahti ei tarkoituksellisesti asettanut mailaa maaliviivan päälle, rangaistusta ei tuomita ja valitettavaa hyökkäävän joukkueen kannalta, ettei maaliakaan voi hyväksyä, koska kiekko ei ylittänyt maaliviivaa. Jos päätuomarin mielestä maalivahti toimi tarkoituksellisesti, tuomitaan tilanne sääntöjen 67.3 ja 67. 5 mukaan."},{"id":"10.22","rule_number":"10","question":"Päätuomaria pyydetään mittaamaan mailan lavan kaarevuutta ja se todetaan mittauksessa sääntöjenvastaiseksi. Mitä päätuomari tekee kyseiselle sääntöjenvastaiselle mailalle?","answer":"Maila palautetaan päätuomarin toimesta pelaajapenkille. Sääntö 10.5"},{"id":"10.23","rule_number":"10","question":"A-joukkue tekee maalin 3. erässä. Heti sen jälkeen pelikatkolla, B-joukkueen kapteeni lähestyy päätuomaria pyytääkseen maalin tehneen A- joukkueen pelaajan mailan lavan kaarevuuden mittaamista. Onko tämä sallittua? Jos ei ole, mikä rangaistus B-joukkueen kapteenille annetaan pyynnön esittämisestä? Jos on, mitä tapahtuu, jos maila todetaan mittauksessa sääntöjenvastaiseksi?","answer":"Mittauspyynnön esittäminen on sallittua maalin jälkeen. Kuitenkin maalia ei voi hylätä, vaikka maila todettaisiinkin mittauksessa sääntöjenvastaiseksi. Pelaajalle silti tuomitaan siinä tapauksessa pieni rangaistus. Jos maila on sääntöjenmukainen, B-joukkueelle tuomitaan joukkuerangaistus (JR). Sääntö 10.5"},{"id":"10.24","rule_number":"10","question":"A-joukkueen kapteeni esittää päätuomarille mailan mittauspyynnön (lavan kaarevuus) pelikatkolla. B-joukkue aavistelee, että maila on mahdollisesti sääntöjenvastainen ja päättää esittää kapteeninsa välityksellä mittauspyynnön A-joukkueen pelaajan mailan lavan kaarevuudesta. Miten päätuomari toimii?","answer":"Päätuomari mittaa molemmat mailat ja toimii mittaustulosten perusteella. Sääntö 10.5 HAKEMISTO VARUSTEET"}],"11":[{"id":"11.1","rule_number":"11","question":"EI TILANNETTA.","answer":""}],"12":[{"id":"12.1","rule_number":"12","question":"A-joukkue pyytää päätuomaria tutkimaan B-joukkueen pelaajan hanskan kämmenalueen. Päätuomari tutkii pelaajan hanskan ja toteaa, että kämmenalueessa ei ole suojaa, vaan pelaaja käyttää paljasta kättä. Mitä päätuomari tekee? Mitä rangaistuksia (jos mitään) tuomitaan? Jos hanska onkin sääntöjenmukainen ja hyvässä kunnossa, mitä rangaistuksia silloin tuomitaan?","answer":"Jos päätuomari toteaa, että hanskaa on muokattu (poistettu/leikattu) niin, että pelaaja pystyy käyttämään paljasta kättään, tuomitaan pelaajalle pieni rangaistus. Jos hanskan todetaan olevan hyvässä kunnossa ja sääntöjenmukainen, pyynnön esittäneelle joukkueelle tuomitaan joukkuerangaistus (JR) pelin viivyttämisestä. Sääntö 12.2"},{"id":"12.4","rule_number":"12","question":"Päätuomari huomaa maalille mennessään, että maalivahti ei pidä housuja oikealla tavalla yllään. Pelipaita ei asetu housujen päälle eikä ole kiinnitetty oikein. Mikä on oikea toimintatapa tilanteessa?","answer":"Päätuomarin tulee käsitellä tilannetta säännön 12 (sääntöjenvastainen varuste) mukaisesti. HAKEMISTO VARUSTEET"},{"id":"12.5","rule_number":"12","question":"Pelaajaa varoitetaan tuomarin toimesta aikuisten ottelussa sääntöjen vastaisen varusteen käytöstä. Myöhemmin ottelun aikana toinen pelaaja samasta joukkueesta pelaa sääntöjen vastaisella varusteella. Tuleeko pelaajalle antaa varoitus vai pieni rangaistus?","answer":"Varoitus sääntöjen vastaisesta varusteesta on henkilökohtainen kyseiselle pelaajalle. Näin ollen toisen pelaajan, joka pelaa sääntöjen vastaisella varusteella, tulisi myös saada varoitus. Sääntö 12.1 Huomautus: 1. Jos pelaaja pelaa vaarallisella varusteella varoitus annetaan joukkueelle, ei pelaajalle. Sääntö 9.8 2. Kaikki sääntöjen vastaisen varusteen tapaukset junioriottelussa käsitellään sääntöjen 202 mukaisesti. SJL: Varusteasioissa varoitetaan aina joukkuetta (koskee kaikkia varusteita) ja sen jälkeen rangaistaan rikkonutta pelaajaa 2 min rangaistuksella."}],"13":[{"id":"13.1","rule_number":"13","question":"Katsoja heittää toisen kiekon jäälle pelin käydessä. Pitääkö tuomariston katkaista peli välittömästi?","answer":"Ei, peliä ei tule keskeyttää, ennen kuin tuomari katsoo, ettei laillisella kiekolla ole välitöntä maalintekomahdollisuutta tai peli laillisella kiekolla on siirtynyt keskialueelle. Sääntö 13.3. HAKEMISTO IIHF TILANNE KÄSIKIRJA 2025/26– OSA 03 27 VARUSTEET"}],"15":[{"id":"15.1","rule_number":"15","question":"Päätuomarilla on käsi ylhäällä A44 pienen rangaistuksen johdosta. A16 saa kiekon hallintaansa puolustusalueellaan ja samalla, kun päätuomari viheltää pelin poikki, A16 laukoo kiekon suojalasin yli katsomoon. Miten päätuomari toimii tilanteessa?","answer":"Koska peli menee poikki sillä hetkellä, kun A-joukkue saa kiekon hallintaansa, ei A16 tuomita lisärangaistusta kiekon laukaisemisesta suojalasin yli katsomoon. Sääntö 15.1, toinen kappale. HUOM! Päätuomari voi silti tuomita rangaistuksen A16, jos hänen tulkintansa mukaan A16 laukoo kiekon katsomoon tarkoituksella. Säännöt 39.1 ja 63.2 (II)"},{"id":"15.2","rule_number":"15","question":"A-joukkueelle on tulossa siirrettynä rangaistus. B-joukkueella on kiekko hallinnassaan ja peli katkaistaan heidän aiheuttaman tahallisen paitsion vuoksi. Mistä suoritetaan seuraava aloitus?","answer":"Toisesta A-joukkueen puolustusalueen aloituspisteestä. Säännöt 83.6 (II) (Myös 76.2 ja 15.5 – tämä ei kuuluu mainittuihin poikkeuksiin)"},{"id":"15.5","rule_number":"15","question":"A6 rikkoo rangaistuslaukauksen (RL) arvoisesti, joka on päätuomarilla siirrettynä kädessä. Ennen pelikatkoa A6 syyllistyy toiseen pienen rangaistuksen arvoiseen rikkeeseen, joka on myös siirrettynä B-joukkueen hallitessa kiekkoa. B-joukkue tekee maalin. Mikä on päätuomarin päätös?","answer":"Maali kumoaa ensimmäisen rikkeen, josta oltiin tuomitsemassa RL. A6 menee rangaistusaitioon kärsimään toista pientä rangaistusta. Säännöt 15.2 ja 15.4 HAKEMISTO RANGAISTUSLAJIT"},{"id":"15.6","rule_number":"15","question":"A-joukkue pelaa vajaalukuisena yhden pienen rangaistuksen johdosta. Päätuomarilla on käsi ylhäällä siirretyn rangaistuksen merkiksi A-joukkueelle. Rike edellyttää rangaistuslaukauksen (RL) tuomitsemista. Ennen pelikatkoa, B-joukkue tekee maalin. Miten päätuomari toimii?","answer":"Kellossa ollut pieni rangaistus päättyy maalista. Siirrettynä ollut RL (pieni rangaistus, kaksinkertainen pieni rangaistus tai iso rangaistus) tuomitaan ”normaalisti”. Eli rikkonut pelaaja menee RL:n sijaan kärsimään rangaistuksen rangaistusaitoon. Säännöt 15.2 ja 15.4"}],"16":[{"id":"16.1","rule_number":"16","question":"Kun pelikellossa on aikaa jäljellä 05:00, A15 ja B12 tuomitaan samanaikaiset pienet rangaistukset. Kun kellossa on 04:30, tuomitaan A23 iso rangaistus. Peli jatkuu ja A6 ollaan tuomitsemassa siirrettynä pientä rangaistusta. Siirretyn rangaistuksen aikana B-joukkue tekee maalin, kun kellossa on 04:00. Miten päätuomari toimii tilanteessa?","answer":"Tässä tilanteessa A6 pientä rangaistusta ei tuomita B-joukkueen maalin vuoksi. Sääntö 16"},{"id":"16.2","rule_number":"16","question":"0 4 Kun pelikellossa on aikaa jäljellä 03:16 3. erässä, A42 tuomitaan kaksinkertainen pieni rangaistus korkeasta mailasta. Kun erää on jäljellä 01:27, A16 tuomitaan pieni rangaistus kiinnipitämisestä ja sen lisäksi pieni rangaistus epäurheilijamaisesta käytöksestä. Kun erää on jäljellä O 0:52, B-joukkue tekee maalin. Miltä A-joukkueen rangaistuskello näyttää B-joukkueen maalin jälkeen? S A","answer":""},{"id":"16.4","rule_number":"16","question":"A-joukkue tekee maalin rangaistuslaukauksesta pelatessaan ylivoimalla. Tarkoittaako tämä sitä, että B-joukkue saa rangaistusta kärsimässä olevan pelaajansa takaisin peliin?","answer":"Ei. B-joukkue ei saa pelaajaa takaisin peliin, kun maali tehdään rangaistuslaukauksesta. Sääntö 16.2 HAKEMISTO RANGAISTUSLAJIT"},{"id":"16.5","rule_number":"16","question":"A-joukkue pelaa vajaalukuisena pienen rangaistuksen johdosta. A-joukkue ilmeisesti onnistuu maalinteossa, mutta tuomaristo ei huomaa tätä ja peli jatkuu. Pelin jatkuessa A-joukkueelle on tulossa siirrettynä pieni rangaistus ja ennen pelikatkoa B-joukkue tekee maalin. Miten päätuomari toimii tässä tilanteessa?","answer":"VASTAUS #1 A-joukkueen todennäköinen maali tarkistetaan videoilta pelikatkolla. Jos tarkastus osoittaa, että kyseessä oli sääntöjenmukainen hyväksyttävä maali, asetetaan pelikello maalin syntyaikaan. Kellossa olevan pienen rangaistuksen aika muokataan myös oikeaksi. Siirrettynä tulossa ollut rangaistus tuomitaan normaalisti ja B-joukkueen tekemää maalia ei hyväksytä. VASTAUS #2 A-joukkueen todennäköinen maali tarkastetaan videolta pelikatkolla. Jos tarkastus osoittaa, ettei sääntöjenmukaista hyväksyttävää maalia syntynyt, B- joukkueen maali hyväksytään ja kellossa oleva A-joukkueen pieni rangaistus päättyy. Siirrettynä ollut A-joukkueen rangaistus tuomitaan normaalisti. VASTAUS #3 Jos todetaan, että A-joukkue sai kiekon maalin sääntöjenvastaisella tavalla, se hylätään. Koska peli olisi pitänyt laittaa poikki maalitarkistuksen vuoksi, ei B-joukkueenkaan maalia voida hyväksyä. Pelikello (mukaan lukien rangaistuskello) pitää asettaa aikaan, jolloin A-joukkueen sääntöjenvastainen maali syntyi. Kaikki rangaistukset, joita oltiin tuomitsemassa epäselvän maalitilanteen ja seuraavan pelikatkon välillä, tuomitaan normaalisti. Näin ollen A-joukkue pelaa kahden pelaajan alivoimalla, kun peli taas jatkuu. Säännöt 16.2 ja 78.6"}],"17":[{"id":"17.1","rule_number":"17","question":"A-joukkueelle tuomitaan joukkuerangaistus, kun heillä on liian monta pelaajaa jäällä. A-joukkueen valmentaja protestoi tuomiota sen verran voimakkaasti, että heille tuomitaan lisäksi joukkuerangaistus epäurheilijamaisesta käytöksestä. Pelaako A-joukkue yhden pelaajan vajaalukuisena neljä minuuttia (4-5) vai kahden pelaajan vajaalukuisena kaksi minuuttia (3-5)?","answer":"Nämä ovat kaksi erillistä tilannetta, joten joukkueen täytyy asettaa myös niitä kärsimään kaksi eri (kapteenin välityksellä valmentajan nimeämää) pelaajaa. Sääntö 17.1"},{"id":"17.2","rule_number":"17","question":"Jatkona yllä olevaan tilanteeseen. Mitä, jos jälkimmäinen joukkuerangaistus tuomittaisiinkin vasta seuraavalla pelikatkolla, kun ensimmäinen joukkuerangaistus on jo käynnissä? Pitääkö A-joukkueen silti asettaa toinen pelaaja kärsimään rangaistusaitioon tätä toista joukkuerangaistusta ja pelata kahden pelaajan vajaalukuisena VAI voidaanko uusi rangaistus lisätä aiemman rangaistuksen jäljellä olevaan aikaan ja joukkue jatkaisi yhden pelaajan vajaalukuisena?","answer":"Edelleen. Nämä ovat kaksi erillistä joukkuerangaistustilannetta ja ne täytyy kärsiä kahden eri pelaajan toimesta, olkoonkin, että se aiheuttaa kahden pelaajan vajaalukuisuuden. Sääntö 17.1"},{"id":"17.3","rule_number":"17","question":"Kun joukkueelle tuomitaan rangaistus syyllä ”pelin viivyttäminen - rike aloitustapahtumassa”, kenen pitää mennä kärsimään tätä rangaistusta?","answer":"Säännön mukaan tästä rikkeestä annetaan joukkuerangaistus pelin viivyttämisestä. Näin ollen rangaistuksen voi kärsiä kuka tahansa valmentajan nimeämä kenttäpelaaja (ei siis maalivahti). Säännöt 17.1 ja 17.6 HAKEMISTO RANGAISTUSLAJIT"},{"id":"17.4","rule_number":"17","question":"Hyökkäysalueen aloituksessa A-joukkueen sentteriä on varoitettu. Sen jälkeen A-joukkueen laitahyökkääjä tulee aloitusympyrän sisälle liian aikaisin, joten heille tuomitaan rangaistus toisesta aloitusrikkeestä. Kuka kärsii tämän tuomitun joukkuerangaistuksen?","answer":"Kuka tahansa (valmentajan nimeämä) A-joukkueen kenttäpelaaja (ei maalivahti). Säännöt 17.1 ja 76.6"},{"id":"17.5","rule_number":"17","question":"A-joukkueelle tuomitaan rangaistus, koska heillä on liikaa pelaajia jäällä. A-joukkueen valmentaja protestoi rangaistusta sen verran voimakkaasti, että heille tuomitaan lisäksi joukkuerangaistus epäurheilijamaisesta käytöksestä. Päätuomari antaa A-joukkueen valmentajalle mahdollisuuden valita, että pelaavatko he 4 vs 5 neljä minuuttia vai 3 vs 5 kaksi minuuttia.","answer":"Päätuomari toimii väärin. Nämä ovat kaksi erillistä tilannetta ja niistä tulleita joukkuerangaistuksia täytyy joukkueen asettaa kärsimään kaksi eri pelaajaa (3 vs 5 kaksi minuuttia)."}],"18":[],"19":[{"id":"19.1","rule_number":"19","question":"Joukkueille tuomitaan samalla pelikatkolla seuraavat rangaistukset toisessa erässä: A- joukkue B- joukkue A45 – 2 + 5 B12 - 5 A14 – 2 + 5 B52 - 5 A20 – 5 B29 – 5 + 5 Miten jatketaan peliä ja miten siihen päädytään?","answer":"Kaikki A-joukkueen isot rangaistukset kumoutuvat, perustuen sääntöön 19: samanaikaiset rangaistukset. A-joukkueen tulee asettaa kaksi pelaajaa kärsimään A45 ja A14 pienet rangaistukset. A-joukkue pelaa kolmella pelaajalla kaksi minuuttia. Kolme neljästä B-joukkueen isosta rangaistuksesta kumoutuu, perustuen samanaikaisten rangaistusten sääntöön. B-joukkue pelaa neljällä pelaajalla viisi minuuttia. Joukkueella on mahdollisuus valita, että istuuko B12 tai B52 oman ison rangaistuksensa TAI he voivat asettaa sijaisen istumaan toisen B29 ison rangaistuksen. SJL HUOMIO: Esimerkki ei käytössä, koska pelkän 5 min mahdollisuutta ei ole. HAKEMISTO RANGAISTUSLAJIT"},{"id":"19.2","rule_number":"19","question":"Joukkueille tuomitaan seuraavat rangaistukset samalla pelikatkolla: A-joukkue B-joukkue A3 – 5 + PR – kyynärpäätaklaus B7 – 2 - väkivaltaisuus A34 – 5 – tappelu B11 – 5 - tappelu Samanaikaisten rangaistusten sääntöä hyödyntäen voimme sanoa, että A-joukkue pelaa neljällä pelaajalla viisi minuuttia ja B-joukkue pelaa neljällä pelaajalla kaksi minuuttia. Kumpi A-joukkueen isoista rangaistuksista laitetaan kelloon?","answer":"Tämä on joukkue A:n valinta. Kuitenkin jos joukkue valitsee laittaa A3 jäähyn kelloon, heidän pitää asettaa ylimääräinen sijainen rangaistusaitioon. Jos he valitsevat laittaa A34 kelloon, pelaaja vapautuu heti jäähyn päätyttyä, eikä sijaista tarvita A3 rangaistukselle. Sääntö 19.1. SJL HUOMIO: Esimerkki ei käytössä, koska pelkän 5 min mahdollisuutta ei ole."},{"id":"19.3","rule_number":"19","question":"A-joukkue pelaaja vajaalukuisena yhden pienen rangaistuksen johdosta ensimmäisen erän lopussa. Rangaistus jatkuu vielä toisessa erässä. Juuri ennen erän päättävää summerin soittoa päätuomarilla on käsi ylhäällä B-joukkueen siirretyn pienen rangaistuksen vuoksi. Rangaistus laitetaan täytäntöön, kun summeri on soinut ja kellossa on aika 00:00. Kun joukkueet palaavat erätauon jälkeen jäälle aloittaakseen toisen erän, yhdelle A-joukkueen pelaajista (ei aiemmin rangaistu) tuomitaan pieni rangaistus epäurheilijamaisesta käytöksestä. Kellossa on nyt aika 20:00. Miten peliä jatketaan?","answer":"Peliä jatketaan 4 vs. 5. B-joukkueen saama pieni rangaistus 1. erän lopussa ja A-joukkueen saama pieni rangaistus ennen toisen erän alkua tulkitaan samalla pelikatkolla tuomituiksi. Koska A-joukkueella oli pieni rangaistus vielä kellossa, nämä em. samanaikaiset rangaistukset kumoutuvat, eikä niitä laiteta kelloon. Sääntö 19.1"},{"id":"19.4","rule_number":"19","question":"Kolmatta erää on jäljellä alle viisi minuuttia. A-joukkueelle tuomitaan iso rangaistus ja kahdelle B-joukkueen pelaajalla tuomitaan pieni rangaistus. Mitkä rangaistukset menevät kelloon ja mikä on joukkueiden vahvuus jäällä (HUOM! muita rangaistuksia ei ole käynnissä)?","answer":"Koska rangaistuksia tuomitaan kahdelle B-joukkueen pelaajalle, ei sääntö 19.4 ole voimassa. Niinpä kelloon menee A-joukkueen osalta iso rangaistus (5´) ja B-joukkueen osalta molemmat pienet rangaistukset (2´). Peliä jatketaan 4 vs. 3. Sääntö 19.4 SJL HUOMIO: Ison rangaistuksen lisäksi tuomitaan aina PR."},{"id":"19.5","rule_number":"19","question":"Molemmat joukkueet pelaavat täysilukuisina. Samalla pelikatkolla tuomitaan rangaistuksia seuraavasti: A21 - 2´maalivahdin estämisestä ja 2´väkivältaisuudesta ja B1 (maalivahti) 2´huitomisesta ja B25 2´väkivaltaisuudesta. Miten peliä jatketaan? Kuka kärsii maalivahdille tuomitun rangaistuksen?","answer":"Peliä jatketaan 5 vs. 5. Säännöt 19.1 ja 19.5. Maalivahdille tuomitun pienen rangaistuksen kärsii yksi pelin katkaisuhetkellä jäällä ollut saman joukkueen kenttäpelaaja (vaikka rangaistus ei menekään kelloon). Rangaistu B-joukkueen pelaaja ei voi kärsiä maalivahdin rangaistusta. Sääntö 27.1 HAKEMISTO RANGAISTUSLAJIT"},{"id":"19.6","rule_number":"19","question":"Seuraavat rangaistukset tuomitaan samalla pelikatkolla (ei tapahdu viimeisen viiden minuutin/jatkoajan aikana): A-joukkue B-joukkue A3 – 2 + 5 B5 – 2 + 5 A4 – 2 + 2 + 5 B7 – 5 + 5 Miten peliä peliä jatketaan? Kuka kärsii minkäkin rangaistuksen?","answer":"A-joukkue pelaa joko neljällä pelaajalla neljä minuuttia tai kolmella pelaajalla kaksi minuuttia (joukkueen valinta). B-joukkue pelaa neljällä pelaajalla viisi minuuttia. Sääntö 19. SJL HUOMIO: Esimerkki ei käytössä, koska pelkän 5 min mahdollisuutta ei ole."},{"id":"19.7","rule_number":"19","question":"Seuraavat rangaistukset tuomitaan samalla pelikatkolla toisessa erässä: A12 – 2´ huitomisesta, 5´(+PR) kyynärpäätaklauksesta, 5`(+PR) tappelusta B23 – 2´ tappelun aloittamisesta, 5+PR tappelusta B37 – 5´ (+PR) huitomisesta Mikä on pelaajavahvuus jäällä, kun peli jatkuu? (Muita rangaistuksia ei ollut käynnissä aiemmin)","answer":"Molemmat joukkueet pelaavat täysilukuisena. Sääntö 19."},{"id":"19.8","rule_number":"19","question":"Kolmatta erää on jäljellä 4:59, kun A-joukkueelle tuomitaan iso rangaistus (5´+PR) ja B-joukkueelle pieni rangaistus (2´). Mitä laitetaan kelloon? Mistä suoritetaan seuraava aloitus, kun peli jatkuu?","answer":"A-joukkueen rangaistuskelloon laitetaan 3:00 (iso rangaistus) ja B-joukkueen rangaistuskelloon ei laiteta mitään. Seuraava aloitus suoritetaan toisesta A-joukkueen puolustusalueen aloituspisteestä. Säännöt 19.4 ja 76.2."},{"id":"19.9","rule_number":"19","question":"Kolmatta erää on jäljellä 2:45. A-joukkue pelaa jo kahdella pelaajalla vajaalukuisena (3-5). Pelikatkolla A-joukkueelle tuomitaan pieni rangaistus (2´) ja B-joukkueelle iso rangaistus (5+PR). Mikä on joukkueiden pelaajavahvuus jäällä, kun peli jatkuu? Mitä näkyy rangaistuskellossa?","answer":"Peliä jatketaan 3 vs. 4. A-joukkueen aiemmin tuomitut rangaistukset pysyvät kellossa. Koska kysymyksessä kuvattu tilanne tapahtuu viimeisen viiden minuutin aikana, A-joukkueen pieni rangaistus ja B-joukkueen iso rangaistus kumoutuu 2 minuutin verran. Näin ollen B-joukkueen rangaistuskelloon laitetaan 3:00. Kokonaisuudessaan rangaistuskello näyttää tältä: A-joukkue B-joukkue A3 0:45 B6 3:00 A8 1:10 Sääntö 19.4 HAKEMISTO RANGAISTUSLAJIT"},{"id":"19.10","rule_number":"19","question":"Kun toista erää on pelattu 10:30, A8 ja B7 tuomitaan molemmille pieni rangaistus (2´) korkeasta mailasta. A1 tuomitaan pieni rangaistus (2´) kampituksesta, kun toista erää on pelattu 11:00. B-joukkue tekee maalin, kun toista erää on pelattu 11:30. Kuka A-joukkueen pelaajista palaa jäälle maalista ja miksi?","answer":"A1 (tai sijainen, jos mv:n rangaistus) palaa maalista jäälle, koska A8 kärsii samanaikaisrangaistusta, joka ei mene kelloon. Sääntö 19.1"},{"id":"19.11","rule_number":"19","question":"Toista erää on jäljellä 7:57, kun A3 tuomitaan iso rangaistus (5+PR) tappelusta. Myös B27 saa ison rangaistuksen (5+PR) tappelusta. Sen lisäksi A65 tuomitaan pieni rangaistus (2´) väkivaltaisuudesta ja B12 pieni rangaistus (2´) väkivaltaisuudesta. Isot rangaistukset kumoutuvat ja samanaikaiset pienet rangaistukset menevät kelloon ja peliä jatketaan 4 vs. 4. Oikein vai väärin?","answer":"Väärin. Kaikki kumoutuvat ja jatketaan 5 vs. 5. Sääntö 19.1"},{"id":"19.12","rule_number":"19","question":"Otteluaikaa on jäljellä 4:15, kun tulee pelikatko B-joukkueen puolustusalueella. Yhdelle B-joukkueen pelaajista tuomitaan pieni rangaistus (2´) ja yhdelle A-joukkueen pelaajista tuomitaan iso rangaistus (5+PR). Miten tuomariston kuuluu toimia?","answer":"A-joukkueen rangaistuskelloon laitetaan 3:00. Seuraava aloitus suoritetaan toisesta A-joukkueen puolustusalueen aloituspisteestä. Säännöt 19.4 ja 76.2."},{"id":"19.13","rule_number":"19","question":"Joukkueet pelaavat 4 vs. 4. Kun kolmatta erää on jäljellä 3:30 syntyy vihellyksen jälkeen ”kahakka”. Tästä tuomitaan seuraavanlaisia rangaistuksia: A-joukkue B-joukkue A2 2´ B12 2´ A6 2´ B84 2´ A7 2´ B68 2´ A12 5+PR B69 2+2´ Mitkä rangaistukset menevät kelloon? Mikä on joukkueiden pelaajavahvuus jäällä?","answer":"Peliä jatketaan 3 vs. 4. A12 1:00 laitetaan kelloon. Sääntö 19.4"},{"id":"19.14","rule_number":"19","question":"Kun kolmatta erää on jäljellä alle viisi minuuttia, tuomitaan seuraavat rangaistukset: A-joukkue B-joukkue A7 5+PR B6 2+2´ B5 2 a) Voidaanko nyt käyttää sääntöä 19.4? b) Jos vielä A8 tuomitaan pieni rangaistus (2´), käytetäänkö sääntöä 19.4 siinä tapauksessa?","answer":"a) EI voida käyttää. Sitä käytetään silloin, kun YHDELLE pelaajalle molemmista joukkueista tuomitaan samanaikaisia rangaistuksia. Sääntöä käytetään myös silloin, kun kaikki muut samanaikaiset rangaistukset kumoutuvat ja jäljelle jää toiselle joukkueelle 2´/2+2´ja toiselle 5´. b) Kyllä, tässä tapauksessa sääntöä 19.4 käytetään. A7 1:00 menisi kelloon. HAKEMISTO RANGAISTUSLAJIT"},{"id":"19.15","rule_number":"19","question":"Seuraavat rangaistukset tuomitaan samalla pelikatkolla: A3 5´(+PR) + 2´ B7 5´(+PR) + 2´ A4 5´(+PR) + 2´+ 2´ B8 5´(+PR) + 5´(+PR) Mitä vaihtoehtoja joukkueilla on tarjolla, jotta tilanne edelleen menisi samanaikaisten rangaistusten säännön mukaan?","answer":"Vaihtoehto 1: A3–5+2 B57–5+2 A4–5+2+2 B8–5+5 A-joukkue laittaa sijaisen rangaistuaitioon ja pelaaja neljällä pelaajalla neljä minuuttia. B-joukkue laittaa sijaisen rangaistusaitioon ja pelaa neljällä pelaajalla viisi minuuttia. Vaihtoehto 2: A3–5+2 B7–5+2 A4–5+2+2 B8–5+5 A-joukkue laittaa kaksi sijaista rangaistusaitioon ja pelaa kolmella pelaajalla kaksi minuuttia. 0 4 B-joukkue laittaa sijaisen rangaistusaitioon ja pelaa neljällä pelaajalla viisi minuuttia. O Vaihtoehto 3: S A A3–5+2 B7–5+2 · R A4–5+2+2 B8–5+5 A N G A-joukkue laittaa sijaisen rangaistusaitioon ja pelaa neljällä pelaajalla 4 minuuttia. A I S B-joukkue laittaa sijaisen rangaistusaitioon ja pelaa neljällä pelaajalla viisi minuuttia. T U S L A J I T"},{"id":"19.16","rule_number":"19","question":"A-joukkue pelaa vajaalukuisena yhden pienen rangaistuksen johdosta. Peli katkaistaan heidän puolustusalueellaan ja heille tuomitaan uusi pieni rangaistus, tällä kertaa huitomisesta. B-joukkue on siis pääsemässä 5-3 ylivoimalle. Seuraavassa aloituksessa B-joukkue syyllistyy kahteen aloitusrikkeeseen ja heille tuomitaan joukkuerangaistus (JR). Mikä on pelaajavahvuus jäällä tämän jälkeen?","answer":"Peliä jatketaan 4 vs. 5. A-joukkueelle tuomittu huitominen ja B-joukkueelle tuomittu joukkuerangaistus (JR) tulkitaan samalla pelikatkolla tuomituiksi ja näin ollen ne kumoutuvat, eikä niitä siis laiteta kelloon. Aloituspaikkaa ei myöskään muuteta samanaikaisten (kumoutuvien) rangaistusten johdosta. Sääntö 19.1 HAKEMISTO RANGAISTUSLAJIT"}],"20":[{"id":"20.1","rule_number":"20","question":"Seuraavat rangaistukset tuomitaan samalla pelikatkolla: A7 5+PR + 5+PR B3 2´+ 5+PR A11 2´+ 5+PR B17 2+2´+ 5+PR Mikä on pelin jatkuessa joukkueiden pelaajavahvuus jäällä? Kuinka monta sijaista tarvitaan?","answer":"A-joukkue pelaa neljällä pelaajalla viisi minuuttia. B-joukkueen kapteenilla on mahdollisuus valita joko pelata neljällä pelaajalla neljä minuuttia tai kolmella pelaajalla kaksi minuuttia. A-joukkueen tulee asettaa sijainen kärsimään isoa rangaistusta. B-joukkueen tulee asettaa yksi sijainen neljäksi minuutiksi tai kaksi sijaista kahdeksi minuutiksi (kahdelle pienelle rangaistukselle). Sääntö 20.3"},{"id":"20.2","rule_number":"20","question":"Päätuomari tuomitsee A-joukkueen pelaajalle ison rangaistuksen. Voiko hän mitätöidä rangaistuksen kokonaan videotarkistuksen jälkeen?","answer":"Kyllä. Päätuomari voi joko vahvistaa jäällä tuomitun ison rangaistuksen, muuttaa ison rangaistuksen pieneksi rangaistukseksi tai mitätöidä rangaistuksen. 0 4"},{"id":"20.3","rule_number":"20","question":"O S Joukkue A tekee maalin. Pelikatkolla linjatuomari ilmoittaa rikkeestä Joukkue A:n pelaajaa vastaan, jonka hän uskoo olevan ison A rangaistuksen arvoinen. Rike tapahtuu ennen maalia. Mitä tapahtuu, kun päätuomarit tarkistavat rikkeen videolta ja ovat linjatuomarin kanssa · R samaa mieltä? A N","answer":""},{"id":"20.5","rule_number":"20","question":"Joukkue A tekee maalin. Tässä pelikatkossa linjatuomari ilmoittaa rikkomuksesta Joukkue A pelaajaa vastaan, jonka hän uskoo olevan ison rangaistuksen arvoinen. Mitä tapahtuu, kun erotuomarit tarkistavat rikkomuksen videolta mutta katsovat, että se tilanteessa ei ole rikettä?","answer":"Koska rikettä ei ole tapahtunut, ei tuomita rangaistusta ja maali hyväksytään."}],"21":[{"id":"21.1","rule_number":"21","question":"A-joukkueen pelaaja syyllistyy 2. erässä rajuun/peliin kuulumattomaan rikkeeseen, joka päätuomareiden mielestä vaarantaa B-joukkueen pelaajaa. Päätuomarit eivät kuitenkaan löydä yhteyttä mihinkään säännöissä esitettyihin rangaistussyihin. Mitä päätuomarit voivat tehdä? HAKEMISTO RANGAISTUSLAJIT","answer":"Tilanteissa, joissa tekoa ei ole kuvattu säännöissä, mutta se selvästi vaarantaa ketä tahansa peliin osapuolta, voivat päätuomarit 5+PR vaarallisesta/piittaamattomasta toiminnasta. HUOM! Tätä sääntöä käytetään vain erikoistapauksissa, eikä sitä tule käyttää säännöllisesti. Sääntö 21.1"}],"22":[{"id":"22.1","rule_number":"22","question":"A-joukkue pelaa yhden pelaajan verran vajaalukuisena, kun pientä rangaistusta on jäljellä 1:30. Tällä pelikatkolla molemmille joukkueille tuomitaan pieni rangaistus (2´). Seuraavalla pelikatkolla toiselle pelaajista, joka kärsii samanaikaista (kumoutuvaa) pientä rangaistusta, tuomitaan lisäksi käytösrangaistus (10´). Täytyykö joukkueen asettaa sijainen rangaistusaitioon kärsimään pientä rangaistusta vai voiko rangaistukset ottanut pelaaja kärsiä molemmat (2´ja 10`)?","answer":"Ei. Samanaikaiset pienet rangaistukset kumoutuvat, eivätkä täten mene kelloon. Näin ollen ne ja lisäksi tullut käytösrangaistus (10´) eivät vaikuta pelaajavahvuuteen jäällä. Rangaistusaitiossa jo istuva pelaaja kärsii itse ottamansa rangaistukset, eikä sijaisia tarvita. Säännöt 19.1 ja 22.2 HAKEMISTO RANGAISTUSLAJIT"},{"id":"22.2","rule_number":"22","question":"Kuka tahansa pelaaja, jolle tuomitaan ottelussa toinen käytösrangaistus (10´), tuomitaan hänelle automaattisesti pelirangaistus (PR). Oikein vai väärin?","answer":"Oikein. Sääntö 22"}],"23":[{"id":"23.1","rule_number":"23","question":"Summeri on soinut pelin päättymisen merkiksi. Kun pelaajat ja valmentaja ovat poistumassa jäältä, hävinneen joukkueen apuvalmentaja käyttää tuomaristoa kohtaan herjaavaa kieltä. Mitä hänelle tuomitaan?","answer":"Pelirangaistus (PR). Säännöt 39.5 (II) ja 75.5 (II ja IV)"},{"id":"23.2","rule_number":"23","question":"0 4 Linjatuomari on saattelemassa pelaajaa pois tappelun jälkeen. Hän kuulee, kun katsoja huutelee pelaajalle ja pilkkaa häntä. Pelaaja hermostuu ja tarttuu katsojaa kiinni ja ravistelee häntä. Miten linjatuomarin kuuluu toimia? O S A","answer":"· Linjatuomarin pitää raportoida kaikki näkemänsä ja kuulemansa asiat päätuomarille, joka sitten tuomitsee pelaajalle pelirangaistuksen (PR). R A Tilanne täytyy raportoida ottelun jälkeen asiankuuluville elimille. Sääntö 23.8 sanoo, että pelaajan yhteenotot katsojien kanssa johtavat N G pelirangaistukseen (PR). Sääntö 32.4 sanoo, että linjatuomarin kuuluu raportoida päätuomarille mm. pelinrangaistusta edellyttävät pelaajan A teot. I S T SJL HUOMAUTUS: 5+PR U S L A J I T"}],"24":[{"id":"24.1","rule_number":"24","question":"Voittomaalikilpailun suorituksen aikana (tai normaalin rangaistuslaukauksen) laukauksen suorittaja kadottaa kiekon hallinnan luistelee sen ohi. Kiekko jatkaa kuitenkin liukumista maalia kohti. Pelaaja ”kurvaa” takaisin, ottaa kiekon haltuunsa ja luistelee maalia kohti jatkaen suoritusta. Onko tämä sääntöjenmukaista?","answer":"Kyllä on. Kunhan kiekko ei pysähdy kokonaan, pelaaja voi ottaa kiekon uudestaan haltuunsa ja yrittää maalintekoa. Sääntö 24.2 (kolmas kappale)"},{"id":"24.2","rule_number":"24","question":"Ennen ottelun alkua valmentaja kysyy päätuomarilta, että missä kohtaa sääntökirjassa otetaan kantaa ”spin-o-rama”-harhautukseen.","answer":"Siihen otetaan kantaa säännössä 24.2. Ei ole sallittu harhautus rangaistuslaukauksessa tai voittomaalikilpailun suorituksessa. HAKEMISTO RANGAISTUSLAJIT"},{"id":"24.3","rule_number":"24","question":"Voittomaalikilpailun suorituksen/rangaistuslaukauksen aikana pelaaja on aikeissa laukaista kiekon maalia kohti. Kun hän pääsee aloitusympyrän ”viiksien” kohdille, hän heilauttaa mailansa, mutta ei lauokaan/osu kiekkoon (toiminta näyttää kuitenkin siltä, että pelaaja yritti laukaista kiekkoa). Kiekko jatkaa liikettään maalia kohti. Pelaaja ottaa sen uudelleen haltuunsa ja tekee lopulta maalin. Hyväksytäänkö maali? Miten perustelet ratkaisun?","answer":"Kyllä, maali hyväksytään. Kiekkoa ei varsinaisesti lauottu, kun siihen ei osuttu. Kiekon liike myös jatkui maalia kohti, eikä kyseessä ollut myös paalukiekko eli ns. ”ripari”. Sääntö 24.2"},{"id":"24.4","rule_number":"24","question":"Voidaanko maalivahti vaihtaa ns. lennossa? (Eli voidaanko jäällä oleva maalivahti vaihtaa varamaalivahtiin pelin ollessa käydessä?)","answer":"Sääntö 74.1 sanoo: ”Pelaajia voidaan vaihtaa milloin tahansa pelin käydessä pelaajapenkiltä..”. Maalivahteja ei ole erityisesti suljettu tästä pois, joten KYLLÄ, maalivahteja voi vaihtaa myös lennosta. Kuitenkin tähän on kaksi poikkeusta: a. Jos varamaalivahti vaihdetaan jäälle pelikatkolla korvatakseen jäällä olevan loukkaantuneen maalivahdin, vaihtoa ei voi suorittaa takaisin kuin vasta seuraavalla pelikatkolla. Sääntö 8.2 0 b. Jos joukkue päättää vaihtaa varamaalivahdin torjumaan rangaistuslaukausta, on tämän varamaalivahdin pysyttävä maalilla 4 seuraavaan pelikatkoon asti. Sääntö 24.2 O S On syytä huomata, että säännön 82.1 viimeinen kappale (jossa puhutaan maalivahdin vaihtamisesta), koskee maalivahdin A vaihtamista pelikatkolla, eikä näin ollen ole verrattavissa kysymyksessä esitettävään skenaarioon. · R A"},{"id":"24.6","rule_number":"24","question":"Puolustavan joukkueen pelaajaa ”blokkaa” hyökkääjän laukauksen ja kiekko kimpoaa juuri ja juuri siniviivan yli puolueettomalle alueelle. Laukauksen blokanneella pelaajalla on hyvä mahdollisuus saada irtokiekko haltuunsa ja päästä samalla läpiajoon. Kuitenkin häntä rikotaan (kampittamalla), kun hän on vielä juuri ja juuri omalla puolustusalueellaan, eikä hän näin ollen pääse irtokiekkoon käsiksi. Mikä on päätuomarin päätös asiassa? HAKEMISTO RANGAISTUSLAJIT","answer":"Pieni rangaistus (2´) kampituksesta. Ei rikkonut pelaaja ei ollut vielä puolueettomalla alueella, eikä rangaistuslaukausta voi siitä syystä tuomita. Sääntö 24.8"},{"id":"24.7","rule_number":"24","question":"A18 laukoo kiekon vastustajan maalia kohti heti siniviivan jälkeen hyökkäysalueellaan. B11 blokkaa laukauksen ja kiekko kimpoaa A18 ohi puolueettomalle alueelle. B11 luistelee A18 ohi puolueettomalle alueelle ja on pääsemässä läpiajoon, kunhan saa irtokiekon haltuunsa. B11 koukitaan takaapäin ja päätuomari nostaa käden ylös siirretyn rangaistuksen (rangaistuslaukaus) merkiksi. Sekunti sen jälkeen, kun päätuomari on nostanut kätensä ylös, erä loppuu. Vaikka B11 ei olisi koukattu, hänellä ei olisi ikinä ollut aikaa tarpeeksi luistella toiseen päähän kiekon kanssa ja yrittää maalia. Kun otetaan tämä fakta huomioon, tuomitaanko silti rangaistuslaukaus?","answer":"Ei tuomita rangaistuslaukausta, vaan pieni rangaistus (2´) koukkaamisesta. Perusteluna tässä on se, että koska peliaika erässä loppui, niin B11 ei viety kohtuullista maalintekotilannetta ja näin ollen rike ei täyttänyt kaikkia vaadittavia kohtia rangaistuslaukauksen tuomitsemiseen. Säännöt 24.8 (III), 55.2, 55.5 ja 57.3"},{"id":"24.8","rule_number":"24","question":"B-joukkueen hyväksi tuomitaan rangaistuslaukaus. A-joukkue päättää vaihtaa varamaalivahdin torjumaan suoritusta. Pitääkö varamaalivahdin jäädä jäälle rangaistuslaukauksen suorituksen jälkeen? 0 4","answer":"O Kyllä, vaihto voidaan suorittaa takaisin vasta seuraavalla pelikatkolla. Sääntö 24.2 S A ·"},{"id":"24.10","rule_number":"24","question":"A-joukkueella on 2-0 vastaan hyökkäys. A12, jolla ei ole kiekkoa, koukitaan B6 toimesta. Heti sen jälkeen A13, jolla on kiekko, kampitetaan takaapäin ja päätuomari tuomitsee rangaistuslaukauksen (RL). Mitä menee rangaistuskelloon, jos A tekee maalin rangaistuslaukauksesta? Mitä menee rangaistuskelloon, jos A ei tee maalia rangaistuslaukauksesta?","answer":"Riippumatta rangaistuslaukauksen lopputulemasta, B6 pieni rangaistus (koukkaamisesta) menee kelloon. HAKEMISTO RANGAISTUSLAJIT"},{"id":"24.11","rule_number":"24","question":"A-joukkue tekee ylivoimalla maalin rangaistuslaukauksesta. Saako B-joukkue yhtään pelaajaa takaisin jäälle rangaistusaitiosta?","answer":"Kukaan ei pääse jäälle B:n rangaistusaitiosta, koska maali tehtiin rangaistuslaukauksesta. Sääntö 16.2"},{"id":"24.12","rule_number":"24","question":"A-joukkueen hyväksi tuomitaan rangaistuslaukaus (RL). Suorituksen aikana B-joukkueen pelaaja tai valmentaja heittää mailan tai jonkin muun esineen rangaistuslaukauksen suorittajaa kohti. Miten päätuomari toimii ja mitä rangaistuksia tuomitaan?","answer":"Jos rangaistuslaukauksesta ei tule maalia, suorittajalle annetaan uusi yritys. Rikkoneelle joukkueelle tuomitaan joukkuerangaistus (JR). Jos häirinnästä on vastuussa pelaajapenkillä oleva (tunnistettava) pelaaja, tuomitaan hänelle lisäksi käytösrangaistus (10´). Jos häirinnästä on vastuussa valmentaja tai joku muu joukkueen henkilöstön jäsen, hänelle tuomitaan lisäksi pelirangaistus (PR) ja hänet määrätään pukuhuoneeseen. Asia raportoidaan asiaankuuluvalle kurinpitoelimelle ja lisärangaistukset ovat myös mahdollisia. Sääntö 24.4"},{"id":"24.13","rule_number":"24","question":"0 Rangaistuslaukauksen (tai voittomaalikilpailun) suorittaja laukoo kiekon tolppaan, josta se kimpoaa maalivahdin kautta suoraan maaliin. Onko 4 tämä sääntöjenmukainen maali? O","answer":""},{"id":"24.15","rule_number":"24","question":"A12 on läpiajossa ja häntä rikotaan takaapäin B6 toimesta. A12 ei onnistu maalinteossa ja päätuomarin tuomio on rangaistuslaukaus A- joukkueen hyväksi. Seuranneella katkolla, ennen rangaistuslaukauksen suorittamista, A12 huitaisee mailalla B16. Miten päätuomari hoitaa tilanteen?","answer":"A12 ei voi suorittaa rangaistuslaukausta, koska hänelle tuomitaan pieni rangaistus (2´) huitomisesta ja hän menee istumaan rangaistusta rangaistusaitioon välittömästi. A-joukkueen valmentaja nimeää jonkun toisen pelaajan suorittamaan rangaistuslaukausta. Sääntö 24.3"},{"id":"24.16","rule_number":"24","question":"Rangaistuslaukauksen aikana, ennen kuin suorittaja saa laukausta aikaiseksi, maalivahti ”tuikkaa” mailalla kiekkoon (käärmeenkieli) ja kiekko nousee ylös ilmaan. Sen jälkeen kiekko kimpoaa suorittajan jalasta suoraan maaliin. Hyväksytäänkö maali?","answer":"Ei. Sääntö 24.2 toteaa, ettei rangaistuslaukauksessa voi syntyä maalia minkäänlaisesta kimmokkeesta/paluukiekosta (huom. tolppa/ylärima). Kun maalivahti tekee torjunnan tms., ainoa tapa, että maali voidaan hyväksyä, on kun kiekon liike jatkaa maaliviivan yli ilman, että rangaistuslaukauksen suorittaja vaikuttaa kiekon liikkeeseen millään tavoin."},{"id":"24.17","rule_number":"24","question":"0 4 Rangaistuslaukauksen tai voittomaalikilpailun suorituksen aikana suorittaja lähestyy maalia. Maalivahti ”tuikkaa” mailalla kiekkoon ja kiekko pomppaa sen jälkeen maalivahdin ohi kohti maalia. Suorittaja saa kiekon uudestaan haltuunsa ja ohjaa sen lopulta maaliin. Mikä on O päätuomarin ratkaisu? S A","answer":""},{"id":"24.19","rule_number":"24","question":"A-joukkue pelaa yhden pelaajan vajaalukuisena pienen rangaistuksen johdosta. B-joukkueen läpiajossa olevaa pelaajaa koukitaan niin, että vastustajan maila lopulta nousee hänen kasvoihinsa aiheuttaen haavan. Päätuomari tuomitsee rangaistuslaukauksen ja B-joukkueen pelaaja tekee maalin rangaistuslaukauksesta. Mikä on tämän jälkeen A-joukkueen pelaajavahvuus jäällä?","answer":"Peli jatkuu 3 vs. 5. Alkuperäinen pieni rangaistus pysyy voimassa (maali tehtiin rangaistuslaukauksesta). Rangaistuslaukaukseen johtaneesta rikkeestä tuomitaan 2+2 korkeasta mailasta. Näistä ensimmäistä ei tuomita minuutteina, koska tuomittiin rangaistuslaukaus. Toinen pieni rangaistus kärsitään ja laitetaan kelloon riippumatta siitä, tehdäänkö rangaistuslaukauksesta maalia vai ei. Sääntö 24.6"},{"id":"24.20","rule_number":"24","question":"A-joukkueen hyväksi tuomitaan rangaistuslaukaus. B-joukkue laittaa varamaalivahdin torjumaan sitä. Milloin maalivahti, joka oli jäällä ennen rangaistuslaukausta, voidaan vaihtaa takaisin jäälle?","answer":"Vaihto voidaan suorittaa takaisin seuraavalla pelikatkolla. Sääntö 24.2 HAKEMISTO RANGAISTUSLAJIT"},{"id":"24.21","rule_number":"24","question":"A-joukkue pelaa vajaalukuisena yhden pienen rangaistuksen johdosta. A-joukkue syyllistyy rikkeeseen, josta tuomitaan (siirrettynä) rangaistuslaukaus B-joukkueen hyväksi. Ennen kuin peli katkaistaan, B-joukkue tekee maalin. Tuomitaanko rangaistuslaukaus silti?","answer":"Ei. B-joukkueen maali päättää A-joukkueen vanhimman kellossa olleen pienen rangaistuksen. Kädessä siirrettynä ollut rangaistuslaukaus tuomitaan nyt ”normaalina” pienenä tai isona rangaistuksena ja laitetaan kelloon. Rangaistuslaukauksen tuomitsemisen tarkoitus on palauttaa joukkueelle maalintekotilaisuus. Nyt ei tilaisuutta menetetty, koska B-joukkue teki maalin. Rikettä ei silti ”unohdeta”, joten asianmukainen rangaistus on tuomittava. Sääntö 24.6"},{"id":"24.22","rule_number":"24","question":"Rangaistuslaukauksen tai voittomaalikilpailun suorituksen aikana maalivahti siirtää torjuntayrityksen seurauksena maalin vahingossa pois paikaltaan. Miten päätuomari toimii?","answer":"Päätuomarin tulee tehdä joku näistä kolmesta päätöksestä: a. Hyväksyä maali, jos päätuomarin mielestä maali olisi syntynyt siinäkin tapauksessa, jos maali olisi ollut normaalisti paikoillaan. b. Uusia rangaistuslaukaus, jos suorittaja ei tee maalia tai sitä ei voi määrittää olisiko kiekko mennyt maaliin, jos maali olisi ollut normaalisti paikoillaan. c. Jos maali siirtyy sen jälkeen, kun kiekko on jo mennyt maaliviivan yli. Rangaistuslaukaus on siinä tapauksessa jo päättynyt, eikä kohdat a. ja b. enää päde."},{"id":"24.23","rule_number":"24","question":"A11 yrittää laukoa kiekkoa vastustajan maalia kohti hyökkäysalueellaan, juuri siniviivan alla. B17 blokkaa laukauksen ja kiekko kimpoaa puolueettomalle alueelle. B17 yrittää luistella A11 ohi, molemmat ovat nyt puolueettomalla alueella. A11 huomaa, että B17 on pääsemässä läpiajoon ja koukkaa häntä. Päätuomari nostaa käden ylös siirretyn rangaistuksen (rangaistuslaukauksen) merkiksi. Siirretyn rangaistuksen aikana B17 pääseekin jatkamaan läpiajoon. A11 luistelee B17 kiinni ja rikkoo häntä uudestaan koukkaamalla takaapäin, vieden kohtuullisen maalitilanteen. Mikä on päätuomarin ratkaisu?","answer":"Päätuomarin tulee tuomita rangaistuslaukaus B-joukkueen hyväksi ja sen lisäksi tuomita A11 pieni rangaistus (2´) koukkaamisesta. Pieni rangaistus kärsitään normaalisti riippumatta siitä, tehdäänkö rangaistuslaukauksesta maali vai ei (sääntö 24.6). HUOM! On myös mahdollista tuomita kaksi rangaistuslaukausta samalla pelikatkolla. Esimerkiksi pelaajaa ensin rikotaan takaapäin vieden kohtuullinen maalintekotilanne ja siirretyn aikana kiekko suljetaan puolustavan joukkueen pelaajan toimesta maalialueella. (Vain yksi maali voidaan kuitenkin hyväksyä yhdellä pelikatkolla.) Kysymyksen tilanteessa, vain toinen (jälkimmäinen) rike täyttää kaikki rangaistuksenlaukauksen tuomitsemiseen vaadittavat perusteet. Ensimmäinen rike ei vie B17 kohtuullista maalintekotilannetta, koska hän pääsee vielä läpiajoon (sääntö 57.6). Sen vuoksi ensimmäisestä rikkeestä tuomitaan pieni rangaistus koukkaamisesta."},{"id":"24.24","rule_number":"24","question":"Rangaistuslaukauksen suorittaja laukoo kiekon maalia kohti. Laukaus osuu ylärimaan ja kimpoaa sen jälkeen suorittajan polvisuojasta suoraan maaliin, koskematta missään vaiheessa maalivahtiin. Hyväksytäänkö maali?","answer":"Ei. Rangaistuslaukauksessa ei voi tehdä maalia minkäänlaisella kimmokkeella/paluukiekosta. (Poikkeus: kiekko kimpoaa laukauksen jälkeen tolpasta/ylärimasta maalivahtiin ja siitä suoraan maaliin). Sääntö 24.2"},{"id":"24.25","rule_number":"24","question":"A7 on suorittamassa rangaistuslaukausta. Sen aikana B2 alkaa ”hakkaamaan” mailalla laitaan. A7 ei tee maalia rangaistuslaukauksesta. Mitä päätuomari tekee vai tarvitseeko reagoida mitenkään?","answer":"Jos päätuomarin mielestä B2 toiminta häiritsi A7 suoritusta, uusitaan rangaistuslaukaus ja B-joukkueelle tuomitaan joukkuerangaistus (JR)+ B2 käytösrangaistus (10´). Sääntö 24.4 HAKEMISTO RANGAISTUSLAJIT"},{"id":"24.26","rule_number":"24","question":"A19 on läpiajossa ja häntä rikotaan takaapäin B5 toimesta. Päätuomari nostaa käden ylös siirretyn rangaistuksen merkiksi. A20 ottaa irtokiekon, menee maalille, muttei onnistu maalinteossa. Mikä on päätuomarin ratkaisu?","answer":"A-joukkueelta ei viety kohtuullista maalintekotilannetta, koska A20 sai irtokiekon ja pääsi yrittämään maalia. Tämän vuoksi A-joukkueen hyväksi ei tuomita rangaistuslaukausta. Kuitenkin pieni rangaistus tuomitaan B5:lle. Sääntö 24.1"},{"id":"24.27","rule_number":"24","question":"B71 lyö kiekon kädellään punaviivaa kohti omalta puolustusalueeltaan. B75 viilettää A-joukkueen puolustajan ohi, eikä hänellä ole enää maalivahdin lisäksi muita A-joukkueen pelaajia vastassa (= pääsemässä läpiajoon). A54 ei ole muuta mahdollisuutta kuin koukata B75 nurin punaviivan kohdilla. Mitä tilanteesta tuomitaan?","answer":"Päätuomari tuomitsee A54 pienen rangaistuksen (2´) koukkaamisesta. Vaikka B75 olikin läpiajossa/pääsemässä läpiajoon, rangaistuslaukausta ei voi tuomita, koska peli olisi katkaistu käsisyöttönä heti, kun B75 koskee kiekkoon. Näin ollen kaikki rangaistuslaukauksen tuomitsemiseen tarvittavat perusteet eivät täyty. Säännöt 24.8 (III) ja 67.1 0"},{"id":"24.30","rule_number":"24","question":"Rangaistuslaukauksen (tai voittomaalikilpailun suorituksen) aikana, kun suorittaja lähestyy maalia, maalivahti liukuu vauhdikkaasti maalialueen läpi ja siirtää vahingossa maalin pois paikaltaan. Suorittajan laukaus menee selvästi ohi maalin. Mikä on päätuomarin päätös?","answer":"Koska oli selvää, ettei kiekko olisi mennyt maaliin, vaikka se olisi ollut normaalilla paikallaan, päätuomari uusii rangaistuslaukauksen. Sääntö 24.4"},{"id":"24.31","rule_number":"24","question":"A11 on läpiajossa, ei muita kuin vastustajan maalivahti edessään maalilla ja summeri soi aiheuttaen pelikatkon. Summeri soi toimitsijoiden virheen/teknisen vian vuoksi. Päätuomarin tulkinnan mukaan pelikellossa oli aikaa riittävästi läpiajon loppuunsaattamiseen.","answer":"Vaikka tällaista tilannetta ei varsinaisesti säännöissä ole mainittu, on maalaisjärjen mukaan luonnollista, että joukkueelle tulee palauttaa kohtuullinen maalintekotilanne. Tämän vuoksi tilanteesta tuomitaan rangaistuslaukaus. Sääntö 24.8 tukee tätä päätöstä. HAKEMISTO RANGAISTUSLAJIT"},{"id":"24.32","rule_number":"24","question":"A47 on läpiajossa. Kun A47 ylittää hyökkäyssiniviivan, B4 yrittää koukata häntä takaapäin. B4 osuu kuitenkin korkealla mailalla A47 kasvoihin, aiheuttaen vamman ja vieden kohtuullisen maalintekotilanteen. Tämä on sekä 2+2 että rangaistuslaukkauksen arvoinen rike. Mitä tapahtuu seuraavaksi?","answer":"A-joukkueen hyväksi tuomitaan rangaistuslaukaus ja B4 tuomitaan kaksinkertainen pieni rangaistus (2+2) korkeasta mailasta. Riippumatta siitä syntyykö rangaistuslaukauksesta maali vai ei, B4 kärsii toisen pienen rangaistuksen. Sääntö 24.6"},{"id":"24.33","rule_number":"24","question":"Rangaistuslaukauksen tai voittomaalikilpailun yrityksen aikana maalivahti yrittää ”tuikata” kiekkoa mailallaan, mutta suorittaja saa pidettyä kiekon hallussaan mailan lavassa ja tekee lopulta maalin. Mikä on päätuomarin päätös?","answer":"Maali hyväksytään. Suorittaja ei missään vaiheessa menettänyt kiekon hallintaa, joten tätä ei tulkita paluukiekosta tehdyksi maaliksi."}],"25":[{"id":"25.1","rule_number":"25","question":"O S A16 on läpiajossa puolueettomalla alueella. B-joukkueen maalivahti on vaihdettu ylimääräiseen kenttäpelaajaan. A16 rikotaan takaapäin ja A tilanteesta tulee tuomita maali (vaikkei kiekko ei menisikään maaliin). Ennen kuin päätuomari ehtii katkaisemaan pelin ja hyväksyä maalin, · R A16 huitaisee pienen rangaistuksen arvoisesti B-joukkueen pelaajaa, joka rikkoi häntä takaapäin. Miten päätuomarin kuuluu toimia? A N","answer":""},{"id":"25.3","rule_number":"25","question":"A-joukkueella on 3 vs. 2 - hyökkäys. B2 yrittää takakarvata ja pelata yhden A-joukkueen pelaajan pois tilanteesta. Kun he ajavat maalia kohti, B2 kaatuu kärkipiikkien vuoksi maalia päin ja siirtää sen pois paikoiltaan. Samassa, kun tämä tapahtuu, A5 on laukaisemassa kiekkoa ja laukookin sen lopulta maaliin. Ennen kuin kiekko ylittää maaliviivan, maalikehikko on irti tapeistaan. Hyväksytäänkö tämä maali?","answer":"Kyllä, maali hyväksytään. Ks. edellisen kysymyksen vastaus. (pätee niin RL kuin normaalissa pelitilanteessa) Säännöt 25.2, 25.4 ja 63.7 HAKEMISTO RANGAISTUSLAJIT"}],"26":[{"id":"26.1","rule_number":"26","question":"Mitkä rangaistukset kirjataan ensimmäisenä seuraavissa tilanteissa? Tilanne 1: erässä ajassa 6:36 A5 tuomitaan iso rangaistus (5´) ryntäyksestä ja A12 tuomitaan pieni rangaistus (2´) väkivaltaisuudesta. Tilanne 2: erässä ajassa 6:35 A5 tuomitaan pieni rangaistus (2´) ryntäyksestä ja A12 tuomitaan pieni rangaistus (2´) väkivaltaisuudesta.","answer":"Tilanne 1: Sääntö 26.3 toteaa: ”Kun iso rangaistus ja pieni rangaistus tuomitaan saman joukkueen kahdelle eri pelaajalla samaan aikaan, on rangaistusajanottajan kirjattava pieni rangaistus ensimmäiseksi rangaistukseksi.” Tämä vuoksi A12 kirjataan ensin. Tilanne 2: Säännöt 16.2 ja 26.1 toteavat: ”Kun saman joukkueen kahden pelaajan rangaistukset päättyvät samaan aikaan, kyseisen joukkueen kapteeni nimeää päätuomarille pelaajan, joka palaa ensin jäälle...” Tämän vuoksi tässä tilanteessa, se on kapteenin valinta. SJL HUOMIO: Ison rangaistuksen lisäksi tulee myös tuomita PR"},{"id":"26.3","rule_number":"26","question":"A-joukkueelle tuomitaan seuraavat pienet rangaistukset: 14:25 – A17 koukkaaminen 13:16 – A23 väkivaltaisuus 12:58 – A38 huitominen Pelissä ei tule katkoja A38 huitomisen jälkeen ennen kuin pelikello osoittaa 11:16. Mitä silloin tapahtuu?","answer":"Pelikellon näyttäessä katkolla 11:16, A17 ja A23 pienet rangaistukset ovat päättyneet. A-joukkue on edelleen yhden pelaajan verran vajaalukuinen. Tämän vuoksi yksi pelaaja saa luvan poistua rangaistusaitiosta. Koska A17 rangaistus päättyi ensimmäisenä, päästetään hänet ensimmäisenä rangaistusaitiosta pois. HUOM! Jos peli jatkuisi ilman katkoa pelikellon aikaan 10:25 asti, A23 pääsisi pois aitiosta ja A-joukkue olisi jälleen täysilukuinen. Pelaajat päästetään rangaistusaitiosta siinä järjestyksessä, kun heidän rangaistusaikansa päättyvät. A38 täytyy odottaa pelikatkoa päästääkseen pois rangaistusaitiosta. Sääntö 26.2 HAKEMISTO RANGAISTUSLAJIT"},{"id":"26.4","rule_number":"26","question":"A-joukkueen pelaajille tuomitaan pienet rangaistukset merkittyinä aikoina: A4 8:00 A6 7:20 A8 7:00 Ensimmäinen pelikatko tulee, kun pelikello näyttää 3:45. Milloin A6 palaa jäälle?","answer":"Pelikellon näyttäessä 4:00. Sääntö 26.2"},{"id":"26.5","rule_number":"26","question":"A-joukkueelle tuomitaan seuraavat pienet rangaistukset: A6 16:00 A7 15:30 A8 15:00 Pelissä ei tule katkoja A8 (15:00) tuomitun rangaistuksen jälkeen. Tiedämme, että pelikellon ajassa 13:30 A7 rangaistus päättyy ja A- joukkueella on oikeus saada yksi pelaaja pois rangaistusaitiosta. Pelaaja, jonka pitäisi päästä pois on A6. Käy kuitenkin niin, että 0 4 rangaistusaitionvalvoja tekee virheen ja päästää A7 pois rangaistusaitiosta. Linjatuomari näkee tämän ja tietää, että nyt pääsi väärä pelaaja jäälle. Miten linjatuomarin kuuluu toimia? O S","answer":""}],"27":[{"id":"27.1","rule_number":"27","question":"Molemmat joukkueet pelaavat täysilukuisina (5-5). Samalla pelikatkolla tapahtuu seuraavaa: A21 tuomitaan 2´maalivahdin estämisestä ja 2´väkivaltaisuudesta. B1 (maalivahti) tuomitaan 2´huitomisesta ja B25 tuomitaan 2´väkivaltaisuudesta. Mikä on joukkueiden pelaajavahvuus jäällä tilanteen jälkeen? Kuka kärsii maalivahdin rangaistuksen?","answer":"Peliä jatketaan 5 vs. 5. (Säännöt 19.1 ja 19.5) Maalivahdin pienen rangaistuksen kärsii pelin katkaisuhetkellä jäällä ollut toinen saman joukkueen pelaaja (vaikka rangaistus ei tässä tapauksessa kelloon menekään). Rangaistu saman joukkueen pelaaja (tässä tapauksessa B25) ei voi kärsiä maalivahdin rangaistusta. Sääntö 27.1 HAKEMISTO RANGAISTUSLAJIT"},{"id":"27.2","rule_number":"27","question":"Molemmille joukkueille tuomitaan rangaistukset tappelusta samalla pelikatkolla. Molemmat maalivahdit saavat myös rangaistukset. Toiselle mv:lle tuomitaan pieni rangaistus väkivaltaisuudesta ja toiselle pieni rangaistus poistumisesta maalialueeltaan. Nämä maalivahtien pienet rangaistukset kumoutuvat samanaikaisten rangaistusten sääntöä noudattaen, eivätkä ne siis mene rangaistuskelloon. Pitääkö molempien joukkueiden silti laittaa sijaiset rangaistusaitioon kärsimään maalivahdeille tuomitut pienet rangaistukset?","answer":"Kyllä. ” Maalivahti ei kärsi rangaistusaitiossa hänelle tuomittua pientä rangaistusta, mutta sen sijaan pienen rangaistuksen kärsii toinen rikkeen pelin katkaisuhetkellä jäällä ollut (ei rangaistu) saman joukkueen pelaaja” Sääntö 27.1"},{"id":"27.3","rule_number":"27","question":"Maalivahdille tuomitaan käytösrangaistus (10´) vastustajan tekemän maalin jälkeen ensimmäisellä kierroksella voittomaalikilpailussa. Voiko maalivahti enää jatkaa torjumista voittomaalikilpailussa? Miten päätuomari toimii tilanteessa?","answer":"Kyllä, maalivahti voi jatkaa voittomaalikilpailussa. Kaikki ne pelaajat, jotka eivät kärsi rangaistusta, ovat sääntöjen mukaan edustuskelpoisia voittomaalikilpailuun. Koska maalivahti ei varsinaisesti kärsi omaa käytösrangaistustaan, voi hän jatkaa torjumista voittomaalikilpailussa. Kuitenkin, sijaisesta, joka maalivahdin rangaistuksen joutuu kärsimään, tulee eduskelvoton voittomaalikilpailuun. (Tämä pätee myös tilanteessa, jossa sijainen on kärsimässä maalivahdin käytösrangaistusta ennen voittomaalikilpailun alkua) Sääntö 27.3 0 4 HUOM! Kun maalivahdille tuomitaan käytösrangaistus (10´) voittomaalikilpailun aikana, on joukkueen nimettävä rangaistusta kärsimään sijainen, joka ei ole vielä osallistunut kilpailuun. Tämä on johdonmukaista normaaliin pelitilanteeseen nähden, jolloin rangaistun maalivahdin O joukkuetta vaaditaan menettämään yhden pelaajan ”palvelukset”/suoritukset joukkueen hyväksi maalivahdin rangaistuksen/rangaistusten S keston ajaksi. A · R"},{"id":"27.5","rule_number":"27","question":"Maalivahti tulee pois maalialueeltaan puolueettomalle alueelle ja pelaa kiekkoa, joka on punaviivan toisella puolella (vastustajan puolella). Maalivahdin luistimet ovat kuitenkin edelleen omalla puolella. Tuomitaanko maalivahdille rangaistus?","answer":"Kyllä, maalivahdille tuomitaan pieni rangaistus (2´). Kiekon asema on määräävänä tekijänä tätä sääntöä sovellettaessa. Sääntö 27.7 HAKEMISTO RANGAISTUSLAJIT"},{"id":"27.6","rule_number":"27","question":"Maalivahti poistuu maalialueeltaan pelatakseen kiekkoa. Molemmat maalivahdin luistimet ovat maalivahdille nimetyn alueen (jossa pelaaminen sallittua) ulkopuolella. Maalivahti pysäyttää kiekon mailallaan maaliviivan päällä. Onko maaliviiva myös kiellettyä aluetta ja näin ollen esimerkin tulee tuomita maalivahdille pieni rangaistus?","answer":"Maaliviiva ei ole vielä kiellettyä aluetta, joten maalivahdille ei tuomita rangaistusta. Sääntö 27.8 toteaa: ”Maalivahdille tuomitaan pieni rangaistus pelin viivyttämisestä, jos hän pelaa kiekkoa maaliviivan takana nimetyn alueen ulkopuolella. Määräävänä tekijänä on kiekon asema.” Esimerkissä kiekko ei ole vielä maaliviivan takana."},{"id":"27.7","rule_number":"27","question":"Maalivahti poistuu maalialueeltaan yrittääkseen pelata kiekkoa, joka on valumassa maaliviivan taakse kulmauksessa. Maalivahti huomaa, ettei ehdikään kiekolle ja alkaa vetäytymään takaisin maalialueelleen. Maalivahdin ollessa vielä matkalla ja pelaamiselle sallitun alueen ulkopuolella, vastustaja saa kiekon kulmauksessa ja yrittää syöttää sen maalin eteen. Maalivahti pudottautuu jäähän ja katkaisee syötön patjoillaan. Patjat ovat selvästi maalivahdin pelaamiselle sallitun alueen ulkopuolella. Tuomitaanko maalivahdille rangaistus?","answer":"0 Kun maalivahti kerran ”pelaa” kiekkoa maaliviivan takana, hänelle nimetyn alueen ulkopuolella, tuomitaan hänelle pieni rangaistus (2´) pelin 4 viivyttämisestä. Sääntö 27.8 O S A"},{"id":"27.8","rule_number":"27","question":"· R Kun 1. erää on 2:10, pelaajalle tuomitaan pieni rangaistukset väkivaltaisuudesta. Hänen on poistuttava pukuhuoneeseen A N loukkaantumisen takia. G A Täytyykö loukkaantuneen pelaajan joukkue laittaa sijainen rangaistusaitioon istumaan tätä väkivaltaisuusrangaistusta? Jos täytyy, I S pitääkö sijaisen olla sellainen, joka oli jäällä rikkeen aikana? Milloin sen sijaisen täytyy olla jokin jäällä olevista pelaajista? T U S","answer":""},{"id":"27.9","rule_number":"27","question":"A-joukkue laukoo kiekon B:n puolustusalueelle. Maalivahti poistuu maalialueeltaan pelatakseen kiekkoa. Hän kuitenkin huomaa, että on hänelle nimetyn alueen ulkopuolella ja päättääkin palata takaisin maalialueelleen. Kiekko kimpoaa suojalasista ja osuu vahingossa maalialueelle palaamassa olevaa maalivahtia. Osumahetkellä maalivahti on edelleen maaliviivan takana hänelle nimetyn alueen ulkopuolella. Tuomitaanko maalivahdille rangaistus?","answer":"Ei tuomita. Sääntö sanoo, että maalivahdin tulee pelata kiekkoa, jotta rangaistus voidaan tuomita. Sääntö 27.8 HAKEMISTO RANGAISTUSLAJIT"},{"id":"27.10","rule_number":"27","question":"Päätuomarilla on käsi ylhäällä A-joukkueen siirretyn pienen rangaistuksen johdosta. A-joukkueen maalivahti poistuu maalialueeltaan ja pelaa kiekkoa oman alueensa kulmauksessa maaliviivan takana saadakseen pelin katkaistuksi. Tuomitaanko maalivahdillekin pieni rangaistus, koska hän pelaa kiekkoa hänelle nimetyn alueen ulkopuolella?","answer":"Kyllä, maalivahdille tuomitaan pieni rangaistus (2´) pelin viivyttämisestä, koska hän pelaa kiekkoa hänelle nimetyn alueen ulkopuolella. Sen lisäksi A- joukkueelle luonnollisesti tuomitaan siirrettynä tulossa ollut pieni rangaistus. Sääntö 27.8 (Katso myös sääntö 63.2 (VIII))"},{"id":"27.11","rule_number":"27","question":"Kiekko menee torjunnan jälkeen maaliviivan taakse maalivahdin pelaamiselle sallitun alueen ulkopuolelle, mutta lähelle maalia. Sen jälkeen torjunnan tehnyt maalivahti pudottautuu mahalleen ja yrittää tökkiä mailallaan kiekkoa vastustajalta, joka oli laukomassa sitä maalille, pois. Sitä tehdessään maalivahdin toinen luistin on maalialueella ja toinen sen ulkopuolella. Pitääkö päätuomarin reagoida jotenkin tilanteeseen?","answer":"Tämä on sääntöjenmukaista jääkiekkoa, joten annetaan pelin jatkua! Tilanteesta ei tuomita rangaistuksia, koska maalivahdin toinen luistin koskettaa maalialuetta. Sääntö 27.8 0 4"},{"id":"27.12","rule_number":"27","question":"O A-joukkueen maalivahdille tuomitaan iso rangaistus (5´). Täytyykö A-joukkueen laittaa sijainen välittömästi rangaistusaitioon S A kärsimään tätä rangaistusta vai voivatko he valita laittavansa sijaisen rangaistusaitioon mihin aikaan tahansa ennen ison rangaistuksen päättymisaikaa? · R A","answer":""},{"id":"27.14","rule_number":"27","question":"Maalin läheisyydessä tapahtuvan kiistan aikana Joukkueen A maalivahti tulee ulos maalialueelta ja saa 2 minuuttia maalialueelta poistumisesta ja 5 minuuttia tappelusta. Joukkueen B hyökkääjä saa 5 minuuttia tappelusta. Kuka kärsii maalivahdin rangaistukset?","answer":"Kaikki maalivahdille tuomitut rangaistukset tulee suorittaa joukkueen toisen jäsenen, joka oli jäällä, kun peli katkaistiin. Lisäksi, jos maalivahti on osallisena samanaikaisesti tuomittaviin rangaistuksiin ja sen seurauksena joukkueen on pelattava alivoimalla maalivahdille määrättyjen lisärangaistusten vuoksi, pelaaja, joka on määrätty suorittamaan maalivahdille määrätyt lisäaikarangaistukset, voi olla kuka tahansa pelaaja joukkueen valmentajan nimeämä pelaaja. Sääntö 27.1 Sääntö 27.2 SJL HUOMIO: Ison rangaistuksen lisäksi tulee myös tuomita PR ja hänet poistetaan ottelusta. HAKEMISTO RANGAISTUSLAJIT"},{"id":"27.15","rule_number":"27","question":"Pelikatkolla, vaihtoproseduuria valvova päätuomari huomaa, että maalivahti on pelaajapenkkinsä luona vaihtamassa mailaa. Miten päätuomari hoitaa tilanteen?","answer":"Sääntö 27.6 – ” Pelikatkon aikana maalivahti ei saa mennä pelaajapenkkinsä luo vaihtaakseen mailaa tai varustetta tai huoltamaan sitä tai loukkaantumisen takia tai saamaa ohjeita, ellei hän ensin saa päätuomarilta lupaa siihen. Muussa tapauksessa joukkueen täytyy välittömästi (ilman viivettä) vaihtaa maalivahti korvaavaa maalivahtiin tai joukkueelle tuomitaan joukkuerangaistus (JR).”"},{"id":"27.16","rule_number":"27","question":"B-joukkue törmää maalialueellaan olevaan A-joukkueen maalivahtiin. Tilanteesta seuraa tappelu ja B-joukkueen hyökkääjälle tuomitaan isot rangaistukset ryntäyksestä ja tappelusta. A-joukkueen maalivahdille tuomitaan pieni rangaistus (2´) poistumisesta maalialueelta ja iso rangaistus (5+PR) tappelusta. Miten maalivahdin rangaistukset kärsitään?","answer":"Maalivahti ja hyökkääjä poistetaan ottelusta. A-joukkueen tulee asettaa sijainen maalivahdin pienelle rangaistukselle (Pelaaja joka oli jäällä pelin katkaisuhetkellä). Sääntö 27.1 ja 27."},{"id":"27.17","rule_number":"27","question":"0 Onko olemassa tilanteita, jolloin maalivahdin rangaistusta ei kärsi pelaaja, joka oli jäällä kun peli katkaistiin? 4 O","answer":"S Sääntö 27.1 – ” Jos maalivahdin rangaistus on osa samanaikaisia rangaistuksia ja hänen joukkueensa täytyy pelata vajaalukuisena A maalivahdin lisärangaistuksen takia, näitä lisärangaistuksia kärsimään nimetty pelaaja voi olla kuka tahansa rikkoneen joukkueen valmentajan · R (kapteenin välityksellä) nimeämä pelaaja.” Kun maalivahti saa ison rangaistuksen, joka on samanaikainen vastustajajoukkueen pelaajan ison A N rangaistuksen kanssa, ei kenenkään pelaajan tarvitse mennä rangaistusaitioon kärsimään maalivahdin isoa rangaistusta. G (Sääntö 27.5) A I S T U"},{"id":"27.18","rule_number":"27","question":"S L Pelikatkolla A-joukkueelle tuomitaan pieni rangaistus (2´) ja B-joukkueen maalivahdille tuomitaan kaksi pientä rangaistus (2+2). On selvää, A J että B-joukkueen tulee laittaa sijainen, joka oli jäällä pelin katkaisuhetkellä, kärsimään maalivahdille tuomitut neljä minuuttia. Heidän tulee I T laittaa myös toinen sijainen, joka kärsii pienen rangaistuksen, mikä aiheuttaa B-joukkueen vajaalukuisuuden (menee siis kelloon). Täytyykö tämän sijaisen olla myös sellainen, joka jäällä pelin katkaisuhetkellä?","answer":"Ei. Katso edellisen tilanteen (27.17) vastaus. Sääntö 27.1"},{"id":"27.19","rule_number":"27","question":"Siirretty rangaistus on viestitty joukkuetta A vastaan. Joukkueen B maalivahti on matkalla vaihtoaitioon saadakseen lisähyökkääjän kentälle. Kun maalivahti ylittää keskiviivan ja lähestyy vaihtoaitiota viiden jalan (noin 1,5 metrin) etäisyydelle, kiekko tulee hänen suuntaansa ja hän pysäyttää sen juuri samalla hetkellä, kun vaihtopelaaja hyppää jäälle vaihtoaitiosta. Mitä rangaistuksia tilanteessa tulisi määrätä?","answer":"Heti kun maalivahti koskee kiekkoon, hänelle tulee määrätä pieni rangaistus kiekon pelaamisesta keskiviivan väärällä puolella. Tässä tilanteessa määrätään vain yksi rangaistus joukkuetta A vastaan. HAKEMISTO RANGAISTUSLAJIT"}],"28":[],"29":[],"30":[],"31":[{"id":"31.1","rule_number":"31","question":"Maalinedushässäkän aikana päätuomari kadottaa kiekon näkökentästään ja on puhaltamassa pilliin katkaistakseen pelin, mutta kiekko tuleekin esille ja ylittää maaliviivan. TV- hidastukset osoittavat selvästi, että kiekko on ylittänyt maaliviivan ennen pillin ääntä. Mikä on päätuomarin päätös? Voiko tilanteen tarkastaa videoilta?","answer":"Maalia ei hyväksytä. Tilanteessa on inhimillinen tekijä mukana pilliin viheltämisessä. Päätuomari voi tulkita, että peli on katkennut, vaikka ei ole vielä ”fyysisesti” ehtinyt/voinut jostain syystä pilliin puhaltaakaan. Tämän vuoksi päätuomarin näkemys/tulkinta on määräävänä tekijänä: olisiko kiekko ylittänyt maaliviivan ennen hänen vihellystään vai kuuluiko pelin olla ns. poikki. Tätä tilannetta ei voi tarkistaa videoilta. Sääntö 37.3 Päätuomari kuitenkin informoi joukkueita ja kuuluttajaa, ettei maalia voida hyväksyä, koska peli oli vihelletty poikki ennen kuin kiekko ylitti maaliviivan. Tämä myös kuulutetaan hallissa. 0 5"},{"id":"31.2","rule_number":"31","question":"O Hyökkäävän joukkueen pelaaja menettää kypäränsä maalineduskamppailussa. Maalia kohti tulee laukaus. Kiekko menee jäässä olevan S kypärän sisälle ja jää sinne. Pelaaja, joka menetti aiemmin kypäränsä, laukoo kypärän (ja kiekon, joka on siellä sisällä) maaliin ennen A vihellystä. · T U Hyväksytäänkö maali? Mitkä ovat perustelut ratkaisuun? O M","answer":""},{"id":"31.3","rule_number":"31","question":"Maalinedusruuhkan aikana päätuomarille on selvää, ettei kiekko mennyt maaliin (sivuverkko heilahtaa), mutta punainen maalilamppu syttyy. Miten päätuomari toimii?","answer":"Päätuomari tai (Suomessa yleensä) kuuluttaja ilmoittaa, ettei maali hyväksytä, koska kiekko ei ylittänyt maaliviivaa. Sääntö 31.5 HAKEMISTL TUOMARISTO"}],"32":[{"id":"32.1","rule_number":"32","question":"Linjatuomari havaitsee rikkeen, josta kuuluu tuomita 5+PR. Voiko linjatuomari katkaista pelin?","answer":"Jos linjatuomarin näkemyksen mukaan pelaaja ei ole vakavasti loukkaantunut, hän raportoi näkemyksensä päätuomarille pelikatkolla. Säännöt 32.4 ja 32.5"},{"id":"32.2","rule_number":"32","question":"Linjatuomari havaitsee, kun A-joukkueen pelaaja heittää mailan pelaajapenkiltä jäällä joukkuekaverilleen, jonka maila on rikkoontunut. Mikä on toimintaohje linjatuomarille?","answer":"Linjatuomari katkaisee pelin (jos päätuomarit eivät tilannetta havaitse) ja raportoi havaintonsa päätuomarille, joka sitten tuomitsee asianmukaisen rangaistuksen, joka tässä tapauksessa on joukkuerangaistus (JR). Sääntö 32.4"},{"id":"32.3","rule_number":"32","question":"Peli pyörii A-joukkueen puolustusalueella. B33 on kiekko hallinnassaan ja hän on syöttämässä sitä joukkuekaverilleen, joka on 00 55 maaliviivan tuntumassa. Kun B33 yrittää syöttöä, A2 laukoo rikkinäisen mailan häntä kohti. Se osuukin B33 mailaan ja kiekko kimpoaa pois lavasta. Kumpikaan päätuomareista ei havaitse tilannetta, mutta toinen linjatuomareista havaitsee. OO SS","answer":""},{"id":"32.5","rule_number":"32","question":"Jos maalivahti heittää mailansa kiekkoa kohti puolustusalueellaan, voiko linjatuomari katkaista pelin välittömästi?","answer":"Kyllä, linjatuomari voi katkaista pelin RL:n tuomitsemista varten. Säännöt 53 ja 32.5 (III)"},{"id":"32.6","rule_number":"32","question":"A57 on viilettämässä läpiajoon ja katsoja heittää popcornilaatikon jäälle. Voiko linjatuomari katkaista pelin, jos päätuomarit eivät tilannetta havaitse?","answer":"Kyllä. Sääntö 32.5 HAKEMISTO TUOMARISTO"},{"id":"32.7","rule_number":"32","question":"Linjatuomari havaitsee, kun pelaaja pelaa mailallaan kiekkoa ennen kuin astuu jäälle rangaistusaitiosta. Miten linjatuomari kuuluu toimia?","answer":"Linjatuomari voi katkaista pelin ja raportoi havaintonsa päätuomarille, joka sitten tuomitsee pienen rangaistuksen estämisestä (2´). Säännöt 32.4 (III) ja 56.2 (VIII)"}],"33":[],"34":[{"id":"34.1","rule_number":"34","question":"A-joukkueelle tuomitaan rangaistus. Pelin jatkuessa pelikello toimii normaalisti, mutta rangaistuskello ei. Miten jäällä oleva tuomaristo toimii? HAKEMISTO TUOMARISTO","answer":"Pelin annetaan jatkua seuraavaan pelikatkoon asti. Tuomariston tulee infota toimitsijoita pelin käydessä siitä, että päästävät pelaajan oikeaan aikaan jäälle, jos pelikatkoa ei ennen rangaistuksen päättymistä tulekaan. Sääntö 34.7"},{"id":"34.2","rule_number":"34","question":"Joukkueelle A määrätään rangaistus. Kun peli jatkuu, pelikello käynnistyy, mutta rangaistuskello ei. Mitä jäällä olevien tuomareiden tulee tehdä?","answer":"Pelin annetaan jatkua seuraavaan pelikatkoon asti. Mikäli mahdollista, rangaistusaika tulisi korjata ja asettaa näkyviin rangaistuskelloon kyseisellä hetkellä. Jos aikaa ei voida laittaa kelloon, molemmille joukkueille tulee ilmoittaa, mihin aikaan pelaajan rangaistus päättyy peliajassa. Jos pelikatkoa ei tule, jäällä olevien tuomareiden tulee ilmoittaa toimitsijoille, jotta he päästävät rangaistun pelaajan pois rangaistusaitiosta oikeaan aikaan. (Sääntö 34.7, kappale 3)"},{"id":"34.3","rule_number":"34","question":"Peliä, joka on jo ratkennut, on jäljellä muutamia sekunteja. Pelin käydessä syntyy kahakka, jota linjatuomarit yrittävät selvittää. Tietäen, että peliä on jäljellä vain muutamia sekunteja, kukaan tuomaristosta ei katkaise peliä. Peliajanottaja pysäyttää kuitenkin pelikellon niin, että aikaa jää 1.2 sekuntia. Miten tuomariston kuuluu toimia? 0 5","answer":"Olettaen, ettei kahakasta ole syytä tuomita rangaistuksia, päätuomarin tulee ohjeistaa ajanottajaa ”juoksuttamaan” kello loppuun, koska peliä O S ei ollut missään vaiheessa katkaistu ja sen olisi pitänyt päättyä peliajan puolesta. Tällä tavalla ennaltaehkäistään myös mahdolliset tulevat A kahinat, jos peliä vielä jatkettaisiin 1.2 sekuntia. · T Sääntö 34.7 tukee tätä tuomariston ratkaisua niin kuin tekee myös Sääntö nro 1 ”maalaisjärki”. U O M"}],"35":[{"id":"35.2","rule_number":"35","question":"A-joukkueen pelaaja on rangaistusaitiossa ja rangaistusaition valvoja päästää hänet vahingossa jäälle ennen hänen rangaistusaikansa päättymistä. A-joukkueella on kiekko hallussa hyökkäysalueellaan, kun päätuomarilla nousee käsi ylös B-joukkueen siirretyn rangaistuksen merkiksi. Ennen kuin peli ehditään katkaista, A-joukkue tekee maalin ja liian aikaisin rangaistusaitiosta päässyt A:n pelaaja on myös jäällä. Seuranneella pelikatkolla päätuomarille ilmoitetaan, että A:n pelaaja on päästetty virheellisesti liian aikaisin takaisin jäälle. Mikä on päätuomarin ratkaisu?","answer":"A-joukkueen maali hylätään. B-joukkueelle siirrettynä tulossa ollut rangaistus tuomitaan. A-joukkueen pelaajan pitää mennä takaisin rangaistusaitioon kärsimään rangaistuksensa loppuun. A-joukkueelle ei tuomita lisärangaistuksia, koska kyseessä oli rangaistusaition valvojan tekemä virhe. Sääntö 68.5. Katso myös säännöt 78.5 (IV), 70.4, 35.1 ja 70.9"},{"id":"35.3","rule_number":"35","question":"A12 tuomitaan iso ja pieni rangaistus 2. erän alkupuolella. Toisessa vaihdossaan päästyään takaisin jäälle, A-joukkue tekee maalin. Maalia HAKEMISTO TUOMARISTO ilmoittamassa olleelle päätuomarille kerrotaan, että A12 olisi pitänyt tuomita pelirangaistus aiemmasta isosta rangaistuksesta, koska se oli hänen toinen isonsa pelissä. Miten päätuomari toimii?","answer":"Päätuomarin tulee hylätä maali, koska maalin tehneellä joukkueella oli edustuskelvoton pelaaja jäällä (sääntö 5.2) ja tuomita A12 pelirangaistus. SJL HUOMIO: Pelkkä 5 min rangaistus ei mahdollista."},{"id":"35.4","rule_number":"35","question":"B15 tuomitaan pieni rangaistus (2´), kun pelikello näyttää, että erää on jäljellä 5:13. Kun pelikello näyttää 3:13 tulee pelikatko. Rangaistuskello näyttää, että rangaistusta on yksi sekunti jäljellä, 0:01. Onko B15 rangaistus päättynyt?","answer":"Ei. Rangaistuskellon aikaa pidetään paikkansapitävänä. Tilanteessa pelaajan pitää pysyä rangaistusaitiossa, kunnes kello näyttää 0:00. Sääntö 35.1"},{"id":"35.5","rule_number":"35","question":"B15 tuomitaan pieni rangaistus (2´), kun erää on jäljellä 2:13. Kun pelikello näyttää, että aikaa on jäljellä 0:13.6, tulee pelikatko. Rangaistuskello näyttää, että B15 rangaistusta on jäljellä 0:01. Onko rangaistus päättynyt? 00","answer":""},{"id":"35.7","rule_number":"35","question":"A-joukkue johtaa 4-3 loppupuolella olevaa kiihkeää kamppailua. Heille tuomitaan pieni rangaistus (2´) koukkaamisesta, kun 3. erää on jäljellä 2:25. Kun erää on jäljellä 1:11, heille tuomitaan vielä pieni rangaistus (2´) kampituksesta. B-joukkue tekee maalin, kun pelikello näyttää, että erää on jäljellä 25.9 sekuntia. Mikä on pelaajavahvuus jäällä, kun peli jatkuu?","answer":"Olettaen, että ensimmäistä rangaistusta on jäljellä vielä 0:01, päättyy tämä rangaistus B-joukkueen maalista. Kampitusjäähyn saanut pelaaja pysyy vielä rangaistusaitiossa ja peliä jatketaan, kun 25.9 sekuntia on jäljellä, 4 vs. 5. Säännöt 16.2 ja 35.1"},{"id":"35.8","rule_number":"35","question":"A-joukkueelle tuomitaan seuraavat rangaistukset: A6 14:02 väkivaltaisuus A12 13:27 koukkaaminen B-joukkue tekee maalin, kun pelikello näyttää 12:02. Rangaistuskellot näyttävät seuraavaa: A6 0:01 A12 0:35 Miten päätuomari toimii tilanteessa?","answer":"Koska rangaistuskello näyttää, että A6 rangaistusta on 0:01 jäljellä, päättyy se B:n tekemästä maalista ajassa 12:02. A-joukkue jatkaa vajaalukuisena A12 rangaistuksen jäljellä olevan ajan. Sääntö 35.1 ja 16.2 HAKEMISTO TUOMARISTO"}],"36":[],"37":[{"id":"37.1","rule_number":"37","question":"Maalinedushässäkän aikana päätuomari kadottaa kiekon näkökentästään ja on puhaltamassa pilliin katkaistakseen pelin, mutta kiekko tuleekin esille ja ylittää maaliviivan. TV- hidastukset osoittavat selvästi, että kiekko on ylittänyt maaliviivan ennen pillin ääntä. Mikä on päätuomarin päätös? Voiko tilanteen tarkastaa videoilta?","answer":"Maalia ei hyväksytä. Tilanteessa on inhimillinen tekijä mukana pilliin viheltämisessä. Päätuomari voi tulkita, että peli on katkennut, vaikka ei ole vielä ”fyysisesti” ehtinyt/voinut jostain syystä pilliin puhaltaakaan. Tämän vuoksi päätuomarin näkemys/tulkinta on määräävänä tekijänä: olisiko kiekko ylittänyt maaliviivan ennen hänen vihellystään vai kuuluiko pelin olla ns. poikki. Tätä tilannetta ei voi tarkistaa videoilta. Sääntö 37.3 Päätuomari kuitenkin informoi joukkueita ja kuuluttajaa, ettei maalia voida hyväksyä, koska peli oli vihelletty poikki ennen kuin kiekko ylitti maaliviivan. Tämä myös kuulutetaan hallissa. Säännöt 31.2, 37.3 (ei ole listattua mahdolliseksi tarkastaa) ja 78.5 (XII)"},{"id":"37.2","rule_number":"37","question":"Rangaistuslaukauksen yrityksen aikana maalivahti yrittää pelata ”käärmeenkielellä” suorittajalta kiekon pois ja pakottaa samalla suorittajan kiertämään maalivahdin yrittääkseen tehdä maalia. Kun suorittaja pääsee maalivahdista ohi ja laukoo, kiekko on hänen lavassaan n. 15cm maaliviivan yli päädyn puolella. Kiekko kimpoaa maalivahdista ja menee lopulta maaliin. Tuomaristo ei havainnut sitä, että kiekko oli ennen 0 laukausta maaliviivan yli ja päätuomari näyttääkin maalia. Voiko videotuomaristo puuttua tilanteeseen ja varmistaa, että tuomaristo tekee 5 oikean ratkaisun tilanteessa. O S","answer":"A Kyllä voi. Videotuomaristo voi avustaa varmistamaan kaikkien maalien oikeellisuuden. Sääntö 37.3 · T U SJL HUOMIO: Ei videotuomaristoa käytössä vaan tuomareilla mahdollisuus itse tarkistaa tilanne O M A R"},{"id":"37.4","rule_number":"37","question":"Linjatuomari on aloittamassa toisesta päätyalueen aloituspisteestä erittäin tiukan maalitilanteen jälkeen. Heti, kun hän on tiputtanut kiekon, videotuomariston äänimerkki soi ja he haluavat lisää aikaa tilanteen tarkasteluun. Mitä tapahtuu?","answer":"Kun kiekko on tiputettu, ei tilannetta voi enää tarkastella. Jos on tiukka maalitilanne, tulee se tarkastella huolellisesti ennen kuin suoritetaan seuraava aloitus. Sääntö 37.1 ja sääntö 78.6 SJL HUOMIO: Ei videotuomaristoa käytössä vaan tuomareilla mahdollisuus itse tarkistaa tilanne HAKEMISTO TUOMARISTO"}],"38":[{"id":"38.1","rule_number":"38","question":"B- joukkue etenee hyökkäysalueelleen ja viivatilanne ei linjatuomarin näkemyksen mukaan ole paitsio. 23 sekuntia viivan ylityksen jälkeen B- joukkue tekee maalin. A-joukkueen valmentaja haluaa haastaa maalitilanteen, koska heidän mielestään maalia edeltävä B-joukkueen siniviivan ylitys oli paitsio. Tuomaristo tarkistaa tilanteen videolta ja toteaa, että A-joukkueen valmentaja on oikeassa. Tilanne oli paitsio. Mitä tapahtuu seuraavaksi?","answer":"A-joukkueen maali hylätään ja se kuulutetaan asianmukaisella tavalla. Pelikelloa siirretään 23 sekuntia taaksepäin. Seuraava aloitus suoritetaan puolueettoman alueen aloituspisteestä, A-joukkueen puolustusalueen ulkopuolelta. Säännöt 38.2 ja 83.6 (II) SJL HUOMIO: Valmentajan haasto ei käytössä"},{"id":"38.2","rule_number":"38","question":"A-joukkue etenee hyökkäysalueelleen ja viivatilanne ei linjatuomarin näkemyksen mukaan ole paitsio. B-joukkueen pelaaja koukkaa rangaistuksen arvoisesti A-joukkueen kiekollista pelaajaa. Päätuomarilla nousee käsi ylös siirretyn rangaistuksen merkiksi. Useita sekunteja myöhemmin A-joukkue tekee maalin. B-joukkueen valmentaja ilmoittaa, että hän haluaa haastaa tilanteen, koska hänen mielestään A-joukkueen 0 hyökkäysalueelle menoa edelsi paitsio. Tuomaristo tarkistaa tilanteen videolta ja toteaa, että B-joukkueen valmentaja on oikeassa. Tilanne oli 5 paitsio. Mitä tapahtuu seuraavaksi? O S A ·","answer":""},{"id":"38.3","rule_number":"38","question":"A-joukkue etenee hyökkäysalueelleen ja viivatilanne ei linjatuomarin näkemyksen mukaan ole paitsio. B-joukkueen pelaaja koukkaa rangaistuksen arvoisesti A-joukkueen kiekollista pelaajaa. Päätuomarilla nousee käsi ylös siirretyn rangaistuksen merkiksi. Useita sekunteja myöhemmin A-joukkue tekee maalin. B-joukkueen valmentaja ilmoittaa, että hän haluaa haastaa tilanteen, koska hänen mielestään A- joukkueen hyökkäysalueelle menoa edelsi paitsio. Tuomaristo tarkistaa tilanteen videolta ja toteaa, että B-joukkueen valmentaja on väärässä. Tilanne ei ollut paitsio. Mitä tapahtuu seuraavaksi?","answer":"Maali hyväksytään ja B-joukkueelle siirrettynä tulossa ollut rangaistus kumoutuu maalista. B- joukkueelle kuitenkin tuomitaan pieni rangaistus (2´) pelin viivyttämisestä, koska heidän haastonsa ei onnistunut. Tilanteet kuulutetaan asianmukaisella tavalla. Seuraava aloitus suoritetaan keskipisteestä. Sääntö 38.2 SJL HUOMIO: Valmentajan haasto ei käytössä"},{"id":"38.4","rule_number":"38","question":"A-joukkue etenee hyökkäysalueelleen ja viivatilanne ei linjatuomarin näkemyksen mukaan ole paitsio. A-joukkue tekee lopulta maalin, 23 sekuntia sen jälkeen, kun he pääsivät hyökkäysalueelle. B-joukkueen valmentaja ilmoittaa, että hän haluaa haastaa tilanteen, koska hänen mielestään A-joukkueen hyökkäysalueelle menoa edelsi paitsio. Tuomaristo tarkistaa tilanteen videolta ja toteaa, ettei videolta pysty varmasti todentamaan asiaa suuntaan tai toiseen. Mitä tapahtuu seuraavaksi?","answer":"Alkuperäinen, jäällä tehty tuomio, pysyy voimassa. Tilanne ei ole paitsio, maali hyväksytään ja B-joukkueelle tuomitaan pieni rangaistus (2´) pelin viivyttämisestä (epäonnistuneesta haastosta). Tilanne kuulutetaan asianmukaisella tavalla. Sääntö 38.2 SJL HUOMIO: Valmentajan haasto ei käytössä"},{"id":"38.5","rule_number":"38","question":"A-joukkue tekee maalin. B-joukkueen mielestä maalia edelsi paitsio ja he haastavat tilanteen. Tarkistus johtaa siihen, että alkuperäinen (jäällä tehty) tuomio kumotaan. Tilanne oli paitsio ja maali hylätään. Alkuperäisessä tilanteessa A-joukkueen pelaaja syötti kiekon omalta puolustusalueeltaan hyökkäyssiniviivalle. Mistä on seuraava aloitus videotarkistuksen (jonka perusteella tilanne todettiin paitsioksi ja maali hylättiin) jälkeen?","answer":"Koska videotarkistuksen tulos edellyttää maalin hylkäämistä, seuraava aloitus suoritetaan A-joukkueen puolustusalueen aloituspisteestä, lähinnä syöttökohtaa. Eli sen mukaan jatketaan, miten tilanne olisi tuomittu jäällä oikein nähtynä. Sääntö 83.6 määrää tässä tapauksessa aloituspaikan. SJL HUOMIO: Valmentajan haasto ei käytössä"},{"id":"38.6","rule_number":"38","question":"B-joukkue tekee maalin. A-joukkueen mielestä kyseessä oli maalivahdin häirintä ja he haastavat tilanteen. Videotarkistuksen jälkeen tuomaristo on edelleen sitä mieltä, että kyseessä oli ns. hyvä maali. Tämän kuultuaan A-joukkue haluaa haastaa vielä maalia edeltäneen viivatilanteen, koska se oli heidän mielestään paitsio. Onko tämä sallittua?","answer":"Ei. Yksi haasto/pelikatko on sallittu. Sääntö 38.43 SJL HUOMIO: Valmentajan haasto ei käytössä HAKEMISTO TUOMARISTO"},{"id":"38.7","rule_number":"38","question":"B-joukkue tekee maalin, mutta päätuomari hylkää sen välittömästi maalivahdin häirinnän takia. B-joukkue on eri mieltä päätuomarin tulkinnnasta ja he haastavat tilanteen. Videotarkistuksen jälkeen on selvää, ettei kyseessä ollut maalivahdin häirintä. Mitä tapahtuu?","answer":"Maali hyväksytään ja (mahdollinen) rangaistus estämisestä perutaan. Sääntö 38.6 SJL HUOMIO: Valmentajan haasto ei käytössä"},{"id":"38.8","rule_number":"38","question":"Punainen joukkue tekee maalin, mutta erotuomari hylkää sen välittömästi maalivahdin estämisen vuoksi. Punainen joukkue haastaa tilanteen, koska he uskovat, ettei maalivahtia estetty. Kun tilanne on tarkistettu ja haasteprosessi on suoritettu, todetaan, ettei maalivahtia estetty. Nyt vihreä joukkue haluaa haastaa tilanteen väittäen, että tilanne oli paitsiomaali. Mitä tapahtuu?","answer":"Maali hyväksytään ja (mahdollinen) rangaistus estämisestä perutaan. Sääntö 38.7 Koska yksi haasto per joukkue on sallittu sääntökirjan mukaisesti, täytyy linjatuomarien tarkistaa tilanne paitsiohaastona. Sääntö 38.3. SJL HUOMIO: Valmentajan haasto ei käytössä"},{"id":"38.9","rule_number":"38","question":"B-joukkue etenee kiekon kanssa hyökkäysalueelleen. A-joukkueen pieni rangaistus päättyy, kun pelikello näyttää 1:38. B-joukkue tekee maalin. A-joukkue haastaa maalin, koska heidän mielestään tuomaristo ei havainnut käsisyöttöä, joka johti lopulta maalin syntymiseen. Haasto onnistuu ja B-joukkueen maali hylätään. Videotarkistuksessa käy selvästi ilmi se, että peli
