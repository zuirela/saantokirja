gaistus pitää tuomita, vaikka rangaistuslaukausta ei tuomita. Merkitsevä tekijä, kun määritellään, tuomitaanko rangaistuslaukaus tai ei, on kiekon asema silloin kun sitä pidettiin, siihen tartuttiin tai sitä haalittiin vartaloon. Jos kiekko on maalialueella, tuomitaan rangaistuslaukaus. Jos kiekko on maalialueen ulkopuolella ja maalialueella oleva pelaaja (muu kuin maalivahti) haalii kiekon vartaloonsa, tuomitaan pieni rangaistus. → Sääntö 67 (Kiekon pelaaminen kädellä) OSA 9 – MUUT RIKKEET"},{"id":"63.7","title":"TUOMITUT MAALIT","content":"Tilanteessa, jossa maali siirtyy paikaltaan puolustavan pelaajan toimesta, joko tarkoituksellisesti tai vahingossa, ennen kuin kiekko ylittää maaliviivan kohdasta, joka on normaaliasemassaan olevien maalitolppien välissä, päätuomari voi hyväksyä maalin. Jotta maali voidaan hyväksy tässä tilanteessa, maali täytyy siirtyä puolustavan pelaajan toimesta, hyökkäävän joukkueen pelaajalla täytyy olla välitön maalintekotilanne ennen maalin siirtymistä, ja täytyy määrittää, olisiko kiekko mennyt maaliin normaaliasemassa olleiden maalitolppien välistä. Jos maalivahti tarkoituksellisesti siirtää maalin läpiajon aikana, tuomitaan maali ei-rikkoneen joukkueen hyväksi. Jos maalivahti tarkoituksellisesti poistaa kypäränsä ja/tai kasvosuojuksensa päästään vastustajan läpiajon aikana, päätuomari tuomitsee maalin vastajoukkueen hyväksi. Jos puolustava joukkue on korvannut maalivahdin ylimääräisellä kenttäpelaajalla, ja tällöin puolustavan joukkueen pelaaja siirtää tarkoituksellisesti maalin täten estäen hyökkäävän joukkueen uhkaavan maalin, päätuomarin pitää tuomita maali hyökkäävän joukkueen hyväksi. Maalikehikon katsotaan olevan pois paikaltaan, jos joko toinen tai molemmat maalin joustopiikit eivät ole omassa kolossaan, tai maali on kokonaan irronnut toisesta tai molemmista joustopiikeistä, ennen kuin tai samaan aikaan kun kiekko ylittää maaliviivan."},{"id":"63.8","title":"EI VAIHTO-OIKEUTTA","content":"Tilanteessa, jossa maali siirtyy vahingossa paikaltaan puolustavan pelaajan toimesta, seuraava aloitus suoritetaan toisesta puolustusalueen aloituspisteestä. Rikkoneelle joukkueelle ei sallita pelaajavaihtoja ennen seuraavan aloituksen suorittamista. Kuitenkin joukkueen sallitaan suorittaa pelaajavaihto vaihtaakseen kenttäpelaajaan vaihdettu maalivahti takaisin, vaihtaakseen loukkaantunut pelaaja tai kun tuomitaan rangaistus, joka vaikuttaa jommankumman joukkueen jäällä olevaan pelaajamäärään. Tilanteessa, jossa hyökkäävän joukkueen pelaaja laukaisee kiekon keskiviivan takaa omalta kenttäpuoliskoltaan hyökkäysalueelle ja vastustajan maalivahti sulkee kiekon aiheuttaen pelikatkon, seuraava aloitus suoritetaan toisesta maalivahdin puolustusalueen aloituspisteestä. Puolustavan joukkueen ei sallita suorittaa yhtään pelaajavaihtoa ennen seuraavaa aloitusta. Kuitenkin joukkueen sallitaan suorittaa pelaajavaihto vaihtaakseen loukkaantunut pelaaja, tai kun tuomitaan rangaistus, joka vaikuttaa jommankumman joukkueen jäällä olevaan pelaajamäärään. Lisäksi kummassakin tässä osiossa kuvatuissa tilanteissa hyökkäävällä joukkueella on oikeus valita, kummasta päätyalueen aloituspisteestä seuraava aloitus suoritetaan."},{"id":"63.9","title":"RIKKEET","content":"Seuraava lista rikkeistä aiheuttaa rangaistuksen (pieni rangaistus, joukkuerangaistus, rangaistuslaukaus tai tuomittu maali): (I) Kiekon tarkoituksellinen laukaisu ulos pelistä / pelialueelta; (II) Kiekon tarkoituksellinen heittäminen tai kädellä lyöminen ulos pelistä / pelialueelta; (III) Kiekon laukaisu tai lyönti (kädellä tai mailalla) puolustusalueelta yli suojalasin; (IV) Maalin tarkoituksellinen siirtäminen pois normaaliasemasta (tai puolustavan joukkueen pelaajan tai maalivahdin tahaton maalin siirto tuomittaessa maali); (V) Kieltäytyminen asettamasta oikeaa pelaajamäärää jäälle; (VI) Jatkaa pelaajien pitämistä väärin sijoittuneena (aloituksissa); 122 (VII) Kiekon tarkoituksellinen sulkeminen. (VIII) Peliasun tai varusteiden säätäminen."}]},"64":{"number":"64","title":"SUKELTAMINEN / RIKKEEN TEHOSTAMINEN","sections":[{"id":"64.1","title":"SUKELTAMINEN / RIKKEEN TEHOSTAMINEN","content":"Pelaajalle, joka räikeästi sukeltaa, tehostaa kaatumista tai vaikutusta, tai joka teeskentelee loukkaantumista, tuomitaan pieni rangaistus tämän säännön perusteella. Maalivahdille, joka tarkoituksellisesti ottaa kontaktin hyökkäävään pelaajaan muutoin kuin asemoituakseen maalialueella, tai joka muutoin toimii luodakseen muunlaisen kuvan kuin tahattomasta kontaktista hyökkäävän pelaajan kanssa, voidaan tuomita pieni rangaistus sukeltamisesta / rikkeen tehostamisesta. Huomautus: Sukeltaminen on pelaajan teko, jolla pyritään hankkimaan rangaistus vastustajalle, kun taas rikkeen tehostamisella rikottu pelaaja yrittää luoda kuvan, että rike olisi vakavampi kuin se todellisuudessa on, vaikka rike on tapahtunut."},{"id":"64.2","title":"PIENI RANGAISTUS","content":"Pieni rangaistus tuomitaan pelaajalle, joka toiminnallaan yrittää aiheuttaa vastustajalle rangaistuksen (sukeltaminen / rikkeen tehostaminen)."}]},"65":{"number":"65","title":"VARUSTEET","sections":[{"id":"65.1","title":"VARUSTEET","content":"Pelaajan vastuulla on ylläpitää varusteitaan ja peliasuaan sellaisessa pelikunnossa kuin näissä säännöissä on esitetty. Pelaajan varusteet koostuvat mailasta, luistimista, suojuksista ja peliasusta. Kaikki suojukset käsineitä, kypärää ja luistimia lukuun ottamatta täytyy pitää kokonaan peliasun alla. Varusteiden täytyy olla turvallisuusmääräysten mukaisia ja niiden tarkoituksena on ainoastaan suojata kenttäpelaajaa eikä lisätä tai parantaa pelaajan pelikykyä tai aiheuttaa vahinkoa vastustajalle. Kaikkia varusteita, mukaan lukien kypärää, on käytettävä asianmukaisesti ottelua edeltävän lämmittelyjakson aikana. Päätuomari voi vaatia pelaajaa poistamaan minkä tahansa vaarallisena pitämänsä pelaajan henkilökohtaisen esineen."},{"id":"65.2","title":"PIENI RANGAISTUS","content":"Kaikki suojukset käsineitä, kypärää ja maalivahdin patjoja lukuun ottamatta täytyy pitää kokonaan peliasun alla. Tämän säännön rikkomisesta, päätuomarin antaman varoituksen jälkeen, tuomitaan pieni rangaistus. Tätä sääntöä rikkova pelaaja ei saa osallistua peliin, ennen kuin tällainen varuste on korjattu tai poistettu. Peliä ei katkaista eikä sitä viivytetä varusteiden, peliasun, luistimien tai mailojen säätämiseksi. Tämän säännön rikkomisesta tuomitaan pieni rangaistus. Mitään viivytystä ei sallita maalivahdin varusteiden korjaamiseksi tai säätämiseksi. Jos säätämistä tarvitaan, niin maalivahdin on poistuttava jäältä ja hänen tilalleen tulee välittömästi varamaalivahti. Maalivahdin rikkoessa tätä sääntöä hänelle tuomitaan pieni rangaistus. Sääntöjen vastainen varuste, mikä ei täytä IIHF:n määräyksiä tai ei ole pelaamiseen hyväksyttävä, luokitellaan vaaralliseksi varusteeksi ja tällaista varustetta käyttävä pelaaja on siten rangaistusten alainen. OSA 9 – MUUT RIKKEET JÄÄKIEKON SÄÄNTÖKIRJA - SJL 2025-2026 123"}]},"66":{"number":"66","title":"OTTELUN KESKEYTTÄMINEN","sections":[{"id":"66.1","title":"OTTELUN KESKEYTTÄMINEN PELILLISISTÄ SYISTÄ JA KIELTÄYTYMINEN PELIN","content":"ALOITTAMISESTA TAI JATKAMISESTA Erotuomareilla on oikeus erittäin painavista syistä keskeyttää ottelu, jos he huomaavat, ettei sitä pelata sääntöjen mukaan. Ottelun keskeytyminen tästä syystä johtaa aina erilliseen kurinpitomenettelyyn. Kilpailuvaliokunta päättää ottelun lopputuloksesta/uusimisesta. Sääntökirjan pykälien 66 ja 73 tarkoittama ottelun keskeyttäminen (kieltäytyminen ottelun aloittamisesta tai jatkamisesta) johtaa aina erilliseen kurinpitomenettelyyn. Kilpailuvaliokunta päättää ottelun lopputuloksesta/uusimisesta. Ottelussa tuomitut käytös-, isot- ja pelirangaistukset ja niistä johtuvat seuraamukset jäävät voimaan. Ottelun keskeyttämistapauksissa ottelun pöytäkirja jätetään avoimeksi tulospalvelussa ja SJL päättää kaikista jatkotoimista."},{"id":"66.2","title":"OLOSUHTEISTA JOHTUVA OTTELUN PERUUTTAMINEN TAI","content":"KESKEYTTÄMINEN/PELIKELPOINEN KENTTÄ Jos pelikelpoista jäätä ei määrättynä ottelupäivänä ole lähialueella, on siitä heti ilmoitettava vierailevalle joukkueelle ja ottelun erotuomareille, kuitenkin viimeistään viisi (5) tuntia ennen matkustavan joukkueen lähtöaikaa. Jos tilanne on epävakainen, ettei varmuudella voida sanoa voidaanko ottelu pelata, on ilmoitettava \"varoitus\" viimeistään viisi tuntia ennen vierailevan joukkueen ilmoittamaa lähtöaikaa. Järjestävä joukkue ilmoittaa lopullisen päätöksen kaksi (2) tuntia ennen vierailevan joukkueen lähtöä. Mikäli menetellään toisin, joutuu järjestävä joukkue korvaamaan vierasjoukkueen matkakustannukset. Ottelupaikalla erotuomarit ratkaisevat lopullisesti ottelun pelaamisesta. Liitto ei vastaa peruuttamisesta aiheutuneista kuluista tai vahingoista. Seurojen on viikon kuluessa sovittava uusi pelipäivä. Mikäli seurat eivät pääse sopuun määräajassa uudesta pelipäivästä, määrää liitto pelipäivän. Jos ottelu keskeytyy tai peruuntuu ottelupaikalla äkillisen vian, esim. sähkövian, savun, jään sulamisen tai valaistuksen riittämättömyyden vuoksi tai muista kaukalon ulkopuolisista tekijöistä johtuen ja keskeytys kestää enemmän kuin yhden tunnin, on erotuomarin keskeytettävä tai peruutettava ottelu. Kotijoukkueella on mahdollisuus järjestää tunnin aikana korvaava pelipaikka, jossa ottelua voidaan jatkaa samana päivänä ja pelata se loppuun. Tällöin ottelua jatketaan toisella pelipaikalla, vaikka keskeytys olisi pidempi kuin yksi tunti mutta enintään kaksi tuntia. Pelipaikan vaihtumisesta päättävät ottelun erotuomarit. Jos korvaavaa pelipaikkaa ei löydy, ottelu on keskeytettävä/peruutettava ja se pelataan myöhemmin uudestaan. Joukkueilla on enintään viikko aikaa sopia ja ilmoittaa uusintaottelun aika ja paikka sarjan järjestäjän määräämään takarajaan mennessä. Jos joukkueet eivät pääse sopuun uudesta pelipäivästä, uusintaottelun ajankohdan määrittelee sarjan järjestäjä. Uusintaottelun kaikista järjestämiskuluista vastaa kotijoukkue. Vierasjoukkue vastaa matka- majoitus- ja ruokailukustannuksistaan. Mahdollisessa uusintaottelussa ovat edustuskelpoisia vain ne pelaajat, jotka olivat merkittynä pöytäkirjaan alkuperäisessä ottelussa. Kilpailuvaliokunta voi miesten III-V divisioonissa, Naisten Suomi-sarjassa, U20-SS ja alemmat sarjat, U18-SS ja alemmat sarjat ja U16-SS ja alemmat sarjat ikäluokkien sarjoissa sekä U15 ja nuorempien kaikilla sarjatasoilla tapauskohtaisesti päättää, ettei ottelua pelata uudestaan ja päättää ottelun lopputuloksesta ja muista seuraamuksista. 124 Jos kenttä on jäämerkintöjen tai turvallisuuden osalta tai muuten puutteellisessa kunnossa liitto voi määrätä, ettei sitä käytetä kilpailutoimintaan ennen kuin puutteet on korjattu. Tällaisen puutteen korjaamista valvoo alueen kilpailu-/sarjavaliokunta. Ottelussa tuomitut käytös-, isot- ja pelirangaistukset ja niistä johtuvat seuraamukset jäävät voimaan. Ottelun keskeyttämistapauksissa ottelun pöytäkirja jätetään avoimeksi tulospalvelussa ja SJL päättää kaikista jatkotoimista."},{"id":"66.3","title":"OTTELUN LUOVUTUS","content":"Mikäli joukkueessa ei ottelun alkaessa tai sen aikana ole vähintään kuutta pelaajaa, joista yhden on oltava maalivahti, tuomitaan joukkue hävinneeksi ko. ottelun 5-0 tai jos keskeytyshetkellä maaliero on suurempi toisen joukkueen hyväksi, jää lopputuloksesi keskeytyshetkellä oleva tilanne. Lisäksi tapaus johtaa erilliseen kurinpitokäsittelyyn."}]},"67":{"number":"67","title":"KIEKON PELAAMINEN KÄDELLÄ","sections":[{"id":"67.1","title":"KIEKON PELAAMINEN KÄDELLÄ","content":"Tämä sääntö kuvaa rikkeet, joiden seurauksena saattaa olla rangaistus, kun pelaaja tai maalivahti käyttää käsiään sääntöjen vastaisesti pelatessaan kiekkoa kädellään. → Sääntö 79 (Käsisyöttö) – kaikki viittaukset kiekon pelaamiseen kädellä"},{"id":"67.2","title":"PIENI RANGAISTUS – KENTTÄPELAAJA","content":"Pelaajan sallitaan ottaa kiekko ilmasta kiinni kädellä, mutta hänen täytyy välittömästi asettaa tai pudottaa kiekko alas jäähän. Pelaajalle tuomitaan pieni rangaistus kiekon sulkemisesta kädellä: (I) Jos pelaaja ottaa kiekon kiinni ja harhauttaa vastustajan tai luistelee kiekon kanssa, joko väistääkseen taklausta tai saavuttaakseen alueellisen edun vastustajaan nähden. (II) Jos pelaaja asettaa kätensä jään pinnalla olevan kiekon päälle, piilottaakseen sen vastustajalta tai estääkseen vastustajaa pelaamasta kiekkoa. Huomautus: Kun tämä tehdään joukkueen maalialueella, tuomitaan rangaistuslaukaus – katso → Sääntö 67.4 (Rangaistuslaukaus), tai → Sääntö 67.5 (Tuomitut maalit). (III) Jos pelaaja poimii kädellään kiekon jäästä, kun peli on käynnissä. Pieni rangaistus pelin viivyttämisestä – rike aloitustapahtumassa tuomitaan: (I) Aloittavalle pelaajalle, joka yrittää voittaa aloituksen lyömällä kiekkoa kädellään. Huomautus: Kaksi (2) varsinaiseen aloitukseen osallistuvaa aloittavaa pelaajaa (keskushyökkääjät) eivät saa pelata kiekkoa kädellään ilman rangaistusta tämän säännön osalta ennen kuin joku kolmas pelaaja (kummasta tahansa joukkueesta) on vähintään koskenut kiekkoon. Heti, kun aloituksen katsotaan päättyneen (ja aloituksen voittaja on selvillä), käsisyöttöjä voidaan suorittaa sääntöjen sallimissa puitteissa. → Sääntö 79 (Käsisyöttö)."},{"id":"67.3","title":"PIENI RANGAISTUS – MAALIVAHTI","content":"Koko tämän säännön tarkoituksena on pitää kiekko jatkuvasti pelissä ja jokainen maalivahdin teko, joka aiheuttaa tarpeettoman pelikatkon, täytyy rangaista ilman varoitusta. Rangaistus pelin viivyttämisestä tuomitaan maalivahdille, joka: OSA 9 – MUUT RIKKEET (I) Pitää kiekko kädessään yli kolme (3) sekuntia ellei vastustaja todella ahdista / paineista häntä; (II) Tarkoituksellisesti pitää kiekkoa hallussaan millä tavoin tahansa ja päätuomarin mielestä aiheuttaa tarpeettoman pelikatkon; (III) Heittää kiekon vastustajan maalin suuntaan; (IV) Huomautus: Tilanteessa, jossa maalivahdin eteenpäin heittämän kiekon saa vastustaja, päätuomarin on annettava pelitilanteen jatkua loppuun ja jos ei-rikkonut joukkue tekee maalin, maali hyväksytään eikä rangaistusta tuomita; mutta jos maalia ei synny, peli katkaistaan ja pieni rangaistus tuomitaan maalivahdille. (V) Pudottaa kiekon patjoihinsa tai maaliverkolle; (VI) Tarkoituksellisesti kasaa lunta tai esineitä maalinsa eteen tai sen lähelle, mikä päätuomarin mielestä estäisi maalin tekemisen."},{"id":"67.4","title":"RANGAISTUSLAUKAUS","content":"Jos pelin käydessä pelaaja, lukuun ottamatta maalivahtia, pudottautuu kiekon päälle, pitää kiekon kädessään, poimii kiekon ylös jäästä tai haalii sen vartaloonsa tai käteensä maalialueella, peli pitää katkaista välittömästi ja on tuomittava rangaistuslaukaus ei-rikkoneelle joukkueelle. → Sääntö 63 (Pelin viivyttäminen)"},{"id":"67.5","title":"TUOMITUT MAALIT","content":"Jos maalivahti, ennen poistumistaan jäältä vaihtoa varten vaihtaakseen kenttäpelaajaan, jättää mailansa tai muun osan varusteestaan tai kasaa lunta tai muita esineitä maalinsa eteen tai sen läheisyyteen, mikä päätuomarin mielestä estäisi kiekon menemisen maalin, tuomitaan maali ei-rikkoneen joukkueen hyväksi. Jotta maali voidaan tuomita tässä tilanteessa, maalivahdin täytyy olla korvattu ylimääräisellä kenttäpelaajalla, muutoin tilanteesta tuomitaan pieni rangaistus. Kun maalivahti on vaihdettu jäältä pois ylimääräiseen kenttäpelaajaan, ja saman joukkueen pelaaja pudottautuu kiekon päälle, pitää kiekon kädessään, poimii kiekon ylös jäästä tai haalii sen vartaloonsa tai käteensä maalialueellaan, peli pitää katkaista välittömästi ja on tuomittava maali ei-rikkoneen joukkueen hyväksi."},{"id":"67.6","title":"MAALIN HYLKÄÄMINEN","content":"Hyökkäävä pelaaja ei voi tehdä maalia lyömällä tai ohjaamalla kiekon kädellään maaliin. Hyökkäävä pelaaja ei voi tehdä maalia lyömällä tai ohjaamalla kiekkoa kädellään siten, että kiekko kimpoaa toisesta pelaajasta, maalivahdista tai tuomarista maaliin. Kun kiekko menee maaliin selkeän käsineestä tapahtuneen kimpoamisen seurauksena, maali pitää hyväksyä."}]},"68":{"number":"68","title":"SÄÄNTÖJENVASTAINEN VAIHTO","sections":[{"id":"68.1","title":"SÄÄNTÖJENVASTAINEN VAIHTO","content":"Sääntöjenvastaisen vaihdon katsotaan tapahtuneen, kun pelaaja tulee pelaajapenkiltä jäälle sääntöjenvastaisesti (kanssapelaaja ei ole 1,50 metrin (5 jalkaa) rajan sisällä) → Sääntö 74 (Liian monta pelaajaa jäällä), rangaistuspenkiltä (rangaistus ei vielä ole päättynyt), kun isoa rangaistusta kärsitään eikä korvaava pelaaja ole tullut jäälle rangaistuspenkiltä → Sääntö 68.2 (Sääntöjen vastainen vaihto / Joukkuerangaistus), tai kun pelaaja tulee sääntöjenvastaisesti jäälle tarkoituksenaan estää vastustajaa tekemästä läpiajosta maali → Sääntö 68.3 (Sääntöjen vastainen vaihto / Rangaistuslaukaus), tai → Sääntö 68.4 (Sääntöjen vastainen vaihto / Tuomitut maalit). 126 Kun rangaistu pelaaja loukkaantuu ja poistuu pelistä ja hän palaa takaisin ennen rangaistuksensa päättymistä, hänellä ei ole oikeutta osallistua pelin. Tämä koskee myös samanaikaisia rangaistuksia, kun sijainen on rangaistusaitiossa odottamassa pelikatkoa. Loukkaantuneen pelaajan täytyy odottaa, kunnes hänen korvaajansa vapautuu rangaistusaitiosta, ennen kuin hänellä on jälleen oikeus osallistua peliin. → Sääntö 8.1 (Loukkaantuneet pelaajat)."},{"id":"68.2","title":"JOUKKUERANGAISTUS","content":"Kun pelaajalle tuomitaan käytösrangaistus tai iso rangaistus ja pelirangaistus samanaikaisesti, tai kun loukkaantuneelle pelaajalle tuomitaan iso rangaistus ja pelirangaistus eikä hän itse voi kärsiä rangaistustaan, rangaistulle pelaajalle täytyy välittömästi asettaa korvaava pelaaja rangaistusaitioon eikä rangaistun pelaajan korvaajaa jäälle sallita muualta kuin rangaistuspenkiltä. Tämän säännön kaikenlainen rikkominen käsitellään sääntöjenvastaisena vaihtona tämän säännön alla ja rikkoneelle joukkueen tuomitaan joukkuerangaistus."},{"id":"68.3","title":"RANGAISTUSLAUKAUS","content":"Jos hyökkäävän joukkueen pelaajalla on kiekko hallinnassaan sellaisessa asemassa, ettei hänellä ole vastustusta itsensä ja vastustaja maalivahdin välissä, ja tässä asemassa häntä estää sääntöjenvastaisesti jäälle tullut vastustajan pelaaja, päätuomarin pitää tuomita rangaistuslaukaus ei-rikkoneen joukkueen hyväksi."},{"id":"68.4","title":"TUOMITUT MAALIT","content":"Kun maalivahti on poistettu jäältä, ja vartioimatonta maalia kohti hyökkäävää vastajoukkueen pelaajaa estää puolueettomalla alueella tai hyökkäysalueella sääntöjen vastaisesti jäälle tullut vastustaja, päätuomarin tulee välittömästi tuomita maali ei-rikkoneen joukkueen hyväksi. OSA 9 – MUUT RIKKEET"},{"id":"68.5","title":"MAALI HYLÄTÄÄN","content":"Jos rangaistu pelaaja palaa jäälle rangaistusaitiosta ennen rangaistuksensa päättymistä, joko omasta virheestään tai rangaistusajanottajan virheen takia, mitään hänen joukkueensa sinä aikana, kun hän (tai hänen vaihtopelaajansa) oli sääntöjenvastaisesti jäällä, tekemää maalia ei hyväksytä, mutta kaikki tuona aikana tuomitut kumman tahansa joukkueen rangaistukset kärsitään normaaliin tapaan. Rangaistun pelaajan on palattava kärsimään rangaistuksensa loppuun (sekä lisärangaistuksena tuomittu pieni rangaistus, jos hän lähti rangaistusaitiosta omasta virheestään). Jos pelaaja tulee jäälle sääntöjenvastaisesti omalta pelaajapenkiltään tai kaukalon muusta osasta, mitään hänen joukkueensa sinä aikana, kun hän oli sääntöjenvastaisesti jäällä, tekemää maalia ei hyväksytä, mutta kaikki tuona aikana tuomitut kumman tahansa joukkueen rangaistukset kärsitään normaaliin tapaan."},{"id":"68.6","title":"TARKOITUKSELLINEN SÄÄNTÖJENVASTAINEN VAIHTO","content":"Liian monta pelaajaa jäällä. → Sääntö 74 (Liian monta pelaajaa jäällä)."}]},"69":{"number":"69","title":"Maalivahdin estäminen","sections":[]},"70":{"number":"70","title":"PELAAJAPENKILTÄ TAI RANGAISTUSAITIOSTA LÄHTEMINEN","sections":[{"id":"70.1","title":"PELAAJAPENKILTÄ TAI RANGAISTUSAITIOSTA LÄHTEMINEN","content":"Yksikään pelaaja ei saa lähteä pelaajapenkiltä tai rangaistusaitiosta yhteenoton aikana tai yrittääkseen aloittaa yhteenoton."},{"id":"70.2","title":"SÄÄNTÖJEN MUKAINEN VAIHTAMINEN","content":"Pelaaja, joka on omalta pelaajapenkiltä tai sääntöjen mukaisesti rangaistusaitiosta (rangaistusaika on päättynyt) tullut jäälle pelin käydessä ja joka aloittaa yhteenoton, tuomitaan soveltuvia rangaistuksia. Pelaajaa tai pelaajia, jotka ovat tulleet peliin pelikatkolla sääntöjen mukaisen vaihdon myötä, ja jotka asettautuvat asemiinsa seuraavaa aloitusta varten, ja jotka osallistuvat yhteenottoon, rangaistaan asiaankuuluvan säännön mukaan."},{"id":"70.3","title":"PELAAJAPENKILTÄ LÄHTEMINEN","content":"Pelaajien ei sallita tulla jäälle lämmittelytarkoituksessa pelikatkolla tai ensimmäisen ja toisen erän jälkeen. Päätuomari tuomitsee tilanteesta tarvittaessa soveltuvia rangaistuksia. Kukaan pelaaja ei saa missään vaiheessa tulla jäälle paitsi kunkin erän päättyessä tai tullakseen peliin sääntöjen mukaisesti. Jos pelaajan on tarpeen mennä pukuhuoneeseen pelin käydessä (ja hänen täytyy kulkea pukuhuoneeseen jään kautta), hänen täytyy odottaa pelikatkoa ja varmistaa, ettei käynnissä ole yhteenottoa ennen kuin hän tulee jäälle siirtyäkseen pukuhuoneeseen. Pelaajalle, joka oli ensimmäinen tai toinen pelaaja, kummasta tahansa joukkueesta, joka lähti pelaajapenkiltä (tai rangaistusaitiosta) yhteenoton aikana tai tarkoituksella aloittaa yhteenotto, tuomitaan pelirangaistus."},{"id":"70.4","title":"RANGAISTUSAITIOSTA LÄHTEMINEN","content":"Rangaistusaitiossa rangaistustaan kärsivän pelaaja ei saa missään vaiheessa lähteä rangaistusaitiosta, paitsi kunkin erän päättyessä tai kun hänen rangaistuksensa on päättynyt. Pelaaja, jonka rangaistus on päättynyt, voidaan vaihtaa toiseen pelaajan sillä edellytyksellä, että pelaaja luistelee jään kautta omalle pelaajapenkilleen. Tämän säännön rikkomisesta tuomitaan joukkuerangaistus (liian monta pelaajaa jäällä). → Sääntö 74 (Liian monta pelaajaa jäällä) Rangaistulle pelaajalle, joka lähtee rangaistusaitiosta ennen rangaistuksensa päättymistä riippumatta siitä, onko peli käynnissä vai ei, tuomitaan ylimääräinen pieni rangaistus sen lisäksi, että hän kärsii alkuperäisen rangaistuksensa loppuun. Pelaajalle, joka mentyään rangaistusaitioon lähtee rangaistusaitiosta ennen rangaistuksensa päättymistä tarkoituksenaan vastustaa tuomarin tekemää päätöstä, tuomitaan pelirangaistus. Tämä sääntökohta ei korvaa mitään arkarampaa rangaistusta, joka voidaan tuomita pelaajalle, joka lähtee rangaistusaitiosta yrittääkseen aloittaa tai osallistua yhteenottoon, kuten tässä säännössä on määritelty. Rangaistulle pelaajalle, joka lähtee rangaistusaitiosta pelikatkolla ja yhteenoton aikana, tuomitaan pieni rangaistus ja pelirangaistus. Pienen rangaistuksen ja alkuperäisen rangaistuksen loppuajan kärsii rangaistusaitiossa kyseisen pelaajan sijainen, jonka nimeää rikkoneen joukkueen valmentaja. Jos pelaaja lähtee rangaistusaitiosta ennen kuin hän on kärsinyt rangaistuksensa kokonaan, rangaistusajanottajan tulee kirjata aika ylös ja ilmoittaa tuomaristolle, joista joku katkaisee pelin, kun rikkonut joukkue saa kiekon hallintaansa. OSA 9 – MUUT RIKKEET Tämän pelaajan täytyy kärsiä ylimääräinen pieni rangaistus sen lisäksi, mitä hänellä on alkuperäistä rangaistusta jäljellä (tämä jäljellä oleva rangaistusaika lasketaan siitä hetkestä, kun hän poistui sääntöjenvastaisesti rangaistusaitiosta). Tilanteessa, jossa pelaaja palaa jäälle ennen kuin hänen rangaistuksensa on päättynyt rangaistusajanottajan virheen takia, pelaajalle ei tuomita ylimääräistä rangaistusta, mutta hänen täytyy kärsiä kesken jääneen rangaistuksen jäljellä oleva aika, joka lasketaan siitä hetkestä, kun hän poistui rangaistusaitiosta rangaistusajanottajan virheen takia. Jos rangaistuksensa päättymisen jälkeistä pelikatkoa odottanut (odottaneet) pelaaja(t) poistuessaan rangaistusaitiosta osallistuu (osallistuvat) yhteenottoon, niin tälle/näille rangaistusaitiosta poistuvalle pelaajalle /poistuville pelaajille tuomitaan rangaistuksia yhteenoton tapahtumien mukaan. Jos rangaistuksensa päättymisen jälkeistä pelikatkoa odottanut pelaaja poistuessaan rangaistusaitiosta ajautuu yhteenottoon vastustajan kanssa ja vastustaja on yhteenoton yllyttäjä / aloitteentekijä, tällöin rangaistusaitiosta tuleva pelaaja ei ole pelirangaistuksen kohteena."},{"id":"70.5","title":"JOUKKUERANGAISTUS","content":"Joukkuerangaistus tuomitaan joukkueelle, jonka pelaaja(t) lähtee(lähtevät) pelaajapenkiltä muussa kuin vaihtotarkoituksessa eikä tällöin ole yhteenottoa käynnissä. Kun pelaaja on loukkaantunut ja kyseessä on pelikatko, joukkueen lääkäri (tai muu lääkintähenkilöstö) saa mennä jäälle hoitamaan loukkaantunutta pelaajaa eikä heidän tarvitse odottaa päätuomarin lupaa."},{"id":"70.6","title":"PELIRANGAISTUS","content":"Jos valmentaja tai joukkueen toimihenkilö erän alkamisen ja sen päättymisen välillä tulee jäälle hoitamaan loukkaantunutta pelaajaa, ellei tuomaristo tai lääkintähenkilöstö ole häntä niin ohjeistanut, päätuomarin tulee tuomita pelirangaistus rikkoneelle joukkueelle ja raportoida tilanne asiaankuuluvalle elimelle mahdollisia kurinpitotoimenpiteitä varten. Kun pelaaja on loukkaantunut ja kyseessä on pelikatko, joukkueen lääkäri (tai muu lääkintähenkilöstö) saa mennä jäälle hoitamaan loukkaantunutta pelaajaa eikä heidän tarvitse odottaa päätuomarin lupaa. Ensimmäiselle pelaajien yhteenoton aikana pelaajapenkiltä tai rangaistusaitiosta lähtevälle kumman joukkueen tahansa pelaajalle tuomitaan pelirangaistus. I. Seuraaville pelaajien yhteenoton aikana pelaajapenkiltä lähteville pelaajille tuomitaan käytösrangaistus. II. Seuraaville pelaajien yhteenoton aikana rangaistusaitiosta lähteville kenttäpelaajille tuomitaan pieni rangaistus ja pelirangaistus, jotka kärsitään kaikkien aikaisempien rangaistustensa päätyttyä. III. Jo pelkkä lähteminen pelaajapenkiltä tai rangaistusaitiosta on rike näitä sääntöjä vastaan, vaikka pelaajat eivät jäälle tultuaan osallistuisi itse tappeluun. IV. Enintään viisi käytösrangaistusta ja/tai pelirangaistusta joukkuetta kohden voidaan tuomita tämän säännön perusteella. Rangaistulle pelaajalle, joka lähtee rangaistusaitiosta pelikatkolla ja yhteenoton aikana, tuomitaan pieni rangaistus ja pelirangaistus. Pienen rangaistuksen ja alkuperäisen rangaistuksen loppuajan kärsii rangaistusaitiossa kyseisen pelaajan sijainen, jonka nimeää rikkoneen joukkueen valmentaja. Pelaajalle, jonka tuomaristo on määrännyt pukuhuoneeseen ja joka mistä syystä tahansa palaa pelaajapenkilleen tai jäälle, tuomitaan pelirangaistus. Kun pelaaja tulee rangaistusaitioon, hän ei saa lähteä sieltä ennen rangaistuksensa päättymistä ja ennen kuin hänen joukkueensa on oikeutettu korvaavaan pelaajaan jäällä, tai erän päättyessä mennäkseen pukuhuoneeseen, tai jos tuomaristo antaa hänelle luvan poistua. Muussa tapauksessa pelaajalle tuomitaan pelirangaistus tämän säännön perusteella. Muussa tapauksessa noudatetaan säännön 70.4. tulkintoja. 132"},{"id":"70.7","title":"RANGAISTUSLAUKAUS","content":"Jos hyökkäävän joukkueen pelaajalla on kiekko hallinnassaan sellaisessa asemassa, ettei hänellä ole vastustusta itsensä ja vastustajan maalivahdin välissä ja tässä asemassa häntä estää sääntöjenvastaisesti jäälle tullut vastustajan pelaaja, päätuomarin pitää tuomita rangaistuslaukaus ei-rikkoneen joukkueen hyväksi."},{"id":"70.8","title":"TUOMITUT MAALIT","content":"Kun maalivahti on poistettu jäältä ja vartioimatonta maalia kohti hyökkäävää vastajoukkueen pelaajaa estää puolueettomalla alueella tai hyökkäysalueella sääntöjen vastaisesti jäälle tullut vastustaja, päätuomarin tulee välittömästi tuomita maali ei-rikkoneen joukkueen hyväksi."},{"id":"70.9","title":"MAALI HYLÄTÄÄN","content":"Jos rangaistu pelaaja palaa jäälle rangaistusaitiosta ennen rangaistuksensa päättymistä, joko omasta virheestään tai rangaistusajanottajan virheen takia, mitään hänen joukkueensa sinä aikana, kun hän (tai hänen vaihtopelaajansa) oli sääntöjen vastaisesti jäällä, tekemää maalia ei hyväksytä, mutta kaikki tuona aikana tuomitut kumman tahansa joukkueen rangaistukset kärsitään normaaliin tapaan. Rangaistun pelaajan on palattava kärsimään rangaistuksensa loppuun (sekä lisärangaistuksena tuomittu pieni rangaistus, jos hän lähti rangaistusaitiosta omasta virheestään). Jos pelaaja tulee jäälle sääntöjenvastaisesti omalta pelaajapenkiltään tai rangaistusaitiosta, mitään hänen joukkueensa sinä aikana, kun hän oli sääntöjen vastaisesti jäällä, tekemää maalia ei hyväksytä, mutta kaikki tuona aikana tuomitut kumman tahansa joukkueen rangaistukset kärsitään normaaliin tapaan."}]},"71":{"number":"71","title":"MAALIVAHDIN LIIAN AIKAINEN VAIHTO","sections":[{"id":"71.1","title":"MAALIVAHDIN LIIAN AIKAINEN VAIHTO","content":"Kun maalivahti lähtee maaliltaan ja etenee pelaajapenkilleen vaihtaakseen ylimääräiseen kenttäpelaajaan, kenttäpelaaja ei voi tulla jäälle ennen kuin maalivahti on 1,50 metrin (5 jalkaa) etäisyydellä pelaajapenkistään. Jos vaihto tapahtuu ennenaikaisesti, tuomari katkaisee pelin välittömästi, ellei ei-rikkoneella joukkueella ole kiekko hallinnassaan – jolloin pelin katkaisua viivytetään, kunnes kiekon hallinta vaihtuu rikkoneelle joukkueelle. Joukkuetta ei rangaista liian aikaisesta vaihdosta, mutta seuraava aloitus suoritetaan kaukalon keskipisteestä, jos pelitilanne oli katkaisuhetkellä vastustajan kenttäpuoliskolla. Jos pelitilanne oli katkaisuhetkellä omalla kenttäpuoliskolla, seuraava aloitus suoritetaan lähimmästä sen alueen aloituspisteestä, missä kiekko oli katkaisuhetkellä. Kaikissa muissa tilanteissa, joita ei yllä kuvattu, rikkoneelle joukkueelle tuomitaan pieni rangaistus (liian monta pelaajaa jäällä). → Sääntö 74 (Liian monta pelaajaa jäällä)"},{"id":"71.2","title":"KUULUTUS","content":"Päätuomarin tulee pyytää kuuluttajaa kuuluttamaan seuraavasti: ”Peli katkaistiin maalivahdin liian aikaisen vaihdon takia”. OSA 9 – MUUT RIKKEET JÄÄKIEKON SÄÄNTÖKIRJA - SJL 2025-2026 133"}]},"72":{"number":"72","title":"KIELTÄYTYMINEN PELAAMASTA KIEKKOA","sections":[{"id":"72.1","title":"KIELTÄYTYMINEN TAI VÄLTTÄMINEN PELAAMASTA KIEKKOA","content":"Tämän osion tarkoituksena on valvoa pelin etenemisen jatkumista ja sekä päätuomarien että linjatuomarien on tulkittava ja sovellettava sääntöä tämän lopputuloksen saavuttamiseksi."},{"id":"72.2","title":"KÄSISYÖTTÖ","content":"Kun pelaaja pelaa kiekon kädellään kanssapelaajalleen ja tämä kanssapelaaja päättää olla pelaamatta kiekkoa välttääkseen aiheuttamasta pelikatkoa ja vastajoukkue myös pidättäytyy pelaamasta kiekkoa (ehkä kuluttaakseen aikaa rangaistuksen päättymiseksi), päätuomarin pitää katkaista peli ja seuraava aloitus suoritetaan lähimmästä aloituspisteestä, missä kiekko oli katkaisuhetkellä."},{"id":"72.3","title":"KIEKON PELAAMINEN KORKEALLA MAILALLA","content":"Kun pelaaja koskettaa kiekkoa yli normaalin hartiatason olevalla mailallaan ja kanssapelaaja päättää olla pelaamatta kiekkoa välttääkseen aiheuttamasta pelikatkoa ja vastajoukkue myös pidättäytyy pelaamasta kiekkoa (ehkä kuluttaakseen aikaa rangaistuksen päättymiseksi), päätuomarin pitää katkaista peli ja seuraava aloitus suoritetaan lähimmästä sen alueen aloituspisteestä, missä kiekko oli katkaisuhetkellä. → Sääntö 76.2 (Aloituspaikat)"},{"id":"72.4","title":"PITKÄ","content":"Jos päätuomarin mielestä puolustava joukkue pitkän tilanteessa tarkoituksellisesti pidättäytyy yrittämästä kunnolla tavoitella kiekkoa aloituspisteiden tasan jälkeen, kun heillä on siihen mahdollisuus, päätuomarin tulee katkaista peli ja määrätä seuraava aloitus rikkoneen joukkueen lähimmästä päätyalueen aloituspisteestä."},{"id":"72.5","title":"RANGAISTUS","content":"Kun päätuomari ilmoittaa toisen joukkueen rangaistuksesta siirrettynä rangaistusvihellyksenä ja tämän joukkueen pelaaja pidättäytyy pelaamasta kiekko, jotta pelikellosta tai rangaistuskellosta kuluisi enemmän aikaa, päätuomarin tulee katkaista peli ja määrätä seuraava aloitus toisesta rikkoneen joukkueen puolustusalueen aloituspisteestä. → Sääntö 76.2 (Aloituspaikat)"}]},"73":{"number":"73","title":"KIELTÄYTYMINEN ALOITTAMASTA PELIÄ","sections":[{"id":"73.1","title":"KIELTÄYTYMINEN ALOITTAMASTA PELIÄ","content":"Tätä sääntöä sovelletaan joukkueeseen, joka kieltäytyy aloittamasta peliä, kun molemmat joukkueet ovat jäällä, tai joka vetäytyy jäältä, tai joka kieltäytyy tulemasta jäälle ottelun alussa tai jonkin erän alussa, kun tuomaristo heitä niin käskee."},{"id":"73.2","title":"TOIMINTAOHJE – JOUKKUE ON JÄÄLLÄ","content":"Jos molemmat joukkueet ovat jäällä ja toinen joukkue jostakin syystä kieltäytyy pelaamasta, kun päätuomari heitä niin käskee, päätuomarin pitää varoittaa joukkueen kapteenia ja antaa kieltäytyvälle joukkueelle 15 sekuntia aikaa aloittaa peli tai jatkaa peliä. 134 Jos tämän ajan päätyttyä joukkue edelleenkin kieltäytyy pelaamasta, päätuomarin pitää tuomita joukkuerangaistus pelin viivyttämisestä rikkoneen joukkueelle, jonka kärsijän nimeää valmentaja kapteenin välityksellä. Jos sama tapahtuma uusiutuu, rikkoneen joukkueen valmentaja poistetaan pelaajapenkiltä ja hänelle tuomitaan pelirangaistus ja rikkoneelle joukkueelle tuomitaan joukkuerangaistus pelin viivyttämisestä. Jos rikkonut joukkue yhä kieltäytyy pelaamasta, päätuomarilla ei ole muuta vaihtoehtoa kuin julistaa ottelu keskeytetyksi ja tilanne raportoidaan asiankuuluvalle elimelle jatkotoimenpiteitä varten. → Sääntö 66 (Ottelun keskeyttäminen) Ensimmäinen kieltäytyminen: (I) Varoita rikkoneen joukkueen kapteenia ja anna 15 sekuntia, jonka aikana peliä on jatkettava. (II) Jos 15 sekunnin jälkeen joukkue edelleen kieltäytyy jatkamasta pelaamista, tuomitse rikkoneelle joukkueelle joukkuerangaistus pelin viivyttämisestä. Toinen kieltäytyminen: (I) Varoita rikkoneen joukkueen kapteenia ja anna 15 sekuntia, jonka aikana peliä on jatkettava. (II) Jos 15 sekunnin jälkeen joukkue edelleen kieltäytyy jatkamasta pelaamista, tuomitse rikkoneelle joukkueelle joukkuerangaistus pelin viivyttämisestä. (III) Päätuomari ilmoittaa rikkoneen joukkueen valmentajalle, että hänelle on tuomittu pelirangaistus. (IV) Jos joukkue yhä kieltäytyy pelaamasta, päätuomari julistaa ottelu keskeytetyksi → Sääntö 66 (Ottelun keskeyttäminen)"},{"id":"73.3","title":"TOIMINTAOHJE – JOUKKUE POISSA JÄÄLTÄ","content":"Jos joukkue, jota päätuomari on näin käskenyt valmentajan välityksellä menemään jäälle ja aloittamaan pelin, ei noudata päätuomarin määräystä tästä viiden (5) minuutin aikarajasta, ottelu katsotaan keskeytetyksi ja tilanne raportoidaan asiankuuluvalle elimelle jatkotoimenpiteitä varten. → Sääntö 66 (Ottelun keskeyttäminen) (I) Heti kun on ilmeistä päätuomarille, että joukkue kieltäytyy menemästä jäälle, tuomitaan joukkuerangaistus rikkoneelle joukkueelle pelin viivyttämisestä. (II) Joukkueelle annetaan aikaa viisi (5) minuuttia palata jäälle ja aloittaa pelaamaan. (III) Kun viisi (5) minuuttia on kulunut ja rikkonut joukkue ei edelleenkään ole palannut jäälle jatkamaan peliä, ottelu katsotaan luovutetuksi. (IV) Jos sen jälkeen, kun valmentajalle on ilmoitettu viiden (5) minuutin aikarajasta, joukkue palaa jäälle aloittaakseen pelaamaan annetun aikarajan sisällä, joukkueelle täytyy tuomita joukkuerangaistus pelin viivyttämisestä."}]},"74":{"number":"74","title":"LIIAN MONTA PELAAJAA JÄÄLLÄ","sections":[{"id":"74.1","title":"LIIAN MONTA PELAAJAA JÄÄLLÄ","content":"Pelaajia voidaan vaihtaa milloin tahansa pelin käydessä pelaajapenkiltä edellyttäen, että jäältä poistuva pelaaja tai pelaajat ovat vähintään 1,50 metrin (5 jalkaa) etäisyydellä pelaajapenkistään ja pois pelistä (eivät osallistu pelitilanteeseen) ennen kuin vaihto tehdään – katso myös Sääntö 71 (Maalivahdin liian aikainen vaihto). Tuomariston harkinnan perusteella, jos korvaava pelaaja tulee jäälle ennen kuin hänen kanssapelaajansa on 1,50 metrin (5 jalkaa) etäisyydellä pelaajapenkistään (ja täten selvästi aiheuttaa joukkueelleen liian monta pelaajaa jäällä tilanteen), tällöin joukkuerangaistus on tuomittava. OSA 9 – MUUT RIKKEET Kun pelaaja on poistumassa jäältä ja hän on vähintään 1,50 metrin (5 jalkaa) etäisyydellä pelaajapenkistään ja hänet korvaava pelaaja on jäällä, tällöin poistuvan pelaajan katsotaan olevan poissa jäältä säännön 70 (Lähteminen pelaajapenkiltä tai rangaistusaitiosta) tarkoituksessa. Jos vaihdon aikana, joko peliin tuleva pelaaja tai jäältä poistuva pelaaja, pelaa kiekkoa mailalla, luistimillaan tai käsin, tai taklaa, tai ottaa jonkin fyysisen kontaktin vastustajaan, samalla kun joko peliin tuleva pelaaja tai jäältä poistuva pelaaja on myös jäällä, tällöin tuomitaan rangaistus liian monta pelaajaa jäällä -rikkeestä. Jos vaihdon aikana joko peliin tulevaan pelaajaan tai jäältä poistuvaan pelaajaan osuu kiekko vahingossa, peliä ei katkaista eikä mitään rangaistusta tuomita. Pelin käydessä jäältä poistuvan pelaajan täytyy poistua pelaajapenkille eikä mistään muusta kaukalon poistumispaikasta. Muualta poistuminen ei ole sääntöjenmukainen pelaajavaihto ja täten kun rike tapahtuu, joukkuerangaistus tuomitaan. Jäälle korvaavana pelaajana tulevan pelaajan katsotaan olevan jäällä, kun hänen molemmat luistimet ovat jäällä. Jos hän pelaa kiekkoa tai estää vastustajaa, kun hän on yhä pelaajapenkillä, häntä on rangaistava → Sääntö 56 (Estäminen) mukaan. Jäältä poistuvan pelaajan, jolla on toinen luistin jäällä ja toinen luistin jäältä pois pelaajapenkin puolella, katsotaan olevan poissa jäältä."},{"id":"74.2","title":"JOUKKUERANGAISTUS","content":"Tämän säännön rikkomisesta tuomitaan joukkuerangaistus (liian monta pelaajaa jäällä). Tämän rangaistuksen voivat tuomita joko päätuomarit tai linjatuomarit. Jos rikkonut joukkue tekee maaliin ennen kuin päätuomari tai linjatuomari ehtii puhaltaa pilliinsä tuomitakseen joukkuerangaistuksen, tehtyä maalia ei hyväksytä ja pitää tuomita rangaistus (liian monta pelaajaa jäällä)."},{"id":"74.3","title":"RANGAISTUSAITIO","content":"Rangaistusaitiossa rangaistusta kärsivän pelaajan, joka on tarkoitus vaihtaa korvaavaan pelaajaan rangaistuksen päätyttyä, täytyy edetä heti jään kautta ja olla vähintään 1,50 metrin (5 jalkaa) etäisyydellä pelaajapenkistään ennen kuin vaihto voidaan suorittaa. Tämän säännön rikkomisesta tuomitaan joukkuerangaistus (liian monta pelaajaa jäällä)."},{"id":"74.4","title":"TAHALLINEN SÄÄNTÖJENVASTAINEN VAIHTO","content":"Jos vähäisen jäljellä olevan peliajan, tai kärsittävinä olevien rangaistusten takia, tahallisesta sääntöjenvastaisesta vaihdosta tuomittua joukkuerangaistusta ei pystytä kärsimään kokonaan varsinaisen peliajan aikana tai milloin tahansa jatkoajalla, tuomitaan rangaistuslaukaus rikkonutta joukkuetta vastaan."}]},"75":{"number":"75","title":"EPÄURHEILIJAMAINEN KÄYTÖS","sections":[{"id":"75.1","title":"EPÄURHEILIJAMAINEN KÄYTÖS","content":"Pelaajat, valmentajat ja joukkueen toimihenkilöt ovat kaiken aikaa vastuussa omasta käytöksestään, ja heidän on pyrittävä ehkäisemään sopimaton käytös ennen peliä, pelin aikana tai sen jälkeen, jäällä tai sen ulkopuolella ja missä tahansa hallilla. Päätuomarit voivat tuomita rangaistuksia kenelle tahansa yllä mainitulle joukkueen henkilöstölle, jos he laiminlyövät tätä sääntöä. Kun tällainen toiminta kohdistuu tuomaristoon, sovelletaan → Sääntö 39 (Sopimaton käytös tuomaristoa kohtaan). 136"},{"id":"75.2","title":"PIENI RANGAISTUS","content":"Seuraavista rikkeistä tuomitaan pieni rangaistus epäurheilijamaisesta käytöksestä tämän säännön perusteella: (I) Tunnistettavalle pelaajalle, joka käyttää säädytöntä, rienaavaa tai herjaavaa kieltä tai eleitä ketä tahansa henkilöä kohtaan. (II) Pelaajalle, joka syyllistyy epäurheilijamaiseen käytökseen mukaan lukien, mutta ei rajoittuen hiuksista vetäminen, kasvosuojukseen tarttuminen, mailalla tai muulla esineellä laidan tai suojalasin lyöminen jne. pelin käydessä tai pelikatkolla. Huomautus: Jos päätuomari luokittelee tehdyn fyysisen rikkeen vakavaksi ja ankaraksi käytetyn voiman ja väkivallan perusteella, → Sääntö 21 (Vaaralliset teot) (III) Pelaajalle, joka heittää jonkin esineen jäälle pelaajapenkiltä tai rangaistusaitiosta (tai jostain muualta jääalueen ulkopuolelta). (IV) Pelaajalle, joka istuu laidalla niin, että luistin tai luistimet ovat kentän puolella pelin käydessä. Tuomari antaa yhden varoituksen rikkeen tehneelle joukkueelle (valmentajalle ja pelaajille) pelaajien istumisesta laidalla (ja ilmoittaa asiasta myös vastustajalle). Varoituksen jälkeen samassa ottelussa joukkueelle, joka aiheutti varoituksen, tuomitaan pieni rangaistus jokaisesta seuraavasta rikkomuksesta. (V) Pelaajalle, joka tarkoituksellisesti riisuu pelipaitansa ennen osallistumistaan yhteenottoon tai selkeästi käyttää pelipaitaa, jota on muokattu eikä se ole sääntöjen mukainen → Sääntö 9 (Peliasut), tuomitaan pieni rangaistus epäurheilijamaisesta käytöksestä sekä pelirangaistus. Jos yhteenottoa ei koskaan toteudu, pelaajalle tuomitaan pieni rangaistus epäurheilijamaisesta käytöksestä ja käytösrangaistus (10 min) pelipaidan tarkoituksellisesta riisumisesta. (VI) Pelaaja, joka tahallisesti riisuu kypäränsä ennen tappeluun ryhtymistä. Kypärän putoaminen tappelun aikana tai sen seurauksena ei aiheuta rangaistusta kummallekaan pelaajalle. Jos rangaistulle pelaajalle määrätään lisärangaistus epäurheilijamaisesta käytöksestä joko ennen alkuperäisen rangaistuksen alkamista tai sen aikana, lisärangaistus lisätään alkuperäisen rangaistuksen jäljellä olevaan aikaan ja suoritetaan peräkkäin. (VII) Ottelun jälkeen ei tuomita pientä rangaistusta vaan käytössä käytösrangaistus, PR Jos rangaistulle pelaajalle tuomitaan lisäksi rangaistus epäurheilijamaisesta käytöksestä joko ennen alkuperäisen rangaistuksen kärsimisen alkamista tai sen jälkeen, kun hän alkaa kärsimään alkuperäistä (alkuperäisiä) rangaistustaan (rangaistuksiaan), tämä ylimääräinen pieni rangaistus lisätään hänen kärsimättömään rangaistusaikaansa ja rangaistukset kärsitään peräkkäin."},{"id":"75.3","title":"JOUKKUERANGAISTUS","content":"Seuraavista rikkeistä tuomitaan joukkuerangaistus epäurheilijamaisesta käytöksestä tämän säännön perusteella: (I) Kun tunnistamaton pelaaja, valmentaja tai joukkueen toimihenkilö heittää jonkin esineen jäälle pelaajapenkiltä tai rangaistusaitiosta (tai jostain muualta jääalueen ulkopuolelta) tai lyö mailalla tai muulla esineellä laitaa tai suojalasia jne. pelin käydessä tai pelikatkolla. (II) Kun tunnistamaton pelaaja, valmentaja tai joukkueen toimihenkilö käyttää säädytöntä, rienaavaa tai herjaavaa kieltä tai eleitä ketä tahansa henkilöä kohtaan tai lyö mailalla tai muulla esineellä laitaa tai suojalasia jne. (III) Aina kun valmentaja ja/tai joukkueen ei-pelaava toimihenkilö käyttää säädytöntä tai rienaavaa kieltä tai eleitä missä tahansa kentällä. OSA 9 – MUUT RIKKEET (IV) Ottelun jälkeen ei tuomita joukkuerangaistuksia vaan käytössä PR 138"},{"id":"75.4","title":"KÄYTÖSRANGAISTUS","content":"Seuraavista rikkeistä tuomitaan käytösrangaistus tämän säännön perusteella: (I) Pelaajalle, joka jatkaa käytöstä, josta hänelle on jo tuomittu pieni rangaistus. (II) Pelaajalle, joka tarkoituksellisesti heittää minkä tahansa varusteen pelialueen ulkopuolelle. Tuomariston harkinnan perusteella voidaan tuomita pelirangaistus. (III) Pelaajalle, joka jatkaa käyttäytymistään (mukaan lukien uhkaava tai loukkaava kielenkäyttö tai eleet tai vastaavat teot) tarkoituksenaan yllyttää vastustajaa rikkeeseen. (IV) Kun rangaistu pelaaja haastaa tai vastustaa tuomarin päätöstä sen jälkeen, kun hän on jo mennyt rangaistusaitioon ja peli on jatkunut. (V) Yleisesti, tämän tyyppisen käytökseen syyllistyville tuomitaan ensin pieni rangaistus, sitten käytösrangaistus ja lopulta pelirangaistus, jos toiminta jatkuu saman ottelun aikana."},{"id":"75.5","title":"PELIRANGAISTUS","content":"Seuraavista rikkeistä tuomitaan pelirangaistus tämän säännön perusteella: (I) Jos pelaaja jatkaa mitä tahansa käytöstä, josta hänelle on aiemmin tuomittu käytösrangaistus. (II) Valmentajalle ja joukkueen toimihenkilölle, jolle on aiemmin tuomittu joukkuerangaistus säädyttömän tai rienaavan kielen käyttämisestä tai eleistä missä tahansa hallilla. Päätuomarin pitää raportoida olosuhteet asiaankuuluvalle elimelle kurinpitokäsittelyä varten. (III) Pelaajalle, valmentajalle tai joukkueen toimihenkilölle, jonka toiminta valmentajaa tai joukkueen ei- pelaavaa toimihenkilöä kohtaan voi aiheuttaa loukkaantumisen. Päätuomarin pitää raportoida olosuhteet asiaankuuluvalle elimelle kurinpitokäsittelyä varten. (IV) Pelaajalle, valmentajalle tai joukkueen ei-pelaavalle toimihenkilölle, joka kohdistaa säädytöntä, rienaavaa tai herjaavaa kieltä tai eleitä ketä tahansa henkilö kohtaan ottelun päättymisen jälkeen. Tämä voi tapahtua jäällä tai jään ulkopuolella."},{"id":"75.6","title":"ISO RANGAISTUS JA PELIRANGAISTUS","content":"(I) Pelaajalle, valmentajalle tai joukkueen toimihenkilölle, joka käyttää säädyttömiä eleitä, rasistista loukkausta tai ivaa tai tekee seksuaalisen huomautuksen ennen peliä, pelin aikana tai sen jälkeen, jäällä tai sen ulkopuolella ja missä tahansa hallilla tai sen yhteydessä olevissa tiloissa. Päätuomarin pitää raportoida olosuhteet asiaankuuluvalle elimelle kurinpitokäsittelyä varten. (II) Pelaajalle, valmentajalle tai joukkueen toimihenkilölle, joka sylkee vastustajan tai kenen tahansa päälle tai kohti missä tahansa kentällä ottelun aikana. (III) Verta vuotavalle pelaajalle, joka tarkoituksellisesti tahrii vertaan vastustajan tai kenen tahansa päälle missä tahansa kentällä. (IV) Pelaajalle tai toimihenkilölle, joka käy kiinni tai osallistuu kiistaan yleisön kanssa."},{"id":"75.7","title":"EPÄASIALLINEN TAI SYRJIVÄ KÄYTÖS","content":"Mitä on epäasiallinen tai syrjivä käytös? • Kaikki ulkonäköön, kansallisuuteen tai etniseen taustaan liittyvät kommentit • Sukupuoleen tai seksuaaliseen suuntautumiseen liittyvät kommentit • Kaikki epäasiallinen käytös niin kentällä, kentän ulkopuolella kuin katsomossa. Esim. henkilökohtaisuuksiin menevä loukkaava nimittely • Kohdistuu tuomareihin, pelaajiin tai toimihenkilöihin OSA 9 – MUUT RIKKEET Seuraava ohjeistus on tehty ottelutapahtumiin, jotta tuomareilla, toimitsijoilla ja joukkueilla on keinot puuttua epäasialliseen käytökseen siten, että samalla varmistamaan otteluiden pelaaminen kilpailusääntöjen mukaisesti • Näitä ohjeita noudattaen ei otteluita keskeytetä • Joukkueella ei ole oikeutta vaatia rangaistuksia tai ottelun keskeytystä PELAAJAT JA TOIMIHENKILÖT Mikäli pelaajistosta tai joukkueen toimihenkilöistä kuuluu epäasiallisia tai syrjiviä kommentteja kohdistuen pelaajiin, tuomareihin tai joukkueiden toimihenkilöihin, toimitaan seuraavasti: Mikäli tuomaristo on kuullut ko. kommentit ja tunnistanut kommentoijan: Tuomitaan kommentoijalle sääntökirjan mukaisesti 5 + 20 pelirangaistus ja asia raportoidaan ottelun jälkeen liittoon. Tuomaristo ilmoittaa samalla pelikatkolla joukkueiden joukkueenjohdolle, että pelaaja/toimihenkilö on lausunut epäasiallisia tai syrjiviä kommentteja ja häntä on rangaistu pelirangaistuksella. Peli jatkuu tämän jälkeen. Mikäli tuomaristo on kuullut ko. kommentit mutta ei ole tunnistanut tekijää: Ko. joukkueelle, josta kommentointi kuului, tuomitaan joukkuerangaistus. Ilmoitetaan kummankin joukkueen joukkueenjohdolle, että epäasiallista tai syrjivää käytöstä on todettu ja se tullaan raportoimaan liittoon ottelun jälkeen. Mikäli tuomaristo ei ole kuullut ko. kommentteja, mutta joukkue/pelaaja sellaisesta ilmoittaa: Ilmoitetaan kummankin joukkueen joukkueenjohdolle, että epäasiallista tai syrjivää käytöstä on informoitu tapahtuneen ja se tullaan raportoimaan liittoon ottelun jälkeen. Mikäli joukkueiden toimesta ilmoitetaan toisen kerran vastaavasta käytöksestä, ilmoitetaan kummallekin joukkueelle, että mahdollisista toistuvista vastaavista käytöksistä ilmoitetaan vasta ottelun jälkeen. YLEISÖ Mikäli yleisön joukosta kuuluu epäasiallisia tai syrjiviä kommentteja kohdistuen pelaajiin, tuomareihin tai joukkueiden toimihenkilöihin, toimitaan seuraavasti: Mikäli tuomaristo on kuullut ko., kommentit: Tuomaristo ilmoittaa seuraavalla pelikatkolla kummankin joukkueen joukkueenjohdolle, että katsomosta on kuulunut epäasiallisia tai syrjiviä kommentteja. Kotijoukkuetta pyydetään identifioimaan ja poistamaan ko. kommentoija katsomosta. Tuomaristo kertoo toimitsijoille, että seuraava kuulutus on kuulutettava: ”Arvoisa yleisö, yleisön joukosta on kuulunut epäasiallisia tai syrjiviä kommentteja. Asianosainen henkilö tullaan poistamaan katsomosta. Mikäli asiaton käytös jatkuu, voidaan katsomo tyhjentää.” Kun katsoja on poistettu, peli jatkuu. Mikäli katsojaa ei saada tunnistettua, ilmoittaa tuomari, että asiasta tehdään raportti liittoon. Peli jatkuu tämän jälkeen Jos sama toistuu, ilmoitetaan kotijoukkueelle ja kuuluttajalle, että katsomo on tyhjennettävä ja peli jatkuu vasta sen jälkeen. Kuulutusohje: ”Arvoisa yleisö, epäasiallinen tai syrjivä käytös katsomossa on jatkunut. Tästä syystä katsomo tyhjennetään, ottelu jatkuu vasta tyhjentämisen jälkeen.” Jos kotijoukkue ei saa katsomoa tyhjennettyä, tuomaristo keskeyttää pelin ja antaa kotijoukkueelle 2 minuuttia aikaa tyhjentää katsomo. Jos katsomo ei tyhjene, peli keskeytetään ja asiasta tehdään raportti 140 koskien kotijoukkueen hoitamatonta velvoitetta. Mikäli tuomaristo ei ole kuullut, mutta jommankumman joukkueen johto on kuullut: Joukkue ilmoittaa seuraavalla pelikatkolla asiasta tuomaristolle. Tuomaristo kirjaa ylös kuka informoi ja mitä kuuli. Tämän jälkeen tuomaristo informoi myös vastustajaa ja muuten toimitaan yllä mainittujen ohjeiden mukaisessa järjestyksessä. OSA 10 – PELIN VIRTAUS OSA 10 PELIN VIRTAUS 142 OSA 10 – PELIN VIRTAUS"}]},"76":{"number":"76","title":"ALOITUKSET","sections":[{"id":"76.1","title":"ALOITUS","content":"Tapahtumaa, jossa päätuomari tai linjatuomari pelin aloittamiseksi pudottaa kiekon kahden vastapuolen pelaajan mailojen väliin, kutsutaan aloitukseksi. Aloitustapahtuma käynnistyy, kun tuomari osoittaa aloituspaikan ja tuomaristo ja pelaajat ottavat aloituksen mukaiset paikkansa. Aloitustapahtuma päättyy, kun kiekko on sääntöjen mukaisesti pudotettu. Maalivahti ei voi toimia aloittavana pelaajana."},{"id":"76.2","title":"ALOITUSPAIKAT","content":"Kaikki aloitukset pitää suorittaa jostain kaukalon yhdeksästä (9) aloituspisteestä. Jos pelikatkon syynä on kaksi (2) sääntörikettä (esim.: kiekon pelaaminen korkealla mailalla ja tahallinen paitsio), seuraavan aloituksen paikka määräytyy sen mukaan, kumpi paikoista antaa rikkoneelle joukkueelle vähemmän alueellista etua. Kun pelitilanne katkaistaan puolueettomalla alueella mistä tahansa sellaisesta syystä, jota ei erityisesti tulkita jommankumman joukkueen syyksi, seuraava aloitus suoritetaan lähimmästä siniviivan aloituspisteestä – aina kun se on mahdollista. Jos on epäselvää, mikä näistä neljästä (4) aloituspisteestä on lähinnä, valitaan seuraavaksi aloituspisteeksi se piste, joka antaa kotijoukkueelle suurimman alueellisen edun. Kun pelaajia rangaistaan pelikatkolla siten, että rangaistuskelloon merkitään rangaistuksia vain toiselle joukkueelle, suoritetaan seuraava aloitus toisesta rikkoneen joukkueen puolustusalueen aloituspisteestä. Tähän sääntöön on olemassa vain kolme (3) poikkeusta: (I) kun rangaistus määrätään maalin hyväksymisen jälkeen, aloitus suoritetaan keskipisteestä; (II) kun rangaistus määrätään erän päättyessä (tai ennen erän alkamista), aloitus suoritetaan keskipisteestä; (III) kun puolustavaa joukkuetta rangaistaan, ja hyökkäävän joukkueen pelaajat tulevat vihellyksen jälkeen hyökkäysalueellaan aloitusympyrän uloimman kaaren tason yli, aloitus suoritetaan lähimmästä puolueettoman alueen aloituspisteestä. (katso tämän osion kappale 11) Ylivoiman saanut joukkue saa valita kummasta päätyalueen aloituspisteestä ylivoimapeli aloitetaan. Jos pelikatkon syynä on molempien joukkueen pelaajien rangaistus, suoritetaan seuraava aloitus lähimmästä sen alueen aloituspisteestä. Kun pelikatko tapahtuu päätyalueen aloituspisteiden välissä ja lähellä päätylaitaa, suoritetaan seuraava aloitus lähimmästä päätyalueen aloituspisteestä, ellei näissä säännöissä toisin määrätä. Yhtään aloitusta ei voi suorittaa 4,50 metriä (15 jalkaa) lähempänä maalia tai laitoja eikä mistään muualta kuin aloituspisteestä. Kun syntyy sääntöjenvastainen maali kiekon kimmottua tuomarista suoraan maaliin, seuraava aloitus suoritetaan osumakohtaa lähinnä olevasta saman alueen aloituspisteestä. Kun hyökkäävä joukkue tekee sääntöjenvastaisen maalin ohjaamalla, kädellä lyömällä, potkaisemalla tai pelaamalla kiekon korkealla mailalla maaliin, seuraava aloitus suoritetaan lähimmästä puolueettoman alueen aloituspisteestä. Kun pelitilanne katkaistaan mistä tahansa sellaisesta syystä, jota säännöissä ei ole määritelty, täytyy seuraava aloitus suorittaa lähimmästä sen alueen aloituspisteestä, missä kiekkoa viimeksi pelattiin. Jos pelin katkaisemisen jälkeen joku hyökkäävän joukkueen pelaaja (päätyalueen aloituspisteiden kaaren tasan siniviivan puolella olleista pelaajista tai vaihdosta tuleva pelaaja) tulee yhteenoton aikana (pelaajien hässäkkä tai kasaantuminen) hyökkäysalueen aloituspisteiden uloimman kaaren tason yli, seuraava aloitus OSA 10 – PELIN VIRTAUS suoritetaan puolueettomalta alueelta lähinnä puolustavan joukkueen siniviivaa. Tätä sääntöä sovelletaan myös pitkään, tahalliseen paitsioon tai kun ylivoimalla pelaava joukkue syyllistyy rikkeeseen, jolloin seuraava aloitus pitäisi suorittaa rikkoneen joukkueen puolustusalueelta. Jos yhteenoton (pelaajien hässäkkä tai kasaantuminen) aikana yhtään ei-hyökkäävää pelaajaa (=puolustajat) tulee hyökkäysalueen aloituspisteiden uloimman kaaren tason yli, seuraava aloitus suoritetaan puolueettomalta alueelta lähinnä puolustavan joukkueen siniviivaa. Maalivahdin liian aikainen vaihto -rikkeestä → Sääntö 71 (Maalivahdin liian aikainen vaihto), seuraava aloitus suoritetaan kaukalon keskipisteestä, jos pelitilanne oli katkaisuhetkellä vastustajan kenttäpuoliskolla. Jos pelitilanne oli katkaisuhetkellä omalla kenttäpuoliskolla, seuraava aloitus suoritetaan lähimmästä sen alueen aloituspisteestä, missä kiekko oli katkaisuhetkellä. Kun peli katkaistaan loukkaantuneen pelaajan takia, seuraava aloitus suoritus suoritetaan lähimmästä sen alueen aloituspisteestä, missä kiekko oli, kun peli katkaistiin. Kun loukkaantuneen pelaajan joukkueella on kiekko hallussaan hyökkäysalueellaan, seuraava aloitus suoritetaan puolueettomalta alueelta. Kun loukkaantunut pelaaja on puolustusalueellaan ja kiekko on hyökkäävän joukkueen hallussa hyökkäysalueella, aloitus suoritetaan toisesta puolustusalueen aloituspisteestä."},{"id":"76.3","title":"ALOITUKSEN SUORITUSTAPA","content":"Heti kun pelaajien vaihtotapahtuma on päättynyt päätuomarin toimesta ja hän laskee kätensä alas ilmoittaen, ettei lisävaihtoja sallita, aloitusta suorittavan linjatuomarin pitää puhaltaa pilliinsä. Tämä indikoi kummallekin joukkueelle, että on vain viisi (5) sekuntia aikaa asettua valmiiksi aloitusta varten. Tämän viiden (5) sekunnin jälkeen (tai aiemmin, jos molemmat aloittajat ovat valmiina), linjatuomari suorittaa oikeaoppisen aloituksen. Kuitenkin, jos: (I) Toinen tai molemmat aloittajat eivät ole asettuneet aloitukseen oikein, (II) Toinen tai molemmat aloittajat pidättäytyvät asettamasta mailaansa jäähän, (III) Joku pelaaja tunkeutuu aloitusympyrän sisäpuolelle, (IV) Joku pelaaja ottaa fyysisen kontaktin vastustajaan, tai (V) Joku pelaaja on asemoitunut aloitustasan väärälle puolelle, (VI) Jompikumpi aloittajista voittaa aloituksen pelaamalla kiekkoa luistimellaan. linjatuomarin pitää varoittaa rikkoneen joukkueen aloittajaa (tai rikkoneiden joukkueiden aloittajia) ennen kiekon pudottamista. Varsinaisen peliajan kahden (2) viimeisen minuutin aikana tai milloin tahansa jatkoajalla linjatuomarin pitää yhä puhaltaa pilliinsä, mutta viiden (5) sekunnin aikarajaa ei noudateta. Pelaajien on kuitenkin noudatettava linjatuomarin suullisia ohjeita hänen yrittäessään suorittaa nopeaa ja tasapuolista aloitusta."},{"id":"76.4","title":"ALOITUKSEN SUORITUSTAPA – ALOITTAJAT","content":"Aloituksessa kiekon pudottaa joko päätuomari tai linjatuomari aloittavien pelaajien mailojen väliin. Aloittavien pelaajien tulee olla suoraan vastakkain kasvot suunnattuina vastustajan kenttäpäätyä kohti, noin mailan mitan päässä toisistaan ja heidän mailojensa lapojen tulee koskettaa jäätä. Kun aloitus tapahtuu mistä tahansa yhdeksästä aloituspisteestä, aloittavien pelaajien on asemoiduttava siten, että he ovat suoraan vastakkain kasvot suunnattuina vastustajan kenttäpäätyä kohti ja erossa aloituspisteen jäämerkinnöistä (jos on). Kummankin aloittavan pelaajan mailan lapa pitää olla kosketuksissa jäähän, siihen merkityn alueen sisällä. Kahdeksassa (8) aloituspisteessä (pois lukien keskipiste) puolustavan joukkueen aloittaja asettaa mailansa lavan merkitylle valkoiselle alueelle ensin ja välittömästi sen jälkeen hyökkäävän joukkueen aloittaja tekee 144 samoin. Kun aloitus suoritetaan kaukalon keskipisteessä, vierasjoukkueen aloittaja asettaa mailansa ensin jäähän. Jos aloittava pelaaja ei heti ota oikeaa aloitusasentoa, kun tuomari häntä ohjeistaa, tuomari voi antaa hänelle varoituksen aloitusrikkeestä. Jos aloittava pelaaja ei ole aloituspaikalla, kun viisi (5) sekuntia on kulunut, linjatuomari pudottaa kiekon välittömästi. Jos aloittava pelaaja on kauempana aloituspisteen takana ohjaten kanssapelaajiaan tai kieltäytyy tulemasta aloituspisteelle linjatuomarin niin käskiessä, tai aloittaja on yksinkertaisesti hidas tulemaan aloituspisteelle, kun viisi (5) sekuntia on kulunut, kiekko pudotetaan. Jos aloittava pelaaja yrittää tulla aloituspisteeseen juuri, kun viisi (5) sekuntia on kulumassa loppuun yrittäen saada etua aloituksessa voittamisessa, linjatuomarin pitää varoittaa aloittajaa aloitusrikkeestä. Jos kyseessä on pitkän jälkeinen aloitus ja aloittava pelaaja yrittää tulla aloituspisteeseen juuri, kun viisi (5) sekuntia on kulumassa loppuun yrittäen saada etua aloituksen voittamisessa, linjatuomarin pitää varoittaa aloittajaa aloitusrikkeestä. Tilanteessa, jossa aloittava pelaaja tämän jälkeen tekee toisen aloitusrikkeen, tai tilanne on jo toinen aloitusrike, tuomitaan joukkuerangaistus. Jos pelaajalle annetaan varoitus aloitusrikkeestä, hänen täytyy asettua aloitusasentoon nopeasti tai riskinä on linjatuomarin nopea kiekon pudotus ennen kuin pelaaja ehtii ottaa aloitusasennon, tai että tuomitaan joukkuerangaistus pelin viivyttämisestä toisen aloitusrikkeen takia samassa aloituksessa."},{"id":"76.5","title":"PELIN VIIVYTTÄMINEN","content":"Kaksi aloitukseen osallistuvaa pelaajaa (sentterit) eivät saa pelata kiekkoa kädellään ilman, että heille tuomitaan rangaistus säännön 67.2 – Pieni rangaistus kenttäpelaaja - mukaan, ennen kuin kolmas pelaaja (kummasta tahansa joukkueesta) on koskenut kiekkoon. Kun aloitus katsotaan päättyneeksi (ja aloituksen voittaja on selvillä), käsisyötöt käsitellään sääntöjen 79 – Käsisyöttö mukaisesti."},{"id":"76.6","title":"ALOITUKSEN SUORITUSTAPA – MUUT PELAAJAT","content":"Kukaan muu pelaaja ei saa tulla aloitusympyrään tai vähintään 4,5 metriä (15 jalkaa) lähemmäksi aloittavia pelaajia. Kaikkien jäällä olevien pelaajien täytyy olla aloitustasaan nähden omalla puolellaan. Päätyalueen aloituksessa kaikkien jäällä olevien pelaajien täytyy asettua aloitusympyrän kaarella oleviin merkkiviivoihin nähden omalle puolelleen. Jos jokin muu kuin aloittava pelaaja liikkuu aloitusympyrään ennen kiekon pudotusta, tällöin rikkoneelle joukkueelle annetaan varoitus aloitusrikkeestä. Hyökkäävän joukkueen pelaajien (pois lukien aloittava pelaaja) täytyy ensin ottaa asemansa ja sitten puolustava joukkue voi vastata tähän ja valita omat paikkansa, jotka he pitävät kiekon pudottamiseen asti. Tätä toimintatapaa vastaan rikkominen käsitellään aloitusrikkeenä ja linjatuomari varoittaa rikkonutta joukkuetta aloitusrikkeestä. Jos hyökkäävä pelaaja yrittää asemoitua uudelleen ennen aloitusta ja puolustava aloittaja perääntyy aloituspisteeltä asemoidakseen kanssapelaajansa uudelleen, hyökkäävää joukkuetta varoitetaan aloitusrikkeestä, koska heidän täytyy asemoida pelaajansa ensin."},{"id":"76.7","title":"ALOITUKSEN SUORITUSTAPA – ALOITUSRIKKEET","content":"Jos aloittaja on liikkunut liian aikaisin ennen aloitusta tai päätuomari tai linjatuomari on pudottanut kiekon epäoikeudenmukaisesti, aloitus tulkitaan aloitusrikkeeksi. Rikkoneelle joukkueelle annetaan varoitus ja aloitus suoritetaan uudestaan. Kun sama joukkue syyllistyy kahteen (2) aloitusrikkeeseen samassa aloituksessa, tälle rikkoneelle joukkueelle pitää tuomita joukkuerangaistus. Tämä rangaistus kuulutetaan ”joukkuerangaistus pelin viivyttämisestä – rike aloitustapahtumassa”. OSA 10 – PELIN VIRTAUS Aloitusrikkeet kuvataan seuraavassa yhteenvedossa – kuka tahansa neljästä tuomarista voi tunnistaa aloitusrikkeen: (I) Muun kuin aloittavan pelaajan tunkeutuminen aloitusalueelle (tai aloitusympyrään) ennen kiekon pudottamista. Aloitusympyrän kehällä olevien pelaajien täytyy pitää molemmat luistimensa aloitusympyrän ulkopuolella – luistinkontakti viivaan on sallittu. Jos pelaajan luistin ylittää ympyrän viivan ennen kiekon pudotusta, tämä tulkitaan aloitusrikkeeksi. Pelaajan maila voi olla ympyrän sisällä edellyttäen, että tilanteessa ei ole fyysistä kontaktia vastustajaan tai vastustajan mailaan. (II) Pelaajan tunkeutuminen aloitusympyrän ulkokehällä olevien merkkiviivojen väliin ennen kiekon pudottamista. Pelaajien täytyy myös varmistaa, ettei heidän kumpikaan luistin ylitä merkkiviivoja. Luistimen kosketus merkkiviivaan sallitaan. Jos pelaajan luistin ylittää merkkiviivan merkkiviivojen väliselle alueelle ennen kiekon pudotusta, tämä tulkitaan aloitusrikkeeksi. Pelaajan maila voi olla merkkiviivojen välisellä alueella edellyttäen, että tilanteessa ei ole fyysistä kontaktia vastustajaan tai vastustajan mailaan. (III) Mikä tahansa fyysinen kontaktia vastustajaan ennen kiekon pudotusta. Jos jompikumpi aloittava pelaaja ottaa kypärä-kypärä-kontaktin vastustajaansa, hänen joukkueensa pitää saada ensimmäinen varoitus aloitusrikkeestä. Jos linjatuomari ei pysty erottamaan, kumpi pelaajista aiheutti kontaktin, täytyy ensimmäinen varoitus aloitusrikkeestä antaa kummallekin kummankin pelaajan joukkueelle. (IV) Jommankumman aloittavan pelaajan epäonnistuminen asettua oikeaan aloitusasemaan merkkiviivojen taakse tai asettaa mailansa jäähän, kuten kuvattu säännössä 76.4 (Aloituksen suoritustapa – aloittajat). Oikeaan aloitusasemaan merkkiviivojen taakse asettumisella tarkoitetaan, että aloittajan täytyy asettaa luistimensa kummallekin puolelle laitojen suuntaisia merkkiviivoja (kontakti viivaan on sallittu) ja terän kärki ei saa ylittää kohtisuoraan laitoja vastaan olevia merkkiviivoja pelaajan lähestyessä aloituspistettä. Mailan lapa täytyy asettaa jäähän (vähintään lavan kärki) aloituspisteen merkitylle valkoiselle alueelle ja lavan pitää pysyä jäässä, kunnes kiekko pudotetaan. (V) Sijoittautumisen ja aloituksen suoritusohjeen noudattamatta jättäminen aiheuttaa aloitusrikkeen. Kun joukkue syyllistyy kahteen (2) aloitusrikkeeseen samassa aloituksessa, päätuomarin pitää välittömästi tuomita rikkoneelle joukkueen joukkuerangaistus pelin viivyttämisestä. Tämä rangaistus kuulutetaan ”joukkuerangaistus pelin viivyttämisestä – rike aloitustapahtumassa”. Päätuomari varoittaa kerran ottelussa niitä pelaajia, jotka ovat myöhässä aloituksen suorituspaikalta ja täten seuraavan aloituksen aloitustasan väärällä puolella. Tämä varoitus annetaan myös rikkoneen joukkueen valmentajalle. Tässä tilanteessa rikkoneen joukkueen aloittavalle pelaajalle ei anneta varoitusta aloitusrikkeestä. Seuraavasta (tämän säännön) rikkeestä tuomitaan rikkoneelle joukkueelle joukkuerangaistus pelin viivyttämisestä. Tämä rangaistus kuulutetaan ”joukkuerangaistus pelin viivyttämisestä – viivyttely aloituspaikalle saapumisessa”. Suoritettaessa mitä tahansa aloitusta mistä tahansa kaukalon yhdeksästä (9) aloituspisteestä, ei kumpikaan aloittava pelaaja saa ottaa minkäänlaista kontaktia vastustajaan vartalollaan tai mailallaan paitsi, kun mailalla pelataan kiekkoa aloituksen päätyttyä. Tämän säännön rikkomisesta päätuomari voi harkintansa mukaan tuomita pienen rangaistuksen tai rangaistuksia pelaajalle (pelaajille), jonka toiminta aiheutti fyysisen kontaktin. Joka tapauksessa tämä fyysinen kontakti ennen kiekon pudottamista tulkitaan aloitusrikkeeksi ja linjatuomari varoittaa tämän aloittajaa, että tämä joukkue on syyllistynyt aloitusrikkeeseen ja seuraava peräkkäinen aloitusrike aiheuttaa joukkuerangaistuksen tuomitsemisen pelin viivyttämisestä. Aloitusalueelle tunkeutumista voidaan soveltaa kaikissa kaukalon yhdeksästä (9) aloituspisteestä. Kuitenkin, koska neljässä (4) siniviivan läheisessä aloituspisteessä ei ympyränkaarta ja muita viivoja ole piirrettyinä, linjatuomarin täytyy käyttää omaa harkintaansa arvioidessaan, onko aloitusrike tapahtunut tai ei. Kaikkien muiden pelaajien kuin aloittajien täytyy olla vastaavalla etäisyydellä aloituspisteestä kuin päätyalueen aloitusten yhteydessä. 146"},{"id":"76.8","title":"ALOITUKSEN SUORITUSTAPA – KENTÄLLISTEN VAIHTAMINEN","content":"Pelaajien vaihtamista ei sallita ennen kuin aloitus suoritettu ja peli on jatkunut, paitsi kun tuomitaan rangaistus, joka vaikuttaa jommankumman joukkueen jäällä olevaan pelaajavahvuuteen. Jos tuomari huomaa, ettei puolustava joukkue ole asettanut jäälle riittävästi pelaajia seuraavaa aloitusta varten, puolueettomalla alueella olevaa päätuomaria informoidaan asiasta ja hänen tulee ohjata rikkonutta joukkuetta asettamaan asianmukainen määrä pelaajia jäälle. Jos päätuomarin mielestä tätä käytetään taktisena viivyttelynä, hän varoittaa rikkoneen joukkueen valmentajaa ja seuraava vastaava rike aiheuttaa joukkuerangaistuksen pelin viivyttämisestä. Jos tuomari huomaa, ettei hyökkäävä joukkue ei ole asettanut riittävästi pelaajia seuraavaa aloitusta varten, linjatuomari jatkaa aloituksen suorittamista normaaliin tapaan. Hyökkäävän joukkueen täytyy varmistaa, että sillä on asianmukainen määrä pelaajia jäällä kaiken aikaa."},{"id":"76.9","title":"ALOITUKSEN SUORITUSTAPA – PELIAJAN VAHVISTAMINEN","content":"Kaikki pelikellossa tai rangaistuskelloissa kulunut aika virheellisen aloituksen tai aloitusrikkeen takia täytyy palauttaa. Videotuomaristoa / toimitsijoita voidaan konsultoida, jotta kulunut aika voidaan varmistaa tarkasti. Tuomari ei puhalla pilliin pelin käynnistymiseksi. Peliaika käynnistyy kiekon pudottamisesta ja katkeaa, kun pilliin puhalletaan tai maali syntyy."}]},"77":{"number":"77","title":"PELIAJANOTTO JA ERÄTAUKOJEN AJANOTTO","sections":[{"id":"77.1","title":"PELIAJANOTTO","content":"Ottelun peliaika on kolme (3) kahdenkymmen (20) minuutin erää tehokasta peliaikaa ja erätauko lepoaikaa erien välillä."},{"id":"77.2","title":"ERÄTAUKOJEN AJANOTTO","content":"Peliä jatketaan viipymättä jokaisen erätauon jälkeen, kun SJL sarjamääräysten mukainen aika on kulunut edellisen erän päättymisestä. Erätaukokello käynnistyy erätauon etenemiseksi välittömästi erän päätyttyä. → Sääntö 34 (Peliajanottaja) Jotta katsojat olivat tietoisia erätauon kulumisesta, peliajanottaja käyttää sähköistä kelloa näyttämään erätauon jäljellä olevan ajan."},{"id":"77.3","title":"VIIVÄSTYKSET","content":"Jos jokin epätavallinen viivästyminen tapahtuu ensimmäisen tai toisen erän aikana, päätuomari voi määrätä seuraavan erätauon alkamaan välittömästi. Kun ottelu jatkuu, joukkueet puolustavat samoja kenttäpäätyjä kuin ennen keskeytystä ja tämän jälkeen joukkueet vaihtavat kenttäpäätyjä ja jatkavat seuraavan erän pelaamiseen ilman viivytystä."},{"id":"77.4","title":"OTTELUPAIKKA","content":"Jos ottelupaikaksi ilmoitettu kenttä ei määrättynä peliaikana ole kunnossa, ja lähialueella on toinen pelikelpoinen kenttä, on ottelu pelattava tällä kentällä. OSA 10 – PELIN VIRTAUS"},{"id":"77.5","title":"OLOSUHTEISTA JOHTUVA OTTELUN PERUUTTAMINEN","content":"Jos pelikelpoista jäätä ei määrättynä ottelupäivänä ole paikkakunnalla, on siitä heti ilmoitettava vierailevalle joukkueelle, kuitenkin viimeistään viisi (5) tuntia ennen matkustavan joukkueen lähtöaikaa. Jos tilanne on epävakainen, ettei varmuudella voida sanoa voidaanko ottelu pelata, on ilmoitettava \"varoitus\" viimeistään viisi tuntia ennen vierailevan joukkueen ilmoittamaa lähtöaikaa. Järjestävä joukkue ilmoittaa lopullisen päätöksen kaksi (2) tuntia ennen vierailevan joukkueen lähtöä. Mikäli menetellään toisin, joutuu järjestävä joukkue korvaamaan vierasjoukkueen matkakustannukset. Ottelupaikalla erotuomarit ratkaisevat lopullisesti ottelun pelaamisesta. Liitto ei vastaa peruuttamisesta aiheutuneista kuluista tai vahingoista. Seurojen on viikon kuluessa sovittava uusi pelipäivä. Mikäli seurat eivät pääse sopuun määräajassa uudesta pelipäivästä, määrää liitto pelipäivän."}]},"78":{"number":"78","title":"MAALIT","sections":[{"id":"78.1","title":"MAALIT JA SYÖTTÄJÄT","content":"Päätuomareiden vastuulla on hyväksyä maalit ja raportoida maalitekijä ja syöttäjät ja päätuomareiden päätös on tässä suhteessa lopullinen, riippumatta muun tuomariston tai toimitsijoiden näkemyksistä. Jos sovellettavissa, niin päätuomarit hyväksyvät maalit ja raportoivat ne kirjurille. Tilastohenkilöstön avustuksella kirjuri vahvistaa maalintekijän ja mahdolliset syöttöpisteen ansaitsevat pelaajat. Tämä päätös on lopullinen tämän suhteen eikä mitään muutoksia voi tehdä ottelun päättymisen jälkeen. On olennaista käyttää videouusintoja varmentamaan oikea maalitekijä tai syöttäjät. Tällaiset päätökset tai muutokset tehdään tiukasti näitä sääntöjä noudattaen. Siksi on välttämätöntä, että kirjuri tuntee perusteellisesti tämän säännön kaikki näkökohdat; on tietoinen huomioimaan kaikki toimet, jotka voivat vaikuttaa maalitekijän tai syöttäjän nimeämiseen; ja ennen kaikkea nimeäminen tai nimeämättä jättäminen tehdään ehdottoman puolueettomasti. Jos kyseessä on ilmeinen virhe jo kuulutetun maalintekijän tai syöttäjän nimeämisessä, asia on korjattava viipymättä, mutta muutoksia ei pitäisi tehdä enää sen jälkeen, kun päätuomari on allekirjoittanut pöytäkirjan. Joukkue, joka tekee enemmän maaleja kolmen (3) 20 minuutin erän aikana on voittaja ja saa kolme (3) sarjapistettä sarjataulukkoon. Jos runkosarjan aikana voittaja ratkaistaan jatkoerässä tai voittomaalikilpailulla, voittava joukkue saa kaksi (2) pistettä sarjataulukkoon ja hävinnyt joukkue saa yhden (1) pisteen sarjataulukkoon."},{"id":"78.2","title":"MAALINTEKIJÄ","content":"Maalintekijäksi nimetään pelaaja, joka aiheuttaa kiekon menemisen vastustajan maaliin. Jokainen maali tuottaa yhden pisteen pelaajan tilastoon. Pelaajalle voidaan myöntää vain yksi piste maalia kohden"},{"id":"78.3","title":"SYÖTTÄJÄ","content":"Kun maali syntyy, syöttäjiksi (enintään kaksi) voidaan nimetä pelaaja(t), jotka koskivat kiekkoa ennen maalintekijää edellyttäen, että vastustaja ei pelannut kiekkoa tai sillä ei ollut kiekko hallinnassaan välillä. Jokainen syöttö tuottaa yhden pisteen pelaajan tilastoon. Pelaajalle voidaan myöntää vain yksi piste maalia kohden. 148"},{"id":"78.4","title":"MAALINTEKO","content":"Maali syntyy, kun hyökkäävän joukkueen pelaaja on mailallaan pelannut kiekon maalin etupuolelta maaliin maalipylväiden välistä ja yläriman alapuolelta kokonaan yli punaisen maaliviivan, joka on maalitolppien halkaisijan levyinen ja piirretty tolpasta tolppaan, ja maalikehikko on oikealla paikallaan. Maalikehikon katsotaan olevan oikealla paikallaan, kun vähintään osa kummastakin joustopiikistä on tolpan sisällä. Joustopiikit voivat olla taipuneet, mutta niin kauan, kun ainakin osa joustavasta piikistä on vielä jääreiässä ja maalipylväässä, maalikehyksen katsotaan olevan paikallaan. Maalikehikko voi olla noussut ylöspäin jonkin verran toisesta (tai molemmista) tolpasta, mutta niin kauan, kun joustopiikki on vielä kontaktissa jääreikään ja tolppaan, maalikehikon ei katsota olevan pois paikaltaan. Maali syntyy, jos puolustavan joukkueen pelaaja laukaisee kiekon omaan maaliin. Maalintekijäksi merkitään hyökkäävän joukkueen pelaaja, joka viimeksi koski kiekkoa, mutta syöttäjää ei nimetä. Maali syntyy, jos puolustavan joukkueen pelaaja jollain muulla tavoin pelaa kiekon omaan maaliin. Maalintekijäksi merkitään hyökkäävän joukkueen pelaaja, joka viimeksi koski kiekkoa, ja syöttäjiä voidaan nimetä. Jos kiekko kimpoaa jollain tavoin hyökkäävän pelaajan luistimesta tai vartalosta maaliin, maali hyväksytään. Hyökkäävän joukkueen pelaaja, josta kiekko kimpoaa, nimetään maalintekijäksi. Jos pelaaja sääntöjen mukaisesti pelaa kiekon vastajoukkueen maalialueelle ja kiekko on vapaana ja toisen hyökkäävän joukkueen pelaajan pelattavissa, tilanteesta tehty maali on sääntöjen mukainen."},{"id":"78.5","title":"MAALI HYLÄTÄÄN","content":"Sääntöjenvastaiset maalit hylkää päätuomari ja kuuluttaja kuuluttaa asiaankuuluvan kuulutuksen seuraavilla syillä: (I) Kun hyökkäävä pelaaja on, ohjannut kiekon jollain vartalonsa osalla (pois lukien luistimet) maaliin, lyönyt kiekon kädellään tai heittänyt kiekon maaliin, muutoin kuin mailallaan ja jos tämä on tehty tahallisesti (tarkoituksellisesti), tuomariston päätös on EI MAALI. Maalia ei voi syntyä, jos hyökkäävä pelaaja on tarkoituksellisesti lyönyt kiekon jollain vartalonsa osalla maaliin → Sääntö 78.4 (Maalinteko) (II) Kun kiekko on potkaistu käyttäen havaittavissa olevaa potkuliikettä → Sääntö 49.2 (Potkaiseminen / Maalit) (III) Kun kiekko on kimmonnut tuomarista suoraan maaliin → Sääntö 85.4 (Kiekko koskettaa tuomaria) (IV) Kun maali on syntynyt ja pelaaja oli jäällä sääntöjen vastaisesti → Sääntö 68.5 (Maali hylätään) (V) Kun hyökkäävä pelaaja on estänyt maalivahtia maalialueella → Sääntö 69.1 (Maalivahdin estäminen) (VI) Kun kiekko on mennyt maaliin osuttuaan hyökkääjäpelaajan mailaan yläriman yläpuolella. Kiekon osumakohta mailaan on määräävä tekijä → Sääntö 80.3 (Maali hylätään). (VII) Kun videotarkistuksessa vahvistetaan maalin syntyneen kentän toisessa päädyssä, muut samassa pelitilanteessa toiseen päätyyn tehdyt maalit hylätään → Sääntö 37.2 (Videotarkistus). (VIII) Kun linjatuomari raportoi päätuomarille maalin tehneen joukkueen kaksinkertaisen pienen rangaistuksen korkeasta mailasta tai ison rangaistuksen, maali täytyy hylätä ja asianmukainen rangaistus tuomita → Sääntö 32.4 (Raportointi päätuomarille). (IX) Kun maalivahti on torjunnan jälkeen työnnetty maaliin yhdessä kiekon kanssa → Sääntö 69.7 (Paluukiekko ja irtokiekko). (X) Kun maali siirtyy vahingossa. Maalikehikon katsotaan olevan pois paikallaan, jos toinen tai molemmat joustopiikit eivät ole enää jääreiässään, tai maali on kokonaan irti toisesta tai molemmista OSA 10 – PELIN VIRTAUS joustopiikistä ennen tai samaan aikaan, kun kiekko menee maaliin. (Jos maali siirretään puolustavan joukkueen toimesta, katso sääntö 63.7) (XI) Siirretyn rangaistusvihellyksen aikana rikkonut joukkue ei voi tehdä maalia, ellei ei-rikkonut joukkue laukaise kiekkoa omaan maaliinsa. Tämä tarkoittaa, että kimmoke rikkoneen joukkueen pelaajasta tai mikä tahansa rikkoneen joukkueen pelaajan fyysinen teko, joka aiheuttaa kiekon menemisen ei- rikkoneen joukkueen maaliin, ei ole sääntöjen mukainen maali. Peli pitää katkaista ennen kuin kiekko menee maaliin (jos mahdollista) ja ilmoitettu rangaistus tuomita rikkoneelle joukkueelle. (XII) Kun päätuomari katsoo, että peli olisi pitänyt katkaista, vaikka hänellä ei ole ollut mahdollisuutta puhaltaa pilliinsä pelin katkaisemiseksi. (XIII) Minkäänlainen muu maali, kuin virallisissa säännöissä kuvattu, ei ole hyväksyttävä maali."}]},"79":{"number":"79","title":"KÄSISYÖTTÖ","sections":[{"id":"79.1","title":"KÄSISYÖTTÖ","content":"Pelaaja saa pysäyttää tai lyödä kiekon ilmasta avokädellä, tai työntää kiekkoa kädellä jäätä pitkin eikä peliä katkaista, ellei tuomariston mielestä kiekkoa ole ohjattu kanssapelaajalle tai saavutettu omalle joukkueelle etua, ja sen myötä rikkoneen joukkueen pelaaja on saanut kiekon haltuun ja hallintaansa, joko suoraan tai kimmoten jostain pelaajasta tai tuomarista. Kiekon sulkemisesta käteen liittyvien rikkeiden osalta viitataan sääntöön 67 (kiekon pelaaminen kädellä): → Sääntö 67 (Kiekon pelaaminen kädellä)"},{"id":"79.2","title":"PUOLUSTUSALUE","content":"Peliä ei katkaista pelaajien omalla puolustusalueella tapahtuvasta käsisyötöstä. Kiekon paikka kosketushetkellä niin käsisyötön tekevän pelaajan kuin vastaanottavan pelaajan osalta määrittää millä alueella käsisyöttö tapahtuu."},{"id":"79.3","title":"ALOITUSPAIKKA","content":"Kun käsisyötön rike tapahtuu, seuraava aloitus suoritetaan lähimmästä sen alueen aloituspisteestä, missä käsisyöttö tapahtui, ellei rikkeen tehnyt joukkue saavuta alueellista etua, tällöin aloitus suoritetaan lähimmästä sen alueen aloituspisteestä, missä peli katkaistiin, ellei näissä säännöissä toisin määrätä. Kun joukkue syyllistyy käsisyöttöön hyökkäysalueellaan, seuraava aloitus suoritetaan puolueettomalta alueelta lähinnä puolustavan joukkueen siniviivaa olevasta aloituspisteestä."}]},"80":{"number":"80","title":"KIEKON PELAAMINEN KORKEALLA MAILALLA","sections":[{"id":"80.1","title":"KIEKON PELAAMINEN KORKEALLA MAILALLA","content":"Kiekon lyöminen yli normaalin hartiatason olevalla mailalla on kiellettyä. Kun kiekkoon osutaan korkealla mailalla ja sen seurauksena rikkoneen joukkueen pelaaja saa kiekon haltuunsa ja hallintaansa (mukaan lukien kiekkoa pelannut pelaaja), joko suoraan tai kimmoten jostain pelaajasta tai tuomarista, peli katkaistaan. Kun kiekkoon osutaan korkealla mailalla, pelin annetaan jatkua sillä edellytyksellä, että: (I) Kiekko on mennyt vastustajalle (kun pelaaja lyö kiekon vastustajalle, päätuomari näyttää välittömästi ei vihelletä -käsimerkin – muutoin peli katkaistaan). (II) Puolustavan joukkueen pelaaja lyö kiekon omaan maaliin, jolloin maali hyväksytään. 150 Kiekon pitäminen lavan päällä (lacrosse-tyylillä, ”ilmaveivi”) yli normaalin hartiatason on kielletty ja peli katkaistaan. Jos pelaaja tekee tämän rangaistuslaukauksessa tai voittomaalikilpailun yrityksessä, suoritus katkaistaan välittömästi ja sen katsotaan päättyneen. → Sääntö 60 (Korkea maila)"},{"id":"80.2","title":"ALOITUSPAIKKA","content":"Kun peli katkaistaan kiekon pelaamisesta korkealla mailalla -rikkeen takia, seuraava aloitus täytyy suorittaa paikasta, joka antaa kiekon lyöneen pelaajan joukkueelle vähiten alueellista etua, joko missä kiekkoon osuttiin sääntöjenvastaisesti tai missä rikkoneen joukkueen pelaaja viimeksi pelasi kiekkoa. Jos rike on hyökkäävän joukkueen syytä ja peli katkaistaan hyökkäysalueella, seuraava aloitus siirretään lähimpään puolueettoman alueen aloituspisteeseen."},{"id":"80.3","title":"MAALI HYLÄTÄÄN","content":"Kun hyökkäävä pelaaja aiheuttaa kiekon menemisen vastustajan maaliin osuen kiekkoon mailalla maalin yläriman yläpuolella, joko suoraan tai kimmoten jostain pelaajasta tai tuomarista, maalia ei hyväksytä. Kiekon osumakohta mailaan on määräävä tekijä. Jos kiekon osumakohta mailaan on yläriman korkeudella tai sen alapuolella ja kiekko menee maaliin, tällöin maali hyväksytään. Jos maali syntyy sen tuloksena, että puolustavan joukkueen pelaaja lyö kiekon maalin yläriman yläpuolella olevalla mailalla omaan maaliin, maali hyväksytään."}]},"81":{"number":"81","title":"PITKÄ","sections":[{"id":"81.1","title":"PITKÄ","content":"Tätä sääntöä varten punainen keskiviiva jakaa jääalueen kahdeksi puoliskoksi. Jos sen joukkueen pelaaja, joka on jäällä tasalukuinen tai pelaajamäärältään suurempi kuin vastustaja (ylivoima), laukaisee kiekon, lyö kiekon kädellä tai aiheuttaa kiekon kimpoamisen omalta kenttäpuoliskoltaan vastustajan maaliviivan yli, peli katkaistaan. Tätä sääntöä varten kiekon kimpoaminen pätee vain, kun kiekon on alun perin laukaissut rikkonut joukkue. Tätä sääntöä varten kiekkoa hallussa pitäneen joukkueen viimeinen kosketuspaikka kiekkoon määrittää syntyykö pitkä vai ei. Näin ollen kiekkoa hallussa pitäneen joukkueen täytyy saavuttaa keskiviiva (”gain the line”), jotta pitkää ei synny. Keskiviivan saavuttamisella tarkoitetaan, että kiekon vielä ollessa pelaajan mailassa kiekko yltää punaiselle keskiviivalle (ei pelaajan luistimet), jotta mahdollinen pitkä poistuisi. Tämän säännön tulkintaa varten on kaksi arvioitavaa kohtaa pitkän yhteydessä. Linjatuomarin täytyy ensimmäiseksi määrittää, että kiekko tulee ylittämään maaliviivan. Heti kun linjatuomari määrittää, ett
