ä kiekko ylittäisi maaliviivan, pitkä saatetaan päätökseen määrittämällä kumpi pelaaja (hyökkäävä tai puolustava) saavuttaisi kiekon ensin. Linjatuomarin täytyy tehdä tämä jälkimmäinen päätös viimeistään, kun ensimmäinen pelaajista saavuttaa päätyalueen aloituspisteiden tasan pelaajan luistinten ollessa määräävä tekijä. Jos kiekko on laukaistu tai ammuttu siten, että kiekko kiertää laitoja pitkin ja/tai liukuu takaisin keskialuetta kohti, sama toimintaohje on voimassa samoin etäisyyksin, eli linjatuomarin pitää arvioida, kumman joukkueen pelaaja koskisi kiekkoa ensin. Selvennykseksi, määräävänä tekijänä on, kumpi pelaaja saavuttaisi kiekon ensin, ei kumpi pelaaja saavuttaisi päätyalueen aloituspisteet ensin. Jos luistelukilpailu kiekolle on niin tasaväkinen, että on liian vaikea määrittää, kumpi pelaajista, silloin kun ensimmäinen pelaajista saavuttaa päätyalueen aloituspisteiden tasan, ehtisi kiekolle ensin, niin pitkä tuomitaan. Kiekon osuminen tai kimpoaminen tuomaristosta ei automaattisesti kumoa mahdollista pitkää. OSA 10 – PELIN VIRTAUS Jos kiekosta ei kisata, niin pitkää ei vihelletä ennen kuin puolustavan joukkueen kenttäpelaaja ylittää oman puolustusalueensa siniviivan ja kiekko ylittää maaliviivan (ei kuitenkaan maalitolppien välistä)."},{"id":"81.2","title":"PITKÄ – ALOITUSPAIKKA","content":"Pitkän jälkeen hyökkäävällä joukkueella on oikeus valita, kummasta päätyalueen aloituspisteestä aloitus suoritetaan. Jos päätuomarin mielestä puolustava joukkue pitkän tilanteessa tarkoituksellisesti pidättäytyy yrittämästä kunnolla tavoitella kiekkoa, kun heillä on siihen mahdollisuus, päätuomarin tulee katkaista peli ja määrätä seuraava aloitus rikkoneen joukkueen lähimmästä päätyalueen aloituspisteestä. Jos linjatuomari on erehtynyt katkaistessaan tilanteen pitkänä (riippumatta siitä, pelaako toinen joukkue vajaalukuisena), seuraava aloitus suoritetaan kaukalon keskipisteestä."},{"id":"81.3","title":"MAALIVAHTI","content":"Jos linjatuomarin mielestä, maalivahti näyttelee kiekon pelaamista, yrittää pelata kiekkoa tai luistelee kiekon suuntaan pitkän aikana, mahdollista pitkää ei tuomita ja peli jatkuu. Jos kuitenkin maalivahti on laillisesti maalialueen ulkopuolella yrittäessään mennä pelaajapenkille vaihtaakseen korvaavaan kenttäpelaajaan eikä hän millään tavoin yritä pelata kiekko, pitkää ei kumota tämän osan mukaisesti. Jos maalivahti on maalialueen ulkopuolella ennen kuin pitkä laukaistaan ja maalivahti vain yksinkertaisesti vetäytyy alueelleen yrittämättä pelata kiekkoa tai teeskennellä kiekon pelaamista, pidetään mahdollinen pitkä voimassa."},{"id":"81.4","title":"PELAAJIEN VAIHTAMINEN PITKÄN YHTEYDESSÄ","content":"Joukkue, joka on syyllistynyt pitkään tämän säännön mukaisesti, ei saa tehdä pelaajavaihtoja ennen seuraavaa aloitusta. Kuitenkin joukkueen sallitaan suorittaa pelaajavaihto vaihtaakseen kenttäpelaajaan vaihdettu maalivahti takaisin, vaihtaakseen loukkaantunut pelaaja, vaihtaakseen pelaaja, jonka luistin on rikki tai kun tuomitaan rangaistus, joka vaikuttaa jommankumman joukkueen jäällä olevaan pelaajamäärään. Jäällä olevat pelaajat määräytyvät sillä hetkellä, kun kiekko irtoaa rikkoneen pelaajan mailasta."},{"id":"81.5","title":"EI PITKÄ","content":"Kun laukaistu kiekko kimpoaa omalla kenttäpuoliskollaan olevan vastusajan vartalosta tai mailasta kiekon laukaisseen pelaajan maaliviivan ylitse, tilannetta ei pidetä pitkänä. Kun joukkueen pelaaja laukaisee kiekon omalta kenttäpuoliskoltaan ja kiekko kimpoaa useaan kertaan ennen punaista keskiviivaa, pitkä kumoutuu, jos vähintään yksi näistä kimmokkeista oli vastustajan pelaajasta. Jos kiekko menee vastakkaisen kenttäpuoliskon maaliviivan ylitse suoraan aloituksesta jommankumman aloittajan toimesta, tilannetta ei pidetä tämän säännön rikkomisena. Jos linjatuomarin mielestä joku puolustavan joukkueen pelaaja (muu kuin maalivahti) pystyisi pelaamaan kiekkoa ennen kuin se ylittäisi maaliviivan, mutta ei tee niin, peli saa jatkua eikä pitkää tuomita. Tähän sisältyy tilanne, jossa vastustava joukkue on suorittamassa pelaajavaihtoja kesken pelitilanteen ja joku pelaajista pystyisi pelaamaan kiekkoa, mutta valitsee, ettei näin tee, jotta välttäisi syyllistymästä liian monta pelaajaa jäällä -rikkeeseen. Pitkää ei tuomita. Jos kiekko osuu johonkin kohtaan vastustajaa mukaan lukien hänen luistimensa tai mailansa tai jos kiekko osuu vastustajan maalivahtiin mukaan lukien hänen luistimensa tai mailansa ennen tai sen jälkeen, kun kiekko on ylittänyt maaliviivan, tilannetta ei pidetä pitkänä. 152 Jos maalivahti jotenkin yrittää irrottaa kiekkoa maalin takaa maaliverkosta, pitkää ei tuomita. OSA 10 – PELIN VIRTAUS"},{"id":"81.6","title":"PITKÄ – PELAAJAMÄÄRÄ JÄÄLLÄ","content":"Jos kiekon laukaisee pelaaja, jonka joukkueella on jäällä alhaisempi pelaajamäärä kuin vastustajalla, pitkän rikettä ei tuomita. Kun joukkue vajaalukuinen rangaistuksen takia ja rangaistus on päättymässä, päätös siitä, onko tilanne pitkä, määritetään sillä hetkellä, kun rangaistus päättyy. Jos kiekko irtoaa pelaajan lavasta ennen kuin rangaistus päättyy, tilanne ei ole pitkä. Rangaistun pelaajan jääminen rangaistusaitioon rangaistuksen päättymisen jälkeen ei muuta tuomiota."}]},"82":{"number":"82","title":"KENTÄLLISTEN VAIHTAMINEN","sections":[{"id":"82.1","title":"KENTÄLLISTEN VAIHTAMINEN","content":"Pelikatkon syntyessä vierasjoukkueen on viipymättä asetettava peliä jatkava kentällinen jäälle eikä siihen voi enää tehdä muutoksia ennen pelin jatkumista. Kotijoukkue voi tämän jälkeen suorittaa haluamansa vaihdot, jotka eivät aiheuta pelin viivytystä, paitsi pitkän jälkeisellä pelikatkolla. Kentällisen asettaminen jäälle tarkoittaa, että molemmat joukkueet asettavat sallitussa vaihdon aikaikkunassa kokonaisuudessaan oikean pelaajamäärän (eikä enempää) jäälle, eli sen pelaajamäärän, johon heillä on tilanteessa oikeus. Jos jompikumpi joukkue viivästyttää aiheettomasti pelaajien vaihtamista, päätuomari määrää rikkoneen joukkueen tai joukkueet sijoittumaan välittömästi aloitusta varten eikä salli muita pelaajavaihtoja. Kun vaihto suoritetaan yllä olevan säännön mukaisesti, ei lisävaihtoja sallita ennen kuin peli jatkuu. Heti kun kentällisen vaihdon toimintapa on valmis, lisävaihtoja ei sallita ennen kuin aloitus on suoritettu hyväksyttävästi ja peli jatkuu paitsi, kun rangaistus tai rangaistuksia tuomitaan siten, että vaikuttavat toisen tai molempien joukkueiden jäällä olevaan pelaajamäärään. Tämä voi sisältää myös vaihdon yhteydessä tai ennen aloitusta tai aloitusrikkeen takia tuomittuja rangaistuksia – viitataan Sääntöön 82.2 (Kentällisten vaihto – toimintaohje). Joukkueella, joka on syyllistynyt sääntöjen → Sääntö 63.8 (Pelin viivyttäminen / ei vaihto-oikeutta) tai → Sääntö 81 (Pitkä) rikkeisiin, ei ole oikeutta suorittaa pelaajavaihtoja ennen seuraavaa aloitusta. Kuitenkin joukkueen sallitaan suorittaa pelaajavaihto vaihtaakseen kenttäpelaajaan vaihdettu maalivahti takaisin, vaihtaakseen loukkaantunut pelaaja, vaihtaakseen pelaaja, jonka luistin on rikki tai kun tuomitaan rangaistus, joka vaikuttaa jommankumman joukkueen jäällä olevaan pelaajamäärään. Tässä yhteydessä jäällä olevat pelaajat määräytyvät sillä hetkellä, kun kiekko irtoaa rikkoneen pelaajan mailasta. Maalivahdin vaihto pelin aikana täytyy suorittaa samassa aikaikkunassa kuin normaali kentällisen vaihtaminen. Mitään lisäaikaa ei anneta peliin tulevan maalivahdin vaihtamiseen, paitsi tilanteessa, jossa maalivahti loukkaantuu (tämä ei ole taktinen vaihto)."},{"id":"82.2","title":"KENTÄLLISEN VAIHTO - TOIMINTATAPA","content":"Pelin katkaisemisen jälkeen päätuomari noudattaa seuraavaa toimintatapaa kentällisten vaihtoa varten heti kun hän määrittää, että toimintatapa on aloitettava: (I) Päätuomari antaa vierasjoukkueelle viisi (5) sekuntia aikaa suorittaa vaihtonsa. (II) Päätuomari nostaa kätensä ylös sen merkiksi, ettei vierasjoukkue enää saa vaihtaa, ja että kotijoukkue aloittaa vaihtonsa. (III) Päätuomari antaa kotijoukkueelle kahdeksan (8) sekuntia aikaa suorittaa vaihtonsa. (IV) Päätuomari laskee kätensä sen merkiksi, ettei kotijoukkue enää saa vaihtaa pelaajia. (V) Kummankaan joukkueen taholta ei sallita mitään yritystä vaihtaa pelaajia päätuomarin merkin jälkeen, ei yritystä asettaa liikaa pelaajia jäälle kentällisen vaihdon yhteydessä tai yritystä tehdä ylimääräisiä pelaajavaihtoja, ja päätuomarin pitää lähettää vaihtoa yrittävät pelaajat takaisin 154 pelaajapenkille. Päätuomari varoittaa sitten rikkonutta joukkuetta (valmentajan välityksellä), että seuraavista vaihto-ohjeen rikkomisista kyseisen ottelun aikana (mukaan lukien jatkoaika) tuomitaan joukkuerangaistus pelin viivyttämisestä. Tämä rangaistus kuulutetaan ”joukkuerangaistus pelin viivyttämisestä – väärä kentällisen vaihtaminen”. (VI) Aloittava linjatuomari puhaltaa pilliinsä sen merkiksi (heti kun päätuomari on laskenut kätensä), että kaikkien pelaajien täytyy asettua valmiiksi ja aloitustasan oikealle puolelle aloitusta varten viiden (5) sekunnin aikana. Tämän jälkeen aloitus suoritetaan → Sääntö 76 (Aloitukset). (VII) Pelaajia, jotka ovat hitaita (linjatuomarin suorittaman viiden sekunnin varoitusvihellyksen jälkeen) asettumaan aloitukseen tai jotka ovat aloitustasan väärällä puolella, varoitetaan päätuomarin toimesta kerran ottelun aikana. Tämä varoitus annetaan myös rikkoneen joukkueen valmentajalle. Seuraavasta tämän säännön rikkomisesta rikkoneelle joukkueelle tuomitaan joukkuerangaistus pelin viivyttämisestä. (VIII) Varsinaisen peliajan kahden (2) viimeisen minuutin ja milloin tahansa jatkoerän aikana yllä olevia kohtia (vi) ja (vii) ei sovelleta. Sen jälkeen, kun kohdat (i) – (v) yllä on suoritettu, linjatuomari antaa joukkueille riittävästi aikaa asettautua seuraavaa aloitusta varten."},{"id":"82.3","title":"KENTÄLLISEN VAIHTO - JOUKKUERANGAISTUS","content":"Kotijoukkueella on oikeus viimeiseen vaihtoon. Tämä tarkoittaa, että vierasjoukkueen valmentajan on ensin asetettava pelaajat jäälle, ja tämän jälkeen kotijoukkueen on tehtävä myös näin. Jos jompikumpi joukkue ei tee vaihtojaan viipymättä, päätuomari ei salli vaihtoja. Jos jompikumpi joukkue ei noudata vaihto-ohjetta, tai on myöhässä niiden noudattamisessa, tai tarkoituksellisesti noudattaa tätä sääntöä virheellisesti, päätuomari antaa joukkueelle ensimmäisellä kerralla varoituksen ja sitten joukkuerangaistuksen pelin viivyttämisestä. Pelaajien täytyy edetä suoraan aloituspaikan luo osallistuakseen seuraavaan aloitukseen. Kaikki kummankin joukkueen yritykset viivyttää peliä hidastelemalla tai muutoin tarpeettomilla toimilla johtavat joukkuerangaistuksen tuomisemiseen pelin viivyttämisestä. Tämä rangaistus kuulutetaan ”joukkuerangaistus pelin viivyttämisestä – hidas siirtyminen aloitukseen (tai hidas siirtyminen pelaajapenkille)”. Jos pelaaja haluaa pelin käydessä poistua jäältä, ja että hänen tilalleen tulee korvaava pelaaja, pelaajan täytyy poistua pelaajapenkille eikä mistään muusta kaukalon poistumispaikasta. Muualta poistuminen ei ole sääntöjenmukainen pelaajavaihto ja täten kun rike tapahtuu, joukkuerangaistus tuomitaan."}]},"83":{"number":"83","title":"PAITSIO","sections":[{"id":"83.1","title":"PAITSIO","content":"Hyökkäävän joukkueen pelaajat ei saa edetä hyökkäysalueelle ennen kiekkoa. Pelaajan luistimet, ei hänen mailansa, ovat määräävä tekijä kaikissa tapauksissa tehtäessä päätös paitsiosta. Pelaaja on paitsiossa, kun hänen molemmat luistimet ovat kokonaan yli kyseisen siniviivan etureunan. Pelaaja ei ole paitsiossa, kun jompikumpi hänen luistimistaan on kontaktissa siniviivaan tai viivan ”omalla puolella” sillä hetkellä, kun kiekko kokonaan ylittää siniviivan etureunan. Viivan ”omalla puolella” oleminen määritellään siniviivan tasona, joka ulottuu siniviivan etureunasta ylöspäin. Jos pelaajan luistin on vielä siniviivan tasalla sillä hetkellä, kun kiekko kokonaan ylittää siniviivan etureunan, hänen ei katsota olevan paitsiossa tämän säännön osalta. Kiekkoa kuljettavan pelaaja, joka ylittää siniviivan ennen kiekkoa ei katsota olevan paitsiossa edellyttäen, että hänellä on kiekko hallussa ja hallinnassaan ennen kuin hänen luistimensa ylittävät siniviivan etureunan. OSA 10 – PELIN VIRTAUS On huomattava, vaikka pelaajan luistimet ovat pelaajan osalta määräävä tekijä päätettäessä, onko hän paitsiossa, kuitenkaan kysymystä paitsioasemasta ei koskaan synny, ennen kuin kiekko on kokonaan ylittänyt siniviivan etureunan, millä hetkellä päätös täytyy tehdä. Jos pelaaja sääntöjen mukaisesti kuljettaa, syöttää tai pelaa kiekon takaisin omalle puolustusalueelleen, kun vastajoukkueen pelaaja on tällä puolustusalueella, tilanne ei ole paitsio ja pelin annetaan jatkua."},{"id":"83.2","title":"PAITSIO – KIMMOKKEET / PALAUTUKSET","content":"Tässä sääntöosiossa oletetaan, että hyökkäävä pelaaja on edennyt hyökkäysalueelle ennen kiekkoa. Kun puolustavan joukkueen pelaaja laukaisee kiekon pois puolustusalueeltaan ja kiekko selkeästi kimpoaa puolueettomalla alueella olevasta puolustavan joukkueen pelaajasta takaisin puolustusalueelle, kaikki hyökkäävät pelaajat voivat pelata kiekkoa. Kuitenkin kaikki hyökkäävän pelaajan toimet, jotka aiheuttavat kiekon kimpoamisen / palautuksen puolueettomalla alueella olevasta puolustavasta pelaajasta takaisin puolustusalueelle (toisin sanoen mailahäirintä, vartalotaklaus, fyysinen kontakti), johtavat siihen, että linjatuomarin pitää nostaa kätensä ylös siirretyn paitsiotilanteen merkiksi. Tilanne, jossa kiekko kimpoaa takaisin puolustusalueelle puolueettomalla alueella olevasta tuomarista, on paitsio (tai siirretty paitsiotilanne, asianmukaisesti). Tilanne, jossa kiekko kimpoaa takaisin hyökkäysalueelle puolueettomalla alueella olevasta hyökkäävästä pelaajasta, riippumatta siitä, kuka alun perin laukaisee kiekon tai mistä kiekko laukaistaan, on paitsio tai tarvittaessa siirretty paitsiotilanne. Tilanne, jossa hyökkäävän joukkueen pelaajan laukaisema kiekko kimpoaa kenestä tahansa pelaajasta hyökkäysalueelle, on paitsio tai tarvittaessa siirretty paitsiotilanne."},{"id":"83.3","title":"SIIRRETTY PAITSIOTILANNE","content":"Tilanne, jossa hyökkäävän joukkueen pelaaja (tai pelaajat) menee (menevät) ennen kiekkoa hyökkäyssiniviivan yli, mutta puolustavalla joukkueella on mahdollisuus tuoda kiekko pois puolustusalueeltaan ilman viivettä tai kontaktia hyökkäävään pelaajaan, tai hyökkäävät pelaajat ovat puhdistamassa hyökkäysaluetta. Jos paitsiotilanne on siirrettynä, linjatuomari laske kätensä alas kumotakseen paitsiorikkeen ja antaa pelin jatkua, jos: (I) Kaikki hyökkäävän joukkueen pelaajat poistuvat alueelta samaan aikaan (luistinkontakti siniviivaan, 3-ulotteinen tulkinta ei ole käytössä tässä tilanteessa), jolloin hyökkäävien pelaajien sallitaan palata uudelleen hyökkäysalueelle, tai (II) Puolustava joukkue syöttää tai kuljettaa kiekon puolueettomalle alueelle. Jos siirretyn paitsiotilanteen aikana, joku hyökkäävän joukkueen pelaaja koskettaa kiekkoon, yrittää saada irtokiekon haltuunsa, paineistaa puolustavaa kiekollista pelaajaa alueellaan syvemmälle, tai on ottamassa fyysisen kontaktin puolustavaan kiekolliseen pelaajaan, linjatuomarin pitää katkaista peli paitsiona. Jos siirretyn paitsiotilanteen aikana hyökkäävä pelaaja päättää edetä pelaajapenkilleen (joka ulottuu hyökkäysalueen puolelle) vaihtaakseen kanssapelaajaan, kentältä poistuvan pelaajan katsotaan puhdistaneen alueen, kun hänen molemmat luistimet ovat pois jäältä ja linjatuomari tulkitsee hänen poistuneen pelialueelta. Jos korvaava pelaaja tulee jäälle hyökkäysalueelle, kun siirretty paitsiotilanne on yhä voimassa, hänen täytyy myös poistua hyökkäysalueelta. Heti kun kaikki hyökkäävät pelaajat ovat puhdistaneet hyökkäysalueen, ja linjatuomari on laskenut siirretyn paitsiotilanteen merkkinä olleen kätensä alas, kaikki hyökkäävät pelaajat voivat sääntöjen mukaisesti edetä hyökkäysalueelle ja tavoitella kiekkoa. 156"},{"id":"83.4","title":"HYLÄTTY MAALI – PAITSIO","content":"Jos kiekko laukaistaan hyökkäysalueelle aiheuttaen siirretyn paitsiotilanteen, pelin sallitaan jatkua normaalin alueen puhdistus -säännön mukaisesti. Jos kiekko tämän laukauksen tuloksena menee puolustavan joukkueen maaliin joko suoraan tai maalivahdin, pelaajan, laitojen, suojalasin tai varusteen tai jäällä olevan tuomarin kautta, maalia ei hyväksytä, koska alkuperäinen laukaus oli paitsio. Sillä, että hyökkäävä joukkue on saattanut puhdistaa alueen ennen kiekon menemistä maaliin, ei ole tämän tilanteen yhteydessä merkitystä. Seuraava aloitus suoritetaan laukaisupaikan alueelta lähinnä laukaisupaikkaa olevasta aloituspisteestä, joka tarjoaa rikkoneelle joukkueelle vähiten alueellista etua. Ainoa tapa, jolla hyökkäävä joukkue voi tehdä maalin siirretyn paitsiotilanteen aikana, on että puolustava joukkue laukaisee tai pelaa kiekon omaan maaliinsa ilman hyökkäävän joukkueen toimintaa tai kontaktia. Muutoin kuin siirretyissä paitsiotilanteissa, joissa kiekko menee maalin, tai onnistuneeseen valmentajan haastoon liittyen, maalia ei voi hylätä jälkikäteen paitsiorikkeeseen vedoten, ellei kyse ole pilliin puhaltamiseen liittyvästä inhimillisestä tekijästä."},{"id":"83.6","title":"ALOITUSPAIKKA – PAITSIO","content":"Tämän säännön rikkomisesta peli katkaistaan ja seuraava aloitus suoritetaan puolueettomalta alueelta lähinnä rikkoneen joukkueen hyökkäysalueen siniviivaa olevasta aloituspisteestä, kun rike tapahtuu sen seurauksena, että hyökkäävä pelaaja kuljettaa kiekon siniviivan ylitse, tai laukaisu- tai syöttökohtaa lähinnä olevasta aloituspisteestä (vaikka kiekko kimpoaisi hyökkäävästä tai puolustavasta pelaajasta tai tuomarista). Jokaisessa siirretyssä paitsiotilanteessa mukaan lukien tahallinen paitsio, linjatuomari nostaa pillittömän kätensä ylös. Hän antaa pelin jatkua, ja jos pelikatko syntyy, on olemassa neljä vaihtoehtoa seuraavaksi aloituspaikaksi: (I) Jos kiekko kuljetetaan siniviivan ylitse – aloituspaikka on siniviivan ulkopuolelta. (II) Jos kiekko laukaistaan hyökkäysalueelle (tai harhasyöttö) – aloituspaikka on lähin aloituspiste siltä alueelta, mistä kiekko syötettiin tai laukaistiin, ja mikä antaa hyökkäävälle joukkueelle vähiten alueellista etua (vaikka kiekko olisi kimmonnut hyökkäävästä tai puolustavasta pelaajasta tai tuomarista). (III) Jos hyökkäävä pelaaja paineistaa tai on taklaamassa puolustavaa pelaajaa – aloituspaikka on lähin aloituspiste siltä alueelta, mistä kiekko syötettiin tai laukaistiin, ja mikä antaa hyökkäävälle joukkueelle vähiten alueellista etua (vaikka kiekko olisi kimmonnut hyökkäävästä tai puolustavasta pelaajasta tai tuomarista). (IV) Jos katsotaan, että kyseessä on tahallinen paitsio – aloituspaikka on rikkoneen joukkueen päätyalueen aloituspiste. Kun linjatuomarilla on käsi ylhäällä siirretyn paitsiotilanteen merkiksi ja puolustava pelaaja laukaisee kiekon pelialueelta ulos suojalasin yli, seuraava aloitus suoritetaan toisesta puolustusalueen aloituspisteestä ja puolustavan joukkueen pelaajalle tuomitaan pieni rangaistus. → Sääntö 63 (Pelin viivyttäminen) Kun linjatuomarilla on käsi ylhäällä siirretyn paitsiotilanteen merkiksi ja alkuperäinen laukaus kimpoaa puolustavasta pelaajasta ulos pelialueelta, seuraava aloitus suoritetaan lähimmästä aloituspisteestä siltä alueelta, mistä kiekko laukaistiin. Kun puolustavaa joukkuetta ollaan rankaisemassa puolustusalueella ja linjatuomarilla on käsi ylhäällä samassa yhteydessä hyökkäävän joukkueen siirretyn paitsiotilanteen merkiksi, seuraava aloitus suoritetaan toisesta puolustusalueen aloituspisteestä. OSA 10 – PELIN VIRTAUS Jos linjatuomarin mielestä hyökkäysalueella olevat hyökkäävä(t) pelaaja(t) on (ovat) yrittämässä poistua hyökkäysalueelta ja ovat siniviivan läheisyydessä silloin, kun kiekko laukaistaan alueelle, tilanteen ei katsota olevan tahallinen paitsio."}]},"84":{"number":"84","title":"JATKOAIKA JA OTTELUIDEN RATKAISUTAVAT","sections":[{"id":"84.1","title":"JATKOAIKA","content":"Jos ottelu on kolmen (3) varsinaisen 20 minuutin erän jälkeen peli on tasan, joukkueet pelaavat sitten enintään viiden (5) minuutin maalista poikki -jatkoajan, jonka voittaa ensin maalin tehnyt joukkue. Jatkoerässä kummankin joukkueen pelaajamäärä jäällä on kolme (3) kenttäpelaajaa ja yksi (1) maalivahti. Jatkoerä alkaa maksimissaan kolmen (3) minuutin tauon jälkeen. Heti kun tauko päättyy, pelikelloon asetetaan 5:00 minuuttia ja jatkoerä aloitetaan välittömästi. Joukkueet eivät vaihda kenttäpäätyjä. Pelaajat pysyvät omilla pelaajapenkeillään tämän tauon ajan. Maalivahtien täytyy mennä omalla pelaajapenkilleen tämän tauon ajaksi, kuitenkin, rangaistuksia kärsivät pelaajat jäävät rangaistusaitioon. Jos rangaistu pelaaja poistuu rangaistusaitiosta, tuomariston täytyy välittömästi palauttaa pelaaja takaisin rangaistusaitioon, mutta mitään lisärangaistusta ei tuomita, ellei pelaaja tee jotain toista sääntörikettä. Joukkueet eivät saa poistua pukuhuoneisiin tänä aikana."},{"id":"84.2","title":"JATKOAIKA - YLIMÄÄRÄINEN KENTTÄPELAAJA","content":"Jatkoerässä joukkueella on oikeus poistaa maalivahtinsa jäältä ja vaihtaa hänen tilalleen ylimääräinen kenttäpelaaja."},{"id":"84.3","title":"JATKOAIKA - RANGAISTUKSET","content":"Jos varsinaisen peliajan päättyessä joukkueiden pelaajavahvuus jäällä on 5 vastaan 3, joukkueen aloittavat jatkoerän pelaajavahvuudella 5 vastaan 3. Heti kun pelaajavahvuus kasvaa 5 vastaan 4 tai 5 vastaan 5, muutetaan pelaajavahvuudeksi seuraavalla pelikatkolla 4 vastaan 3 tai 3 vastaan 3 sen mukaan, mikä on tarkoituksenmukaista. Jos varsinaisen peliajan päättyessä joukkueiden pelaajavahvuus jäällä on 4 vastaan 4, joukkueen aloittavat jatkoajan 3 vastaan 3. Heti kun pelaajavahvuus kasvaa 4 vastaan 4, muutetaan pelaajavahvuudeksi seuraavalla pelikatkolla 3 vastaan 3, mikä on tarkoituksenmukaista. Jos varsinaisen peliajan päättyessä joukkueiden pelaajavahvuus on 3 vastaan 3, joukkueet aloittavat jatkoajan 3 vastaan 3. Heti kun pelaajavahvuus kasvaa 4 vastaan 4, 5 vastaan 4 tai 5 vastaan 5, muutetaan pelaajavahvuudeksi seuraavalla pelikatkolla 3 vastaan 3 tai 4 vastaan 3, sen mukaan, mikä on tarkoituksenmukaista. Jos molemmat joukkueet kärsivät samalla pelikatkolla tuomittuja pieniä rangaistuksia jatkoerän alkaessa (eikä muita rangaistuksia ole käynnissä), joukkueet aloittavat jatkoajan 3 vastaan 3, ja nämä (molemmat) rangaistukset poistetaan rangaistuskellosta. Missään vaiheessa joukkueella ei saa olla vähempää kuin kolme (3) kenttäpelaajaa jäällä. Tämä edellyttää neljännen (4.) ja/tai viidennen (5.) kenttäpelaajan lisäämisen jäälle, kun rangaistuksia tuomitaan. Jos joukkuetta rangaistaan jatkoajalla, joukkueet pelaavat 4 vastaan 3. Jos kummallekin joukkueelle tuomitaan pieni rangaistus samalla pelikatkolla (eikä muita rangaistuksia ole rangaistuskellossa), joukkueet jatkavat peliä 3 vastaan 3. Jatkoajalla, jos joukkuetta rangaistaan siten, että vastustajalla on kahden (2) kenttäpelaaja etu, tällöin rikkonut joukkue jatkaa 3 kenttäpelaajalla ja ei- rikkoneella joukkueella on viisi (5) kenttäpelaajaa. Seuraavalle pelikatkolla sen jälkeen, kun kahden (2) kenttäpelaaja etu ei enää ole voimassa, pelaajavahvuus jäällä muutetaan 4 vastaan 3 tai 3 vastaan 3, sen mukaan kumpi on tarkoituksenmukaista. → Lisätietoja: Liite IV – Taulukoiden yleiskatsaus – Taulukko 18. 158"},{"id":"84.4","title":"VOITTOMAALIKISAN SUORITUKSEN TOIMINTATAPA","content":"Jos jatkoerässä tai -ajalla ei synny maalia, sitten suoritetaan IIHF:n voittomaalikisa. Seuraavaa toimintaohjetta noudatetaan: (I) Laukaukset suoritetaan kumpaankin päätyyn. (II) Voittomaalikisa alkaa siten, että viisi (5) pelaajaa kummastakin joukkueesta suorittaa vuorotellen omat laukauksensa. Pelaajia ei tarvitse nimetä ennakolta. Voittomaalikisaan osallistumiskelpoisia ovat ottelupöytäkirjaan listatut kummankin joukkueen neljä (4) maalivahtia ja kaikki kenttäpelaajat, paitsi alla olevassa kohdassa kolme määritellyt pelaajat. (III) Pelaaja, jonka rangaistus ei vielä jatkoerän päättyessä ollut päättynyt, ei ole oikeutettu olemaan yksi pelaajista, jotka on valittu suorittamaan laukausta, ja hänen täytyy pysyä rangaistusaitiossa tai pukuhuoneessa. Myös niiden pelaajien, joille tuomitaan rangaistuksia voittomaalikisan aikana, täytyy pysyä rangaistusaitiossa tai pukuhuoneessa, kunnes voittomaalikisa on päättynyt. (IV) Vierasjoukkue aloittaa voittomaalikilpailun (V) Maalivahdit puolustavat samoja maaleja kuin jatkoerässä ja voivat pysyvä omalla maalialueellaan, kun oma joukkue suorittaa laukauksen. (VI) Kummankin joukkueen maalivahti voidaan vaihtaa jokaisen voittomaalilaukauksen jälkeen. (VII) Laukaukset suoritetaan rangaistuslaukauksen tapaan → Sääntö 24 (Rangaistuslaukaus). (VIII) Kummankin joukkueen pelaajat suorittavat laukauksia vuorotellen, kunnes ratkaiseva maali tehdään. Loppuja laukauksia ei suoriteta. (IX) Jos tilanne on tasan kummankin joukkueen suoritettua kaikki (viisi) laukausta, voittomaalikisaa jatketaan äkkikuolemaperiaatteella käyttäen samoja tai uusia pelaajia. Mikäli ratkaisua ei ole syntynyt jatketaan pari kerrallaan siten että aloitusvuoro vaihtuu kuudenteen pariin. (X) Ottelu ratkeaa heti, kun kahden laukaisuparina suorittavan pelaajan tuloksessa syntyy ero. Joukkue voi käyttää samaa pelaaja jokaisessa äkkikuolemavaiheen laukauksessa. (XI) Kirjuri pitää kirjaa kaikista suoritetuista laukauksista listaten pelaajan, maalivahdin ja tehdyt maalit. (XII) Vain ratkaiseva maali lasketaan mukaan ottelun lopputulokseen. Se merkitään maalin tehneen joukkueen hyväksi ja vastajoukkuetta vastaan. (XIII) Jos joukkue kieltäytyy osallistumasta voittomaalikilpailuun, joukkue julistetaan ottelun häviäjäksi ja vastajoukkueen hyväksi myönnetään kolme (3) pistettä. Jos pelaaja kieltäytyy suorittamasta laukausta, päätuomari määrää laukauksen tulokseksi ”ei maali”. OSA 10 – PELIN VIRTAUS"},{"id":"84.5","title":"Paras kahdesta- pelattavien playoff- tai karsintaotteluiden ratkaisumallit","content":"Mikäli sarjamääräyksissä on päätetty pudotuspelien tai karsintaotteluiden pelaamisesta paras kahdesta - järjestelmällä, ratkaistaan voittaja seuraavasti: 1. Pisteet (ottelut pelataan ilman jatkoaikoja tai VL-kilpailuja 2 pisteen otteluina) 2. Jatkoerä ja ottelun voittomaalikilpailu toisen osaottelun jälkeen. Jos toisessa ottelussa pelataan jatkoerä, pelataan se 5-5 vastaan. Toisen osaottelun lopussa käynnissä olevat 2 ja 5 min. rangaistukset loppuvat jatkoerään mennessä. Jos pelaajalla on käytösrangaistuksen kärsiminen kesken, hän kärsii sen loppuun ennen kuin voi pelata jatkoerässä. Jos pelaaja on saanut pelirangaistuksen, ei pelaaja voi osallistua jatkoerään eikä voittomaalikilpailuun. Jatkoerä pelataan kokonaisuudessaan (ei maalista poikki – periaatteella). Jos jatkoerän jälkeen tilanne on edelleen tasan, ratkaistaan voittaja voittomaalikilpailulla. 3. Kotietu Sarjassa paremmin sijoittunut saa valita aloittaako ottelut kotona vai vieraissa."},{"id":"84.5","title":"Pudotuspelien ja karsintaotteluiden ratkaisutavat","content":"Jatkoerä ja ottelunvoittomaalikilpailu (IIHF Game Winning Shot Competition) pudotuspeleissä ja karsintaotteluissa Ennen ensimmäistä jatkoerää pidetään ottelun sarjatason mukainen erätauko ja kenttä kunnostetaan. Ennen jatkoerän alkua vaihdetaan kenttäpuoliskoja. Ulkona pelattavissa otteluissa jatkoerän puolivälissä joukkueet vaihtavat kenttäpuoliskoja ilman erätaukoa, halliotteluissa kenttäpuoliskoja ei vaihdeta jatkoerän puolivälissä. 1. Mestis ja Suomi-sarja Mikäli Mestiksessä ja Suomi-sarjassa pudotuspeli virallisen peliajan jälkeen on tasan, pelataan ottelu ratkaisuun saakka siten, että peliä jatketaan 20 min. pituisin jatkoerin. Mestiksessä erätauko ennen jatkoerien aloittamista ja jatkoerien välillä on 18 minuuttia. Mestiksessä ja Suomi-sarjassa jatkoerät pelataan 5-5 vastaan (rangaistukset voimassa) siihen asti, kunnes toinen joukkue tekee maalin. Maalin tehnyt joukkue on ottelun voittaja. Mestiksen ja Suomi-sarjan karsintaottelut (jos pelataan ottelupareina eikä sarjana) pelataan myös tässä mainitulla tavalla. 2. U20 SM-sarja U20 SM-sarjan villi kortti –kierroksella, puolivälierä- ja välieräotteluissa sekä pronssiottelussa pelataan vain yksi jatkoerä, jonka pituus on sama kuin normaali erän pituus varsinaisella peliajalla. Jatkoerä pelataan 5-5 vastaan maalista poikki –periaatteella. Mikäli jatkoerässä/erissä ei tehdä maalia, ratkaistaan ottelun voittaja Kansainvälisen Jääkiekkoliiton säännöin pidettävällä ottelun voittomaalikilpailulla (IIHF Game Winning Shot Competition). U20 SM-sarjan loppuotteluissa pelataan ottelu ratkaisuun saakka siten, että peliä jatketaan 20 min. pituisin jatkoerin. Loppuotteluiden jatkoerät pelataan 5-5 vastaan (rangaistukset voimassa) siihen asti, kunnes 160 toinen joukkue tekee maalin. Loppuottelut pelataan aina eri päivinä kuin kotijoukkueen seuran SM- Liigajoukkueella on kotiottelu. 3. Muut sarjat Muissa sarjoissa pelataan vain yksi jatkoerä, jonka pituus on sama kuin normaali erän pituus varsinaisella peliajalla. Jatkoerä pelataan 5-5 vastaan maalista poikki –periaatteella. Mikäli jatkoerässä/erissä ei tehdä maalia, ratkaistaan ottelun voittaja Kansainvälisen Jääkiekkoliiton säännöin pidettävällä ottelun voittomaalikilpailulla (IIHF Game Winning Shot Competition)."}]},"85":{"number":"85","title":"KIEKKO PELIALUEEN ULKOPUOLELLA","sections":[{"id":"85.1","title":"KIEKKO PELIALUEEN ULKOPUOLELLA","content":"Kun kiekko menee pelialueen ulkopuolelle joko kaukalon päädystä tai sivuilta, osuu johonkin muuhun pelialueen yläpuolella olevaan esineeseen kuin laitaan tai suojalasiin, aiheuttaa suojalasin, valaistuksen, ajanottolaitteen tai tukirakenteiden rikkoutumisen, seuraava aloitus suoritetaan lähimmästä sen alueen aloituspisteestä, mistä kiekko laukaistiin tai kimposi ulos pelialueelta. Jos tuomaristo tuomitsee, että kiekon ulosmenon aiheuttaneen laukauksen tai kimmokkeen lähtöpaikka on puolueettomalla alueella tai puolustusalueella, seuraava aloitus suoritetaan lähimmästä sen alueen aloituspisteestä, mistä kiekko laukaistiin tai kimposi ulos pelialueelta, sen mukaan kumpi antaa rikkoneelle joukkueelle vähiten alueellista etua. Jos kiekko jää pelialuetta ympyröivän laidan päälle, sen katsotaan olevan pelissä, ja pelaajat voivat pelata kiekkoa sääntöjen mukaan kädellä tai mailalla. Kun kiekko menee suoraan aloituksesta ulos pelialueelta, niin riippumatta siitä, kumpi pelaaja on saattanut viimeiseksi koskea kiekkoon, seuraava aloitus suoritetaan samasta aloituspisteestä eikä kummallekaan joukkueelle tuomita rangaistusta pelin viivyttämisestä. Jos pelaajan laukaisema kiekko osuu pelaajapenkillä laidan yli nojaavan pelaajan kentän puolella olevaan hanskaan tai vartaloon, tai kiekko menee pelaajapenkille avoinna olevasta ovesta, seuraava aloitus suoritetaan lähimmästä sen alueen aloituspisteestä, mistä kiekko laukaistiin, kuitenkin jos kiekko osuu pelaajapenkillä laidan yli nojaavan vastustajan pelaajan kentän puolella olevaan hanskaan tai vartaloon, tai kiekko menee vastustajan pelaajapenkille avoinna olevasta ovesta, seuraava aloitus suoritetaan vastustajan pelaajapenkkiä lähinnä olevasta aloituspisteestä. Jos kiekko osuu kummankin pelaajapenkin päässä olevaan kaarevaan suojalasiin, peli katkaistaan, kun joku tuomaristosta tämän huomaa. Seuraava aloituspaikka määritetään samoin kuin, jos kiekko olisi mennyt pelialueen ulkopuolelle. Jos kiekko osuu kummassakin päässä ja nurkissa oleviin katsomon suojaverkkoihin, peli katkaistaan ja seuraava aloituspaikka määritetään samoin kuin, jos kiekko olisi mennyt pelialueen ulkopuolelle. Pelaajien ei pidä lopettaa pelaamista ennen kuin kuulevat pillin vihellyksen."},{"id":"85.2","title":"KIEKKO PELAAMATTOMISSA","content":"Kun kiekko asettuu jommankumman maalin maaliverkon ulkopuolelle siten, että se on pelaamattomissa tai se ”jäätyy” vastapuolen pelaajien väliin tahallisesti tai muutoin, päätuomarin pitää katkaista peli. Kumpikin joukkue voi pelata kiekon pois maaliverkolta. Kuitenkin, jos kiekko jää maaliverkolle yli kolmeksi (3) sekunniksi, peli katkaistaan. Jos maalivahti käyttää mailaansa tai hanskaansa kiekon sulkemiseen maaliverkolle tai puolustava pelaaja estää hyökkäävää pelaajaa pelaamasta maaliverkolla olevaa kiekkoa, seuraava aloitus suoritetaan toisesta puolustusalueen aloituspisteestä. OSA 10 – PELIN VIRTAUS Jos kiekko menee maalin alle joko takaa tai sivusta, tai menee verkon läpi takakautta tai sivusta, ja jos tuomaristo havaitsee tämän, peli katkaistaan välittömästi ja seuraava aloitus suoritetaan katkaisupaikkaa lähinnä olevasta aloituspisteestä."},{"id":"85.3","title":"KIEKKO NÄKYMÄTTÖMISSÄ","content":"Jos syntyy ruuhka, tai pelaaja vahingossa kaatuu kiekon päälle ja kiekko on poissa päätuomarin näkökentästä, hänen pitää välittömästi puhaltaa pilliinsä ja katkaista peli. Seuraava aloitus suoritetaan katkaisupaikkaa lähinnä olevasta saman alueen aloituspisteestä, elleivät säännöt toisin määrää."},{"id":"85.4","title":"KIEKKO KOSKETTAA TUOMARIA","content":"Peliä ei katkaista, jos kiekko koskettaa tuomaria missä tahansa kaukalossa riippumatta siitä, onko joukkue vajaalukuinen tai ei. Kun kiekko kimpoaa puolueettomalla alueella olevasta tuomarista takaisin puolustusalueelle, tilanteen katsotaan olevan paitsio. → Sääntö 83 (Paitsio) Kiekon osuminen tai kimpoaminen tuomarista ei automaattisesti kumoa mahdollista pitkää. Kun kiekko kimpoaa tuomarista ja menee pelialueelta ulos, seuraava aloitus suoritetaan kosketuspaikkaa lähinnä olevasta saman alueen aloituspisteestä. Jos kiekko kimpoaa suoraan tuomarista maaliin, maalia ei hyväksytä."},{"id":"85.5","title":"ALOITUSPAIKKA","content":"Jos pelaaja aiheuttaa kiekon ulosmenon pelistä, tai sen, ettei kiekkoa voida pelata millä alueella tahansa, seuraava aloitus suoritetaan sen alueen aloituspisteestä, mistä kiekko laukaistiin. Jos kiekko kimpoaa ulos pelistä, seuraava aloitus suoritetaan lähimmästä sen alueen aloituspisteestä, mistä kiekko kimposi. Jos tämän pelikatkon aiheuttaa hyökkäävä pelaaja hyökkäysalueellaan, aloitus suoritetaan lähimmästä hyökkäysalueen aloituspisteestä (jos pelaaja ei syyllistynyt rikkeeseen → Sääntö 63 (Pelin viivyttäminen)) Jos alue on puolueeton alue, aloituspisteeksi valitaan aloituspiste, joka antaa rikkoneelle joukkueelle vähiten alueellista etua. Jos kiekkoa ei voida pelata, koska se on maaliverkolla, tai jää pysähdyksiin vastapuolen pelaajien väliin, seuraava aloituspiste on joko lähin aloituspiste tai lähin aloituspiste sillä alueella, mistä kiekko laukaistiin, ellei näissä säännöissä toisin määrätä. Jos hyökkäävä joukkue laukaisee kiekon hyökkäysalueelle ja syntyy siirretty paitsiotilanne, tai hyökkäävä joukkue syyllistyy pelin virtaukseen vaikuttavaan rikkeeseen, kuten pelaa kiekkoa korkealle mailalla tai lyö kiekkoa kädellä (aiheuttaen pelikatkon), seuraava aloitus suoritetaan puolueettomalta alueelta lähinnä rikkoneen joukkueen hyökkäysaluetta."},{"id":"85.6","title":"PIENI RANGAISTUS","content":"Pieni rangaistus pelin viivyttämisestä tuomitaan maalivahdille, joka tarkoituksellisesti pudottaa kiekon maaliverkolle aiheuttaen pelikatkon. → Sääntö 67.3 (Kiekon pelaaminen kädellä)"},{"id":"85.7","title":"PELIAJAN VARMISTAMINEN","content":"Kaikki aika, mikä on menetetty sen takia, että kiekko on pelialueen ulkopuolella, pitää palauttaa niin pelikelloon kuin rangaistuskelloonkin. Videotuomaristoa/toimitsijoita voidaan konsultoida, jotta varmistetaan palautettava aika tarkasti."}]},"86":{"number":"86","title":"OTTELUN JA ERIEN ALKAMINEN","sections":[{"id":"86.1","title":"OTTELUN JA ERIEN ALKAMINEN","content":"Pelikello on ainoa virallinen ajanottolaite, jolla otetaan aikaa kaikista toiminnoista mukaan lukien ottelua edeltävä lämmittelyjakso, erätauot ja itse peliaika. Ottelu pitää aloittaa aikataulun mukaisesti kaukalon keskipistealoituksella ja se uusitaan viipymättä kunkin erätauon päätyttyä. OSA 10 – PELIN VIRTAUS"},{"id":"86.2","title":"JOUKKUERANGAISTUS","content":"Joukkuerangaistus pelin viivyttämisestä tuomitaan toiselle tai molemmille joukkueille, jos: Joukkue ei ole jäällä tai ei ole havaittavasti tulossa jäälle, toisen tai kolmannen erän tai jokaisen jatkoerän aloittamiseksi, kun erätauon aika on kulunut kellossa loppuun. Toisen ja kolmannen erän ja jokaisen jatkoerän alussa kaikkien pelaajien, pois lukien aloittavat pelaajat, täytyy edetä suoraan omalle pelaajapenkilleen. Luistelu, lämmittely tai erinäiset jääaktiviteetit ei- aloittavien pelaajien osalta eivät ole sallittuja. Kun vierasjoukkueen täytyy erän päättyessä poistua pukuhuoneeseen jään kautta, pelaajien pitää odottaa tuomariston antamaa lupaa ennen kuin siirtyvät pukuhuoneeseen. Jos joukkue ei odota tuomariston merkkiä, siitä voidaan tuomita rangaistus."},{"id":"86.3","title":"KENTTÄPÄÄTYJEN VALINTA","content":"Jos järjestäjät eivät ole määrittäneet kenttäpäätyjä, kotijoukkue saa valita kumpaa maalia puolustaa ottelun alussa. Varsinaisella peliajalla joukkueet vaihtavat kenttäpäätyjä kunkin erän päätyttyä."},{"id":"86.4","title":"VIIVÄSTYKSET","content":"Minkään seremonian, näyttelyn, esittelyn tai esityksen takia ei sallita mitään viivästyksiä, ellei SJL ole niitä hyväksynyt."},{"id":"86.5","title":"ERIEN PÄÄTTYMISET","content":"Ensimmäisen ja toisen erän päättyessä joukkueiden on äänimerkin kuultuaan noudatettava näitä menettelyohjeita poistuessaan jäältä. Heti kun äänimerkki kuuluu merkiten erän päättymistä, pelikello asetetaan välittömästi uudelleen erätauon keston mukaiseen aikaan. Jos pukuhuoneet sijaitsevat saman poistumistien varrella, vierasjoukkue palaa pelaajapenkilleen ja pysyy siellä, kunnes koko kotijoukkue on poistunut jäältä ja siirtynyt yhteiseen käytävään. Kun kotijoukkueen viimeinen pelaaja on astunut yhteiseen käytävään, erotuomari antaa vierasjoukkueelle luvan aloittaa poistumisen jäältä. Pelaajien ei sallita lämmittelytarkoituksessa tulla jäälle pelikatkolla tai ensimmäisen ja toisen erän päättyessä."},{"id":"86.6","title":"OTTELUA EDELTÄVÄ LÄMMITTELYJAKSO","content":"Ottelua edeltävän lämmittelyjakson aikana tai ennen pelin käynnistymistä kunkin erän alussa, joukkueen täytyy rajoittaa toimintonsa kaukalon omalle kenttäpuoliskolle. → Sääntö 46.10 (Tappelu ennen aloitusta) Peliajanottaja on vastuussa ottelua edeltävän lämmittelyjakson alkamisen ja päättymisen ilmoittamisesta ja kaikki pelaajien tekemät rikkeet tätä sääntöä kohtaan pitää raportoida asiaankuuluvalle elimelle. 20 minuuttia ennen ottelun aikataulun mukaista alkamisaikaa kummankin joukkueen pitää poistua jäältä ja mennä pukuhuoneisiinsa siksi aikaa, kun jää kunnostetaan. Peliajanottaja ilmoittaa kummallekin joukkueelle, kun heidän on palattava samanaikaisesti jäälle ennen ottelun aikataulun mukaista alkamisaikaa."},{"id":"86.7","title":"OTTELUN ALKAMINEN","content":"Jos joukkue ei ilmesty jäälle ajallaan ottelun alussa ilman oikeutettua syytä, tapaus raportoidaan asiaankuuluvalle elimelle. Tarvittaessa asiaankuuluva elin voi oman harkintansa mukaan tuomita täydentäviä kurinpitotoimenpiteitä. 164 → Sääntö 28 (Täydentävä kurinpito) OSA 10 – PELIN VIRTAUS"},{"id":"86.8","title":"ERIEN ALKAMINEN","content":"Toisen ja kolmannen erän alussa ja playoffs-ottelun jatkoerien alussa (pelikellossa 0:00), joukkueiden täytyy olla jäällä tai pitää voida havaita heidän tulevan jäälle. Tämän säännön noudattamatta jättäminen aiheuttaa joukkuerangaistuksen pelin viivyttämisestä. Ennen toisen ja kolmannen erän (ja jatkoerän) alkamista joukkueiden täytyy edetä suoraan omille pelaajapenkeilleen. Vierasjoukkueen täytyy välittömästi asettaa aloittavat pelaajat aloitusympyrään, sitten on kotijoukkueen vuoro, päätuomarin tulee antaa kotijoukkueelle aikaa tehdä muutoksia aloittaviin pelaajiin, jos se näin ennen aloitusta haluaa. Ei-aloittavien pelaajien luistelu, lämmittely tai jääaktiviteetit aiheuttavat joukkuerangaistuksen pelin viivyttämisestä rikkoneelle joukkueelle. Mitään maalivahdin lämmittelyä kiekon kanssa ei sallita ennen erien alkamista. Jos tämä jatkuu vielä yhden varoituksen jälkeen, päätuomarin pitää tuomita rangaistus pelin viivyttämisestä rikkoneelle joukkueelle. Ilmoittaakseen joukkueille, että on aika palata jäälle kunkin erän aloittamista varten, peliajanottaja soittaa äänimerkin pukuhuonealueella."},{"id":"86.9","title":"OTTELUN PÄÄTTYMINEN","content":"Ottelun päättyessä hävinnyt joukkue poistuu jäältä ensin ja voittanut joukkue odottaa jäällä, kunnes hävinnyt joukkue on poistunut jäältä. Heti kun viimeinen hävinneen joukkueen pelaaja on siirtynyt yhteiseen käytävään, päätuomari kehottaa voittanutta joukkuetta poistumaan jäältä."},{"id":"86.9","title":"PELIKATKOT JA AIKALISÄT","content":"Pelin käydessä tai joukkueen ottaman aikalisän aikana ei saa soittaa musiikkia. Pelikatkolla ei saa soittaa musiikkia, jos loukkaantunut pelaaja makaa jäällä. Mestiksen (sis. pudotuspelit ja karsinnat) otteluissa maalin tehneellä joukkueella saa olla enemmän kuin yhden vaihdon verran pelaajia juhlimassa. Naisten Liigan, U20 SM-sarjan sekä U18- ja U16 SM-sarjojen pudotuspeleissä maalin tehneellä joukkueella saa olla enemmän kuin yhden vaihdon verran pelaajia juhlimassa"}]},"87":{"number":"87","title":"AIKALISÄT","sections":[{"id":"87.1","title":"AIKALISÄT","content":"Kummallekin joukkueelle sallitaan yksi 30 sekunnin aikalisä ottelun aikana, niin runkosarjassa kuin pudotuspeleissä. Kaikki jäällä olevat pelaajat, mukaan lukien maalivahdit, voivat mennä pelaajapenkilleen aikalisän aikana. Aikalisä täytyy pitää normaalilla pelikatkolla. Vain yksi aikalisä (television mainoskatko tai joukkueaikalisä) sallitaan samalla pelikatkolla. Tämän säännön mukaan television mainoskatkon katsotaan olevan virallinen aikalisä eikä sitä kirjata kummankaan joukkueen nimiin. Kuka tahansa valmentajan määräämä pelaaja tai valmentaja itse voi ilmoittaa päätuomarille, että joukkue käyttää aikalisänsä. Joukkueen pitää pyytää aikalisäänsä ennen kuin tuomari on saanut valmiiksi pelaajien vaihtoprosessin, ennen kuin päätuomari laskee kätensä ja osoittaa aloituspistettä. Päätuomari raportoi aikalisän peliajanottajalle, joka on vastuussa aikalisän päättymisen ilmoittamisesta. 166 Aikalisää ei myönnetä aloitusrikkeen jälkeen. Aikalisää ei myönnetä puolustavalle joukkueelle pitkän jälkeen, maalivahdin aiheutettua pelikatkon keskiviivan takaa laukaistun kiekon sulkemisella tai puolustavan pelaajan vahingossa siirrettyä maalin pois paikaltaan aiheuttaen pelikatkon. Aikalisää ei myönnetä sen jälkeen, kun päätuomari on tuominnut rangaistuslaukauksen jommallekummalle joukkueelle, ja päätuomari on antanut ohjeet niin laukausta suorittavalle pelaajalle kuin rangaistuslaukausta torjuvalle maalivahdille. Aikalisää ei myönnetä voittomaalikisan aikana. Aikalisän aikana ei sallita maalivahdin tai varamaalivahdin lämmittelyä kiekoilla. Jos tämä jatkuu vielä yhden varoituksen jälkeen, päätuomarin pitää tuomita rangaistus pelin viivyttämisestä rikkoneelle joukkueelle. Pelin käydessä tai joukkueen ottaman aikalisän aikana ei saa soittaa musiikkia. Pelikatkolla ei saa soittaa musiikkia, jos loukkaantunut pelaaja makaa jäällä. OSA 11 – NAISTEN JÄÄKIEKKO OSA 11 NAISTEN JÄÄKIEKKO 168 OSA 11 – NAISTEN JÄÄKIEKKO"}]},"101":{"number":"101","title":"NAISTEN JÄÄKIEKKO – ERITYISSÄÄNNÖT – PELAAMINEN","sections":[{"id":"101.1","title":"SÄÄNTÖJENVASTAINEN TAKLAUS NAISTEN JÄÄKIEKOSSA","content":"Naisten jääkiekossa vartalotaklaus on sallittu, kun on selkeä tarkoitus pelata kiekkoa tai yritys saada kiekko haltuun lukuun ottamatta säännössä ”sääntöjenvastainen taklaus” kuvattu tilanne. Jos kaksi (2) pelaajaa kamppailee kiekosta, heidän sallitaan kohtuullisesti työntää ja nojata toisiinsa edellyttäen, että kiekon tavoittelu säilyy näiden kahden pelaajan ainoana tavoitteena. Pelaajalle, joka taklaa vastustajaa tässä säännössä kuvatulla tavalla, tuomitaan joku seuraavista: (I) Pieni rangaistus (2 minuuttia) (II) Iso rangaistus (5 minuuttia) ja pelirangaistus Jos kaksi (2) tai useampi pelaaja kamppailee kiekon hallinnasta, he eivät saa käyttää laitoja apuna eliminoidakseen vastustajaa pelitilanteesta, työntää vastustajaa laitaa vasten tai naulata vastustajaa laitaan. Paikallaan olevalla pelaajalla on oikeus pitää paikkansa jäällä. Vastustajan tehtävänä on välttää vartalokontakti tällaiseen pelaajaan. Jos pelaaja on paikoillaan vastustajan ja kiekon välissä, vastustaja on velvollinen kiertämään paikallaan olevan pelaajan. Jos kiekollinen pelaaja luistelee suoraan kohti paikallaan olevaa vastustajaa, kiekollisen pelaajan velvollisuus on välttää kontakti. Mutta jos kiekkoa kuljettava pelaaja pyrkii kaikin tavoin välttämään kontaktia ja vastustaja liikkuu kiekkoa kuljettavaa pelaajaa päin, vastustajalle tuomitaan vähintään pieni rangaistus (2 minuuttia) sääntöjenvastaisesta taklauksesta. Pelaajilla on kaiken aikaa oikeus pitää saavuttamansa asema ja paikka jäällä. Yhdenkään pelaajan ei tarvitse väistää päin tulevaa vastustajaa välttääkseen törmäyksen. Kaikissa tilanteissa pelaajaa on rangaistava vähintään pienellä rangaistuksella (2 minuuttia) sääntöjenvastaisesta taklauksesta, jos hän astuu tai liukuu vastustajaa päin."}]},"102":{"number":"102","title":"NAISTEN JÄÄKIEKKO – ERITYISSÄÄNNÖT – VARUSTEET","sections":[{"id":"102.1","title":"KASVOSUOJUKSET – NAISTEN JÄÄKIEKKO – IKÄLUOKKA – AIKUISET","content":"Kaikkien pelaajien aikuisten ikäluokassa täytyy käyttää kokokasvusuojusta (visiiri- tai häkkimallinen), joka on oikein kiinnitetty kypärään. → Sääntö 9.6 (Kypärät) → Sääntö 9.7 (Kasvojen suojaus) Pelaajat, joilla ei ole mainittuja suojuksia, eivät saa osallistua otteluun. Nuorempien, alle 18-vuotiaiden sarjan pelaajien, jotka osallistuvat aikuisten sarjaan, täytyy käyttää niitä suojuksia, jotka on määrätty ja kuvattu alle 18-vuotiaiden ikäluokassa."},{"id":"102.2","title":"KASVOSUOJUKSET – NAISTEN JÄÄKIEKKO – IKÄLUOKKA – ALLE 18 JA ALAIKÄISET","content":"Kaikkien pelaajien U18-ikäluokassa täytyy käyttää kokokasvusuojusta (visiiri- tai häkkimallinen), joka on oikein kiinnitetty kypärään. → Sääntö 9.6 (Kypärät) → Sääntö 9.7 (Kasvojen suojaus) Pelaajat, joilla ei ole mainittuja suojuksia, eivät saa osallistua otteluun. Kaikkien maalivahtien U18-ikäluokassa täytyy käyttää kokokasvosuojusta, joka on valmistettu siten, ettei kiekko tai mailan lapa mahdu aukoista läpi. Varamaalivahdin on käytettävä kasvomaskia istuessaan vaihtopenkillä."},{"id":"102.3","title":"HAMMASSUOJAT – NAISTEN JÄÄKIEKKO – IKÄLUOKKA – AIKUISET","content":"Vahvasti suositellaan, että kaikki pelaajat käyttävät hammassuojaa, mieluiten yksilöllisesti räätälöityä. → Sääntö 9.13 (Hammassuojat) Hammassuojus on suunniteltu suojaamaan hampaita ja leukaa iskulta ja se voi myös vähentää aivotärähdysten riskiä. Suositellaan, että pelaajat käyttävät aina jäällä ollessaan hammassuojaa vaatimusten edellyttämällä tavalla."},{"id":"102.4","title":"HAMMASSUOJAT – NAISTEN JÄÄKIEKKO – IKÄLUOKKA – ALLE 18 JA ALAIKÄISET","content":"Vahvasti suositellaan, että kaikki pelaajat käyttävät hammassuojaa, mieluiten yksilöllisesti räätälöityä. → Sääntö 9.13 (Hammassuojat) Hammassuojus on suunniteltu suojaamaan hampaita ja leukaa iskulta ja se voi myös vähentää aivotärähdysten riskiä. Vahvasti suositellaan, että pelaajat käyttävät yksilöllisesti räätälöityjä hammassuojia. Suositellaan, että pelaajat käyttävät aina jäällä ollessaan hammassuojaa vaatimusten edellyttämällä tavalla. 170"},{"id":"102.5","title":"KYPÄRÄ / KORVASUOJUS – NAISTEN JÄÄKIEKKO – IKÄLUOKKA – AIKUISET","content":"Pelaajien täytyy käyttää kypärään kiinnitettyjä korvasuojuksia. → Sääntö 9.6 (Kypärät) Pelaajat, joilla ei ole mainittuja suojuksia, eivät saa osallistua otteluun."},{"id":"102.6","title":"KYPÄRÄ / KORVASUOJUS – NAISTEN JÄÄKIEKKO – IKÄLUOKKA – ALLE 18 JA ALAIKÄISET","content":"Pelaajien täytyy käyttää kypärään kiinnitettyjä korvasuojuksia. → Sääntö 9.6 (Kypärät) Pelaajat, joilla ei ole mainittuja suojuksia, eivät saa osallistua otteluun. OSA 12 – JUNIORIJÄÄKIEKKO OSA 12 MIESTEN-, HARRASTE-, JUNIORIJÄÄKIEKON JA SARJOJEN ERITYISSÄÄNNÖT 172 OSA 12 – MIESTEN-, HARRASTE-, JUNIORIJÄÄKIEKON JA SARJOJEN ERITYISSÄÄNNÖT"}]},"202":{"number":"202","title":"MIES-/JUNIORIJÄÄKIEKKO – ERITYISSÄÄNNÖT – VARUSTEET","sections":[{"id":"202.1","title":"KASVOSUOJUKSET – MIES-/JUNIORIJÄÄKIEKKO – IKÄLUOKKA – ALLE 20","content":"U20 -ikäisten sarjoissa pelaavien kenttäpelaajien on aina käytettävä joko kokokasvosuojusta tai ns. visiiriä. Aikuisten sarjoissa (myös harraste- ja seniorisarjat) pelaavien on iästä riippumatta käytettävä aina vähintään visiiriä. Visiirin on aina oltava CE-hyväksytty. Visiirin (+hammassuojan) käyttö on sallittua 1.5. alkaen sinä vuonna, kun pelaaja siirtyy U22 tai U20 ikäisten sarjoihin ja pelaaja täyttää 18 vuotta kuluvan kalenterivuoden aikana. Sen täytyy ulottua alaspäin siten, että se tarjoaa riittävän suojan silmille, suojaa silmät ja nenän kokonaisuudessaan. Se täytyy kiinnittää kypärän sivuille siten, että sitä ei voi kääntää ylös. U18 ja nuorempien sarjoissa pelaavan kenttäpelaajan on kenttäpelaajan iästä riippumatta aina käytettävä kokokasvosuojusta. U18 ja nuorempien sarjoissa pelaavan maalivahdin on maalivahdin iästä riippumatta aina käytettävä IIHF:n U18-nuorille ja nuoremmille pakollista maalivahdin kasvosuojusta (pienempi ristikon silmäkoko). Jos kenttäpelaajan visiiri (tai kokokasvosuojus) säröytyy tai rikkoutuu pelitilanteen aikana, hänen täytyy poistua jäältä välittömästi. Pelaajan visiiri tai kokokasvosuojus ei saa olla värillinen tai sävytetty. → Sääntö 9.6 (Kypärät) → Sääntö 9.7 (Kasvojen suojaus)"},{"id":"202.2","title":"KASVOSUOJUKSET – MIES-/JUNIORIJÄÄKIEKKO – IKÄLUOKKA – ALLE 18","content":"Kaikkien pelaajien U18-ikäluokassa täytyy käyttää kokokasvusuojusta (visiiri- tai häkkimallinen), joka on oikein kiinnitetty kypärään. Se täytyy kiinnittää kypärän sivuille siten, että sitä ei voi kääntää ylös. → Sääntö 9.6 (Kypärät) → Sääntö 9.7 (Kasvojen suojaus) Jos kenttäpelaajan kokokasvosuojus säröytyy tai rikkoutuu pelitilanteen aikana, hänen täytyy poistua jäältä välittömästi. Kaikkien maalivahtien U18-ikäluokassa täytyy käyttää kokokasvosuojusta, joka on valmistettu siten, ettei kiekko tai mailan lapa mahdu aukoista läpi. Varamaalivahdin on käytettävä kasvomaskia istuessaan vaihtopenkillä. Pelaajat, joilla ei ole mainittuja suojuksia, eivät saa osallistua otteluun."},{"id":"202.3","title":"HAMMASSUOJAT – MIES-/JUNIORIJÄÄKIEKKO – IKÄLUOKKA – ALLE 20","content":"Kaikkien pelaajien U20-ikäluokassa täytyy käyttää hammassuojaa, joka on mieluiten yksilöllisesti räätälöity, jos he eivät käytä koko kasvoa suojaavaa suojusta (kokokasvosuojus tai häkki). → Sääntö 9.13 (Hammassuojat) Hammassuojus on suunniteltu suojaamaan hampaita ja leukaa iskulta ja se voi myös vähentää aivotärähdysten riskiä. Pelaajien täytyy käyttää aina jäällä ollessaan hammassuojaa vaatimusten edellyttämällä tavalla. Ei ole sallittu pitää hammassuojaa osin suun ulkopuolella (esim. pureskella sitä). Nuorten U18-vuotiaiden sarjan pelaajien, jotka osallistuvat U20-sarjaan, täytyy käyttää niitä suojuksia, jotka on määrätty ja kuvattu U18-vuotiaiden ikäluokassa – viitataan Sääntöön 202.4 (Hammassuojat – miesjuniorit – ikäluokka – alle 18). Pelaajat, joilla ei ole mainittuja suojuksia, eivät saa osallistua otteluun."},{"id":"202.4","title":"HAMMASSUOJAT – MIES-/JUNIORIJÄÄKIEKKO – IKÄLUOKKA – ALLE 18","content":"174 Vahvasti suositellaan, että kaikki U18-ikäluokan pelaajat käyttävät hammassuojaa, joka on mieluiten yksilöllisesti räätälöity. Heidän ei ole pakko käyttää hammassuojaa, koska he käyttävät koko kasvoa suojaavaa suojusta (kokokasvosuojus tai häkki). → Sääntö 9.13 (Hammassuojat) Hammassuojus on suunniteltu suojaamaan hampaita ja leukaa iskulta ja se voi myös vähentää aivotärähdysten riskiä. On suositeltavaa, että pelaajat käyttävät hammassuojaa vaatimusten edellyttämällä tavalla aina jäällä ollessaan."},{"id":"202.5","title":"KYPÄRÄ / KORVASUOJUS – MIES-/JUNIORIJÄÄKIEKKO – IKÄLUOKKA – ALLE 20","content":"Pelaajien täytyy käyttää kypärään kiinnitettyjä korvasuojuksia. → Sääntö 9.6 (Kypärät) Pelaajat, joilla ei ole mainittuja suojuksia, eivät saa osallistua otteluun."},{"id":"202.6","title":"KYPÄRÄ / KORVASUOJUS – MIES-/JUNIORIJÄÄKIEKKO – IKÄLUOKKA – ALLE 18","content":"Pelaajien täytyy käyttää kypärään kiinnitettyjä korvasuojuksia. → Sääntö 9.6 (Kypärät) Pelaajat, joilla ei ole mainittuja suojuksia, eivät saa osallistua otteluun. SÄÄNTÖ 203. SARJAKOHTAISET ERITYISSÄÄNNÖT"}]},"36":{"number":"36","title":"TILASTOHENKILÖSTÖ","sections":[]},"38":{"number":"38","title":"VALMENTAJAN HAASTO","sections":[]}},"situations":{"1":[{"id":"1.1","rule_number":"1","question":"Jatkoajan aikana A-joukkue on vajaalukuisena yhden pienen rangaistuksen takia. Kello pysähtyy niin, että jatkoaikaa on jäljellä 1:58. Yhtäkkiä kaukalon portti, josta zamboni yleensä tulee jäälle, aukeaa ja jäätä hoitava henkilökunta tulee jäälle lapioimaan ylimääräistä lunta. Onko tämä sallittua?","answer":"Tämä ei ole sallittua ja näin tapahtuessa, se pitää raportoida asiankuuluvalle elimelle."}],"2":[],"3":[],"4":[{"id":"4.2","rule_number":"4","question":"Yksi tuomareista huomaa, että vaikka peli on alkanut/jatkunut, pelikello ei käy. Mikä tähän on toimintaohje?","answer":"Tuomaristo voi katkaista pelin, kun kiekko on puolueettomalla alueella, eikä kummallakaan joukkueella ole ilmeistä maalintekotilannetta (esimerkiksi läpiajo, tyhjä maali jne. TAI antaa pelin jatkua ”normaaliin” pelikatkoon asti. Päätuomari huolehtii pelikatkolla yhteistyössä toimitsijoiden kanssa (ja tarvittaessa videoiden tai toimitsijoiden avulla), että pelin jatkuessa pelikellossa on oikea aika. Sääntö 4, 34.7 ja 37.6. HAKEMISTO OSA 02 J O U K K U E E T 0 2 O S A · J O U K K U E E T JOUKKUEET"}],"5":[{"id":"5.1","rule_number":"5","question":"Tuomaristo on saanut kokoonpanot pöytäkirjanpitäjältä. Ennen pelin alkua päätuomarit huomaavat, että yhden vierasjoukkueen pelaajan nimi on kirjoitettu kahdesti, kahdelle eri pelinumerolle ja näin joukkueen vahvuus on 20 kenttäpelaajaa ja kaksi maalivahtia. Mikä on toimintaohje tuomaristolle tilanteen korjaamiseksi?","answer":"Päätuomari informoi tilanteesta vierasjoukkuetta ja pöytäkirjanpitäjää ja kokoonpanoon tehdään tarvittavat korjaukset. Rangaistuksia ei tuomita. Sääntö 5.1."},{"id":"5.2","rule_number":"5","question":"Ajassa 14:00 A-joukkue tekee maalin. Ennen kuin seuraava aloitus ehditään suorittaa, B-joukkueen valmentaja pyytää päätuomarin pelaajapenkilleen. Valmentaja kertoo päätuomarille, että pelaajan A48, joka oli jäällä maalin syntyessä, nimi on kirjoitettu väärin pöytäkirjaan. Miten tuomariston kuuluu toimia?","answer":"Lähtökohtaisesti päätuomarin tulisi hylätä maali ja poistaa A48 ottelusta, koska hän on edustuskelvoton pelaaja. Sääntö 5.2 ja 78.5 (IV) HUOM! Maalaisjärjen pitää voittaa näitä päätöksiä tehdessä. Jos kyseisen pelaajan oikea sukunimi on ”Virtanen” ja pöytäkirjassa lukee ”Virtanen”, ei maalia tule säännön hengen nojalla hylätä. Jos kuitenkin nimi on selkeästi väärin kirjoitettu (esim. Virtanen on 0 2 muuttunut Vertalaksi), maali tulee hylätä. O SJL HUOMIO: VAIN MESTIS JA U20- SM. Muissa sarjoissa lisätään nimi pöytäkirjaan ja tehdään raportti S A · J O"},{"id":"5.4","rule_number":"5","question":"A12:lle tuomitaan pieni ja iso rangaistus toisen erän alussa. Toisessa vaihdossaan rangaistusten kärsimisen jälkeen A-joukkue tekee maalin. Päätuomarin ilmoittaessa maalia, hänelle kerrotaan toimitsijoiden toimesta, että A12:sta olisi kuulunut aiemmin tuomita myös pelirangaistus, koska aiemmin tuomittu iso rangaistus oli hänen toinen kyseisessä ottelussa. Mikä on päätuomarin ratkaisu?","answer":"Päätuomarin tulee hylätä maali edustuskelvottoman pelaajan vuoksi (sääntö 5.2) ja tuomita A12:sta pelirangaistus (sääntö 20.4). SJL HUOMIO: Ei pelkän ison rangaistuksen mahdollisuutta. HAKEMISTO JOUKKUEET"},{"id":"5.5","rule_number":"5","question":"Ensimmäisen erän puolivälissä A-joukkueen maalilla aloittanut maalivahti loukkaantuu ja poistuu ottelusta. A-joukkueen varamaalivahti tulee peliin ja kun kerran joukkueella on myös kolmas varamaalivahti yleisössä, eikä pelin aloittanut maalivahti pysty enää jatkamaan ottelussa, pukee kolmas varamaalivahti varusteet ylleen ja tulee penkille. Aloittaneen maalivahdin jälkeen peliin tullut varamaalivahti päästää kolme maalia, mutta pelaa ensimmäisen erän loppuun. Toisen erän alussa kolmas maalivahti tulee nyt peliin. Kaksi ensimmäistä maalivahtia eivät enää ole pelaajapenkillään. Miten tuomariston kuuluu toimia?","answer":"Joukkueen kolmas maalivahti voi osallistua peliin vain, jos molemmat kokoonpanoon ilmoitetut maalivahdit ovat kykenemättömiä jatkamaan ottelua. Niinpä päätuomari kysyy valmentajalta, että onko toinenkin maalivahti loukkaantunut tai sairas? Jos vastaus on kyllä, kolmas maalivahti voi pelata. Jos vastaus on ei, toisen maalivahdin tulee palata peliin. Sääntö 5.3 SJL HUOMIO: Kolmas maalivahti ei käytössä."},{"id":"5.6","rule_number":"5","question":"Pelaaja nro 12 on nimettynä kokoonpanoon, mutta väärällä nimellä (nimi on sama kuin toisella kokoonpanon pelaajalla). Asia tuodaan päätuomarin tietoisuuteen ottelun aikana. Tuleeko nimen vai numeron (tai molempien) olla oikein kokoonpanossa? Esimerkki: #2 Niina Nykänen, #4 Jutta Hynynen, #8 Tarja Tavonen #10 Maria Mutka #12 Niina Nykänen 0","answer":""},{"id":"5.7","rule_number":"5","question":"U E A-joukkue johtaa ottelua 4-0. Kun ensimmäistä erää on pelattu 8:59, B-joukkue ilmoittaa päätuomarille, ettei A13 löydy kokoonpanoluettelosta. E T A13 on tehnyt joukkueensa maaleista kolme. Miten päätuomari toimii tilanteessa?","answer":"A13 poistetaan ottelusta. Koska B-joukkue toi asian ilmi ”normaalilla” pelikatkolla (eikä maalien jälkeen), kaikki maalit pysyvät hyväksyttyinä. Sääntö 5.2"},{"id":"5.8","rule_number":"5","question":"A -joukkueen maalivahdille (A1) tuomitaan pelirangaistus (PR) ensimmäisen erän alussa. Varamaalivahti tulee peliin, mutta loukkaantuu toisessa erässä, eikä pysty enää jatkamaan ottelussa. A-joukkueella ei ole kolmatta maalivahtia. Saako ensimmäisessä erässä PR:n saanut maalivahti palata peliin?","answer":"Ei. A1 ei ole edustuskelpoinen hänelle tuomitun PR:n vuoksi. A-joukkue voi pukea yhden kokoonpanoon listatuista kenttäpelaajista maalivahdikseen. Sääntö 5.3 SJL HUOMIO: Kolmas maalivahti ei käytössä, mutta muuten tulkinta toimii myös SJL sarjoissa."},{"id":"5.9","rule_number":"5","question":"Kuinka monta pelaajaa voi pukeutua alkulämmittelyyn?","answer":"Ei ole olemassa maksimimäärää. Kuitenkin osallistuakseen ottelua edeltävään lämmittelyyn, pelaajan tulla olla ”rekisteröitynä” joukkueeseen. Sääntö 5.6 HAKEMISTO JOUKKUEET"},{"id":"5.10","rule_number":"5","question":"Molemmat A- joukkueen maalivahdeista loukkaantuvat nopealla tahdilla. Joukkueella on kolmas maalivahti saatavilla. Kuinka paljon joukkueelle annetaan aikaa kolmannen maalivahdin pukemiseen ja peliin valmistautumiseen?","answer":"Sääntö sanoo, että maalivahdille annetaan kohtuullinen aika pukea pelivarusteet ylleen ja siihen lisäksi annetaan kaksi minuuttia aikaa lämmittelyyn. SJL HUOMIO: Kolmas maalivahti ei käytössä. Tulkinta kenttäpelaajan pukeutumisajasta maalivahdin paikalle erilainen."}],"6":[{"id":"6.1","rule_number":"6","question":"Joukkue haluaa nimetä kaksi kapteenia (C). Voiko päätuomari sallia sen, että joukkueella on enemmän kuin yksi pelaaja kapteenina?","answer":"Ei. Joukkueen tulee nimetä ainoastaan yksi kapteeni ja enintään kaksi varakapteenia jokaiseen otteluun. Nimetyillä pelaajilla tulee olla paidassaan kirjaimet C (kapteeni) tai A (varakapteeni). 0 2"},{"id":"6.2","rule_number":"6","question":"O S Kirjuri ilmoittaa päätuomarille ennen ottelun alkua, että A- joukkueen valmentaja on kieltäytynyt nimeämästä kapteenia ja varakapteeneita. A Onko päätuomarin tarvetta puuttua tähän mitenkään? · J","answer":""},{"id":"8.1","rule_number":"6","question":"Kun ensimmäistä erää on jäljellä 10 sekuntia, pelaajalle tuomitaan pieni rangaistus väkivaltaisuudesta. Pelaaja loukkaantuu ja hänen täytyy poistua pukuhuoneeseensa. Tarvitseeko joukkueen asettaa sijainen kärsimään loukkaantuneen pelaajan rangaistusta? Jos kyllä, pitääkö sen olla pelaaja, joka oli jäällä samaan aikaan, kun rangaistukset tuomittiin? Milloin sen pitää olla pelaaja, joka oli tapahtumahetkellä jäällä?","answer":"Sääntö sanoo, että joukkueen on asetettava välittömästi sijainen, joka kärsii rangaistuksen tai kärsii siihen asti, kun loukkaantunut pelaaja on kykenevä jatkamaan ottelua. Sijainen voi olla kuka tahansa pelaaja, paitsi maalivahti. Maalivahdin rangaistuksissa sijaisena on pelaaja, joka on jäällä kun peli katkeaa. Sääntö 8.1 ja sääntö 27.1 HAKEMISTO JOUKKUEET"},{"id":"8.2","rule_number":"6","question":"Pelaaja saa kumoutuvan rangaistuksen, joka ei näy pelikellossa. Rangaistuksen saanut pelaaja loukkaantuu ja hän poistuu pukuhuoneeseen. Pelaaja tulee takaisin pelaajapenkilleen, kun rangaistusaika on päättynyt, mutta päättymisen jälkeen ei ole vielä tullut pelikatkoa. Voiko kyseinen pelaaja osallistua peliin (vaihtaa lennosta) vai pidetäänkö häntä sääntöjen vastaisesti jäällä olevana pelaajana?","answer":"Pelaajaa pidetään sääntöjen vastaisesti jäällä olevana, koska häntä ei ole vielä päästetty rangaistusaitiosta sääntöjen määräämällä tavalla (kumoutuvissa rangaistuksissa pelaajat pääsevät takaisin peliin rangaistusajan päättymisen jälkeen seuraavalla pelikatkolla). Sääntö 8.1, 68.1 ja 78.5 (IV)"},{"id":"8.3","rule_number":"6","question":"A-joukkueen puolustusalueen aloituksen jälkeen A20 yrittää pelata kiekkoa taakse päin osuen samalla mailan päällään sentterinä pelaavaa B10 kasvoihin. B10 ”putoaa” välittömästi jäähän ja jäälle alkaa heti muodostumaan verilammikko ja peli katkaistaan. Kumpikaan päätuomareista ei havainnut, että mitä tapahtui. Linjatuomari informoi päätuomaria tapahtumasta. Mikä on päätuomarin päätös? Mistä on seuraava aloitus?","answer":"Konsultoituaan tilanteen nähnyttä linjatuomaria ja, jos on selvää, että kyseessä oli pelitilanne, kun molemmat ovat kyyristyneinä aloitukseen, eikä rangaistuksia ole tarvetta tuomita. Seuraava aloitus suoritetaan puolueettoman alueen aloituspisteestä, A-joukkueen puolustusalueen ulkopuolelta."},{"id":"8.4","rule_number":"6","question":"Voittomaalikisan aikana suorittaja yrittää harhauttaa maalivahtia, mutta kaatuu ja liukuu maalivahtia päin. Kiekko ei mene maaliin, mutta maalivahti loukkaantuu. Joukkue laittaa varamaalivahdin jäälle seuraavalle kierrokselle. Sallitaanko jäälle tulevalle varamaalivahdille lämmittelyä?","answer":"Ei sallita. Sääntö 84.4, kohta 6 ja Sääntö 8.2"},{"id":"8.5","rule_number":"6","question":"Peli katkaistaan toisessa erässä A-joukkueen maalivahdin loukkaantumisen johdosta. Maalivahti poistuu jäältä ja hänet vaihdetaan varamaalivahtiin. Peli jatkuu ja ennen seuraavaa pelikatkoa A-joukkue vaihtaa lennosta aiemmin loukkaantuneen maalivahdin takaisin jäälle. Onko tämä sallittua?","answer":"Tämä ei ole sallittua ja tilanteesta pitää tuomita pieni rangaistus pelin viivyttämisestä. Jos varamaalivahti on tullut jäälle katkolla korvatakseen loukkaantuneen maalivahdin, voi vaihdon tehdä takaisin vasta seuraavalla pelikatkolla. Sääntö 8.2 HAKEMISTO JOUKKUEET"},{"id":"8.6","rule_number":"6","question":"A-joukkueen maalivahti on loukkaantunut ja hänet on vaihdettu varamaalivahtiin. Peli jatkuu ja loukkaantunut maalivahti (joka on pelaajapenkillään) on toipunut pelikuntoon ja haluaa nyt palata peliin takaisin. A-joukkue päättää tehdä vaihdon pelin käydessä lennosta. Hetki vaihdon jälkeen A- joukkue tekee maalin. Miten tuomariston pitää reagoida vai pitääkö reagoida mitenkään?","answer":"Loukkaantunut maalivahti ei voi palata peliin ennen seuraavaa pelikatkoa (Sääntö 8.2). Sen vuoksi maalivahtia pidetään sääntöjen vastaisesti jäällä olevana pelaajana, eikä A-joukkueen näin ollen sallita tehdä maalia. Maali hylätään ja maalivahdille tuomitaan pieni rangaistus. Sääntö 78.5 (IV) ja Sääntö 8.2."},{"id":"8.7","rule_number":"6","question":"A-joukkueen maalivahti on loukkaantunut ja hänet on vaihdettu varamaalivahtiin. Peli jatkuu ja loukkaantunut maalivahti (joka on pelaajapenkillään) on toipunut pelikuntoon ja haluaa nyt palata peliin takaisin. A-joukkue päättää tehdä vaihdon pelin käydessä lennosta. Hetki vaihdon jälkeen B-joukkue tekee oman maalin. Miten tuomariston pitää reagoida vai pitääkö reagoida mitenkään?","answer":"Loukkaantunut maalivahti ei voi palata peliin ennen seuraavaa pelikatkoa (Sääntö 8.2). Sen vuoksi maalivahtia pidetään sääntöjen vastaisesti jäällä olevana pelaajana, eikä A-joukkueen näin ollen sallita tehdä maalia (olkoonkin, että B-joukkue tekee oman maalin). Maali hylätään ja maalivahdille tuomitaan pieni rangaistus. Sääntö 78.5 (IV) ja sääntö 8.2 0 2"},{"id":"8.8","rule_number":"6","question":"O Voiko maalivahdin vaihtaa lennosta? Eli voidaanko jäällä oleva maalivahti vaihtaa varamaalivahtiin pelin käydessä? S A","answer":""},{"id":"8.9","rule_number":"6","question":"Joukkueen molemmat maalivahdit ovat joko loukkaantuneet, sairaina tai jostain muusta syystä eivät pysty osallistumaan otteluun. Joukkueella ei ole kolmatta maalivahtia saatavilla. Miten joukkueen kuuluu toimia?","answer":"Jos tämä on tiedossa ennen ottelun alkua, voi joukkue pukea maalivahdiksi jonkun kokoonpanoon ilmoitetusta kenttäpelaajasta ja merkitä hänet myös kokoonpanoon maalivahdiksi. Jos kysymyksen tilanne tapahtuu ottelun aikana, joukkueelle annetaan kohtuullinen aika pukea yksi kenttäpelaajista maalivahdiksi. Sääntö 5.3 SJL HUOMIO: Kolmas maalivahti ei käytössä. Tulkinta kenttäpelaajan pukeutumisajasta maalivahdin paikalle erilainen."},{"id":"8.10","rule_number":"6","question":"Linjatuomarilla on käsi ylhäällä B- joukkueen siirretyn paitsion vuoksi. A-joukkueella on kiekko hallinnassa oman maalinsa takana. Peli katkaistaan, koska A-joukkueen pelaaja makaa loukkaantuneena jäällä puolueettomalla alueella. Mistä on seuraava aloitus? ”Käveleekö” loukkaantuminen tässä tilanteessa siirretyn paitsiotilanteen yli?","answer":"Maalaisjärjellä ajateltuna, koska siirretty paitsiotilanne oli edelleen päällä, niin seuraava aloitus suoritetaan puolueettoman alueen aloituspisteestä (lähinnä A-joukkueen puolustusaluetta). Sääntö 8.1 0 2"},{"id":"8.11","rule_number":"6","question":"O A4 saa osuman kasvoihinsa B8 mailasta. B8 ollaan tuomitsemassa rangaistusta korkeasta mailasta ja peli katkaistaan, kun B-joukkue saa kiekon S A hallintaansa. A4 ei loukkaantunut, mutta B-joukkueen lääkintähenkilö tulee tarkastamaan hänen kuntoansa. Nyt, kun peli oli katkaistu tuomitun · rangaistuksen vuoksi, voiko A4 jäädä jäälle jatkamaan heti peliä? J O","answer":""},{"id":"8.12","rule_number":"6","question":"Peli pyörii A-joukkueen puolustusalueella. A-joukkueen puolustaja loukkaantuu ”blokatessaan” hyökkääjän laukauksen. Pelaaja on raahautumassa omaa pelaajapenkkiänsä kohti, kun huoltaja avaa portin kaukalon laidasta, avustaa pelaajan pois jäältä ja vie suoraan pukuhuoneeseen. Huoltajan avaama portti on erillään pelaaja-aitiosta. Onko tämä sääntöjen mukaista toimintaa?","answer":"Ei, tämä ei ole sääntöjenmukainen vaihto. Kun loukkaantunutta pelaajaa vaihdetaan pois jäältä toiseen pelaajaan, täytyy siinäkin käyttää pelaaja-aition luukkuja, eikä mitään muita poistumisreittejä. Tämän vuoksi A-joukkueelle tulee tuomita 2´(JR). Sääntö 8.1 HAKEMISTO OSA 03 V A R U S T E E T 0 3 O S A · V A R U S T E E T VARUSTEET"}],"9":[{"id":"9.1","rule_number":"9","question":"Pelaajan paita repeytyy pelin käydessä. Sallitaanko pelaajan jatkaa ottelua repeytyneellä paidalla vai pitääkö pelaajaa ohjeistaa vaihtamaan/korjaamaan repeytynyt paita, jotta voi jatkaa pelaamista ottelussa?","answer":"Pelipaitaa ei saa muuttaa ottelun käynnistyttyä ja repeytynyt paita on osa tätä sääntöä eli pelaajan paita on joko korjattava tai vaihdettava, jotta pelaaja voi jatkaa pelaamista ottelussa. Sääntö 9.1 ja 9.5"},{"id":"9.2","rule_number":"9","question":"Pelaaja menettää kypäränsä pelin käydessä ja luistelee vaihtoon. Peli jatkuu ilman katkoa ja tämä sama pelaaja palaa peliin (edelleen ilman kypärää). Onko tämä sallittua?","answer":"Ei, tämä ei ole sallittua. Jos pelaaja palaa jäälle ilman kypärää, peli täytyy katkaista heti, kun hänen joukkueellaan on kiekko hallinnassa ja tuomita pelaajalle pieni rangaistus (2´). Sääntö 9.6"},{"id":"9.3","rule_number":"9","question":"00 33 A-joukkueen pelaaja menettää kypäränsä pelin käydessä. Pelaaja luistelee vaihtoon. Pelin edelleen käydessä pelaaja palaa jäälle ilman kypärää. Tuomaristo huomaa tämän välittömästi ja viheltää pelin poikki, kun A-joukkue saa kiekon hallintaansa. Mistä on seuraava aloitus? OO SS","answer":""},{"id":"9.5","rule_number":"9","question":"A-joukkueen maalivahti menettää kasvosuojuksensa pelin käydessä. Miten päätuomarin toimii?","answer":"Jos A- joukkueella on kiekko hallinnassaan, peli tulee katkaista välittömästi. Jos kiekko on B-joukkueen hallinnassa, niin peli katkaistaan, jos B- joukkueella ei ole välitöntä ja ilmeistä maalintekotilannetta. Pelin katkaisee päätuomari."},{"id":"9.6","rule_number":"9","question":"A-joukkueen pelaaja on läpiajossa. B-joukkueen maalivahti tulee alueensa ulkopuolelle vastaan ja poistaa tarkoituksellisesti kasvosuojuksensa, kun hyökkääjä on ylittänyt hyökkäyssiniviivan. Mikä on päätuomarin ratkaisu?","answer":"Jos rangaistuslaukauksen kriteerit täyttyvät (paitsi rike takaapäin), päätuomari tuomitsee maalin A-joukkueen hyväksi. Sääntö 9.6 HAKEMISTO VARUSTEET"},{"id":"9.7","rule_number":"9","question":"Maalivahti poistaa tarkoituksellisesti kasvosuojuksensa läpiajon, rangaistuslaukauksen (RL)/ voittomaalikilpailun suorituksen aikana. Mikä on päätuomarin ratkaisu?","answer":"Päätuomari tuomitsee maalin vastajoukkueen hyväksi. Sääntö 9.6"},{"id":"9.8","rule_number":"9","question":"Päätuomarille ilmoitetaan, että pelaajan paitaa on muutettu ja että se ei olisi enää sääntöjen mukainen. Päätuomari tarkastaa paidan ja on kiistatta selvää, että sitä on muutettu, eikä se ole sääntöjen mukainen. Miten päätuomarin kuuluu toimia?","answer":"Päätuomari varoittaa pelaajaa (ja joukkuetta) ja ohjeistaa pelaajaa poistamaan tai vaihtamaan muutetun pelipaidan. Jos pelaaja kieltäytyy tai ei muuten vaan onnistu toimimaan päätuomarin kehotuksen mukaisesti, tuomitaan pelaajalle pieni rangaistus pelin viivyttämisestä. Jos kyseinen pelaaja palaa jäälle, eikä tarvittavia korjauksia ole tehty, tuomitaan pelaajalle käytösrangaistus (10´). Ja jos tämä tapahtuu vielä kolmannen kerran, tuomitaan pelaajalle pelirangaistus (PR)."},{"id":"9.9","rule_number":"9","question":"A-joukkueen pelaajalle tuomitaan samanaikainen pieni rangaistus vastustajan kanssa. Pelaajan kypärän remmi meni rikki ”kähinässä” ja kypärä viedään hänen pelaajapenkilleen huoltajan korjattavaksi. Miten toimitsijoiden kuuluu toimia? Miten tuomariston kuuluu toimia? 0 3","answer":"Tuomariston (ja myös toimitsijoiden) täytyy huolehtia siitä, että pelaaja saa varakypärän pelaajanpenkiltä rangaistusaitoon ennen kuin O peli jatkuu. Sääntö 9.6 S A · V"},{"id":"9.10","rule_number":"9","question":"A Kenttäpelaajan tai maalivahdin luistimen terä irtoaa pelin käydessä. Katkaiseeko päätuomari pelin? R U S T E","answer":""},{"id":"9.11","rule_number":"9","question":"Pelaaja menettää kypäränsä pelin käydessä. Kiekko on kyseisen pelaajan jaloissa ja hän päättää syöttää sen joukkuekaverilleen. Onko tämä sallittua?","answer":"Ei ole. Pelaaja ei saa osallistua millään tavoin peliin ilman kypärää. Pelaajalla tuomitaan pieni rangaistus osallistumisesta peliin ilman kypärää. Sääntö 9.6"},{"id":"9.12","rule_number":"9","question":"Pelaaja menettää kypäränsä pelin käydessä. Pelaaja päättää ottaa kypärän jäästä. Onko tämä sallittua?","answer":"Pelaajalle sallitaan kypärän hakeminen matkalla pelaajapenkille vaihtoon, kunhan hän ei osallistu peliin millään tavalla. Pelaajalle tuomitaan pieni rangaistus, jos hän osallistuu peliin, vaikka kypärä olisi laitettu takaisin päähän. Sääntö 9.6 HAKEMISTO VARUSTEET"},{"id":"9.13","rule_number":"9","question":"Pelaajat kamppailevat kiekosta kulmauksessa. A11 tarttuu B13 kypärän takaosaan kiinni ja vetää sen pois hänen päästään. Miten päätuomarin kuuluu toimia vai tarvitseeko reagoida mitenkään?","answer":"A11 kuuluu tuomita pieni rangaistus (2´) väkivaltaisuudesta (poistaa vastustajan kypärän päästä pelin käydessä). Sääntö 9.6"},{"id":"9.14","rule_number":"9","question":"Tuomaristo huomaa, että maalivahdin luistimen terä ei ole asianmukainen ja on vaarana, että se aiheuttaa vastustajalle loukkaantumisen. Miten päätuomarin kuuluu toimia?","answer":"Toimitaan vaarallisen varusteen säännön periaatteen mukaisesti ja kyseinen maalivahti tulee vaihtaa varamaalivahtiin, eikä hän voi palata peliin ennen kuin luistimen terä on sääntöjenmukainen. Sääntö 9.8"},{"id":"9.15","rule_number":"9","question":"Kokonaan peittävän visiirin tai ristikon kiinnityshihnat löystyvät pelin aikana, jolloin visiiri tai ristikko jää täysin auki. Voiko pelaaja jatkaa pelaamista?","answer":"Ei. Pelaajalle tulee tällöin tuomita pieni rangaistus. Säännöt 9 ja 12."},{"id":"9.16","rule_number":"9","question":"Pelaaja menettää kaulasuojansa pelin aikana, voiko hän pelata vaihdon loppuun ilman kaulasuojaa?","answer":"Kyllä, pelaaja voi pelata vaihdon loppuun, mutta ei palata peliin ilman kaulasuojaa HAKEMISTO VARUSTEET"}],"10":[{"id":"10.1","rule_number":"10","question":"Pelaaja laukoo kiekon maalia kohti. Maalivahti haparoi torjunnassaan ja kiekko päätyy lopulta maaliin. Juuri ennen kuin kiekko on ylittänyt maaliviivan päätuomari huomaa, että kiekon laukaisseen pelaajan mailan varsi on rikki. Hyväksytäänkö maali?","answer":"Ellei päätuomari ole täysin varma siitä, että maila oli rikki ennen laukauksen suorittamista, tulee maali hyväksyä. Jos kuitenkin päätuomari on täysin varma, että pelaajan maila oli jo rikki ennen laukauksen suorittamista, maali tulee hylätä ja tuomita pelaajalle pieni rangaistus (2’) rikkoutuneella mailalla pelaamisesta. Sääntö 10.3"},{"id":"10.2","rule_number":"10","question":"Pelaaja mailan varren yläpäästä irtoaa puinen ”tulppa” pelin käydessä. Hän pudottaa puisen osan jäähän ja jatkaa pelaamista samalla mailalla. Miten päätuomarin tulee toimia?","answer":"Jos maila on päätuomarin mielestä sellainen, ettei se sovellu normaaliin pelaamiseen, tulee pelaajalle tuomita pieni rangaistus (2’). Sääntö 10.3 0"},{"id":"10.5","rule_number":"10","question":"A17 maila rikkoutuu hyökkäysalueellaan. A-joukkueella säilyy kiekko hallinnassa. Pelaajapenkillä oleva toinen A-joukkueen pelaaja heittää mailan jäälle, A17 suuntaan. A17 nostaa mailan jäästä ja jatkaa pelaamista. Miten päätuomarin tulee toimia?","answer":"A-joukkueelle tuomitaan joukkuerangaistus (JR) mailan heittämisestä pelaajapenkiltä jäälle. Sääntö 10.3 HAKEMISTO VARUSTEET"},{"id":"10.6","rule_number":"10","question":"Linjatuomari havaitsee, että A-joukkueen pelaajapenkillä oleva pelaaja heittää mailan jäällä olevalle pelaajalle, jonka maila on aiemmin rikkoutunut. Mikä on toimintaohje linjatuomarille, joka havaitsee tällaisen tapahtuman?","answer":"Linjatuomari voi katkaista pelin ja raportoida päätuomarille havaintonsa/näkemyksensä tapahtumasta. Päätuomarin on mahdollista tuomita raportoinnin perusteella A-joukkueelle joukkuerangaistuksen (JR). Sääntö 32.4 ja 10.3."},{"id":"10.7","rule_number":"10","question":"A-joukkueen pelaaja (tai maalivahti) menettää mailansa kulmauksessa. Hänen joukkuekaverinsa laittaa oman mailansa jäässä olevaa mailaa vasten ja vie sitä jäätä pitkin mailan menettänyttä pelaajaa kohti. Hän jättää mailan metrin päähän ilman mailaa olevasta joukkuekaveristaan, joka tulee sitten ja ottaa mailan itselleen jäästä. Miten päätuomarin tulee toimia?","answer":"Tilanteessa on syytä käyttää maalaisjärkeä, eikä tuomita rangaistusta. Kuvatussa tilanteessa pelaaja ei laukonut tai heittänyt mailaa, eikä se häirinnyt kiekon liikkeitä jäällä tai hyökkäävän joukkueen pelaajia. Säännöt 10.3, 10.4, 53.2 ja 53.6."},{"id":"10.8","rule_number":"10","question":"00 33 A-joukkueen maalivahti on menettänyt mailansa ja se on päätynyt kulmaukseen. Hänen joukkuekaverinsa ottaa mailan ja liu’uttaa sen takaisin maalivahdille. Onko tämä sallittua? Mikä on tuomio? OO SS","answer":""},{"id":"10.10","rule_number":"10","question":"A-joukkueen maalivahti on menettänyt mailansa tai se on rikkoutunut. Pelin käydessä hänen joukkuekaverinsa saa korvaavan maalivahdin mailan pelaajapenkiltä ja hän lähtee luistelemaan maalivahtia kohti ojentaakseen mailan hänelle. Ennen kuin pelaaja on maalivahdin luona, kiekko tulee mailaa kuljettavalle pelaajalle. Mitä tapahtuu, jos: a) pelaaja pelaa kiekkoa, kun hänellä on oma ja maalivahdille tarkoitettu korvaava maila kädessään? b) pelaaja pudottaa maalivahdin mailan jäähän ja pelaa sitten kiekkoa?","answer":"a) Tuomitaan pieni rangaistus (2´). Sääntö 10.5 b) Ei tuomita rangaistusta."},{"id":"10.11","rule_number":"10","question":"B4 on valittu suorittamaan rangaistuslaukausta. Ennen suoritusta A-joukkue pyytää hänen mailansa mittausta. B4 kieltäytyy luovuttamasta mailaansa mittausta varten. Mitä tästä tuomitaan?","answer":"Jos pelaaja kieltäytyy luovuttamasta mailaansa mittausta varten ennen rangaistuslaukausta, rangaistuslaukausta ei sallita ja pelaajalle tuomitaan käytösrangaistus (10´). HAKEMISTO VARUSTEET"},{"id":"10.12","rule_number":"10","question":"Voidaanko maila mitata ennen voittomaalikilpailun alkua tai sen käydessä? Ja jos voi, mikä on toimintaohje?","answer":"Kyllä, maila voidaan mitata voittomaalilaukauskilpailun aikana. Pyyntö mittauksesta on tehtävä ennen kuin tuomari viheltää pelin käyntiin kyseisen laukaisuyrityksen alkaessa. Jos maila on sääntöjen mukainen, valituksen tehnyt joukkue menettää seuraavan rangaistuslaukausvuoronsa. Jos maila on sääntöjen vastainen, rikkomuksen tehnyt joukkue menettää kyseisen pelaajan laukaisuyrityksen, eikä pelaaja saa enää osallistua voittomaalilaukauskilpailuun. Tämä laukaisuyritys merkitään tilastoihin \"ei maalia\" Sääntö 10.7"},{"id":"10.13","rule_number":"10","question":"Hyökkääjä menettää mailansa kamppailutilanteessa maalin edessä. Hän tarttuu välittömästi puolustajan mailaan ja ottaa sen itselleen. Hän saa samalla syötön, harhauttaa puolustuksen ja laukoo maalin ”uudella” mailallaan. Onko tämä ns. hyvä maali? Mikä on linjatuomareiden vastuu tilanteessa, jos päätuomarit eivät tekoa havaitse?","answer":"Tätä maalia ei pidä hyväksyä, koska pelaajalla ei ollut hallussaan sääntöjenmukainen maila. Pelaaja, joka on menettänyt mailansa, tai hänen mailansa on rikkoutunut, voi ainoastaan saada korvaavan mailan pelaajapenkiltään tai ojennettuna jäällä olevalta joukkuekaverilta. Linjatuomarin tulee tarvittaessa raportoida tapahtuneesta, jos päätuomarit eivät sitä havaitse. Raportin perusteella päätuomarit hylkäävät maalin ja tuomitsevat pelaajalle pienen rangaistuksen sääntöjenvastaisella mailalla pelaamisesta. Säännöt 10.3 ja 32.4."},{"id":"10.14","rule_number":"10","question":"A-joukkueen pelaaja heittää pelaajapenkiltään mailan jäällä olevalle joukkuekaverilleen, jonka maila on rikki. Mitä tuomitaan pelaajalle, joka heitti mailan pelaajapenkiltään ja mitä tuomitaan pelaajalle, joka otti mailan vastaan ja pelasi sillä?","answer":"Mailan heittämisestä pelaajapenkiltä tuomitaan joukkuerangaistus (JR) ja mailan vastaanottajalle, joka myös pelasi mailalla, ei tuomita rangaistusta. Sääntö 10.3 HAKEMISTO VARUSTEET"},{"id":"10.15","rule_number":"10","question":"Maalivahti menettää mailansa. Yksi hänen joukkuekavereistaan antaa oman kenttäpelaajan mailansa maalivahdille, joka sitten rikkoo sen. Voiko maalivahti jatkaa torjumista tällä rikkinäisellä kenttäpelaajan mailalla?","answer":"Maalivahti voi jatkaa pelaamista rikkinäisellä mailalla seuraavan katkoon asti tai siihen asti, kun hän saa sääntöjenmukaisesti luovutetun uuden mailan joukkuekaveriltaan. Sääntö 10.4"},{"id":"10.16","rule_number":"10","question":"A-joukkueen turnauksen kolmannessa pelissä A91 maila mitataan ja todetaan sääntöjenvastaiseksi. Tämä oli myös kolmas kerta saman pelaajan kohdalla turnauksessa, kun näin käy. Mikä rangaistus tai mitä rangaistuksia tuomitaan?","answer":"Pelaajalle tuomitaan pieni rangaistus. Sääntö 10.5"},{"id":"10.17","rule_number":"10","question":"A10 taklaa sääntöjenmukaisesti B12. Molemmat pelaajat menettävät mailansa tilanteessa. Heti kontaktin jälkeen kiireessä, molemmat pelaajat nostavat mailan jäästä luullen, että se on heidän omansa. Peli jatkuu ja lopulta A10 tekee maalin. Heti
