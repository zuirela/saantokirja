tetut rangaistukset tuomitaan normaaliin tapaan, paitsi kun pieni rangaistus tuomitaan joukkueelle, jota vastaan tehtiin maali, jolloin pientä rangaistusta ei tuomita – viittaus → Sääntö 16.2 (Pienet rangaistukset) ja → Sääntö 18.2 (Kaksinkertaiset pienet rangaistukset). Jos jommankumman joukkueen tekemä rike tapahtuu ilmeisen maalin jälkeisellä ensimmäisellä pelikatkolla, mutta vasta pelin katkaisemisen jälkeen, rangaistus tuomitaan ja kärsitään normaaliin tapaan riippumatta videotarkistuksen tuloksesta. Kun päätuomari ilmoittaa videotarkistuksen olevan käynnissä, kaikkien pelaajien (maalivahteja lukuun ottamatta) pitää välittömästi edetä omalle pelaajapenkilleen ja tämän säännön rikkominen aiheuttaa pelirangaistuksen rikkoneelle pelaajalle ja asia pitää raportoida asiaankuuluvalle elimelle. Jokainen potentiaalinen videotarkistusta edellyttävä maalitilanne täytyy tarkistaa ennen seuraavaa pelikatkoa tai sen aikana. Yhtään maalia ei voi hyväksyä (tai hylätä) videotarkistuksen tuloksena sen jälkeen, kun peli on jatkunut."},{"id":"37.3","title":"VIDEOTARKISTUKSEN ALAISET MAALITILANTEET","content":"Seuraavat tilanteet voidaan tarkistaa videotarkistuksen avulla: (I) Ylittikö kiekko maaliviivan tason? (II) Menikö kiekko maaliin ennen kuin maalikehikko siirtyi pois paikaltaan? (III) Menikö kiekko maaliin ennen erän päättymistä (tai erän päättymisen jälkeen)? (IV) Tehtiinkö maali käyttämällä jalan alaosaa / luistinta ja havaittavissa oleva potkuliike on ilmeinen? (V) Ohjasiko, löikö tai heittikö hyökkäävän joukkueen pelaaja kiekon maaliin tarkoituksellisesti millä tavoin tahansa (ja millä vartalon osalla tahansa) muuten kuin mailalla – pois lukien jalan alaosa / luistin (katso kohta IV edellä)? (VI) Kimposiko kiekko tuomarista suoraan maaliin? (VII) Pelasiko tai kimposiko kiekon maaliin hyökkäävän joukkueen pelaajan maalin yläriman yläpuolella olevasta korkeasta mailasta? 88 (VIII) Menikö kiekko maaliin asianmukaisella tavalla maalin suuaukon kautta (varmistetaan, ettei kiekko mennyt maaliin väärin verkon läpi tai maalikehikon alitse, jne.)? (IX) Mahdollisten maalien sääntöjenmukaisuus rangaistuslaukauksessa tai voittomaalikisan laukauksessa, jotta varmistetaan tilanteissa noudatetun sovellettavia sääntöjä (esim. maalivahti lähtee maalialueeltaan liian aikaisin ennen kiekon koskemista, maalivahti heittää mailan, maalivahti siirtää maalin, laukaisija nostaa kiekon lavassaan yli normaalin hartiatason, laukaisija tekee sääntöjen vastaisen spin-o-rama -liikkeen, kuljettaako laukaisija kiekkoa jatkuvasti eteenpäin, kaksoislaukaus / kimmoke, jne.) (X) Päätuomari voi oman harkintansa mukaan tarkistaa maalivahdin häirintätilanteet. Tilanteissa, joissa on jäällä tehty päätös maalin hylkäämisestä, vaikka kiekko on mennyt maaliin ja tuomaristo on todennut, että hyökkäävä pelaaja on syyllistynyt maalivahdin häirintään ja siitä ollaan tuomitsemassa rangaistusta. Videotarkastuksen tuloksena todetaan maalin olevan oikea ratkaisu ja, että tilanteessa ei ollut häirintää, pitää jäällä tehty päätös muuttaa eli maali hyväksytään ja seuraava suoritetaan keskipisteestä. Lisäksi kumotaan rangaistus maalivahdin häirintää koskien. → Sääntö 69 (Maalivahdin häirintä)"},{"id":"37.4","title":"HAVAITTAVISSA OLEVA POTKULIIKE","content":"Tilanteet, joissa kiekko menee maaliin suoraan havaittavissa olevan potkuliikkeen seurauksena, eivät ole hyväksyttäviä maaleja. Videotarkistuksissa havaittavissa oleva potkuliike on teko, jossa videolta selkeästi voidaan nähdä, että hyökkäävä pelaaja tarkoituksellisesti liikuttaa kiekkoa potkaisemalla sitä jalan alaosalla tai luistimella ja kiekko tämän seurauksena menee maaliin. Maalia ei voi tehdä tilanteessa, jossa hyökkäävän joukkueen pelaaja pelaa kiekon maaliin luistimellaan käyttäen havaittavissa olevaa potkuliikettä (vaikka kiekko välissä kimpoaisikin toisen pelaajan kautta, paitsi jos kyseessä on kenttäpelaajan maila). Maalia ei myöskään voi tehdä tilanteessa, jossa hyökkäävän joukkueen pelaaja potkaisee jonkin varusteen (maila, hanska, kypärä, jne.) kiekkoa kohti, mukaan lukien oman lavan potkaiseminen, aiheuttaen kiekon menemisen maaliin maaliviivan ylitse. Kun kiekko kimpoaa maaliin hyökkäävän joukkueen pelaajan luistimesta eikä pelaaja tee havaittavissa olevaa potkuliikettä, maalitilanne tuomitaan hyväksyttäväksi maaliksi. Kun hyökkäävän joukkueen pelaaja ohjaa luistimellaan kiekon maaliin, maalitilanne tuomitaan myös hyväksyttäväksi maaliksi, jos havaittavissa oleva potkuliike ei ole ilmeinen. → Sääntö 49.2 (Potku / Maalit)"},{"id":"37.5","title":"KIEKON PELAAMINEN KORKEALLA MAILALLA","content":"Videotarkistuksessa korkean mailan osalta määräävä tekijänä on kiekon osumakohta mailaan suhteessa maalin ylärimaan. Jos kiekko osuu mailaan yläriman tasalla tai sen alapuolella (riippumatta siitä, että osa mailaa on maalin yläriman yläpuolella) ja kiekko menee maaliin, maali hyväksytään. → Sääntö 80.3 (Kiekon pelaaminen korkealla mailalla / Maali hylätään)"},{"id":"37.6","title":"VIDEOTARKISTUS PELIAJAN VARMISTAMISEKSI","content":"Videolaitteistoa voidaan käyttää oikean peliajan varmistamiseksi videotarkistuksella. Kaikki uusittavien aloitusten (väärät aloitukset tai aloitusrike) tai ”kun kiekko on pelialueen ulkopuolella”- syyn takia mahdollisesti menetetty aika niin pelikellossa tai rangaistuskelloissa on palautettava. Tuomaristo OSA 5 – TUOMARISTO voi konsultoida otteluvalvojaa ja toimitsijoita, jotta varmistutaan, että näiden tilanteiden aiheuttama peliajan tai rangaistusajan menetys korjataan asianmukaisesti. → Sääntö 76.8 (Aloitustapahtuma / peliajan varmistaminen) → Sääntö 85.7 (Kiekko pelialueen ulkopuolella / peliajan varmistaminen) Jos peliajan osalta on näkemysero, asia saatetaan tarkistettavaksi ja tuomariston päätös on lopullinen. Peliajanottaja avustaa peliajan tarkistamisessa käyttäen lisäajanottovälinettä (IIHF:n hyväksymä sekuntikello). Tilanteessa, jossa videotarkistus näyttää, että maali syntyi ennen pelikatkoa, tuomaristo ilmoittaa peliajanottajalle ja kirjurille maalin syntyhetken ja kuinka paljon peliaikaa on jäljellä pelikellon tai rangaistuskellojen (jos tarpeen) asettamiseksi oikeaan aikaan. → Sääntö 34.7 (Peliajanottaja / peliajan varmistaminen) Jos ilmeisen maalin jälkeinen seuraava pelikatko on erä päättyminen, tuomaristo ohjeistaan kummankin joukkueen pelaajia pysymään pelaajapenkillään, kunnes videotarkistus on suoritettu."},{"id":"37.7","title":"MAALITUOMARI MAALIN TAKANA – VIDEOTARKISTUSTA EI KÄYTÖSSÄ","content":"Jos videotarkistusta ei ole käytettävissä Mestiksessä tai Mestiksen karsinnoissa, käytetään maalituomareita. Kunkin maalin takana istuu yksi maalituomari (tai alueella, joka SJL on määrännyt ja hyväksynyt), jos mahdollista suojatulla alueella, jotta heidän tehtävänsä suorittamista ei voi häiritä. Maalituomarit eivät vaihda kenttäpäätyjä ottelun aikana. Maalituomari ilmoittaa, normaalisti punalampulla, päätöksensä, onko kiekko ylittänyt maaliviivan maalitolppien välistä ja mennyt kokonaan maaliviivan yli. Maalituomarin ainoa päätettävä asia on, menikö kiekko todella maaliin, ei miten tai milloin kiekko meni maaliin. Merkkivalon pitää olla päällä viisi (5) sekuntia joka kerta kun kiekko menee maaliin, riippumatta tilanteen olosuhteista. Päätuomarin tehtävä on tehdä lopullinen päätös."}]},"39":{"number":"39","title":"SOPIMATON KÄYTÖS TUOMARISTOA KOHTAAN","sections":[{"id":"39.1","title":"YLEINEN KUVAUS","content":"Pelaajan, maalivahdin, valmentajan tai joukkueen toimihenkilön ei pidä haastaa ja kyseenalaistaa tuomarin päätöksiä ennen ottelua, sen aikana tai sen jälkeen, jäällä tai sen ulkopuolella niin kauan kuin hän on hallissa tai sen yhteydessä olevissa tiloissa. Pelaajan, maalivahdin, valmentajan tai joukkueen toimihenkilön ei pidä esiintyä epäurheilijamaisesti sisältäen, mutta ei rajoittuen, säädytön, rienaava tai loukkaava kielenkäyttö tai eleet, henkilökohtaiset kommentit, joiden tarkoituksena on heikentää tuomarin asemaa tai tuomion kiistämisen jatkaminen sen jälkeen, kun hänen on käsketty lopettaa kyseinen käytös tai sen jälkeen, kun häntä on rangaistu tällaisesta käytöksestä. Joukkueen tai sen toimihenkilöiden toistuvasta ja ottelua yleisesti häiritsevästä käytöksestä vastaa joukkueen päävalmentaja. Huomautus: Kun tällainen käytös kohdistetaan jotain muuta henkilöä kuin tuomaristoa kohtaan, sovelletaan → Sääntö 75 (Epäurheilijamainen käytös)."},{"id":"39.2","title":"PIENI RANGAISTUS","content":"Tämä säännön perusteella tuomitaan pieni rangaistus epäurheilijamaisesta käytöksestä seuraavien rikkeiden kohdalla: (I) Pelaajalle, joka haastaa tai vastustaa tuomarin päätöstä. (II) Tunnistettava pelaajalle, joka käyttää säädytöntä, rienaavaa tai herjaavaa kieltä tai eleitä kohdistaen sen tuomariston tai toimitsijoiden suuntaan. (III) Pelaajalle tai pelaajille, joka milloin tahansa hakkaa laitaa tai suojalasia mailallaan tai muulla esineellä tai joka millään tavoin osoittaa epäkunnioitusta tuomariston päätöstä kohtaan. Jos tämä tehdään tuomariston huomion saamiseksi hyväksyttävästä syystä (toisin sanoen vakava loukkaantuminen, sairaus, jne.), tällöin päätuomarin täytyy käyttää harkintavaltaansa. (IV) Kun kapteeni, varakapteeni tai joku muu pelaaja tulee pelaajapenkiltä kyseenalaistamaan tai protestoimaan tuomarin jäällä tekemää päätöstä. (V) Jos pelaaja hakkaa laitaa tai suojalasia protestoidakseen toimitsijan päätöstä. Jos hän jatkaa käytöstä, tuomitaan käytösrangaistus tällaisen käytöksen jatkamisesta. (VI) Jos rangaistulle pelaajalle tuomitaan lisäksi rangaistus epäurheilijamaisesta käytöksestä joko ennen alkuperäisen rangaistuksen kärsimisen alkamista tai sen jälkeen, tämä ylimääräinen pieni rangaistus lisätään hänen kärsimättömään rangaistusaikaansa ja rangaistukset kärsitään peräkkäin. Huomautus: Peliajan päätyttyä huonosta käytöksestä rangaistaan käytösrangaistuksella tai pelirangaistuksella sääntöjen määritysten mukaisesti."},{"id":"39.3","title":"JOUKKUERANGAISTUS","content":"Joukkuerangaistus epäurheilijamaisesta käytöksestä / sopimattomasta käytöksestä tuomaristoa kohtaan tuomitaan tämän säännön perusteella seuraavista rikkeistä: (I) Valmentajalle tai joukkueen toimihenkilölle, joka milloin tahansa hakkaa laitaa tai suojalasia mailallaan tai jollain muulla esineellä osoittaen epäkunnioitusta tuomariston päätöstä kohtaan. OSA 5 – TUOMARISTO Jos tämä tehdään tuomariston huomion saamiseksi hyväksyttävästä syystä (toisin sanoen vakava loukkaantuminen, sairaus, jne.), tällöin päätuomarin täytyy käyttää harkintavaltaansa. (II) Valmentajalle tai joukkueen ei-pelaavalle toimihenkilölle, joka käyttää säädytöntä, rienaavaa tai herjaavaa kieltä tai eleitä kohdistaen sen tuomariston tai toimitsijoiden suuntaan tai joka yhdistää jonkun ottelun tuomarin nimen minkäänlaiseen äänekkääseen kommenttiin, sen jälkeen, kun hänelle on jo tuomittu joukkuerangaistus (Sääntö 39.3 (ii)), tälle valmentajalle tai joukkueen ei-pelaavalle toimihenkilölle tuomitaan pelirangaistus ja tapaus raportoidaan asiaankuuluvalle elimelle. Kun tämä tapahtuu ottelun päättymisen jälkeen, jäällä tai sen ulkopuolella, pelirangaistus voidaan tuomita ilman (välttämättömyyttä), että aiemmin olisi tuomittu joukkuerangaistusta. (III) Pelaajalle, valmentajalle tai joukkueen toimihenkilölle, joka estää millään tavoin ketä tahansa tuomariston jäsentä, mukaan lukien päätuomarit, linjatuomarit, peliajanottaja, rangaistusajanottaja tai maalituomarit, heidän suorittaessaan tehtäviään. (IV) Pelaajalle, valmentajalle tai ei-pelaavalle henkilölle, joka väärinkäyttää videoteknologiaa (tabletti, jne.) kyseenalaistaakseen tuomariston päätöstä"},{"id":"39.4","title":"KÄYTÖSRANGAISTUS","content":"Käytösrangaistus epäurheilijamaisesta käytöksestä / sopimattomasta käytöksestä tuomaristoa kohtaan tuomitaan tämän säännön perusteella seuraavista rikkeistä: (I) Pelaajalle, joka jatkaa säädyttömän, rienaavan tai herjaavan kielen käyttöä jotain tuomariston jäsentä kohtaan, ja josta hänelle on jo tuomittu pieni rangaistus. (II) Pelaajalle, joka tahallaan lyö tai laukaisee kiekon toimitsijan ulottuvilta, joka pyrkii sitä ottamaan. (III) Pelaajalle, joka sen jälkeen, kun hänelle on tuomittu pieni rangaistus epäurheilijamaisesta käytöksestä, jatkaa tuomarin päätöksen haastamista tai vastustamista. (IV) Pelaajalle tai pelaajille, joka milloin tahansa hakkaa laitaa tai suojalasia mailallaan tai muulla esineellä tai joka millään tavoin osoittaa epäkunnioitusta tuomariston päätöstä kohtaan, ja josta hänelle (heille) on jo tuomittu pieni rangaistus tai joukkuerangaistus epäurheilijamaisesta käytöksestä aiemmin ottelun aikana. (V) Pelaajalle tai pelaajille, joka muulloin kuin mennäkseen rangaistusaitioonsa tulee tai jää tuomarialueelle, kun tuomaristo raportoi tai neuvottelee toimitsijan kanssa mukaan lukien päätuomarit, linjatuomarit, ajanottaja, rangaistusajanottaja, kirjuri tai kuuluttaja. (VI) Rangaistulle pelaajalle, joka ei siirry suoraan rangaistuspenkille tuomarin niin määrätessä. (VII) Käytösrangaistus (tai pelirangaistus päätuomarin harkinnan mukaan) tuomitaan pelaajalle, joka tarkoituksellisesti heittää minkä tahansa varusteen pelialueen ulkopuolelle. Kun tämä tehdään protestiksi tuomarin päätökseen, tuomitaan pieni rangaistus ja pelirangaistus → Sääntö 39.5 (Pelirangaistus). (VIII) Pelaajalle, jolle jo on tuomittu pieni rangaistus vastaavasta epäurheilijamaisesta käytöksestä, hakkaa laitaa tai suojalasia protestoidakseen toimitsijan päätöstä. (IX) Yleisesti, tämän tyyppisen käytökseen syyllistyville tuomitaan samasta tilanteesta ensin pieni rangaistus, sitten käytösrangaistus ja lopulta pelirangaistus, jos toiminta jatkuu. 92 OSA 5 – TUOMARISTO"},{"id":"39.5","title":"PELIRANGAISTUS","content":"Pelirangaistus epäurheilijamaisesta käytöksestä / sopimattomasta käytöksestä tuomaristoa kohtaan tuomitaan tämän säännön perusteella seuraavista rikkeistä: (I) Pelaajalle, joka sen jälkeen, kun hänelle on tuomittu käytösrangaistus, jatkaa tuomarin päätöksen haastamista tai vastustamista. (II) Valmentajalle tai ei-pelaavalle joukkueen toimihenkilölle, joka sen jälkeen, kun hänelle on tuomittu joukkuerangaistus (Sääntö 39.3 (ii)), käyttää säädytöntä, rienaavaa tai herjaavaa kieltä tai eleitä kohdistaen sen tuomariston tai toimitsijoiden suuntaan tai yhdistää jonkun ottelun tuomarin nimen minkäänlaiseen äänekkääseen kommenttiin. Tälle valmentajalle tai ei-pelaavalle joukkueen toimihenkilölle tuomitaan pelirangaistus ja tilanne raportoidaan asiaankuuluvalle elimelle jatkotoimenpiteitä varten. Kun tämä tapahtuu ottelun päätyttyä joko jäällä tai jään ulkopuolella, voidaan pelirangaistus tuomita ilman, että aiemmin on tuomittu joukkuerangaistus. Kun joukkuetta on epäurheilijamaisesta käytöksestä annetun varoituksen jälkeen rangaistu joukkuerangaistuksella, voidaan vastaavan käytöksen jatkuessa joukkueen päävalmentajalle tuomita pelirangaistus. Jos epäasiallinen käytös on kuitenkin selkeästi yksilöitävissä, kohdistetaan pelirangaistus kyseiselle pelaajalle tai toimihenkilölle päävalmentajan sijaan. Lisätarkennus kohtaan (II): Tunnistettavalle jäältä poissaolevalle pelaajalle tai joukkueen toimihenkilölle, joka heittää mailan tai jonkin muun esineen jäälle, tuomitaan pieni rangaistus/joukkuerangaistus ja pelirangaistus (III) Pelaajalle, joka mentyään rangaistusaitioon poistuu sieltä ennen rangaistuksensa päättymistä haastaakseen tuomarin päätös, tuomitaan pelirangaistus. (IV) Tämä sääntö ei korvaa mitään vakavampaa rangaistusta, joka saatetaan tuomita pelaajalle rangaistusaitiosta lähtemisestä yhteenoton aloittamiseksi tai siihen osallistumiseksi. Sääntö 70 (Lähteminen pelaajapenkiltä tai rangaistusaitiosta) (V) Pieni rangaistus epäurheilijamaisesta käytöksestä sekä pelirangaistus tuomitaan pelaajalle, joka heittää mailan tai osan siitä tai jonkin muun varusteen tai esineen pelialueen ulkopuolelle protestiksi tuomarin päätökseen. (VI) Pelaajalle tai valmentajalle tai joukkueen toimihenkilölle, joka heittää tai laukaisee jonkin esineen tuomariston suuntaan, mutta ei niin lähelle, että osuisi. Tämä rike voi tapahtua jäällä tai sen ulkopuolella. (huom. lisätarkennus kohta II) (VII) Pelaajalle, joka pelitilanteessa varomattomasti ottaa kontaktin tuomariin ja tuomarin oma toiminta ei aiheuta kontaktia tilanteessa, tuomitaan pelirangaistus. (VIII) Yleisesti, tämän tyyppisen käytökseen syyllistyville tuomitaan samasta tilanteesta ensin pieni rangaistus, sitten käytösrangaistus ja lopulta pelirangaistus, jos toiminta jatkuu."},{"id":"39.6","title":"ISO RANGAISTUS JA AUTOMAATTINEN PELIRANGAISTUS","content":"Iso rangaistus ja pelirangaistus epäurheilijamaisesta käytöksestä / sopimattomasta käytöksestä tuomaristoa kohtaan tuomitaan tämän säännön perusteella seuraavista rikkeistä: (I) Iso rangaistus ja pelirangaistus tuomitaan, jos pelaajalle tai toimihenkilölle säädyttömien eleiden, rasististen loukkauksen tai pilkkaavien tai seksuaalisten huomautusten käytöstä. 94 (II) Pelaajalle, joka tarkoituksellisesti käyttää millään tavoin fyysistä voimaa tuomaria kohti ja millään tavoin, jos tällainen toiminta todennäköisesti voi aiheuttaa tuomarin loukkaantumisen, fyysisesti halventaa tai tarkoituksellisesti käyttää fyysistä voimaa pelkästään tarkoituksena vapautua tuomarin otteesta pelaajien yhteenoton aikana tai välittömästi sen jälkeen, tuomitaan iso rangaistus ja pelirangaistus. (III) Pelaajalle tai valmentajalle tai joukkueen toimihenkilölle, joka sylkee, tahrii verellä tai käyttää säädytöntä, rienaavaa tai herjaavaa kieltä, säädyttömiä eleitä, rasistisia loukkauksia tai pilkkaavia tai seksuaalisia huomautuksia tuomaria kohtaan joko ottelun aikana tai sen jälkeen, jäällä tai sen ulkopuolella ja missä tahansa hallin alueella tai sen yhteydessä olevissa tiloissa. (IV) Iso rangaistus ja pelirangaistus tuomitaan pelaajalle, joka tarkoituksellisesti heittää minkä tahansa varusteen pelialueen ulkopuolelle vaarantaen katsojien tai kenen tahansa turvallisuutta. (V) Pelaajalle tai valmentajalle tai joukkueen toimihenkilölle, joka heittää tai laukaisee jonkin esineen tuomariston suuntaan, tarkoituksenaan osua tuomaristoon. Tuomitaan iso rangaistus ja pelirangaistus. Tämä rike voi tapahtua jäällä tai sen ulkopuolella."},{"id":"39.7","title":"RAPORTIT","content":"Ottelun tuomariston vastuulla on toimittaa asiaankuuluvalle elimelle yksityiskohtainen raportti jokaisesta pelaajan, valmentajan tai ei-pelaavan joukkueen toimihenkilön saamasta pelirangaistuksesta. Jos asiaankuuluva elin katsoo, se voi harkintansa mukaan tuomita lisärangaistuksia. → Sääntö 28 (Täydentävä kurinpito)"}]},"40":{"number":"40","title":"TUOMARISTON FYYSISEN KOSKEMATTOMUUDEN LOUKKAUS","sections":[]},"41":{"number":"41","title":"LAITATAKLAUS","sections":[{"id":"41.1","title":"LAITATAKLAUS","content":"Laitataklauksesta tuomitaan rangaistus pelaajalle, joka taklaa tai työntää puolustuskyvytöntä vastustajaa aiheuttaen vastustajan voimakkaan tai vaarallisen osumisen tai törmäämisen laitaa vasten. Päätuomarin harkinnan pohjalta rangaistuksen ankaruus perustuu laitaa vasten kohdistuneen iskun voimaan. Päätuomareilla on tämän säännön yhteydessä merkittävä määrä harkintavaltaa. Taklaajan velvollisuus on varmistaa, että vastustaja ei ole puolustuskyvyttömässä asemassa ja jos näin on, hänen täytyy välttää kontakti tai minimoida se. Jos taklattava pelaaja tarkoituksellisesti muuttaa asemaansa, johon taklaajalla ei ole mahdollisuutta reagoida ja siten altistaa itsensä haavoittuvaan asemaan välittömästi ennen taklausta luoden laitataklaus– tilanteen, ei tilanteesta rangaista laitataklauksena. Kuitenkin tilanteesta voidaan silti tuomita jokin muu rangaistus. Nämä näkökulmat täytyy ottaa huomioon, kun päätuomarit soveltavat tätä sääntöä. Tarpeeton kontakti kiekkoa pelaavaan pelaajaan ilmeisessä pitkän kiekon- tai paitsiotilanteessa, minkä seurauksena pelaaja osuu tai törmää laitaan, on laitataklaus ja täytyy myös rangaista sellaisena. Tilanteissa, joissa osumaa laitaa vasten ei ole, niin rike pitää käsitellä ryntäyksenä."},{"id":"41.2","title":"PIENI RANGAISTUS + KÄYTÖSRANGAISTUS","content":"Päätuomarin pitää oman harkintansa mukaan tuomita pieni rangaistus ja automaattinen käytösrangaistus pelaajalle, joka syyllistyy laitataklaukseen vastustajaa kohti ja teon vakavuus määräytyy laitaa vasten olevan osuman voiman ja väkivallan asteesta."},{"id":"41.3","title":"ISO RANGAISTUS + PELIRANGAISTUS","content":"Päätuomari voi oman harkintansa mukaan tuomita ison rangaistuksen pelaajalle, joka päätuomarin tulkinnan mukaan piittaamattomasti vaarantaa vastustajaa laitataklauksella. Tällaisen piittaamattoman vaarantamisen perusteena ovat rikkeen vakavuus, kontaktin vakavuus, väkivallan aste ja teon yleinen moitittavuus."}]},"42":{"number":"42","title":"RYNTÄYS","sections":[{"id":"42.1","title":"RYNTÄYS","content":"Pelaajaa rangaistaan, jos hän millä tavoin tahansa luistelee, hyppää tai ryntää vastustajan päälle. Ryntäämisellä tarkoitetaan toimintaa, jossa pelaaja joko hyppää taklatakseen vastustajaa, lisää nopeuttaan ottamalla useita luistelupotkuja välittömästi ennen kontaktia ja / tai luistelee liiallisen matkan ainoana tarkoituksenaan suorittaa tällainen taklaus ja / tai jollain tavoin väkivaltaisesti taklaa vastustajaa. Ryntäys voi tapahtua taklauksena laitaa päin, maalikehikkoa päin tai avojäällä. Tämän säännön syrjäyttävät kaikki vastaavat sääntöjenvastaiset päähän kohdistuvat teot paitsi tappeluun liittyvät. Pelaajalle tuomitaan rangaistus, jos hän ryntää maalivahdin päälle tämän ollessa maalialueella. Maalivahtia ei saa taklata, vaikka hän olisi maalialueensa ulkopuolella. Asianmukainen rangaistus tulee tuomita kaikissa tapauksissa, joissa vastustaja ottaa tarpeettoman kontaktin maalivahtiin. OSA 6 – FYYSISET RIKKEET Kuitenkin tahaton kontakti maalivahtiin sallitaan päätuomarin harkinnan mukaan, jos maalivahti on pelaamassa kiekkoa maalialueensa ulkopuolella edellyttäen, että hyökkäävä pelaaja yrittää kohtuudella välttää tällaista tahatonta kontaktia."},{"id":"42.2","title":"PIENI RANGAISTUS","content":"Päätuomarin pitää oman harkintansa mukaan tuomita pieni rangaistus pelaajalle, joka syyllistyy ryntäämiseen vastustajaa kohti ja teon vakavuus määräytyy taklauksen voiman ja väkivallan asteesta."},{"id":"42.3","title":"ISO RANGAISTUS + PELIRANGAISTUS","content":"Päätuomari voi oman harkintansa mukaan tuomita ison rangaistuksen pelaajalle, joka päätuomarin tulkinnan mukaan piittaamattomasti vaarantaa vastustajaa ryntäämisellä. Tällaisen piittaamattoman vaarantamisen perusteena ovat rikkeen vakavuus, kontaktin vakavuus, väkivallan aste ja teon yleinen moitittavuus."}]},"43":{"number":"43","title":"SELÄSTÄ TAKLAAMINEN","sections":[{"id":"43.1","title":"SELÄSTÄ TAKLAAMINEN","content":"Selästä taklaaminen on taklaus, joka kohdistetaan haavoittuvassa asemassa olevaan pelaajaan, (joka ei ole tietoinen uhkaavasta iskusta) ja täten ei pysty suojaamaan tai puolustamaan itseään tällaiselta iskulta, ja kontakti kohdistuu taklattavan vartaloon selkäpuolelta. Pelaajalle, joka millään tavoin taklaa vastustajaansa selästä päin laitaa, päin maalikehikkoa tai avojäällä (toisin sanoen korkealla mailalla, poikittaisella mailalla, jne.), rangaistaan tämän säännön perusteella. Jos taklattava pelaaja tarkoituksellisesti kääntää selkänsä vastustajaa kohden, johon taklaajalla ei ole mahdollisuutta reagoida ja siten altistaa itsensä haavoittuvaan asemaan välittömästi ennen taklausta luoden selästä taklaus –tilanteen, ei tilanteesta rangaista selästä taklauksena. Kuitenkin tilanteesta voidaan silti tuomita jokin muu rangaistus."},{"id":"43.2","title":"PIENI RANGAISTUS + KÄYTÖSRANGAISTUS","content":"Pelaajalle, joka taklaa vastustajaa selästä tuomitaan pieni rangaistus + käytösrangaistus"},{"id":"43.3","title":"ISO RANGAISTUS + PELIRANGAISTUS","content":"Päätuomari voi oman harkintansa mukaan tuomita ison rangaistuksen pelaajalle, joka päätuomarin tulkinnan mukaan piittaamattomasti vaarantaa vastustajaa selästä taklaamisella. Tällaisen piittaamattoman vaarantamisen perusteena ovat rikkeen vakavuus, kontaktin vakavuus, väkivallan aste ja teon yleinen moitittavuus."}]},"44":{"number":"44","title":"LEIKKAAMINEN","sections":[{"id":"44.1","title":"LEIKKAAMINEN","content":"Leikkaaminen tai alas osuva taklaus on teko, jossa vartalotaklaus kohdistuu vastustajan polven alueelle tai sen alapuolelle. Pelaaja ei saa taklata leikkaavalla tavalla eikä laskea omaa vartaloasemaansa taklatakseen vastustajaa polven alueelle tai sen alapuolelle. Sääntöjenvastainen alas osuva taklaus on teko, jossa taklaajalla voi olla molemmat luistimet jäässä (teräkontakti jäähän) tai ei, ja taklaajan yksinomainen tarkoitus on taklata vastustajaa polvien alueelle. Pelaaja ei saa laskea omaa vartaloasemaansa taklatakseen vastustajaa polven alueelle. Pelaaja ei saa kyyristyä alas laitojen lähellä välttääkseen taklatuksi tulemisen, aiheuttaen tämän seurauksena vastustajan pyörähtämisen hänen ylitseen. 98"},{"id":"44.2","title":"PIENI RANGAISTUS","content":"Päätuomarin pitää oman harkintansa mukaan tuomita pieni rangaistus pelaajalle, joka taklaa leikkaamalla vastustajaa ja teon vakavuus määräytyy taklauksen väkivallan asteesta."},{"id":"44.3","title":"ISO RANGAISTUS + PELIRANGAISTUS","content":"Päätuomari voi oman harkintansa mukaan tuomita ison rangaistuksen pelaajalle, joka päätuomarin tulkinnan mukaan piittaamattomasti vaarantaa vastustajaa leikkaamalla. Tällaisen piittaamattoman vaarantamisen perusteena ovat rikkeen vakavuus, kontaktin vakavuus, väkivallan aste ja teon yleinen moitittavuus."}]},"45":{"number":"45","title":"KYYNÄRPÄÄTAKLAUS","sections":[{"id":"45.1","title":"KYYNÄRPÄÄTAKLAUS","content":"Kyynärpäätaklauksella tarkoitetaan ojennetun kyynärpään käyttöä iskuun tai taklaukseen vastustajaa kohti tavalla, joka voi aiheuttaa loukkaantumisen tai ei."},{"id":"45.2","title":"PIENI RANGAISTUS","content":"Päätuomarin pitää oman harkintansa mukaan tuomita pieni rangaistus pelaajalle, joka taklaa kyynärpäällä vastustajaa ja teon vakavuus määräytyy taklauksen voiman ja väkivallan asteesta."},{"id":"45.3","title":"ISO RANGAISTUS + PELIRANGAISTUS","content":"Päätuomari voi oman harkintansa mukaan tuomita ison rangaistuksen pelaajalle, joka päätuomarin tulkinnan mukaan piittaamattomasti vaarantaa vastustajaa kyynärpäätaklauksella. Tällaisen piittaamattoman vaarantamisen perusteena ovat rikkeen vakavuus, kontaktin vakavuus, väkivallan aste ja teon yleinen moitittavuus."}]},"46":{"number":"46","title":"TAPPELU","sections":[{"id":"46.1","title":"TAPPELU / TAPPELIJA – HALUKKUUS TAPELLA JA JATKAA TAPPELUA","content":"Tappeleminen ei kuulu kansainvälisen jääkiekon piirteisiin. Päätuomarin (päätuomareiden) on rangaistava pelaajia, jotka vapaaehtoisesti osallistuvat nujakkaan / tappeluun, niin sanottuja ”halukkaita tappelijoita” sen mukaisesti, ja heidät voidaan poistaa pelistä. Muita täydentäviä kurinpitorangaistuksia voidaan määrätä. Tappeluksi tulkitaan tilanne, jossa vähintään yksi (1) pelaaja lyö tai yrittää lyödä vastustajaa toistuvasti tai kun kaksi (2) pelaajaa painivat tavalla, joka vaikeuttaa linjatuomareiden puuttumista asiaan ja erottaa kamppailijat toisistaan. Pelaajalle, joka itsepintaisesti jatkaa tai yrittää jatkaa tappelu tai yhteenottoa sen jälkeen, kun päätuomari on käskenyt häntä lopettamaan, tai vastustaa linjatuomaria tämän hoitaessaan tehtäviään, tuomitaan päätuomarin harkinnan mukaan vähintään iso rangaistus (tappelusta) ja pelirangaistus sen lisäksi, mitä muita rangaistuksia hänelle tuomitaan. Päätuomareille annetaan erittäin laaja liikkumavara rangaistuksissa, joita he voivat määrätä tämän säännön nojalla. Tämä on tietoinen valinta, jotta päätuomareilla on mahdollisuus erotella tappelun osapuolien ilmeinen vastuu joko tappelun aloittajana tai tappelua itsepintaisesti jatkava osapuolena. Annettua harkintavaltaa tulisi käyttää järkevästi. Jos pelaajat, valmentajat tai joukkueen toimihenkilöt lähtevät jäälle pelaajapenkiltä tai rangaistusaitiosta sovelletaan OSA 6 – FYYSISET RIKKEET → Sääntö 70 (Lähteminen pelaajapenkiltä tai rangaistusaitiosta)"},{"id":"46.2","title":"YHTEENOTTO","content":"Yhteenotoksi katsotaan tilanne, jossa on osallisena vähintään kaksi (2) pelaajaa ja vähintään yhdelle (1) pelaajalle tuomitaan rangaistuksia."},{"id":"46.3","title":"YLLYTTÄJÄ / ALOITTEENTEKIJÄ","content":"Yhteenoton yllyttäjä / aloitteentekijä on pelaaja, joka toiminnallaan tai käytöksellään osoittaa minkä tahansa seuraavista kriteereistä: etäältä kuljettu matka, ensimmäisen iskun lyönti; uhkaava asenne tai asento; suullinen yllyttäminen tai uhkaaminen; reagointi aiempaan tapahtumaan; ilmeinen kosto edeltävään pelitilanteeseen. Pelaajalle, jonka katsotaan olevan sekä yhteenoton yllyttäjä / aloitteentekijä että hyökkäävä osapuoli, tuomitaan pieni rangaistus (yllyttäjä / aloitteentekijä) + pieni rangaistus (hyökkäävä osapuoli) + iso rangaistus (tappelu) ja pelirangaistus (yhteensä 2 min + 2 min + 5 min+ PR)."},{"id":"46.4","title":"HYÖKKÄÄVÄ OSAPUOLI","content":"Yhteenotossa hyökkäävä osapuoli on pelaaja, joka jatkaa iskujen antamista tarkoituksenaan rangaista puolustuskyvyttömässä asemassa olevaan vastustajaa tai tappeluun halutonta vastustajaa. Pelaaja on todettava hyökkääväksi osapuoleksi, kun hän on selkeästi voittanut tappelun, mutta jatkaa iskujen antamista ja saa iskut perille jatkaakseen vastustajan rankaisemista ja/tai loukkaa vastustajaa, joka ei enää pysty puolustamaan itseään. Pelaajalle, jonka katsotaan olevan sekä yhteenoton hyökkäävä osapuoli että yllyttäjä / aloitteentekijä, tuomitaan pieni rangaistus (hyökkäävä osapuoli) + pieni rangaistus (yllyttäjä / aloitteentekijä) + iso rangaistus (tappelu) ja pelirangaistus (yhteensä 2 min + 2 min + 5 min+ PR)."},{"id":"46.5","title":"VAARALLINEN ISKIJÄ – RAUKKAMAINEN LYÖJÄ","content":"Pelaajalla, jolla on teippiä tai muuta materiaalia käsissään (ranteiden alapuolella), ja joka haavoittaa tai loukkaa vastustajaa yhteenoton aikana, tuomitaan iso rangaistus ja pelirangaistus sen lisäksi, mitä muita rangaistuksia (mukaan lukien tappelusta tämän säännön perusteella) hänelle tuomitaan. iso rangaistus ja pelirangaistus tuomitaan pelaajalle, joka lyö pahaa aavistamatonta tai tappeluun halutonta vastustajaa (toisin sanoen raukkamainen isku) ja voi aiheuttaa täten vastustajan loukkaantumisen."},{"id":"46.6","title":"PUOLUSTAUTUVA – TAPPELUUN HALUTON VASTUSTAJA","content":"Pelaajaa, joka puolustaa itseään lyöden muutaman lyönnin hyökkäävää osapuolta, yllyttäjää / aloitteentekijää tai tappelijaa vastaan, pidetään tappeluun haluttomana vastustajana. Tällainen pelaaja ei halua jatkaa tai pidentää tappelua tai antaa tappelun lähteä käsistään – päätuomareille on selvää, että tämä pelaaja ei halua tapella. Pelaajalle, joka kostaa lyötynä lyöden takaisin, tuomitaan vähintään pieni rangaistus (väkivaltaisuus) tai iso rangaistus ja automaattinen pelirangaistus jos tappelun kriteeristö ei muutaman lyönnin perusteella täyty."},{"id":"46.7","title":"KOLMAS OSALLISTUVA PELAAJA","content":"Päätuomarin harkinnan mukaan tuomitaan pelirangaistus pelaajalle, joka ensimmäisenä osallistuu (kolmas pelaaja) käynnissä olevaan pelaajien väliseen yhteenottoon paitsi, jos hänelle tuomitaan iso rangaistus ja pelirangaistus alkuperäisestä tappelusta. Tämä rangaistus tuomitaan muiden samassa tilanteesta tuomittavien rangaistusten lisäksi. 100 Tätä sääntöä sovelletaan myös seuraaviin pelaajiin, jotka päättävät osallistua samaan tai toiseen yhteenottoon samalla pelikatkolla. Yleisesti, tätä sääntöä sovelletaan, kun kyseessä on tappelu."},{"id":"46.8","title":"TAPPELUALUEEN TYHJENTÄMINEN","content":"Kun tappelu syntyy, kaikkien siihen kuulumattomien pelaajien täytyy välittömästi mennä pelaajapenkkinsä luo ja jos tappelu tapahtuu pelaajapenkillä (pelaajapenkin alueella), tämän joukkueen pelaajien on mentävä puolustusalueelleen. Maalivahtien on pysyttävä maalialueellaan paitsi, jos yhteenotto tapahtuu maalivahdin alueen läheisyydessä, jolloin maalivahdin on noudatettava päätuomarin antamia ohjeita. Säännön noudattamatta jättäminen voi johtaa rangaistuksiin pelaajan toiminnasta tappelualueella sekä täydentäviin kurinpitorangaistuksiin."},{"id":"46.9","title":"TAPPELU MUULLOIN KUIN OTTELUN ERÄN AIKANA","content":"Joukkueita, joiden pelaajat osallistuvat yhteenottoon muulloin kuin ottelun erän aikana, minkä lisäksi tappeluun osallistuneille pelaajille voidaan määrätä lisärangaistuksia täydentävän kurinpidon toimesta tai muutoin. Pelaajille, jotka osallistuvat tappeluun muulloin kuin ottelun erän aikana tuomitaan iso rangaistus ja pelirangaistus. Hyökkäävää osapuolta ja / tai yllyttäjää / aloitteentekijää rangaistaan vastaavasti sääntöjen 46.3 ja / tai 46.4 mukaisesti. Tilanteissa, joissa yhteenotto tapahtuu erän tai ottelun päätyttyä, asia pitää raportoida asiankuuluvalle elimelle täydentävää kurinpitokäsittelyä varten. Jos pelaajat tulevat pelaajapenkiltään jäälle erän päättymisen jälkeen ennen yhteenoton alkamista, heitä ei rangaista, jos he pysyvät pelaajapenkkinsä läheisyydessä edellyttäen, etteivät he osallistu yhteenottoihin."},{"id":"46.10","title":"TAPPELU ENNEN ALOITUSTA","content":"Tappelusta, joka tapahtuu ennen kiekon pudottamista normaalissa aloitustapahtumassa, tuomitaan rangaistuksia kuten yhteenotosta, joka tapahtuu normaalin peliajan aikana Säännön 46.9. (Tappelu) mukaan, paitsi jos kyseessä on tilanne ennen ottelun tai erän alkua. Jos päätuomarin mielestä, joukkue tai molemmat joukkueet tekevät erityisiä muutoksia kentällisiin ottelun loppuvaiheessa ja tätä seuraa yhteenotto, tilanteesta tuomitaan asianmukaiset rangaistukset ja tapaus raportoidaan asiankuuluvalle elimelle välittömästi ottelun jälkeen tarkistusta ja mahdollisista täydentävää kurinpitokäsittelyä varten."},{"id":"46.11","title":"TAPPELU PELIALUEEN ULKOPUOLELLA","content":"Pelirangaistus tuomitaan pelaajalle, joka osallistuu tappeluun pelialueen ulkopuolella tai toisen pelialueen ulkopuolella olevan pelaajan kanssa. Nämä rangaistukset tuomitaan sen lisäksi, mitä muita rangaistuksia tilanteesta tuomitaan mukaan lukien iso rangaistus + pelirangaistus (tappelu). Aina kun valmentaja tai joku joukkueen toimihenkilö on osallisena yhteenotossa vastustajan pelaajan, valmentajan tai jonkun joukkueen toimihenkilön kanssa, joko jäällä tai sen ulkopuolella, hänelle tuomitaan pelirangaistus ja hänet poistetaan automaattisesti ottelusta, käsketään siirtyä pukuhuoneeseen ja asia raportoidaan asiaankuuluvalle elimelle kurinpitokäsittelyä varten."},{"id":"46.12","title":"KYPÄRÄT","content":"Pelaajalle, joka ottaa kypäränsä pois tapellakseen vastustajan kanssa, tuomitaan lisäksi pieni käytösrangaistus muiden rangaistusten ohella. Yhteenoton aikana ja sen seurauksena irtoavat kypärät eivät aiheuta rangaistusta kummallekaan pelaajalle. OSA 6 – FYYSISET RIKKEET"},{"id":"46.13","title":"PELIPAIDAT","content":"Pelaajalle, joka tarkoituksellisesti riisuu pelipaitansa ennen osallistumistaan yhteenottoon tai joka selkeästi käyttää pelipaitaa, jota on muokattu eikä se ole sääntöjen mukainen → Sääntö 9 (Peliasut), tuomitaan pieni rangaistus epäurheilijamaisesta käytöksestä ja pelirangaistus. Nämä rangaistukset tuomitaan sen lisäksi, mitä muita rangaistuksia tilanteesta tuomitaan yhteenottoon osallistujille. Jos yhteenotto ei koskaan kunnolla käynnisty, pelaajalle tuomitaan pieni rangaistus epäurheilijamaisesta käytöksestä ja käytösrangaistus (10 min) pelipaidan tarkoituksellisesta riisumisesta."}]},"47":{"number":"47","title":"PÄÄLLÄ ISKEMINEN","sections":[{"id":"47.1","title":"PÄÄLLÄ ISKEMINEN","content":"Tekona päällä iskeminen edellyttää, että pelaaja ottaa tarkoituksellisesti kontaktin tai yrittää ottaa kontaktin vastustajaan pää ja/tai kypärä edellä riippumatta siitä osuuko kontakti tai ei."},{"id":"47.4","title":"ISO RANGAISTUS JA PELIRANGAISTUS","content":"Päätuomarin pitää tuomita iso rangaistus ja pelirangaistus pelaajalle, joka yrittää iskeä tai iskee päällään vastustajaa. 102 JÄÄKIEKON SÄÄNTÖKIRJA - SJL 2025-2026 OSA 6 – FYYSISET RIKKEET"}]},"48":{"number":"48","title":"SÄÄNTÖJENVASTAINEN TAKLAUS PÄÄHÄN TAI NISKAAN/KAULAAN","sections":[{"id":"48.1","title":"SÄÄNTÖJENVASTAINEN TAKLAUS PÄÄHÄN TAI NISKAAN/KAULAAN","content":"Ei ole olemassa puhdasta taklausta päähän tai niskaan/kaulaan. Taklaavan pelaajan täytyy välttää osumasta vastustajaa päähän tai niskaan/kaulaan. Taklaus, jonka tuloksena on kontakti vastustajan päähän, ja jossa isku kohdistuu valtaosin päähän, ja joka olisi vältettävissä, ei ole sallittu. Tämä sääntö syrjäyttää kaikki vastaavat pään ja niskan/kaulan alueelle kohdistuvat teot. Kun pelaaja luistelee pää ylhäällä, riippumatta siitä, onko hänellä kiekko hallussa ja voiko hän kohtuudella olettaa lähestyvää kontaktia, vastustajalla ei ole oikeutta taklata häntä päähän tai niskaan/kaulaan. Mikäli taklaavalla pelaajalla ei ole mahdollisuutta reagoida taklattavan pelaajan äkilliseen aseman muutokseen juuri ennen taklausta ja vaikka taklaus osuisikin päähän, ei taklausta rangaista sääntöjenvastaisena taklauksena päähän. Pelaajalle, joka taklaa vastustajaa, tuomitaan rangaistus sääntöjen vastaisesta taklauksesta päähän tai niskaan/kaulaan, jos joku seuraavista kohdista täyttyy/tapahtuu (I) Pelaaja kohdistaa minkälaisen iskun millä tahansa vartalonsa tai varusteensa osalla vastustajan päähän tai niskaan/kaulaan tai iskee tai runnoo vastustajan pään suojalasia tai laitaa vasten käyttäen mitä tahansa ylävartalonsa osaa. (II) Pelaaja ojentaa ja suuntaa minkä tahansa ylävartalonsa kohdan osuakseen vastustajaa päähän tai niskaan/kaulaan. (III) Pelaaja ojentaa kehoansa ylöspäin tai ulospäin ylettyäkseen vastustajaan tai käyttää mitä tahansa ylävartalonsa osaa osuakseen vastustajaa päähän tai niskaan/kaulaan. (IV) Pelaaja hyppää (irrottaa luistimensa jäästä) taklatakseen vastustajaa päähän tai niskaan/kaulaan. Määritettäessä oliko kontakti vastustajan päähän vältettävissä, pitää seuraavat taklaukseen liittyvät olosuhteet ottaa huomioon: (V) Yrittikö pelaaja taklata normaalissa peliasennossa vastustajan vartaloon eikä pää tullut kontaktin kohteeksi taklauksen huonon ajoituksen, huonon lähestymiskulman tai tarpeettoman vartalon ylöspäin tai ulospäin suuntaamisen takia. Kohdistuiko suurin osa iskun voimasta ensin vartaloon ja liukuiko kontakti sitten /sen jälkeen päähän tai niskaan/kaulaan. (VI) Asettiko taklattava itsensä haavoittuvaan asemaan ottaen asennon, joka altisti pään muutoin normaalin vartalotaklauksen kohteeksi. (VII) Muuttiko taklattava olennaisesti vartaloasemaansa tai päänsä asemaa välittömästi ennen taklausta tai samanaikaisesti sen kanssa, mikä merkittävästi vaikutti pääkontaktin syntymiseen."},{"id":"48.2","title":"PIENI RANGAISTUS + KÄYTÖSRANGAISTUS","content":"Päätuomarin pitää oman harkintansa mukaan tuomita pieni rangaistus + käytösrangaistus pelaajalle, joka taklaa vastustajaa päähän tai niskaan/kaulaan."},{"id":"48.3","title":"ISO RANGAISTUS JA PELIRANGAISTUS","content":"Päätuomari voi oman harkintansa mukaan tuomita ison rangaistuksen pelaajalle, joka päätuomarin tulkinnan mukaan piittaamattomasti vaarantaa vastustajaa taklaamalla tätä päähän tai niskaan/kaulaan. Tällaisen piittaamattoman vaarantamisen perusteena ovat rikkeen vakavuus, kontaktin vakavuus, väkivallan aste ja teon yleinen moitittavuus."}]},"49":{"number":"49","title":"POTKAISEMINEN","sections":[{"id":"49.1","title":"POTKAISEMINEN","content":"Pelaajan teko, jossa hän tarkoituksellisesti käyttää luistintaan potkuliikkeen tavoin kiekon liikuttamiseksi tai osuakseen vastustajaan."},{"id":"49.2","title":"MAALIT","content":"Kiekon potkaiseminen on sallittua kaikilla alueilla. Hyökkäävä pelaaja ei voi tehdä maalia havaittavissa olevalla potkuliikkeellä potkaisemalla luistimellaan/jalan alaosallaan kiekon maaliin Hyökkäävä pelaaja ei voi tehdä maalia potkaisemalla, jos kiekko kimpoaa potkaisusta yhdenkään pelaajan, maalivahdin tai tuomarin kautta maaliin. Jos kiekko kimpoaa maaliin hyökkäävän pelaajan luistimesta/jalan alaosasta eikä pelaaja käytä havaittavissa olevaa potkuliikettä, kyseessä on hyväksyttävä maali. Jos hyökkäävä pelaaja ohjaa kiekon maaliin luistimellaan/jalan alaosalla eikä pelaaja käytä havaittavissa olevaa potkuliikettä, kyseessä on hyväksyttävä maali. Seuraavassa täsmennetään tilanteita, jossa kiekko menee maaliin potkun jälkeisestä kimmokkeesta: (I) Jos hyökkäävän pelaajan potkaisema kiekko kimpoaa kumman tahansa joukkueen jonkin pelaajan (mukaan lukien maalivahti) vartalosta maaliin, maalia ei hyväksytä. (II) Jos hyökkäävän pelaajan potkaisema kiekko kimpoaa jonkin pelaajan (pois lukien maalivahti) mailasta maaliin, maali hyväksytään. (III) Maali hyväksytään, jos hyökkäävän joukkueen pelaajan potkaisema kiekko kimpoaa hänen omasta mailastaan maaliin. (IV) Maali hyväksytään, jos kiekko menee maaliin kimmoten hyökkäävän pelaajan luistimesta tai kimpoaa hänen luistimestaan maaliin jarrutuksen yhteydessä. Hyökkäävä pelaaja ei voi tehdä maalia potkaisemalla jonkin varusteen (maila, hanska, kypärä jne.) välityksellä kiekkoa, mukaan lukien potkaisemalla oman mailansa lapaa ja täten aiheuttaen kiekon menemisen maaliviivan ylitse."},{"id":"49.3","title":"ISO RANGAISTUS JA PELIRANGAISTUS","content":"Päätuomarin pitää oman harkintansa mukaan tuomita iso rangaistus ja pelirangaistus pelaajalle, joka päätuomarin tulkinnan mukaan potkaisee tai yrittää potkaista vastustajaa. Tämän rikkeen seurauksena on iso rangaistus ja pelirangaistus kaikissa tapauksissa, joissa potkaiseminen todetaan, vaikka potku ei osuisikaan vastustajaan. 104 JÄÄKIEKON SÄÄNTÖKIRJA - SJL 2025-2026 OSA 6 – FYYSISET RIKKEET"}]},"50":{"number":"50","title":"POLVITAKLAUS","sections":[{"id":"50.1","title":"POLVITAKLAUS","content":"Polvitaklauksessa pelaaja taklaa polvi edellä ja joissakin tapauksissa levittää polveaan ulospäin taklatakseen vastustajaa."},{"id":"50.2","title":"PIENI RANGAISTUS","content":"Päätuomarin pitää oman harkintansa mukaan tuomita teon vakavuuden perusteella pieni rangaistus pelaajalle, joka taklaa polvella vastustajaa."},{"id":"50.3","title":"ISO RANGAISTUS JA PELIRANGAISTUS","content":"Päätuomari voi oman harkintansa mukaan tuomita ison rangaistuksen pelaajalle, joka päätuomarin tulkinnan mukaan piittaamattomasti vaarantaa vastustajaa taklaamalla polvella. Tällaisen piittaamattoman vaarantamisen perusteena ovat rikkeen vakavuus, kontaktin vakavuus, väkivallan aste ja teon yleinen moitittavuus."}]},"51":{"number":"51","title":"VÄKIVALTAISUUS","sections":[{"id":"51.1","title":"VÄKIVALTAISUUS","content":"Väkivaltaisuutta on hanskat kädessä tai ilman hanskoja tapahtuva lyönti- tai iskuliike, joka normaalisti on kohdistettu vastustajan päähän tai kasvoihin, tai jos pelaaja tarkoituksellisesti poistaa vastustajan kypärän pelin aikana."},{"id":"51.2","title":"PIENI RANGAISTUS, KAKSINKERTAINEN PIENI RANGAISTUS TAI 5+PR","content":"Päätuomarin pitää oman harkintansa mukaan tuomita pienen rangaistuksen pelaajalle, joka lyö kädellään tai nyrkillään vastustajaa, tai jos pelaaja tarkoituksellisesti poistaa vastustajalta kypärän päästä pelin käydessä. → Sääntö 9.6 (Kypärät) Pelaajalle, joka on osallinen lyhyeen yhteenottoon vastustajan kanssa tai syyllistyy muuhun väkivaltaiseen tekoon, tuomitaan pieni rangaistus, kaksinkertainen pieni rangaistus tai iso rangaistus ja pelirangaistus. Pelaajaan, joka itsepintaisesti jatkaa väkivaltaisuutta, sovelletaan tappelua koskevia sääntöjä. → Sääntö 46 (Tappelu)"},{"id":"51.3","title":"ISO RANGAISTUS JA PELIRANGAISTUS","content":"Päätuomari voi oman harkintansa mukaan tuomita ison rangaistuksen ja pelirangaistuksen maalivahdille, joka lyö kilpikäsineellään vastustajaa ja teko todennäköisesti voi johtaa vastustajan loukkaantumiseen. OSA 6 – FYYSISET RIKKEET JÄÄKIEKON SÄÄNTÖKIRJA - SJL 2025-2026 105"}]},"52":{"number":"52","title":"JALKAPYYHKÄISY","sections":[{"id":"52.1","title":"JALKAPYYHKÄISY","content":"Jalkapyyhkäisy on teko, jossa pelaaja jalkaansa tai jalkaterää käyttäen iskee tai potkaisee vastustajalta jalat alta tai työntää vastustajan ylävartaloa käsivarrella tai kyynärpäällä taaksepäin, ja samalla jalkojen eteenpäin suuntautuvalla liikkeellä iskee tai potkaisee vastustajalta jalat alta, aiheuttaen täten vastustajan voimakkaan kaatumisen jäähän."},{"id":"52.2","title":"ISO RANGAISTUS JA PELIRANGAISTUS","content":"Päätuomari voi oman harkintansa mukaan tuomita ison rangaistuksen ja pelirangaistuksen pelaajalle, joka rikkoo vastustajaa jalkapyyhkäisyllä."}]},"53":{"number":"53","title":"VARUSTEEN HEITTÄMINEN","sections":[{"id":"53.1","title":"VARUSTEEN HEITTÄMINEN","content":"Pelaaja ei saa heittää mailaa tai mitään muuta esinettä millään alueella. Pelaaja, jonka maila on pudottanut tai rikkoutunut, voi saada uuden mailan vain pelaajapenkiltään tai jäällä olevan kanssapelaajan ojentamana. → Sääntö 10 (Mailat)"},{"id":"53.2","title":"PIENI RANGAISTUS","content":"Pieni rangaistus tuomitaan: (I) Jäällä olevalle pelaajalle mailan heittämisestä, kun hän heittää mailan tai osan siitä tai jonkin muun esineen kiekon suuntaan tai vastustajaa kohti millä alueella tahansa, paitsi kun tällaisesta rikkeestä on rangaistu tuomitsemalla rangaistuslaukaus (Sääntö 53.7) tai tuomitsemalla maali (Sääntö 53.8); (II) Mailan heittämisestä, kun puolustava pelaaja laukaisee tai heittää mailan tai jonkin muun esineen puolustusalueellaan, mutta ei kiekkoa tai kiekkoa kuljettavaa pelaajaa kohti; (III) Estämisestä, kun pelaaja siirtää ehjän mailan ja tämä häiritsee vastustajaa (paitsi, jos tilanteesta on tuomittu rangaistuslaukaus Säännön 53.7 tai maali Säännön 53.8 mukaan), tai kun mailan pudottanutta vastustajaa estetään ottamasta mailaansa; Ehjän mailan siirtämisestä ei rangaista, jos se ei häiritse pelitilannetta tai vastustaja ei yritä ottaa mailaa. Kun pelaaja hylkää mailansa rikkoutuneen osan tai jonkin muun esineen heittäen sen pois tai lyöden sen jään sivuun (ei kuitenkaan laidan yli) siten, että teko ei häiritse pelitilannetta tai vastustajaa (vastustajia), tilanteesta ei tuomita rangaistusta. (IV) Epäurheilijamaisesta käytöksestä, kun pelaaja heittää mailan tai osan siitä tai jonkin muun esineen tai osan siitä pelialueen ulkopuolelle protestiksi tuomarin päätökselle. Säännössä 53.5 kuvataan perusteet lisärangaistuksena tuomittavalle pelirangaistukselle."},{"id":"53.3","title":"JOUKKUERANGAISTUS","content":"Pelaajapenkillä tai rangaistuspenkillä olevalle tunnistamattomalle pelaajalle, valmentajalle tai joukkueen toimihenkilölle, joka heittää jotain jäälle pelin käydessä tai pelikatkolla, tuomitaan joukkuerangaistus epäurheilijamaisesta käytöksestä. → Sääntö 75 (Epäurheilijamainen käytös). 106"},{"id":"53.4","title":"KÄYTÖSRANGAISTUS","content":"Käytösrangaistus tuomitaan pelaajalle, joka tahattomasti tai vahingossa heittää mailan tai osan siitä tai jonkin muun esineen tai osan varusteesta pelialueen ulkopuolelle."},{"id":"53.5","title":"PELIRANGAISTUS","content":"Pelirangaistus tuomitaan pelaajalle, joka tarkoituksellisesti heittää mailan tai osan siitä tai jonkin muun esineen tai osan varusteesta pelialueen ulkopuolelle. Jos teko tehdään protestiksi tuomarin päätökseen, tuomitaan rikkoneelle pelaajalle pieni rangaistus epäurheilijamaisesta käytöksestä (Sääntö 53.2 iv) sekä pelirangaistus."},{"id":"53.6","title":"ISO RANGAISTUS JA PELIRANGAISTUS","content":"Päätuomari voi oman harkintansa mukaan tuomita ison rangaistuksen ja pelirangaistuksen pelaajalle, jos tämä heittää mailan tai jonkin muun esineen tai osan varusteesta vastustajan pelaajaa, valmentajaa tai joukkueen toimihenkilöä kohti, ja teko voisi aiheuttaa vastustajan loukkaantumisen. Tämä koskee myös mailan heittämistä katsomoon/yleisöä kohti. Huomautus: Tällaisen piittaamattoman vaarantamisen perusteena ovat rikkeen vakavuus ja teon yleinen moitittavuus."},{"id":"53.7","title":"RANGAISTUSLAUKAUS","content":"Kun joku puolustavan joukkueen jäsen, mukaan lukien valmentaja tai joukkueen toimihenkilö, heittää tai laukaisee minkä tahansa mailan osan tai jonkin muun esineen tai osan varusteesta heidän (rikkoneen joukkueen) puolustusalueellaan olevaa kiekkoa tai kiekkoa kuljettavaa pelaajaa kohti, päätuomarin tai linjatuomarin on sallittava pelata tilanne loppuun, ja jos maalia ei synny, niin päätuomarin pitää tuomita rangaistuslaukaus ei-rikkoneen joukkueen hyväksi. Tämän rangaistuslaukauksen saa suorittaa kuka tahansa ei-rikkoneen joukkueen pelaaja. Jos läpiajossa puolueettomalla alueella tai hyökkäysalueella olevaa pelaajaa häiritsee jokin puolustavan joukkueen jäsenen, mukaan lukien valmentajan tai joukkueen toimihenkilön, heittämä maila tai jokin muu esine tai varusteen osa, päätuomari tuomitsee rangaistuslaukauksen ei-rikkoneen joukkueen hyväksi. → Sääntö 53.7 (Kampitus / rangaistuslaukaus). Jos läpiajossa puolueettomalla alueella tai hyökkäysalueella olevaa pelaajaa häiritsee katsojan jäälle heittämä esine, mikä aiheuttaa kiekon menettämisen tai kaatumisen, päätuomari tuomitsee rangaistuslaukauksen ei-rikkoneen joukkueen hyväksi."},{"id":"53.8","title":"TUOMITUT MAALIT","content":"Jos puolustava joukkue on ottanut maalivahdin pois jäältä ja puolustavan joukkueen jäsen, mukaan lukien valmentaja tai joukkueen toimihenkilö, heittää tai laukaisee minkä tahansa mailan osan tai jonkin muun esineen tai varusteen osan puolueettomalla alueella tai heittäjän puolustusalueella olevaa kiekkoa tai kiekkoa kuljettavaa vastustajaa kohti, täten estäen kiekollista pelaajaa laukaisemasta vapaasti kohti vartioimatonta maalia, tuomitaan maali hyökkäävän joukkueen hyväksi. Tätä sääntöä varten vartioimaton maali määritellään siten, että maalivahti on korvattu jäällä ylimääräisellä kenttäpelaajalla. Maalivahdin katsotaan olevan pois jäältä heti, kun korvaava pelaaja on astunut jäälle. OSA 7 – RAJOITTAVAT RIKKEET OSA 7 RAJOITTAVAT RIKKEET 108 OSA VII – RAJOITTAVAT RIKKEET"}]},"54":{"number":"54","title":"KIINNIPITÄMINEN","sections":[{"id":"54.1","title":"KIINNIPITÄMINEN","content":"Kaikki pelaajan toimet, joka pidättelevät tai estävät vastustajan etenemistä riippumatta siitä, onko hänellä kiekko hallinnassaan tai ei."},{"id":"54.2","title":"PIENI RANGAISTUS","content":"Pieni rangaistus tuomitaan pelaajalle, joka pitää kiinni vastustajasta käsillä, käsivarsilla tai jaloilla. Pelaajan sallitaan käyttää käsivarsiaan voimaliikkeenä blokaten vastustajaa sillä edellytyksellä, että hänellä on vartaloasema tilanteessa eikä hän käytä käsiään millään tavoin vastustajan kiinnipitämiseen. Pelaajan ei sallita pitää kiinni vastustajan mailasta. Pieni rangaistus tuomitaan pelaajalle, joka pitää kiinni vastustajan mailasta (tuomitaan ja kuulutetaan ”vastustajan mailasta kiinnipitäminen”). Pelaajan sallitaan suojata itseään puolustautumalla vastustajan mailaa vastaan. Pelaajan täytyy välittömästi päästää irti vastustajan mailasta ja sallia vastustajan jatkaa normaalia pelaamista."},{"id":"54.3","title":"RANGAISTUSLAUKAUS","content":"Kun puolueettomalla tai hyökkäysalueella olevaa kiekkoa hallitsevaa pelaajaa (tai pelaajaa, joka olisi voinut saada kiekon haltuunsa ja hallintaansa), jolla ei ole muita vastustajia ohitettavanaan kuin maalivahti, rikotaan takaapäin ja täten estetään kohtuullinen maalintekotilanne, tuomitaan rangaistuslaukaus ei- rikkoneelle joukkueelle. Kuitenkaan päätuomarin ei pidä katkaista peliä ennen kuin hyökkäävä joukkue on menettänyt kiekon hallinnan puolustavalle joukkueelle. Tämän säännön tarkoituksena on palauttaa rikotulle joukkueelle kohtuullinen maalintekomahdollisuus, jonka se menetti rikkeen myötä. Jos kuitenkin rikottu pelaaja pystyy palauttamaan ja saamaan kohtuullisen maalintekotilanteen (tai kanssapelaaja pystyy luomaan kohtuullisen maalintekotilanteen) ei rangaistuslaukausta tuomita, vaan rikkeen mukainen rangaistus ilmoitetaan ja tuomitaan, jos tilanteesta ei synny maalia. Kiekon hallinnalla tarkoitetaan kiekon liikuttamisesta mailalla, käsin tai jalkaterällä/jalan alaosalla. Jotta rangaistuslaukaus voidaan tuomita takaapäin rikotun pelaajan hyväksi, täytyy seuraavat neljä (4) kriteeriä täyttyä: (I) Rike täytyy tapahtua puolueettomalla alueella tai hyökkäysalueella (toisin sanoen kiekko kuljettavan pelaajan on täytynyt ylittää oma siniviivansa); (II) Rike täytyy tapahtua takaapäin (paitsi, jos läpiajon yhteydessä maalivahti rikkoo edestäpäin); (III) Kiekkoa hallussa pitävältä ja hallitsevalta pelaajalta (tai pelaajalta, joka selvästi olisi saanut kiekon haltuunsa ja hallintaansa) estetään kohtuullinen maalintekotilanne. Se, että pelaaja onnistuu laukaisemaan, ei automaattisesti poista tältä tilanteelta rangaistuslaukauksen perusteita. Jos rike tapahtui takaapäin ja pelaajalta riistettiin rikkeellä parempi kohtuullinen maalintekomahdollisuus, silloin rangaistuslaukaus pitäisi edelleen tuomita; (IV) Kiekkoa hallussa pitävällä ja hallitsevalla pelaajalla (tai pelaajalla, joka selvästi olisi saanut kiekon haltuunsa ja hallintaansa) ei saa olla yhtään vastustajaa itsensä ja maalivahdin välissä. Jos päätuomarin mielestä pelaaja osuu ensin kiekkoon ja sen jälkeen kaataa vastustajan, rangaistuslaukausta ei tuomita, mutta pieni rangaistus kampituksesta tuomitaan. On huomattava, että jos hyökkäävä pelaaja onnistuu pääsemään maalivahdin ohitse eikä hänellä ole yhtään puolustavan joukkueen pelaajaa itsensä ja vartioimattoman maalin välissä, ja maalivahti tai joku muu OSA 7 – RAJOITTAVAT RIKKEET puolustava pelaaja rikkoo häntä takaapäin, maalia ei silti tuomita, koska maalivahti on yhä jäällä. Tilanteesta tuomitaan rangaistuslaukaus."},{"id":"54.4","title":"TUOMITUT MAALIT","content":"Jos vastustaja joukkue on ottanut maalivahdin pois jäältä, ja puolueettomalla tai hyökkäysalueella olevaa kiekkoa hallitsevaa pelaajaa (tai pelaajaa, joka olisi voinut saanut kiekon haltuunsa ja hallintaansa), jolla ei ole vastustajia itsensä ja vartioimattoman maalin välissä, rikotaan ja täten estetään kohtuullinen maalintekotilanne, päätuomarin pitää välittömästi katkaista peli ja tuomita maali hyökkäävän joukkueen hyväksi."}]},"55":{"number":"55","title":"KOUKKAAMINEN","sections":[{"id":"55.1","title":"KOUKKAAMINEN","content":"Koukkaaminen on teko, jossa pelaaja käyttää mailaansa rajoittaakseen vastustajan liikettä. Jos maila osuu vastustajan käsiin tai niiden lähelle, teko rangaistaan koukkaamisena. Kun pelaaja pelaa tai karvaa vastustajaa siten, että kyseessä on vain maila-maila-kontakti, ei tällaista tilannetta rangaista koukkaamisena."},{"id":"55.2","title":"PIENI RANGAISTUS","content":"Pieni rangaistus tuomitaan pelaajalle, joka haittaa vastustajan etenemistä koukkaamalla tätä mailallaan. Pieni rangaistus koukkaamisesta tuomitaan pelaajalle, joka käyttää mailansa varren yläkäden yläpuoleista osaa pitääkseen kiinni tai koukatakseen vastustajaa."},{"id":"55.3","title":"ISO RANGAISTUS + PELIRANGAISTUS","content":"Päätuomari voi oman harkintansa mukaan tuomita ison rangaistuksen pelaajalle, joka syyllistyy vastustajan koukkaamiseen, ja joka piittaamattomasti vaarantaa vastustajaa siten, että päätuomarin harkinnan mukaan tällaista pelaajaa ei riittävästi rangaista tuomitsemalla pieni rangaistus."},{"id":"55.4","title":"RANGAISTUSLAUKAUS","content":"Tämä sääntö on identtisesti kuvattu kohdassa → Sääntö 54.3 (Varusteen heittäminen /Rangaistuslaukaus)"},{"id":"55.5","title":"TUOMITUT MAALIT","content":"Tämä sääntö on identtisesti kuvattu kohdassa → Sääntö 54.4 (Varusteen heittäminen / Tuomitut maalit) 110 JÄÄKIEKON SÄÄNTÖKIRJA - SJL 2025-2026 OSA 7 – RAJOITTAVAT RIKKEET"}]},"56":{"number":"56","title":"ESTÄMINEN","sections":[{"id":"56.1","title":"ESTÄMINEN","content":"Pelaajan, joka estää tai pidättelee kiekotonta vastustajaa luistelemasta, vastaanottamasta syöttöä tai liikkumasta jäällä vapaasti, katsotaan syyllistyvän estämiseen. Sellaiseen pelaajaan kohdistuva myöhästynyt taklaus, jolla ei ole enää kiekko hallussaan tai hallinnassaan, on vastustajan piittaamatonta vaarantamista. Pelaajaa, joka on luopumassa kiekosta tai menettämässä kiekon hallussapidon tai kiekon hallinnan, voidaan taklata niin kauan, kun taklaaja on kiekollisen pelaajan välittömässä läheisyydessä. Estämisen suhteen on noudatettava tiukkaa tulkinnan tasoa kaukalon kaikilla alueilla. Vartaloasema: Vartaloasema määritellään, kun pelaaja luistelee vastustajan edessä tai rinnalla ja pelaajat luistelevat samaan suuntaan. Vastustajan takana oleva kiekoton pelaaja ei saa käyttää mailaansa, vartaloaan, tai vapaata kättään estääkseen vastustajaa, vaan pelaajan täytyy luistella saavuttaakseen tai palauttaakseen oikea asema voidakseen taklata vastustajaa. Pelaajan sallitaan hallita jään sitä aluetta, jolla hän on (vartaloasema) ja hänen ei tarvitse väistyä vastustajan tieltä. Pelaaja saa sulkea vastustajan kulkulinjan sillä edellytyksellä, että hän on vastustajan etupuolella ja etenee samaan suuntaan. Kontaktin ottaminen kiekottomaan vastustajaan siirtymällä sivuttain ilman, että pelaaja ensin vakiinnuttaa vartaloaseman, ei ole ei ole sallittua ja se pitää rangaista estämisenä. Pelaaja saa aina käyttää vartaloasemaansa, jotta vastustaja matka kiekkoon pitenisi sillä edellytyksellä, että pelaaja ei käytä mailaa apunaan (tehden itsestään isomman ja täten huomattavasti pidentäen vastustajan matkaa); eikä hän käytä vapaata kättään apuna eikä hän hyödynnä vartaloasemaansa suorittamalla muutoin sääntöjenvastaisen taklauksen. Kiekon hallussapito: Viimeisen kiekkoa pelanneen pelaajan, pois lukien maalivahti, katsotaan olevan kiekollinen pelaaja. Kiekollista pelaajaa saa sääntöjen puitteissa taklata edellyttäen, että taklaus tapahtuu välittömästi sen jälkeen, kun pelaaja on menettänyt kiekon hallustaan, ja että vastustaja on edelleen objektiivisesti kohtuullisessa tilaisuudessa suorittaa tällainen taklaus, kuten säännössä 56.4 (Estäminen) kuvataan. Rajoittaa: Sellaisen pelaajan tekoja, jolla ei ole vartaloasemaa, mutta joka sen sijaan käyttää sääntöjenvastaisia keinoja (esim. mailalla koukkaaminen, kiinnipitäminen käsin, mailalla kampittaminen tai muulla tavoin) kiekottoman vastustajan estämiseen. Sääntöjenvastaisilla keinoilla tarkoitetaan tekoja, joiden avulla pelaaja tai maalivahti voi hankkia, ylläpitää tai palauttaa vartaloaseman muulla tavalla kuin luistelemalla. Poimiminen: Poimiminen on teko, jossa pelaaja taklaa kiekotonta pelaajaa, ja joka on tietämätön tulevasta taklauksesta / iskusta. Poiminnan tekevä pelaaja tai maalivahti ei saa estää pelaajaa, vaikka tämä on tietoinen tulevasta iskusta, jos tilannetta ei pidetä sääntöjen mukaisena kamppailuna kiekosta. Poiminnan tekevä pelaaja on pelaaja, joka liikkuu vastustajan kulkulinjalle ilman, että hän ensin ottaa vartaloaseman, ja täten pelaa vastustajan ulos pelitilanteesta. Jos näin tehdään, tuomitaan rangaistus estämisestä. OSA 7 – RAJOITTAVAT RIKKEET Vapaa käsi: Kun pelaaja käyttää vapaata kättään vastustajan kiinnipitämiseen, vetämiseen, kiskomiseen, tarttumiseen tai vapaan liikkumisen rajoittamiseen, tämä täytyy rangaista kiinnipitämisenä. Pelaaja voi käyttää vapaata kättään vastustajan tai vastustajan mailan torjumiseen, mutta sitä ei saa käyttää vastustajan mailasta tai vartalosta kiinnipitämiseen. Maila: Pelaajalle, jolla ei ole vastustajaan nähden vartaloasemaa, ja joka käyttää mailaansa (joko lapaa tai vartta, mukaan lukien varren yläosa) haitatakseen tai estääkseen vastustajan vapaata liikettä jäällä, tuomitaan rangaistus koukkaamisesta. → Sääntö 55 (Koukkaaminen)"},{"id":"56.2","title":"PIENI RANGAISTUS","content":"Pieni rangaistus estämisestä tuomitaan: (I) Pelaajalle, joka häiritsee tai estää kiekottoman vastustajan etenemistä. (II) Pelaajalle, joka pidättelee karvausta tekevää vastustajaa. (III) Pelaajalle, joka tarkoituksellisesti taklaa vastustajaa, mukaan lukien maalivahti, joka ei ole kiekollinen, tai jota ei enää pidetä kiekollisena pelaajana (myöhästynyt taklaus). (IV) Pelaajalle, joka kiekotonta vastustajaa taklaamalla pakottaa vastustajan paitsioasemaan aiheuttaen pelikatkon. Jos teko aiheuttaa siirretyn paitsiotilanteen (eikä välttämättä pelikatkoa), silloin päätuomarin tulkinta vaikuttaa siihen, tuomitaanko rangaistusta estämistä. (V) Pelaajalle, joka tarkoituksellisesti lyö vastustajan mailan käsistä tai estää mailan tai jonkin muun varusteen pudottanutta vastustajaa saamasta sitä uudelleen itselleen. (VI) Pelaajalle, joka lyö tai laukaisee jonkin hylätyn tai rikkinäisen mailan tai sääntöjenvastaisen kiekon tai muun roskan kohti kiekollista vastustajaa siten, että tämä saattaisi häiriintyä. → Sääntö 53 (Varusteen heittäminen) (VII) Pelaajapenkillä tai rangaistusaitiossa olevalle tunnistetulle pelaajalle, joka mailallaan tai vartalollaan estää kiekon tai vastustajan liikkeitä jäällä pelitilanteessa. (VIII) Pelaajalle, joka on tulossa jäälle, ja joka pelaa kiekkoa, kun toinen tai molemmat luistimet ovat yhä pelaajapenkillä tai rangaistusaitiossa. Pelisääntöjen mukainen rangaistus pitää tuomita, kun pelaajapenkillä tai rangaistusaitiossa oleva(t) pelaaja(t) osallistuvat kontaktiin vastustajan kanssa pelikatkon aikana. Tähän osallistuva(t) pelaaja(t) saattaa(vat) olla täydentävien kurinpitotoimenpiteiden kohteena. → Sääntö 28 (Täydentävä kurinpito)"},{"id":"56.3","title":"JOUKKUERANGAISTUS","content":"Joukkuerangaistus tuomitaan, kun pelaajapenkillä tai rangaistusaitiossa oleva tunnistamaton pelaaja tai valmentaja tai joukkueen toimihenkilö estää mailallaan tai vartalollaan kiekon tai vastustajan liikkeitä jäällä pelitilanteessa."},{"id":"56.4","title":"ISO RANGAISTUS + PELIRANGAISTUS","content":"Päätuomari voi oman harkintansa mukaan tuomita ison rangaistuksen pelaajalle, joka päätuomarin tulkinnan mukaan piittaamattomasti vaarantaa vastustajaa estämisellä tai myöhästyneellä taklauksella. Tällaisen piittaamattoman vaarantamisen perusteena ovat rikkeen vakavuus, kontaktin vakavuus, väkivallan aste ja teon yleinen moitittavuus. 112"},{"id":"56.5","title":"RANGAISTUSLAUKAUS","content":"Jos puolueettomalla alueella tai hyökkäysalueella olevaa kiekollista pelaajaa, jolla ei ole muuta vastustajaa kuin maalivahti ohitettavanaan, estää jokin puolustavan joukkueen jäsenen, mukaan lukien valmentajan tai joukkueen toimihenkilön, heittämä tai laukaisema maila tai sen osa tai jokin muu esine tai varusteen osa, tuomitaan rangaistuslaukaus rikotun joukkueen hyväksi. Kun valmentaja tai ei-pelaava joukkueen toimihenkilö syyllistyy tällaiseen tekoon, hänelle tuomitaan pelirangaistus ja käsketään siirtyä pukuhuoneeseen. Tapaus raportoidaan asiaankuuluvalle elimelle kurinpitokäsittelyä varten."},{"id":"56.6","title":"TUOMITUT MAALIT","content":"Jos silloin kun joukkue on ottanut maalivahdin pois jäältä, joku tämän joukkueen sääntöjenvastaisesti jäällä oleva jäsen (mukaan lukien maalivahti) tai valmentaja tai joukkueen toimihenkilö estää vartalollaan, mailalla tai jollakin muulla esineellä tai varusteen osalla kiekon tai vastajoukkueen pelaajan liikettä puolueettomalla alueella tai hyökkäysalueella, päätuomarin pitää välittömästi katkaista peli ja tuomita maali ei-rikkoneen joukkueen hyväksi. Kun valmentaja tai joukkueen toimihenkilö syyllistyy tällaiseen tekoon, hänelle tuomitaan pelirangaistus, käsketään siirtyä pukuhuoneeseen ja asia raportoidaan asiaankuuluvalle elimelle kurinpitokäsittelyä varten."},{"id":"56.7","title":"KATSOJIEN AIHEUTTUMAT HÄIRIÖT","content":"Tuomariston täytyy raportoida asiaankuuluvalle elimelle kaikki yleisön aiheuttamat häiriötilanteet. (I) Jos yleisöstä heitetään esineitä jäälle ja pelitilanne vaarantuu, tuomaristo katkaisee pelin ja seuraava aloitus suoritetaan pelin katkaisupaikkaa lähinnä olevasta aloituspisteestä. (II) Jos katsoja pitää pelaajasta kiinni tai estää häntä, peli katkaistaan. Jos estetyn kenttäpelaajan joukkueella on kiekko hallussaan rikkeen tapahtumishetkellä, pelitilanne jatkuu, kunnes vastajoukkue saa kiekon haltuunsa."}]},"57":{"number":"57","title":"KAMPITUS","sections":[{"id":"57.1","title":"KAMPITUS","content":"Pelaaja ei saa asettaa mailaansa tai mitään vartalonsa osaa siten, että aiheuttaa vastustajan kompastumisen tai kaatumisen. Tahattomasta kampituksesta, joka tapahtuu samanaikaisesti pelisuorituksen päättymisen kanssa, ei rangaista. Tahattomasta kampituksesta, joka tapahtuu samanaikaisesti pelin katkeamisen yhteydessä tai pelikatkolla, ei rangaista."},{"id":"57.2","title":"PIENI RANGAISTUS","content":"Päätuomarin pitää oman harkintansa mukaan tuomita teon vakavuuden perusteella pieni rangaistus pelaajalle, joka asettaa/asemoi mailaansa tai mitään vartalonsa osaa siten, että se aiheuttaa vastustajan kompastumisen tai kaatumisen."},{"id":"57.3","title":"ISO RANGAISTUS + PELIRANGAISTUS","content":"Päätuomari voi oman harkintansa mukaan ison rangaistuksen ja pelirangaistuksen pelaajalle, jos päätuomarin tulkinnan mukaan pelaaja todennäköisesti vahingoitti vastustajaa kampittamalla. OSA 7 – RAJOITTAVAT RIKKEET Huomautus: Jos päätuomari luokittelee tehdyn rikkeen vakavaksi ja ankaraksi käytetyn voiman, väkivallan ja piittaamattoman vaarantamisen perusteella, hänen pitää tuomita iso rangaistus ja pelirangaistus. Tämän tulkinnan pohjalta voidaan tuomita iso rangaistus ja pelirangaistus, vaikka rike ei aiheuttaisi loukkaantumista."},{"id":"57.6","title":"RANGAISTUSLAUKAUS","content":"Kun puolueettomalla tai hyökkäysalueella olevaa kiekkoa hallitsevaa pelaajaa (tai sitä pelaajaa, joka olisi voinut saada kiekon haltuunsa ja hallintaansa), jolla ei ole muita vastustajia ohitettavaan kuin maalivahti, kampitetaan tai muutoin rikotaan takaapäin ja täten estetään kohtuullinen maalintekotilanne, tuomitaan rangaistuslaukaus ei-rikkoneelle joukkueelle. Kuitenkaan päätuomarin ei pidä katkaista peliä ennen kuin hyökkäävä joukkue on menettänyt kiekon hallinnan puolustavalle joukkueelle. Tämän säännön tarkoituksena on palauttaa rikotulle joukkueelle kohtuullinen maalintekomahdollisuus, jonka sen menetti rikkeen myötä. Jos kuitenkin rikottu pelaaja pystyy palauttamaan ja saamaan kohtuullisen maalintekotilanteen (tai kanssapelaaja pystyy luomaan kohtuullisen maalintekotilanteen) ei rangaistuslaukausta tuomita, vaan rikkeen mukainen rangaistus ilmoitetaan ja tuomitaan, jos tilanteesta ei synny maalia. Kiekon hallinnalla tarkoitetaan kiekon liikuttamisesta mailalla, käsin tai jalkaterällä/jalan alaosalla. Jotta rangaistuslaukaus voidaan tuomita takaapäin rikotulle pelaajalle, täytyy seuraavat neljä (4) kriteeriä täyttyä: (I) Rike täytyy tapahtua puolueettomalla alueella tai hyökkäysalueella (toisin sanoen kiekkoa kuljettavan pelaajan on täytynyt ylittää oma siniviivansa); (II) Rike täytyy tapahtua takaapäin (paitsi, jos läpiajon yhteydessä maalivahti rikkoo edestäpäin); (III) Kiekkoa hallussa pitävältä ja hallitsevalta pelaajalta (tai pelaajalta, joka selvästi olisi saanut kiekon haltuunsa ja hallintaansa) estetään kohtuullinen maalintekotilanne. Se tosiseikka, että pelaaja onnistuu laukaisemaan, ei automaattisesti poista tältä tilanteelta rangaistuslaukauksen perusteita. Jos rike tapahtui takaapäin ja pelaajalta riistettiin rikkeellä parempi kohtuullinen maalintekomahdollisuus, silloin rangaistuslaukaus pitäisi edelleen tuomita; (IV) Kiekkoa hallussa pitävällä ja hallitsevalla pelaajalla (tai pelaajalla, joka selvästi olisi saanut kiekon haltuunsa ja hallintaansa) ei saa olla yhtään vastustajaa itsensä ja maalivahdin välissä. Jos päätuomarin mielestä pelaaja osuu ensin kiekkoon ja sen jälkeen kaataa vastustajan, rangaistuslaukausta ei tuomita, mutta pieni rangaistus kampituksesta tuomitaan. On huomattava, että jos hyökkäävä pelaaja onnistuu pääsemään maalivahdin ohitse eikä hänellä ole yhtään puolustavan joukkueen pelaajaa itsensä ja vartioimattoman maalin välissä, ja maalivahti tai joku muu puolustava pelaaja rikkoo häntä takaapäin, maalia ei silti tuomita, koska maalivahti on yhä jäällä. Tilanteesta tuomitaan rangaistuslaukaus."},{"id":"57.7","title":"TUOMITUT MAALIT","content":"Jos puolustava joukkue on ottanut maalivahdin pois jäältä ja puolueettomalla tai hyökkäysalueella olevaa kiekkoa hallitsevaa pelaajaa (tai pelaajaa, joka olisi voinut saanut kiekon haltuunsa ja hallintaansa), jolla ei ole vastustajia ohitettavaan itsensä ja vartioimattoman maalin välissä, kampitetaan tai muutoin rikotaan ja täten estetään kohtuullinen maalintekotilanne, päätuomarin pitää välittömästi katkaista peli ja tuomita maali hyökkäävän joukkueen hyväksi. 114 OSA 8 MAILARIKKEET OSA 8 – MAILARIKKEET OSA 8 – MAILARIKKEET"}]},"58":{"number":"58","title":"MAILAN PÄÄLLÄ LYÖMINEN","sections":[{"id":"58.1","title":"MAILAN PÄÄLLÄ LYÖMINEN","content":"Teko, jossa pelaaja käyttää ylemmän kätensä yläpuolista mailan varren osaa jollain tavoin vastustajan taklaamiseen tai iskee tai yrittää iskeä vastustajaa tällä varren osalla, tapahtuu kontaktia tai ei."},{"id":"58.2","title":"KAKSINKERTAINEN PIENI RANGAISTUS + KÄYTÖSRANGAISTUS","content":"Päätuomarin pitää oman harkintansa mukaan tuomita kaksinkertainen pieni rangaistus ja käytösrangaistus pelaajalle, joka yrittää iskeä/lyödä mailan päällä vastustajaa."},{"id":"58.3","title":"ISO RANGAISTUS + PELIRANGAISTUS","content":"Päätuomari pitää oman harkintansa mukaan tuomita iso rangaistus ja pelirangaistus pelaajalle, joka lyö mailan päällä vastustajaa."}]},"59":{"number":"59","title":"POIKITTAINEN MAILA","sections":[{"id":"59.1","title":"POIKITTAINEN MAILA","content":"Teko, jossa käsien välisellä mailan varren osalla taklataan voimakkaasti vastustajaa."},{"id":"59.2","title":"PIENI RANGAISTUS","content":"Päätuomarin pitää oman harkintansa mukaan tuomita pieni rangaistus pelaajalle, joka taklaa poikittaisella mailalla vastustajaa, teon vakavuus määräytyy taklauksen voiman ja väkivallan asteesta."},{"id":"59.3","title":"ISO RANGAISTUS + PELIRANGAISTUS","content":"Päätuomari voi oman harkintansa mukaan tuomita ison rangaistuksen ja pelirangaistuksen pelaajalle, joka päätuomarin tulkinnan mukaan piittaamattomasti vaarantaa vastustajaa taklaamalla tätä poikittaisella mailalla. Tällaisen piittaamattoman vaarantamisen perusteena ovat rikkeen vakavuus, kontaktin vakavuus, väkivallan aste ja teon yleinen moitittavuus."}]},"60":{"number":"60","title":"KORKEA MAILA","sections":[{"id":"60.1","title":"KORKEA MAILA","content":"Korkea maila on teko, jossa mailaa pidetään vastustajan hartiatason yläpuolella ja osuu jollain sen osalla vastustajaan, kun vastustaja on ns. normaalissa peliasennossa. Pelaajien täytyy hallita ja olla vastuussa mailastaan. Pelaajaan, joka kiekkoa laukaistessaan tai syöttäessään joko laukaisuliikkeen taakse viennissä tai laukaisun saatossa osuu mailansa millä tahansa osalla vastustajan hartialinjan yläpuolelle, on sovellettavissa korkean mailan rangaistukset."},{"id":"60.2","title":"PIENI RANGAISTUS","content":"116 Kaikenlainen kontakti mailalla vastustajan hartialinjan yläpuolelle on kielletty ja tilanteesta tuomitaan pieni rangaistus."},{"id":"60.3","title":"KAKSINKERTAINEN PIENI RANGAISTUS","content":"Pelaajalle, joka tahattomalla korkean mailan rikkeellä aiheuttaa vastustajalle vahinkoa normaalissa pelitilanteessa (kiekollinen), tuomitaan kaksinkertainen pieni rangaistus. Tällaisen rangaistuksen tuomitsevilla päätuomareilla on mahdollisuus (mutta ei velvollisuus) tarkistaa pelitilanne videolta, jotta he vahvistavat tai eivät vahvista alkuperäisen jäällä tehdyn tuomion, ja erityisesti sen, oliko kyseisen loukkaantumisen aiheuttanut maila rangaistun pelaajan maila. Korkean mailan videotarkistus kaksinkertaisen pienen rangaistuksen osalta.→ Sääntö 18.4 (Videotarkistus, kaksinkertainen pieni rangaistus, korkea maila)"},{"id":"60.4","title":"ISO RANGAISTUS + PELIRANGAISTUS","content":"Päätuomari voi oman harkintansa mukaan tuomita ison rangaistuksen ja pelirangaistuksen pelaajalle, joka päätuomarin tulkinnan mukaan piittaamattomasti vaarantaa vastustajaa korkealla mailalla. Tällaisen piittaamattoman vaarantamisen perusteena ovat rikkeen vakavuus, kontaktin vakavuus, väkivallan aste ja teon yleinen moitittavuus."}]},"61":{"number":"61","title":"HUITOMINEN","sections":[{"id":"61.1","title":"HUITOMINEN","content":"Huitominen on teko, jossa pelaaja heiluttaa mailansa kohti vastustajaa riippumatta siitä, osuuko maila vai ei. Ei-aggressiivista mailahäirintää pelaajan housuihin tai säärisuojien etupuolelle ei pidä rangaista huitomisena. Kaikenlainen voimakas tai suuritehoinen lyönti mailalla vastustajan vartaloon, vastustajan mailaan tai vastustajan käsille tai niiden läheisyyteen, jolla ei tuomarin näkemyksen yritetä pelata kiekkoa, pitää rangaista huitomisena."},{"id":"61.2","title":"PIENI RANGAISTUS","content":"Päätuomarin pitää oman harkintansa mukaan tuomita pieni rangaistus pelaajalle, joka syyllistyy vastustajan huitomiseen, teon vakavuus määräytyy huitomisen voiman ja väkivallan asteesta."},{"id":"61.3","title":"ISO RANGAISTUS + PELIRANGAISTUS","content":"Päätuomari voi oman harkintansa mukaan tuomita ison rangaistuksen ja pelirangaistuksen pelaajalle, joka päätuomarin tulkinnan mukaan piittaamattomasti vaarantaa vastustajaa huitomalla. Tällaisen piittaamattoman vaarantamisen perusteena ovat rikkeen vakavuus, kontaktin vakavuus, väkivallan aste ja teon yleinen moitittavuus."},{"id":"61.6","title":"RANGAISTUSLAUKAUS","content":"Tämä sääntö on identtisesti kuvattu kohdassa → Sääntö 54.3 (Rangaistuslaukaus)"},{"id":"61.7","title":"TUOMITUT MAALIT","content":"Tämä sääntö on identtisesti kuvattu kohdassa → Sääntö 54.4 (Tuomitut maalit) OSA 8 – MAILARIKKEET JÄÄKIEKON SÄÄNTÖKIRJA - SJL 2025-2026 117"}]},"62":{"number":"62","title":"KEIHÄSTÄMINEN","sections":[{"id":"62.1","title":"KEIHÄSTÄMINEN","content":"Keihästäminen tarkoittaa vastustajan iskemistä mailan lavan kärjellä, tapahtuu kontaktia tai ei."},{"id":"62.2","title":"KAKSINKERTAINEN PIENI RANGAISTUS + KÄYTÖSRANGAISTUS","content":"Päätuomarin pitää oman harkintansa mukaan tuomita kaksinkertainen pieni rangaistus pelaajalle, joka yrittää keihästää vastustajaa."},{"id":"62.3","title":"ISO RANGAISTUS + PELIRANGAISTUS","content":"Päätuomari pitää oman harkintansa mukaan tuomita ison rangaistus ja pelirangaistus pelaajalle, joka keihästää vastustajaa. 118 OSA 9 MUUT RIKKEET OSA 9 – MUUT RIKKEET OSA 9 – MUUT RIKKEET"}]},"63":{"number":"63","title":"PELIN VIIVYTTÄMINEN","sections":[{"id":"63.1","title":"PELIN VIIVYTTÄMINEN","content":"Pelaajaa tai joukkuetta rangaistaan, jos se päätuomarin mielestä jollain tavoin viivyttää peliä."},{"id":"63.2","title":"PIENI RANGAISTUS","content":"Pieni rangaistus pelin viivyttämisestä tuomitaan: (I) Pelaajalle, mukaan lukien maalivahti, joka pitää kiinni, sulkee tai pelaa kiekkoa mailallaan, luistimillaan tai kehollaan siten, että tarkoituksellisesti aiheuttaa pelikatkon. Maalivahdin kohdalla tätä sääntöä sovelletaan maalialueen ulkopuolella. (II) Pelaajalle, joka tarkoituksellisesti laukaisee tai lyö (kädellä tai mailalla) kiekon pelialueen ulkopuolelle (mistäpäin jääaluetta tahansa) pelin käydessä tai pelin katkaisemisen jälkeen. (III) Pelaajalle, joka puolustusalueeltaan laukaisee tai lyö (kädellä tai mailalla) kiekon suoraan (ilman kontaktia) pelialueen ulkopuolelle, paitsi kohdasta, jossa ei ole suojalasia. Määräävänä tekijänä on kiekon asema silloin, kun rikkeen tehnyt pelaaja sen laukaisi tai löi. Jos kontakti kiekkoon tapahtuu, kun kiekko on puolustusalueella ja kiekko sen seurauksena menee ulos pelialueelta, tuomitaan pieni rangaistus. Kun kiekko laukaistaan pelaajapenkin takana olevan suojalasin yli, rangaistus tuomitaan. Huomautus: Kun kiekko laukaistaan pelaajapenkille, rangaistusta ei tuomita. Jos kiekko menee suoraan aloituksesta ulos pelialueelta, rangaistusta ei tuomita. (IV) Pelaajalle, joka viivyttää peliä tahallisesti siirtämällä maalin paikaltaan. Päätuomarin pitää katkaista peli välittömästi, kun rikkonut joukkue saa kiekon hallintaansa. Huomautus: Jos pelaaja tarkoituksellisesti siirtää maalin paikaltaan, kun vastustajalla on välitön maalintekotilanne vartioimattomaan maaliin, päätuomari voi tuomita maalin – katso → Sääntö 63.7 (Tuomitut maalit). (V) Muulle pelaajalle kuin maalivahdille, joka tarkoituksellisesti pudottautuu kiekon päälle tai haalii kiekon vartaloonsa. Huomautus: Pelaajaa, joka pudottautuu polvilleen peittäessään laukausta, ei rangaista, jos kiekko laukaistaan hänen alleen tai kiekko juuttuu kenttäpelaajan asuun tai varusteisiin, mutta kaikenlainen käsien käyttäminen kiekon pelaamisen estämiseksi pitää rangaista. (VI) Maalivahdille, joka tulee ulos maalialueeltaan yrittäessään saada kiekon ennen hyökkäävää pelaajaa ja sen sijaan, että pelaisi kiekkoa hän sulkee kiekon aiheuttaen pelikatkon. Huomautus: Jos maalivahti tulee ulos alueeltaan pienentääkseen laukaisukulmaa ja torjunnan jälkeen sulkee kiekon, tämä on sallittua. (VII) Maalivahdille, joka on omalla maalialueellaan ja joka tarkoituksellisesti pudottautuu kiekon päälle tai haalii sen vartaloonsa, tai joka pitää tai asettaa kiekon mitä tahansa maalin osaa vasten saadakseen pelikatkon aikaan, ellei vastustaja todellisuudessa paineista häntä. (VIII) Maalivahdille, joka pelaa kiekkoa maaliviivan takana maalivahdin rajatun alueen ulkopuolella. Määräävänä tekijänä on kiekon asema. Huomautus: Pientä rangaistusta ei tuomita, jos maalivahti pelaa kiekkoa ja hänellä on samanaikaisesti luistinkontakti maalialueeseen. (IX) Peliasun, varusteiden, luistinten tai mailojen säätämisestä. Huomautus: Rangaistusta ei tuomita, kun vesipullo toimitetaan maalivahdille, kuitenkin tämä tulisi suorittaa aikalisien aikana, ja jos päätuomarin näkemyksen mukaan tämä tehdään tarkoituksellisesti pelin viivyttämiseksi, pieni rangaistus tuomitaan. 120 (X) Mitään viivettä ei sallita maalivahdin varusteiden korjaamiseksi tai säätämiseksi. Jos maalivahti tarvitsee jotain säätöä varusteidensä osalta, hänen täytyy poistua jäältä ja hänen tilalleen tulee varamaalivahti. Tämän säännön rikkomisesta tuomitaan maalivahdille pieni rangaistus."},{"id":"63.3","title":"JOUKKUERANGAISTUS","content":"Joukkuerangaistus tuomitaan joukkueelle, joka päätuomarin kapteenille tai varakapteenille antaman varoituksen jälkeen ei aseta oikeaa määrää pelaajia jäälle ja aloita pelaamista, ei noudata päätuomarin ohjeita ja täten viivyttää peliä tekemällä lisävaihtoja (mukaan lukien, mutta ei rajoittuen maalivahtien jatkuva vaihtaminen pelin pysäyttämiseksi tai viivyttämiseksi), pitäen itsepintaisesti pelaajansa väärin sijoittuneena (väärällä puolella kenttää suhteessa aloituspaikkaan) tai millään muulla tavoin."},{"id":"63.4","title":"SIIRRETTY VIHELLYS","content":"Kun hyökkäävä pelaaja vahingossa siirtää maalin paikaltaan ja puolustavalla joukkueella on kiekon hallinta ja se on siirtymässä ulos omalta alueeltaan, pelin sallitaan jatkua, kunnes ei-rikkonut joukkue menettää kiekon hallinnan. Seuraava aloitus suoritetaan lähimmästä sen alueen aloituspisteestä, missä kiekko oli katkaisuhetkellä, ellei kyse ole ei-rikkoneen joukkueen puolustusalueesta, jolloin seuraava aloitus suoritetaan siniviivan ulkopuolelta lähimmästä puolueettoman alueen aloituspisteestä. On mahdollista tehdä maali kaukalon toisen kenttäpäädyn maaliin samalla, kun toisen kenttäpäädyn maali on pois paikaltaan, edellyttäen, että maali tehtiin sitä joukkuetta vastaan, joka oli vastuussa maalin siirtämisestä kaukalon toisessa päässä."},{"id":"63.5","title":"ESINEIDEN HEITTÄMINEN JÄÄLLE","content":"Jos jäälle heitetään esineitä, jotka häiritsevät peliä, päätuomari puhaltaa pilliin ja katkaisee pelin ja seuraava aloitus suoritetaan sen alueen lähimmästä aloituspisteestä, missä kiekko oli katkaisuhetkellä. Tapaus raportoidaan sarjan järjestäjälle."},{"id":"63.6","title":"RANGAISTUSLAUKAUS","content":"Jos varsinaista peliaikaa on liian vähän jäljellä tai aiemmin tuomittujen rangaistusten takia maalin tarkoituksellisesta siirtämisestä tuomittua pientä rangaistusta ei pystytä kärsimään kokonaan varsinaisen peliajan aikana tai milloin tahansa jatkoajalla, tuomitaan rangaistuslaukaus rikkonutta joukkuetta vastaan. Kukaan puolustavan joukkueen pelaaja, paitsi maalivahti, ei saa pudottautua kiekon päälle, sulkea kiekkoa, poimia kiekkoa tai haalia kiekkoa vartaloonsa tai käteensä, kun kiekko on maalialueella. Tämän säännön rikkomisesta peli pitää välittömästi katkaista ja tuomita rangaistuslaukaus rikkonutta joukkuetta vastaan, mutta muuta rangaistusta ei tuomita. Sääntöä on tulkittava siten, että rangaistuslaukaus tuomitaan vain, kun kiekko on maalialueella rikkeen tekohetkellä. Kuitenkin tilanteissa, joissa kiekko on maalialueen ulkopuolella, Sääntö 63 saattaa silti olla sovellettavissa ja pieni ran
