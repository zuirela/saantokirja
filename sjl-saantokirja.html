 Rintakehän sivureunan kerrostaminen on sallittua kylkiluiden suojan lisäämiseksi, mutta suojusten paksuus ei saa ylittää rintaosan suojien paksuutta ja edelleen kylkien muodon täytyy mukailla pelaajan vartalon muotoa. Jos maalivahdin kyykistyessä normaaliin torjunta-asentoon suojukset tai olkakuppi työntyvät hartialinjan yläpuolelle, rintasuojus luokitellaan sääntöjen vastaiseksi. Jos jokin rinta- ja käsivarsisuojus on suoritetussa mittauksessa todettu liian isoksi, katsotaan kyseisen maalivahdin kohdalla laittomaksi varusteeksi, on se sitten aiempien varusterajojen kohdalla ollut hyväksytty tai ei. → Lisätietoja: Liite VI – Infografiikka."},{"id":"11.4","title":"HOUSUT","content":"Maalivahdin käyttämät housut täytyy anatomian ja koon suhteen olla yksilölliset kyseisen maalivahdin fyysisten ominaisuuksien perusteella. Housun lahkeisiin tai vyötärölle ei sallita mitään sisäisiä tai ulkoisia toppauksia lisäsuojauksen saamiseksi (ts. ei kohokkeita sisäpuolelle tai ulkopuolelle). Jos maalivahti pitää kuorihousuja väljästi, jolloin hänen kyykistyessään torjunta-asentoon jalkojen ja suojusten välinen rako peittyy, kuorihousut ovat tällöin sääntöjen vastaiset. Housujen sisäpuolisten reisisuojusten täytyy seurata säären muotoja. Levymäiset reisisuojukset eivät ole sallittuja. Jos jotkut housut on mittauksessa todettu sääntöjen vastaisiksi, katsotaan ne kyseisen maalivahdin kohdalla laittomaksi varusteeksi, on ne sitten aiempien varusterajojen kohdalla hyväksytty tai ei. → Lisätietoja: Liite VI – Infografiikka."},{"id":"11.5","title":"POLVISUOJUKSET","content":"Polvisuojus täytyy pitää kiinnitettynä ja sen täytyy mahtua housujen reisisuojan alle. Maalivahdin säärisuojuksen sisäpuolelle polven yläpuolelle kiinnitetyt läpät ovat kiellettyjä, jos niitä ei pidetä housujen reisisuojan alla. Polven hihnapehmuste on suojus, joka erottaa polven sisäsyrjän jäästä. Polvisuojuksen nauha täytyy kiinnittää niin kireälle, ettei suojus peitä yhtään jalkojen välistä aluetta tai ”vitosaukkoa”. Tämä mittausnormi ei vaikuta polven hihnapehmusteen ja polven sisäsuojan väliseen pehmustukseen. Pitkittäiset poimut (punotut saumakohokkeet) eivät ole sallittuja. → Lisätietoja: Liite VI – Infografiikka."},{"id":"11.6","title":"KIINNIOTTOKÄSINE","content":"Suurin sallittu ympärysmitta on 114,5 cm (45 tuumaa). Kiinniottokäsineen ympärysmitta on reunoja pitkin mitattu etäisyys. 54 Ranneke on oltava 10,5 cm (4 tuumaa) leveä. Ranneke on käsineen osuus, joka suojaa rannetta siitä kohdasta, jossa peukalon nivel yhdistyy ranteeseen. Kaikkea suojusta, joka yhdistää / korostaa ranneketta käsiosaan, pidetään ennemmin käsineen osana kuin rannekkeen osana. Ranneke saa olla enintään 20,5 cm (8 tuumaa) pitkä (tämä sisältää siteet). Kaikki mitat mitataan rannekkeen muotoa seuraten. Etäisyys käsineen tyvestä pussin sisäpintaa pitkin mitattuna T-osan yläosaan asti ei saa ylittää 46,0 cm (18 tuumaa). Tyvi on kohta, missä rannekkeen suora osa kohtaa käsineen. → Lisätietoja: Liite VI – Infografiikka."},{"id":"11.7","title":"KILPIKÄSINE","content":"Kilpikäsineen on oltava suorakaiteen muotoinen. Peukaloa ja rannetta suojaavan läpän täytyy olla kiinnitettynä kilpikäsineeseen ja mukailla peukalon ja ranteen muotoja. Missään kohtaa kilpikäsineessä ei sallita kohotettuja harjanteita. Maalivahdin kilpikäsineen selkäpuolelle kiinnitettyjen tai käsineen muodostavien suojatoppausten ulkomitat eivät saa missään kohdin (tämä sisältää siteet) ylittää 20,5 cm (8 tuumaa) leveydessä eikä 38,5 cm (15 tuumaa) pituudessa. Kaikki mitat mitataan rannekkeen selkäosan muotoa seuraten. Peukalon suoja ei saa ylittää 18,0 cm (7 tuumaa) mitattuna kilven pinnasta suojan uloimpaan kohtaan. → Lisätietoja: Liite VI – Infografiikka."},{"id":"11.8","title":"KASVOSUOJUKSET","content":"Maalivahtien on käytettävä kasvosuojusta aina pelitilanteen aikana. Maalivahtien täytyy käyttää IIHF:n hyväksymää kasvosuojusmallia. Kasvosuojus, jonka tarkoitus on vain lisätä torjunta-alaa, tulkitaan sääntöjen vastaiseksi. Kasvosuojus on valmistettava siten, ettei kiekko mene sen aukoista läpi. Maalivahti voi käyttää kasvosuojusta, jonka väritys ja malli eroavat kanssapelaajien käyttämästä. Varamaalivahdin ei tarvitse pitää kasvosuojusta pelaajapenkillä tai kun hän liikkuu kentän poikki palatakseen pelaajapenkille erätauon jälkeen. Naisten jääkiekossa, miesjuniorien U20- ja U18-sarjoissa sovelletaan erityissääntöjä ja ohjeita pää- / kasvosuojaukseen. → Sääntö 102 (Naisten jääkiekko – Erityissäännöt – Varusteet) → Sääntö 202 (Miesjuniorit – Erityissäännöt – Varusteet) → Lisätietoja: Liite VI – Infografiikka."},{"id":"11.9","title":"SJL:N SUORITTAMAT VARUSTETARKASTUKSET","content":"Maalivahdit eivät saa osallistu peliin sellaisilla varusteilla, jotka eivät ole näiden sääntöjen mukaisia. SJL:n suorittamat varustetarkastukset voivat tapahtua milloin tahansa ennen ottelua, sen aikana tai ottelun jälkeen. SJL:n edustajat voivat ottaa haltuunsa yhden tai kaikkien maalivahtien varusteita. Tällainen varuste voidaan poistaa suojattuun paikkaan mittausta varten. Sääntöjen vastaiset ja laittomat varusteet täytyy korjata ennen kuin niillä voi osallistua peliin tai käyttää edelleen. Jos sääntöjenvastaisuuksia ilmenee seurantatarkastuksissa, tilanteesta ilmoitetaan asiaankuuluvalle elimelle. OSA 3 – VARUSTEET Kieltäytyminen luovuttamasta varustetta SJL:lle mittausta varten johtaa samoihin seuraamuksiin kuin mitä maalivahdille tuomittaisiin sääntöjenvastaisesta varusteesta. 56 JÄÄKIEKON SÄÄNTÖKIRJA - SJL 2025-2026 OSA 3 – VARUSTEET"}]},"12":{"number":"12","title":"SÄÄNTÖJENVASTAINEN VARUSTE","sections":[{"id":"12.1","title":"SÄÄNTÖJENVASTAINEN VARUSTE - TOIMINTAOHJE – SUOJUSTEN PUUTTEELLINEN","content":"KÄYTTÄMINEN Kaikki suojukset käsineitä, kypärää, hammassuojia, niska-/kaulasuojusta ja maalivahdin patjoja lukuun ottamatta on pidettävä kokonaan peliasun alla. Tämän säännön rikkomisesta, päätuomarin antaman varoituksen jälkeen, tuomitaan pieni rangaistus. Ne pelaajat, jotka eivät noudata näitä määräyksiä, eivät saa osallistua peliin ennen kuin tällainen varuste on korjattu tai poistettu. SJL on käytössä poikkeussääntö, jonka nojalla kaulasuojus ja muut sääntöjen määrittelemät suojukset ovat jokaiselle pelaajalle pakollisia varusteita. Tämä sääntö koskee myös suojia, joista on poistettu osia tai niitä on modifioitu muulla sääntöjen kieltämällä tavalla. Sääntökirjaa tulkitaan kyseisten rikkeiden kohdalla seuraavasti: • Ottelutapahtumassa varusteen sääntöjen vastaisesta käytöstä seuraa ensin varoitus erotuomarilta, joka koskee kaikkia varusteita. • Varoitus annettaan koko joukkueelle kollektiivisesti: mikäli keneltä tahansa saman joukkueen pelaajalta suojus edelleen puuttuu tai hän käyttää sääntöjen vastaista varustetta, seuraa 2 minuutin rangaistus sääntöjen vastaisesta varusteesta. • Jos joku saman joukkueen pelaajista yrittää rangaistuksenkin jälkeen yhä pelata sääntöjen vastaisella varusteella, hänelle tuomitaan pelirangaistus (PR) ja asiasta toimitetaan raportti SJL kurinpitoon. • Kun joukkueen pelaajalle on tuomittu pelirangaistus (PR) tämän ohjeen mukaisesti, ei samassa ottelussa tuomita lisärangaistuksia sääntöjen vastaisista varusteista kyseiselle joukkueelle, mutta kaikki puutteet varusteiden suhteen kirjataan ylös pelirangaistuksesta tehtävään raporttiin. Jos varusteita tai niiden korjaamista käytetään pelin viivyttämiseen voidaan edelleen tulkita sääntöä pelin viivyttäminen: → Sääntö 63 (Pelin viivyttäminen)."},{"id":"12.2","title":"HANSKAT","content":"Hanska, josta koko kämmen tai osa kämmenestä on poistettu tai leikattu paljaan käden käytön mahdollistamiseksi, katsotaan sääntöjenvastaiseksi varusteeksi, ja jos joku pelaaja käyttää tällaista hanskaa pelissä, tuomitaan hänelle pieni rangaistus. Jos joukkue esittää valituksen tämän säännön perusteella ja tällainen valitus on aiheeton, tuomitaan valituksen tehneelle joukkueelle joukkuerangaistus pelin viivyttämisestä."},{"id":"12.3","title":"KYYNÄRPÄÄSUOJAT","content":"Kaikki kyynärpääsuojat, joissa ei ole uloimpana suojakerroksena vaahtokumia tai vastaavaa materiaalia vähintään 1,5 cm (½ tuumaa) paksuudelta, luokitellaan vaarallisiksi varusteiksi."},{"id":"12.4","title":"REILU PELI","content":"Nämä varusteita koskevat säännöt (osa 3) on laadittu reilun pelin hengessä. Aina kun SJL:n mielestä tätä säännön henkeä käytetään väärin, ristiriidassa olevan varusteen katsotaan olevan pelaamisen sopimaton."},{"id":"12.5","title":"SJL:N SUORITTAMAT VARUSTETARKASTUKSET","content":"OSA 3 – VARUSTEET SJL:n suorittamat varustetarkastukset voivat tapahtua milloin tahansa ennen ottelua, sen aikana tai ottelun jälkeen. SJL:n edustajat voivat ottaa haltuunsa kenenkä tahansa osallistuvan joukkueen pelaajan varusteita. Sääntöjen vastaiset ja laittomat varusteet täytyy korjata ennen kuin niillä voi osallistua peliin. Jos sääntöjenvastaisuuksia ilmenee seurantatarkastuksissa, tilanteesta ilmoitetaan asiaankuuluvalle elimelle. Kieltäytyminen luovuttamasta varustetta SJL:lle mittausta varten johtaa samoihin seuraamuksiin kuin mitä pelaajalle tuomittaisiin sääntöjenvastaisesta varusteesta."}]},"13":{"number":"13","title":"KIEKKO","sections":[{"id":"13.1","title":"MITAT","content":"Kiekko on valmistettava vulkanoidusta kumista tai muusta hyväksytystä materiaalista, 2,5 cm (1 tuuma) paksuksi ja 7,6 cm (3 tuumaa) korkeaksi sekä 156 – 170 g (5 ½ …6 unssia) painavaksi. IIHF:n täytyy hyväksyä kaikki kisoissa käytettävät kiekot. Kiekkoon painettu logo, tavaramerkki ja mainos eivät saa ylittää kiekon kummallakaan puolella halkaisijaltaan 4,5 cm (1¾ tuumaa) tai 35 % kiekon kyseisen puolen pinta-alasta. Kiekon molemmilla puolilla voi olla painatusta. → Lisätietoja: Liite VI – Infografiikka."},{"id":"13.2","title":"HANKINTA","content":"Kotijoukkueen vastuulla on tarjota riittävä määrä virallisia kiekkoja. Varakiekot pidetään rangaistusaitiossa toisen rangaistusaition valvojan tai erityisen toimitsijan hallussa."},{"id":"13.3","title":"SÄÄNTÖJENVASTAINEN KIEKKO","content":"Jos jossain vaiheessa pelin käydessä jäälle ilmaantuu muu kuin sääntöjen mukaisesti pelissä oleva kiekko, peliä ei katkaista ennen kuin sääntöjen mukaisen kiekon hallinta siirtyy toiselle joukkueelle."}]},"14":{"number":"14","title":"ASUN TAI VARUSTEIDEN SÄÄTÄMINEN","sections":[{"id":"14.1","title":"ASUN TAI VARUSTEIDEN SÄÄTÄMINEN","content":"Peliä ei katkaista eikä peliä viivytetä asun, varusteen, luistimen tai mailan säätämiseksi. Pelaaja on vastuussa asun ja varusteiden kunnossa pitämisestä. Jos tarvitaan säätämistä, niin pelaajan on poistuttava jäätä ja hänet korvataan toisella pelaajalla. Maalivahdin varusteiden korjaaminen tai säätäminen ei saa aiheuttaa viivytyksiä. Jos tarvitaan säätämistä, niin maalivahdin on poistuttava jäätä ja hänen paikkansa ottaa välittömästi varamaalivahti. OSA 4 – RANGAISTUSLAJIT OSA 4 RANGAISTUSLAJIT 60 OSA 4 – RANGAISTUSLAJIT"}]},"15":{"number":"15","title":"RANGAISTUKSIEN TUOMITSEMINEN","sections":[{"id":"15.1","title":"RANGAISTUKSEN TUOMITSEMINEN","content":"Jos pelaajan tai joukkueen toimihenkilön tekemä sääntörike edellyttää pienen rangaistuksen, joukkuerangaistuksen, ison rangaistuksen, käytösrangaistuksen tai pelirangaistuksen tuomitsemista, ja kyseisellä joukkueella on kiekko hallinnassaan, päätuomari puhaltaa välittömästi pilliinsä ja rankaisee rikkonutta pelaajaa tai joukkuetta. Jos pelaajan tai joukkueen toimihenkilön tekemä sääntörike edellyttää pienen rangaistuksen, joukkuerangaistuksen, ison rangaistuksen, käytösrangaistuksen, tai pelirangaistuksen tuomitsemista, mutta kiekko ei ole kyseisen joukkueen hallinnassa, päätuomari nostaa kätensä ylös siirretyn rangaistusvihellyksen merkiksi. Kun rangaistava joukkue saa kiekon hallintaansa, päätuomari puhaltaa pilliinsä ja rankaisee rikkonutta pelaajaa tai joukkuetta. Kun sääntörikkeen takia pelaaja, joukkueenjohtaja, valmentaja tai joukkueen toimihenkilö poistetaan ottelusta, hänen täytyy poistua pelaajapenkiltä eikä hän saa enää millään tavoin osallistua otteluun. Tällä tarkoitetaan myös joukkueen ohjaamista katsomosta tai radioviestintää hyödyntäen. Mahdollinen sääntöjen vastainen toiminta pitää raportoida asiaankuuluvalle elimelle."},{"id":"15.2","title":"PIENEN RANGAISTUKSEN TUOMITSEMINEN – MAALI SYNTYY","content":"Jos joukkueelle ollaan tuomitsemassa pientä rangaistusta ja ei-rikkonut joukkue tekee maalin, pientä rangaistusta ei tuomita, mutta iso rangaistus tuomitaan normaaliin tapaan, syntyi tilanteesta maali tai ei. Jos joukkueelle ollaan tuomitsemassa kahta (2) tai useampaa pientä rangaistusta ja ei-rikkonut joukkue tekee maalin, rikkoneen joukkueen kapteenin tulee valita ja kertoa päätuomarille, mikä rangaistus (tai mitkä rangaistukset) tuomitaan ja mitä rangaistusta ei tuomita syntyneen maalin takia."},{"id":"15.3","title":"KAKSINKERTAISEN PIENEN RANGAISTUKSEN TUOMISEMINEN – MAALI SYNTYY","content":"Kun rangaistuksen määräämiseen sovelletaan Sääntöä 58 (Mailan päällä lyöminen), Sääntöä 60 (Korkea maila) tai Sääntöä 62 (Keihästäminen) ja ei-rikkonut joukkue tekee maalin, rikkoneelle pelaajalle tuomitaan kahden (2) minuutin asianmukainen rangaistus. Rangaistus kuulutetaan kaksinkertaisena pienenä rangaistuksena asianmukaisesta rikkeestä, mutta pelaaja kärsii vain kaksi (2) minuuttia."},{"id":"15.4","title":"RANGAISTUKSEN TUOMITSEMINEN – VAJAALUKUINEN JOUKKUE – MAALI SYNTYY","content":"Kun joukkue on yhden tai useamman pienen rangaistuksen tai joukkuerangaistuksen takia vajaalukuinen ja päätuomari on tuomitsemassa lisää pienen rangaistuksen tai pieniä rangaistuksia vajaalukuiselle joukkueelle, ja ei-rikkonut joukkue tekee maalin ennen pelin katkaisua, tällöin maali hyväksytään. Siirrettynä rangaistusvihellyksenä ollut rangaistus tai rangaistukset tuomitaan ja vanhin kärsittävänä ollut pieni rangaistus päättyy automaattisesti Säännön 16 (Pienet rangaistukset) mukaisesti. Isot rangaistukset tuomitaan normaaliin tapaan, syntyi tilanteesta maali tai ei. Kun joukkueelle, joka on vajaalukuinen ison rangaistuksen takia, ollaan tuomitsemassa pientä rangaistusta tai joukkuerangaistusta, ja ei-rikkonut joukkue tekee maalin ennen kuin peli voidaan katkaista pienen tai joukkuerangaistuksen tuomitsemiseksi, siirrettynä rangaistusvihellyksenä ollutta pientä rangaistusta tai joukkuerangaistusta ei tuomita syntyneen maalin takia. Kun joukkuetta vastaan, joka on vajaalukuinen yhden tai useamman pienen rangaistuksen tai joukkuerangaistuksen takia, ollaan tuomitsemassa siirrettynä rangaistusvihellyksenä rangaistuslaukausta, ja ennen kuin päätuomari voi katkaista pelin rangaistuslaukauksen tuomitsemiseksi, ei-rikkonut joukkue tekee OSA 4 – RANGAISTUSLAJIT maalin, tällöin siirrettynä rangaistusvihellyksenä olleesta rikkeestä (josta olisi tuomittu rangaistuslaukaus) tuomitaan pieni rangaistus (kaksinkertainen pieni rangaistus tai iso rangaistus) ja vanhin kärsittävänä ollut pieni rangaistus päättyy automaattisesti. → Sääntö 16 (Pienet rangaistukset)"},{"id":"15.5","title":"ALOITUSPAIKAT","content":"Kun pelaajia rangaistaan pelikatkolla siten, että rangaistuskelloon merkitään yksi tai useampi rangaistus toiselle joukkueelle, suoritetaan seuraava aloitus toisesta rikkoneen joukkueen puolustusalueen aloituspisteestä. Tähän käytäntöön on vain kolme (3) poikkeusta: (I) Kun rangaistus määrätään maalin hyväksymisen jälkeen – aloitus suoritetaan keskipisteestä; (II) Kun rangaistus määrätään erän päättyessä (tai käynnistyessä) – aloitus suoritetaan keskipisteestä; (III) Kun puolustavaa joukkuetta ollaan rankaisemassa, ja hyökkäävän joukkueen pelaajat tulevat vihellyksen jälkeen hyökkäysalueellaan aloitusympyrän uloimman kaaren tason yli – aloitus suoritetaan lähimmästä puolueettoman alueen aloituspisteestä. → Sääntö 76 (Aloituspaikat)"}]},"16":{"number":"16","title":"PIENET RANGAISTUKSET","sections":[{"id":"16.1","title":"PIENI RANGAISTUS","content":"Pienestä rangaistuksesta muu pelaaja kuin maalivahti poistetaan jäältä kahdeksi (2) minuutiksi, jonka aikana korvaavaa pelaajaa ei sallita."},{"id":"16.2","title":"VAJAALUKUISUUS","content":"Vajaalukuisuudella tarkoitetaan, että joukkueella on vastajoukkuetta lukumääräisesti vähemmän pelaajia jäällä maalin syntyhetkellä. Se pieni rangaistus tai joukkuerangaistus, josta rangaistuskellossa on rangaistusaikaa vähiten jäljellä, päättyy automaattisesti. Täten kummallekin joukkueelle tuomitut samanaikaiset, toisensa kumoavat pienet rangaistukset eivät aiheuta kummallekaan joukkueelle vajaalukuisuutta – katso Sääntö 19 (Samanaikaiset rangaistukset). Jos joukkue on vajaalukuinen yhden tai useamman pienen rangaistuksen tai joukkuerangaistuksen takia, kun vastajoukkue tekee maaliin, päättyy automaattisesti vanhin tällaisista rangaistuksista. Tätä sääntöä sovelletaan myös, kun maali tuomitaan. Tätä sääntöä ei sovelleta, jos maali tehdään rangaistuslaukauksesta (toisin sanoen, rikkoneen joukkueen pelaajan rangaistus ei pääty, jos maali tehdään rangaistuslaukauksesta). Pienen rangaistuksen päättymisen kriteerit: (I) Tehtiinkö maali vajaalukuista joukkuetta vastaan? (II) Kärsikö vajaalukuinen joukkue pientä rangaistusta rangaistuskellossa? Jos molemmat kriteerit täyttyvät, niin rangaistuskellossa vähiten aikaa jäljellä oleva pieni rangaistus päättyy, ellei kyseessä ole samanaikainen, toisensa kumoava rangaistus. → Lisätietoja: Liite IV – Taulukoiden yleiskatsaus – Taulukko 14. Mikään rangaistus ei pääty, kun maali tehdään rangaistuslaukauksesta. Kun saman joukkueen kahden pelaajan pieni rangaistus päättyy samaan aikaan, niin kyseisen joukkueen kapteenin on nimettävä päätuomarille, kumpi pelaajista palaa ensin jäälle ja päätuomari ohjeistaa rangaistusajanottajaa sen mukaisesti. 62 JÄÄKIEKON SÄÄNTÖKIRJA - SJL 2025-2026 OSA 4 – RANGAISTUSLAJIT"}]},"17":{"number":"17","title":"JOUKKUERANGAISTUKSET","sections":[{"id":"17.1","title":"JOUKKUERANGAISTUS","content":"Joukkuerangaistuksesta rikkoneen joukkueen pelaaja poistetaan jäältä kahdeksi (2) minuutiksi. Kuka tahansa, valmentajan kapteenin välityksellä nimeämä pelaaja, paitsi maalivahti, voidaan määrätä kärsimään joukkuerangaistus ja kyseinen pelaaja siirtyy välittömästi rangaistusaitioon, ja kärsii rangaistuksen aivan kuin kyseessä olisi hänelle tuomittu pieni rangaistus."},{"id":"17.2","title":"VAJAALUKUISUUS","content":"Vajaalukuisuuden selitys: → Sääntö 16.2 (Vajaalukuisuus)"}]},"18":{"number":"18","title":"KAKSINKERTAISET PIENET RANGAISTUKSET","sections":[{"id":"18.1","title":"KAKSINKERTAINEN PIENI RANGAISTUS","content":"Kaksinkertaisesta pienestä rangaistuksesta, muu pelaaja kuin maalivahti, poistetaan jäältä neljäksi (4) minuutiksi, jonka aikana korvaavaa pelaajaa ei sallita."},{"id":"18.2","title":"VAJAALUKUISUUS","content":"Kun päätuomari on tuomitsemassa siirrettynä rangaistusvihellyksenä kaksinkertaista pientä rangaistusta, mutta ennen kuin peli katkaistaan, ei-rikkonut joukkue tekee maalin, toinen (1) pienistä rangaistuksista kumoutuu ja rangaistu pelaaja kärsii jäljellä olevat kaksi (2) minuuttia kaksikertaisesta pienestä rangaistuksestaan. Rangaistus kuulutetaan kaksinkertaisena pienenä rangaistuksena, mutta vain kaksi (2) minuuttia näytetään rangaistuskellossa. Vajaalukuisuuden selitys: → Sääntö 16.2 (Vajaalukuisuus)"},{"id":"18.4","title":"VIDEOTARKISTUS – KAKSINKERTAINEN PIENI RANGAISTUS, KORKEA MAILA","content":"Päätuomareilla on mahdollisuus tarkistaa videolta tilanne, jossa korkeasta mailasta tuomitaan kaksikertainen pieni rangaistus, jotta alkuperäinen jäällä tuomittu rangaistus joko 1. varmennetaan, 2. kumotaan tai 3. korotetaan, jolloin tuomitaan iso- ja pelirangaistus Tällaiset tarkistukset suorittavat yksinomaan jäällä olevat päätuomari(t) muuta tuomaristoa konsultoiden, käyttäen määrättyä ja annettua teknologiaa (esimerkiksi kannettava tabletti, televisio- tai tietokonemonitori). → Sääntö 38.5 (Tarkistamisprosessi) Videotuomariston ja jäällä olevan tuomariston välinen kommunikointi rajataan kyseisen videotuomarin ja päätuomarin väliseksi, jotta varmistetaan päätuomarin saavan kaiken sen videomateriaalin, mitä päätuomari saattaa pyytää, kuten myös kaikki tarkoituksenmukaiset kuvakulmat, jotta rangaistustuomion tarkistaminen on mahdollista. Tilanteessa ei saa olla muuta kontaktia tai konsultaatiota kuin jäällä olevan tuomariston ja videotuomariston välillä. Päätuomarilla on ainoastaan seuraavat vaihtoehdot oman tuomionsa videotarkistuksessa: OSA 4 – RANGAISTUSLAJIT (I) vahvistaa alkuperäinen rangaistus (kaksinkertainen pieni rangaistus); tai (II) kumota alkuperäinen rangaistus. (III) tuomita iso rangaistus ja pelirangaistus Huomautus: Tämä sääntö on voimassa vain Mestiksen, U20-SM ja Auroraliigan otteluissa, joissa on mahdollista saada kuva tuomarin ratkaistavaksi."}]},"19":{"number":"19","title":"SAMANAIKAISET RANGAISTUKSET","sections":[{"id":"19.1","title":"SAMANAIKAISET PIENET RANGAISTUKSET","content":"Kun kummankin joukkueen pelaajille tuomitaan samanaikaisia pieniä rangaistuksia tai samanaikaisia yhtä pitkiä pieniä rangaistuksia, rangaistujen pelaajien on mentävä rangaistusaitioihinsa ja tällaiset rangaistut pelaajat eivät saa lähteä rangaistusaitiosta ennen kuin kunkin rangaistuksen päättymisen jälkeisellä pelikatkolla. Jos rangaistujen pelaajien joukossa on maalivahti, katso → Sääntö 27.1 (Maalivahdin rangaistukset). Kunkin pelaajan, jolle on tuomittu samanaikaisia pieniä rangaistuksia tai samanaikaisia yhtä pitkiä pieniä rangaistuksia, kohdalla sallitaan välitön korvaava pelaaja jäälle eikä niillä ole vaikutusta mahdollisiin rangaistusten siirrettyihin alkamisaikoihin – katso Sääntö 26 (Rangaistusten siirretty alkamisaika). Kun kummallekin joukkueelle tuomitaan useita rangaistuksia samalla pelikatkolla, yhtä monta pientä rangaistusta ja yhtä monta isoa rangaistusta kumoutuu samanaikaisten rangaistuksien säännön perusteella, ja rangaistusaikojen erotus kärsitään normaaliin tapaan ja aika näkyy vastaavasti rangaistuskellossa – katso Sääntö 19.5 (Samanaikaisten rangaistusten soveltaminen). Jos rangaistusajoissa ei ole eroa, kaikki pelaajat kärsivät heille määrätyn rangaistusajan, mutta he eivät voi palata jäälle ennen kuin kunkin pelaajan rangaistuksen päättymisen jälkeisellä pelikatkolla. Samanaikaiset rangaistukset, jotka jatkuvat tai tuomitaan jatkoajalla, katso → Sääntö 84 (Jatkoajan toiminnot). Yhteenveto samanaikaisista rangaistuksista – katso yksittäisistä sääntökohdista täydelliset kuvaukset. → Lisätietoja: Liite IV – Taulukoiden yleiskatsaus – Taulukot 17 ja 18."},{"id":"19.2","title":"SAMANAIKAISET ISOT RANGAISTUKSET","content":"Kun kummankin joukkueen pelaajille tuomitaan samanaikaisia isoja rangaistuksia tai samanaikaisia yhtä pitkiä rangaistuksia, rangaistujen pelaajien tai heidän sijaistensa on mentävä rangaistusaitioihinsa ja tällaiset rangaistut pelaajat eivät saa lähteä rangaistusaitiosta ennen kuin kunkin rangaistuksen päättymisen jälkeisellä pelikatkolla. Kunkin pelaajan, jolle on tuomittu samanaikaisia isoja rangaistuksia tai samanaikaisia yhtä pitkiä rangaistuksia, kohdalla sallitaan välitön korvaava pelaaja jäälle eikä niillä ole vaikutusta mahdollisiin rangaistusten siirrettyihin alkamisaikoihin. → Sääntö 26 (Rangaistusten siirretty alkamisaika). Tilanteissa, joissa yhdelle tai molemmille pelaajille tuomitaan pelirangaistus ison rangaistuksen lisäksi, joukkueen ei tarvitse asettaa sijaista rangaistusaitioon. → Sääntö 26 (Rangaistusten siirretty alkamisaika)."},{"id":"19.3","title":"VIIMEISET VIISI MINUUTTIA JA JATKOAIKA","content":"64 Kun samalla pelikatkolla, varsinaisen peliajan viimeisen viiden (5) minuutin tai milloin tahansa jatkoajan aikana, tuomitaan yhdelle A-joukkueen pelaajalle pieni rangaistus (tai kaksikertainen pieni rangaistus) ja yhdelle B-joukkueen pelaajalle iso rangaistus, kärsitään rangaistusten erotus (3 minuuttia tai 1 minuutti) välittömästi ison rangaistuksen tapaan. Tätä sovelletaan myös, kun samanaikaisia rangaistuksia on ”kumoutuu” ja yllä mainitut esimerkit jäävät jäljelle. Joukkueen täytyy asettaa välittömästi rangaistu pelaaja tai sijainen rangaistusaitioon. Rangaistusaikojen erotus kolme (3) minuuttia tai yksi (1) minuutti (tilanteen mukaan) asetetaan rangaistuskelloon ja tämä kärsitään ison rangaistuksen tapaan. Tätä sääntöä sovelletaan riippumatta siitä, mikä on joukkueiden pelaajavahvuus jäällä rangaistusten tuomitsemishetkellä."},{"id":"19.4","title":"SAMANAIKAISTEN RANGAISTUSTEN -SÄÄNNÖN SOVELTAMINEN","content":"Kun rangaistuksia määrätään kummallekin joukkueelle samalla pelikatkolla, päätuomarin tulee hyödyntää seuraavia sääntöjä kummankin joukkueen pelaajavahvuuteen jäällä: (I) Kumoa niin monta isoa rangaistusta kuin mahdollista; (II) Kumoa niin monta pientä rangaistusta, joukkuerangaistusta tai kaksinkertaista pientä rangaistusta kuin mahdollista Yhteenveto samanaikaisista rangaistuksista – katso yksittäisistä sääntökohdista täydelliset kuvaukset. → Lisätietoja: Liite IV – Taulukoiden yleiskatsaus – Taulukot 15."}]},"20":{"number":"20","title":"ISOT RANGAISTUKSET","sections":[{"id":"20.1","title":"ISO RANGAISTUS","content":"Iso rangaistus tuomitaan mille tahansa pelaajalle, joka tekee fyysisen rikkeen ja joka piittaamattomasti vaarantaa rikottua pelaajaa siten, että päätuomarin harkinnan mukaan pieni rangaistus tai kaksinkertainen pieni rangaistus ei olisi riittävä rangaistus kyseiselle pelaajalle. Tällaisen piittaamattoman vaarantamisen perusteena ovat rikkeen vakavuus, kontaktin vakavuus, väkivallan aste ja teon yleinen moitittavuus. Kun yhdelle pelaajalle tuomitaan samanaikaisesti sekä pieni rangaistus että iso rangaistus, rangaistun pelaaja sijainen (tai maalivahdin sijainen) kärsii ensin ison rangaistuksen paitsi, jos sovelletaan → Sääntöä 19.2. (Samanaikaiset isot rangaistukset), tällöin pieni rangaistus kirjataan ja kärsitään ensin."},{"id":"20.2","title":"VAJAALUKUISUUS","content":"Vaikka iso rangaistus aiheuttaa joukkueen vajaalukuisuuden, isoa rangaistusta kärsivän pelaajan sijainen ei pääse pois rangaistusaitiosta, jos vastajoukkue tekee maalin. Pelaajan on kärsittävä iso rangaistus kokonaan ennen kuin hän pääsee pois rangaistusaitiosta."},{"id":"20.3","title":"SIJAINEN","content":"Kun pelaajalle tuomitaan iso rangaistus ja hänet on poistettu pelistä, rikkoneen joukkueen täytyy välittömästi asettaa rangaistuspenkille sijainen. Tällainen sijainen voi laillisesti palata peliin, kun iso rangaistus on päättynyt. Jos pelaajalle on ison rangaistuksen lisäksi tuomittu myös rangaistuskellossa kärsittäviä pieniä rangaistuksia, rikkoneen joukkueen täytyy välittömästi asettaa rangaistuspenkille sijainen."},{"id":"20.4","title":"AUTOMAATTINEN PELIRANGAISTUS","content":"Kenelle tahansa pelaajalle tuomitaan automaattinen pelirangaistus, kun pelaajalle tuomitaan iso rangaistus tai samassa ottelussa toinen käytösrangaistus. OSA 4 – RANGAISTUSLAJIT Kun pelaajalle tuomitaan iso rangaistus ja automaattinen pelirangaistus, pelaaja poistetaan pelistä sen loppuajaksi, mutta pelaaja voidaan korvata toisella pelaajalla viiden (5) minuutin jälkeen. → Lisätietoja: Liite IV – Taulukoiden yleiskatsaus – Taulukot 6."},{"id":"20.6","title":"VIDEOTARKISTUS – ISOT RANGAISTUKSET","content":"Päätuomarin tulee aina tarkistaa videolta tilanne, josta tuomitaan iso rangaistus (muusta syystä kuin tappelusta), jotta alkuperäinen jäällä tuomittu rangaistus varmennetaan (tai muutetaan). Tällaiset tarkistukset suorittavat yksinomaan jäällä olevat päätuomari(t) muuta tuomaristoa konsultoiden, käyttäen määrättyä ja annettua teknologiaa (esimerkiksi kannettava tabletti, televisio- tai tietokonemonitori). → Sääntö 38.5 (Tarkistamisprosessi) Videotuomariston ja jäällä olevan tuomariston välinen kommunikointi rajataan kyseisen videotuomarin ja päätuomarin väliseksi, jotta varmistetaan päätuomarin saavan kaiken videomateriaalin, mitä päätuomari saattaa pyytää, kuten myös kaikki tarkoituksenmukaiset kuvakulmat, jotta rangaistustuomion tarkistaminen on mahdollista. Tilanteessa ei saa olla muuta kontaktia tai konsultaatiota kuin jäällä olevan tuomariston ja videotuomariston välillä. Päätuomarilla on ainoastaan seuraavat vaihtoehdot oman tuomionsa videotarkistuksessa: (I) vahvistaa alkuperäinen rangaistus (iso rangaistus); tai (II) tuomita samasta syystä pienempi/vähäisempi rangaistus. (III) Kumota alkuperäinen iso rangaistus kokonaan. Huomautus: Tämä sääntö on voimassa vain Mestiksen, Naisten Liigan ja U20-SM sarjojen otteluissa, joissa on mahdollista saada kuva tuomarin ratkaistavaksi."},{"id":"20.7","title":"RAPORTIT","content":"Päätuomarin täytyy välittömästi ottelun jälkeen raportoida asiaankuuluvalle elimelle kaikki tuomitut isot rangaistukset ja niihin liittyvät olosuhteet."}]},"21":{"number":"21","title":"VAARALLISET TEOT","sections":[{"id":"21.1","title":"ISO RANGAISTUS JA AUTOMAATTINEN PELIRANGAISTUS","content":"Iso rangaistus ja automaattinen pelirangaistus määrätään pelaajalle, joka tekee minkä tahansa teon, jota ei ole määritelty pelisäännöissä ja erotuomarin harkinnan mukaan tämä teko vaarantaa kenen tahansa peliin osallistuvan henkilön turvallisuutta."}]},"22":{"number":"22","title":"KÄYTÖSRANGAISTUKSET","sections":[{"id":"22.1","title":"KÄYTÖSRANGAISTUS","content":"Käytösrangaistuksesta muu pelaaja kuin maalivahti poistetaan jäältä kymmeneksi (10) minuutiksi. Korvaava pelaaja sallitaan jäälle välittömästi käytösrangaistusta kärsivän pelaajan tilalle. Pelaajan, jonka käytös- rangaistus on päättynyt, täytyy odottaa rangaistusaitiossa rangaistuksen päättymistä seuraavaan pelikatkoon. Kenelle tahansa pelaajalle tuomitaan automaattinen pelirangaistus, kun pelaajalle tuomitaan samassa ottelussa toinen (2.) käytösrangaistus. 66"},{"id":"22.2","title":"KÄYTÖSRANGAISTUS – MAALIVAHTI","content":"Jos maalivahdille tuomitaan käytösrangaistus, kärsii rangaistuksen joku toinen pelin katkaisuhetkellä jäällä ollut pelaaja. Tämän kenttäpelaajan nimeää rikkoneen joukkueen valmentaja kapteenin välityksellä."},{"id":"22.3","title":"VAJAALUKUISUUS","content":"Käytösrangaistuksen saanut pelaaja ei aiheuta joukkueelleen vajaalukuisuutta, ellei kyseiselle pelaajalle tuomita myös pientä rangaistusta, isoa rangaistusta + pelirangaistusta käytösrangaistuksen lisäksi. Kun pelaajalle tuomitaan samanaikaisesti pieni rangaistus ja käytösrangaistus, rangaistun joukkueen täytyy välittömästi asettaa rangaistusaitioon sijainen, joka kärsii pienen rangaistuksen ilman vaihtoa. Jos vastajoukkue tekee maalin pienen rangaistuksen kärsimisen aikana, päättyy pieni rangaistus (jollei sovelleta → Sääntö 15.4 Rangaistuksen tuomitseminen – vajaalukuinen joukkue – maali syntyy ja alkuperäisen käytösrangaistuksen saaneen pelaajan käytösrangaistus alkaa välittömästi."}]},"23":{"number":"23","title":"PELIRANGAISTUKSET","sections":[{"id":"23.1","title":"PELIRANGAISTUS","content":"Pelirangaistuksesta pelaaja poistetaan jäältä ottelun loppuajaksi, mutta korvaava pelaaja sallitaan jäälle välittömästi pelistä poistetun pelaajan tilalle. Pelirangaistus kirjataan pöytäkirjaan 20 minuutin rangaistuksena rikkoneen pelaajan nimiin."},{"id":"23.2","title":"KURINPITOTOIMENPITEET","content":"Pelirangaistuksen saaneen pelaajan, valmentajan tai muun joukkueen toimihenkilön osalta tapaus raportoidaan asiaankuuluvalle elimelle, jolla on täysi valta tuomita lisäkurinpitorangaistuksia rangaistulle henkilölle. → Sääntö 28 (Täydentävä kurinpito)"},{"id":"23.7","title":"AUTOMAATTINEN PELIRANGAISTUS","content":"Tuomitaan aina ison rangaistuksen lisäksi ja pelaajan saadessa toisen 10 min käytösrangaistuksen saman ottelun aikana. Selitykset → Sääntö 20.4 (Automaattinen pelirangaistus)"}]},"24":{"number":"24","title":"RANGAISTUSLAUKAUS","sections":[{"id":"24.1","title":"RANGAISTUSLAUKAUS","content":"Rangaistuslaukauksen tuomitsemisen tarkoituksena on palauttaa joukkueelle maalintekomahdollisuus, joka menetettiin vastustajan tekemän rikkeen takia, kuten näissä säännöissä esitetään."},{"id":"24.2","title":"TOIMINTAOHJE","content":"Päätuomari ilmoittaa rangaistuslaukauksen tuomitsemisen syyn ja äänentoistojärjestelmän avulla kuulutetaan rangaistuslaukausta suorittamaan joukkueen valitsema pelaaja. Kiekko asetetaan kaukalon keskipisteeseen ja päätuomarin ohjeesta vihellyksen jälkeen rangaistuslaukauksen suorittaja pelaa kiekkoa keskipisteeltä aloittaen ja yrittää tehdä maalin maalivahtia vastaan. Kiekon tai pelaajan on liikuttava kohti vastustajan maaliviivaa ja laukauksen jälkeen tilanteen katsotaan päättyvän. Maalia ei voi tehdä kimmokkeella (paitsi jos kiekko kimpoaa tolpasta tai ylärimasta maalivahtiin OSA 4 – RANGAISTUSLAJIT ja tästä suoraan maaliin), ja heti kun kiekko ylittää maaliviivan tai pysähtyy kokonaan, rangaistuslaukauksen suorituksen katsotaan päättyneen. ”Lacrosse-tyyppinen” –liike (”ilmaveivi”), jossa pelaaja kääntää kiekon jään pinnasta mailansa lavan päälle ja piiskaa kiekon maaliin, on sallittu, jos kiekkoa ei missään vaiheessa nosteta yli hartiatason eikä laukaisuvaiheessa kiekko ylitä yläriman korkeutta. → Sääntö 80.1 (Kiekon pelaaminen korkealla mailalla) Spin-O-Rama”–pyörähdys, jossa kenttäpelaaja tekee 360 asteen käännöksen lähestyessään maalia, ei ole sallittu. Jos pelaaja suorittaa tällaisen liikkeen rangaistuslaukauksen aikana, päätuomari päättää rangaistuslaukauksen ja maalia ei synny. Ainoastaan maalivahti tai varamaalivahti voivat toimia maalivahteina rangaistuslaukauksessa. Maalivahdin on pysyttävä maalialueellaan, kunnes rangaistuslaukausta suorittava pelaaja on koskettanut kiekkoa. Jos rangaistuslaukauksen tuomitsen hetkellä joukkue pelaa ilman maalivahtia (korvattu kenttäpelaajalla), maalivahdin sallitaan palata jäälle torjumaan rangaistuslaukausta. Joukkue, jota vastaan rangaistuslaukaus on tuomittu, voi vaihtaa rangaistuslaukausta torjuvaa maalivahtiaan, kuitenkin korvaavan maalivahdin täytyy pysyä pelissä seuraavaan pelikatkoon asti. Rangaistuslaukauksen suorittamisen ajaksi molempien joukkueiden pelaajien on siirryttävä kaukalon laidalle pelaajapenkkinsä eteen."},{"id":"24.3","title":"NIMETTY PELAAJA","content":"Kaikissa tapauksissa, joissa rangaistuslaukaus on tuomittu, sen suorittaa ei-rikkoneen joukkueen valmentajan tai kapteenin valitsema tämän joukkueen ei-rangaistu pelaaja. Kyseinen valinta ilmoitetaan päätuomarille eikä sitä voi vaihtaa."},{"id":"24.4","title":"RIKKEET RANGAISTUSLAUKAUKSEN AIKANA","content":"Jos maalivahti liikkuu ulos maalialueelta ennen kuin rangaistuslaukauksen suorittaja koskettaa kiekkoa tai maalivahti tekee minkä tahansa rikkeen rangaistuslaukauksen aikana, päätuomari sallii rangaistuslaukauksen suorittamisen jatkuvan (käyttäen siirrettyä rangaistusvihellystä). Jos rangaistuslaukauksesta ei synny maalia, sallitaan rangaistuslaukauksen uusiminen. Jos rangaistuslaukauksen aikana maalivahdin tekemä rike on pienen rangaistuksen arvoinen, aiheuttaen rangaistuslaukauksen epäonnistumisen, tällöin rangaistusta ei tuominta, mutta päätuomari sallii rangaistuslaukauksen uusimisen. Jos maalivahti tekee toisen (2.) rikkeen ja rangaistuslaukaus epäonnistuu, maalivahdille tuomitaan käytösrangaistus ja päätuomari sallii rangaistuslaukauksen uusimisen. Kolmannen (3.) rikkeen kohdalla maalivahdille tuomitaan pelirangaistus, ja tuomitaan maali ei-rikkoneen joukkueen hyväksi. Jos maalivahti tekee ison rangaistuksen arvoisen rikkeen aiheuttaen rangaistuslaukauksen epäonnistumisen, päätuomari sallii rangaistuslaukauksen uusimisen ja maalivahdille tuomitaan asianmukainen rangaistus. Maalivahti voi yrittää torjua rangaistuslaukauksen millä tavoin tahansa, paitsi heittämällä mailan tai muun esineen tai siirtämällä tarkoituksellisesti maalin paikaltaan, joissa tapauksissa tuomitaan maali vastajoukkueen hyväksi. Jos rangaistuslaukauksen aikana, maalivahti torjuntayrityksen seurauksena, vahingossa siirtää maalin paikaltaan, päätuomarin pitää tehdä päätös seuraavalta pohjalta: (I) Tuomita maali, jos pelaaja olisi tehnyt maalin, jos maali olisi ollut normaalilla paikallaan eikä siirtyneenä. 68 (II) Sallia rangaistuslaukauksen uusiminen, jos maalia ei synny tai jos ei voida määrittää, olisiko kiekko mennyt normaalilla paikallaan olleeseen maaliin. (III) Jos maali siirtyy sen jälkeen, kun kiekko on ylittänyt maaliviivan päättäen rangaistuslaukauksen suorituksen, edellä esitetyt määritelmät eivät sovellu ja rangaistuslaukaus on päättynyt. Jos suorituksen aikana joku vastajoukkueen pelaaja, valmentaja tai joukkueen toimihenkilö estää tai häiritsee rangaistuslaukauksen suorittajaa, ja tämän takia rangaistuslaukaus epäonnistuu, päätuomarin on sallittava uusi yritys (2.). Päätuomarin tulee tuomita joukkuerangaistus rikkoneelle joukkueelle, ja jos pelaajapenkillä oleva rikkonut pelaaja on tunnistettavissa, hänelle tuomitaan käytösrangaistus. Kun valmentaja tai joukkueen toimihenkilö on syyllinen tällaiseen tekoon, kyseessä olevalle henkilölle tuomitaan pelirangaistus ja asia raportoidaan asiaankuuluvalle elimelle mahdollisia jatkotoimenpiteitä varten. Jos suorituksen aikana joku suorittajajoukkueen pelaaja, maalivahti, valmentaja tai joukkueen toimihenkilö estää tai häiritsee rangaistuslaukausta torjuvaa maalivahtia ja tämän takia rangaistuslaukaus onnistuu, päätuomarin pitää hylätä maali ja tuomita joukkuerangaistus rikkoneelle joukkueelle. Jos rangaistuslaukauksen aikana katsoja heittää jokin esineen jäälle siten, että se päätuomarin mielestä estää laukaisijan tai maalivahdin suoritusta, päätuomari määrää laukauksen uusittavaksi. Rangaistuslaukaukseen liittyvät mailan mittaukset viitataan: → Sääntö 10.5 (Mailan mittaus) ja → Sääntö 10.6 (Mailan mittaus – ennen rangaistuslaukausta)"},{"id":"24.5","title":"ALOITUSPAIKKA","content":"Jos rangaistuslaukauksesta tehdään maali, seuraava aloitus suoritetaan kaukalon keskipisteestä. Jos rangaistuslaukauksesta ei tehdä maalia, seuraava aloitus suoritetaan toisesta sen päätyalueen aloituspisteestä, johon rangaistuslaukausta suoritettiin, paitsi jos toinen sääntö määrää muusta aloituspaikasta, kuten ”siniviivapelaajien” meno katkolla hyökkäysalueen aloitusympyröiden ylätason yli tai hyökkäävän joukkueen rangaistuksen takia. → Sääntö 76.2 (Aloituspaikat)"},{"id":"24.6","title":"TULOKSET","content":"Jos rangaistuslaukauksen tuloksena syntyy maali, rikkoneelle pelaajalle tai maalivahdille ei tuomita lisärangaistusta, ellei rangaistuslaukauksen aiheuttanut rike edellytä isoa rangaistusta tai käytösrangaistusta, jolloin kyseinen rangaistus tuomitaan. Jos rangaistuslaukauksen aiheuttanut rike normaalisti edellyttää pientä rangaistusta, niin riippumatta rangaistuslaukauksen tuloksesta, pientä rangaistusta ei tuomita. Jos rangaistuslaukauksen aiheuttanut rike normaalisti edellyttää kaksinkertaista pientä rangaistusta tai rikkoneelle joukkueelle tuomitaan samassa pelitilanteessa ylimääräinen pieni rangaistus, ei ensimmäistä pientä rangaistusta tuomita, koska rangaistuslaukaus tuomittiin menetetyn maalitilanteen palauttamiseksi. Toinen pieni rangaistus tuomitaan ja kärsitään riippumatta siitä, syntyykö rangaistuslaukauksesta maali. Rike kuulutetaan kaksinkertaisena pienenä rangaistuksena asianmukaisesta rikkeestä ja pelaajan täytyy kärsiä siitä vain kaksi (2) minuuttia. Mikään rangaistus ei pääty, jos joukkue tekee maalin rangaistuslaukauksesta. Jos joukkueen hyväksi tuomitaan kaksi (2) rangaistuslaukausta samalla pelikatkolla (kaksi (2) eri rikettä kahta (2) eri pelaajaa kohtaan), vain yksi (1) maali voidaan tehdä tai tuomita samalla pelikatkolla. OSA 4 – RANGAISTUSLAJIT Jos ensimmäisen rangaistuslaukauksen tuloksena syntyy maali, toista rangaistuslaukausta ei voida suorittaa, mutta toisesta rikkeestä tuomitaan asianmukainen rangaistus. 70"},{"id":"24.7","title":"AJANOTTO","content":"Jos rike, johon rangaistuslaukauksen tuomitseminen perustuu, tapahtuu todellisen peliajan aikana, tuomitaan rangaistuslaukaus ja se suoritetaan välittömästi normaaliin tapaan, vaikka viivettä olisi syntynyt päätuomarin hyödyntäessä siirrettyä rangaistusvihellystä antaen pelin jatkua, kunnes hyökkäävä joukkue on menettänyt kiekon puolustavalle joukkueelle, mikä takia kyseisen erän peliaika on saattanut loppua. Rangaistuslaukauksen suoritukseen tarvittavaa aikaa ei sisällytetä varsinaiseen peliaikaan tai jatkoaikaan."},{"id":"24.8","title":"RIKKEET","content":"On neljä (4) erityisehtoa, joiden täytyy täyttyä, jotta päätuomari voi tuomita rangaistuslaukauksen, kun pelaajaa rikotaan takaapäin. Ne ovat: (I) Rike täytyy tapahtua puolueettomalla alueella tai hyökkäysalueella (toisin sanoen kiekollisen pelaajan on oltava ylittänyt oma siniviivansa). (II) Rike täytyy tehdä takaapäin (paitsi, jos maalivahti rikkoo läpiajossa edestäpäin). (III) Kiekkoa hallussa pitävältä ja hallitsevalta pelaajalta (tai päätuomarin mielestä pelaajalta, joka olisi selvästi saanut kiekon haltuunsa ja hallintaansa) riistetään kohtuullinen maalintekotilanne. (Se tosiasia, että pelaaja onnistuu laukaisemaan, ei automaattisesti poista tältä tilanteelta rangaistuslaukauksen tuomitsemisen edellytyksiä.) Jos rike tehdään takaapäin ja pelaajalta riistetään rikkeellä kohtuullinen maalintekotilanne, tuomitaan rangaistuslaukaus. (IV) Kiekkoa hallussa pitävällä ja hallitsevalla pelaajalla tai päätuomarin mielestä pelaajalla, joka olisi selvästi saanut kiekon haltuunsa ja hallintaansa, ei saa olla vastustajaa itsensä ja maalivahdin välillä."}]},"25":{"number":"25","title":"TUOMITUT MAALIT","sections":[{"id":"25.1","title":"TUOMITTU MAALI","content":"Hyökkäävän joukkueen hyväksi voidaan tuomita maali, kun vastajoukkue on ottanut maalivahtinsa pois jäältä, ja hyökkäävän joukkueen pelaajalla on kiekko hallussa ja hallinnassaan (tai hän olisi selvästi saanut kiekon haltuunsa ja hallintaansa), ja pelaaja on puolueettomalla alueella tai hyökkäysalueella, eikä pelaajalla ole puolustavan joukkueen pelaajaa itsensä ja vastustajan maalin välillä, ja kun vastustaja estää maalinteon rikkomalla häntä sääntöjen vastaisesti. → Sääntö 25.3 (Rikkeet – maalivahti pois jäältä)"},{"id":"25.2","title":"RIKKEET – KUN MAALIVAHTI ON JÄÄLLÄ","content":"Maali tuomitaan, kun välittömän maalintekomahdollisuuden omaavaa hyökkäävää pelaajaa estetään tekemästä maalia, siten että puolustava pelaaja tai maalivahti siirtää maalitolpan paikaltaan joko tarkoituksellisesti tai vahingossa, ja lisäksi täytyy määrittää, että kiekko olisi mennyt maaliin normaalilla paikallaan olleiden maalitolppien välistä. → Sääntö 63.7 (Tuomitut maalit)"},{"id":"25.3","title":"RIKKEET – KUN MAALIVAHTI ON POISSA JÄÄLTÄ","content":"Mikäli vastustajan maalivahti on vaihdettu pois kentältä ja pelaaja hallitsee kiekkoa (tai olisi voinut saada kiekon hallintaansa) keskialueella tai hyökkäysalueella ja hänet kaadetaan tai muutoin rikotaan, eikä hänellä ole vastustajaa hänen ja vastustajan maalin välissä ja samalla estetään kohtuullinen maalintekotilanne, erotuomari keskeyttää pelin välittömästi ja tuomitsee maalin hyökkäävälle joukkueelle. OSA 4 – RANGAISTUSLAJIT Taulukosta 12 löytyy luettelo rikkeistä, jotka johtavat maalin tuomitsemiseen, kun maalivahti on poistettu ylimääräisen hyökkääjän vuoksi.\" 72"},{"id":"25.4","title":"RIKKEET – RANGAISTUSLAUKAUKSEN SUORITUKSEN AIKANA","content":"Rangaistuslaukauksesta tuomitaan maali, jos maalivahti yrittää torjua rangaistuslaukausta heittämällä mailansa tai jonkin muun esineen kohti rangaistuslaukauksen suorittajaa tai siirtää maalin paikaltaan (joko tarkoituksellisesti tai vahingossa) tai ottaa kasvosuojuksen pois aiheuttaakseen suorituksen keskeytyksen. → Sääntö 63.7 (Tuomitut maalit)"}]},"26":{"number":"26","title":"RANGAISTUSTEN SIIRRETTY ALKAMISAIKA","sections":[{"id":"26.1","title":"RANGAISTUKSEN SIIRRETTY ALKAMISAIKA","content":"Jos joukkueen kolmannelle (3.) pelaajalle tuomitaan rangaistus, kun joukkueella on jo kaksi (2) pelaajaa kärsimässä rangaistuksiaan, kolmannen (3.) pelaajan rangaistus ei ala ennen kuin toisen (1) näistä kahdesta (2) rangaistustaan kärsivän pelaajan rangaistus on päättynyt. Kolmannen (3.) pelaajan täytyy heti mennä rangaistusaitioon. Joukkue saa korvaavan kenttäpelaajan jäälle, jotta joukkueen jäällä oleva pelaajavahvuus ei ole alhaisempi kuin kolme (3) kenttäpelaajaa. Kun saman joukkueen kahden (2) pelaaja rangaistukset päättyvät samaan aikaan, kyseisen joukkueen kapteeni nimeää päätuomarille, kumpi pelaaja palaa ensin jäälle ja päätuomari ohjeistaa vastaavasti rangaistusajanottajaa asiasta (tämän tarkoitus on nopeuttaa pelaajan päästämistä rangaistusaitiosta, kun vastajoukkue tekee ylivoimalla maalin)."},{"id":"26.2","title":"RANGAISTUKSEN PÄÄTTYMINEN","content":"Kun joukkueella on kolme (3) pelaajaa samanaikaisesti rangaistusaitiossa kärsimässä rangaistuksiaan, ja koska siirretyn rangaistuksen säännön mukaisesti jäällä on kolmannen (3.) rangaistun pelaajan tilalla korvaava kenttäpelaaja, kukaan kolmesta (3) rangaistusta pelaajasta ei pääse jäälle rangaistusaitiosta ennen kuin seuraavalla pelikatkolla. Pelaaja, jonka rangaistus on kokonaan päättynyt, palaa jäälle, kun peli katkaistaan. Pelin käydessä rangaistusajanottajan tulee päästää rangaistut pelaajat jäälle heidän rangaistustensa päättymisjärjestyksessä, mutta vain, kun joukkueella on oikeus useampaan kuin neljään (4) pelaajaan (3 kenttäpelaajaa ja maalivahti) jäällä. Muutoin kunkin pelaajan täytyy odottaa rangaistusaitiosta vapautumista oman rangaistuksensa päättymistä seuraavaan pelikatkoon."},{"id":"26.3","title":"ISO JA PIENI RANGAISTUS","content":"Kun iso rangaistus ja pieni rangaistus tuomitaan saman joukkueen kahdelle eri pelaajalle samaan aikaan, rangaistusajanottajan on kirjattava pieni rangaistus ensimmäiseksi rangaistukseksi. OSA 4 – RANGAISTUSLAJIT JÄÄKIEKON SÄÄNTÖKIRJA - SJL 2025-2026 73"}]},"27":{"number":"27","title":"MAALIVAHDIN RANGAISTUKSET","sections":[{"id":"27.1","title":"PIENI RANGAISTUS MAALIVAHDILLE","content":"Maalivahti ei kärsi rangaistusaitiossa hänelle tuomittua pientä rangaistusta, mutta sen sijaan pienen rangaistuksen kärsii toinen pelin katkaisuhetkellä jäällä ollut saman joukkueen pelaaja. Pelaajan nimeää valmentaja kapteenin välityksellä eikä tällaista sijasta voi vaihtaa. Rangaistu pelaaja ei voi kärsiä maalivahdin rangaistuksia. Jos maalivahdin rangaistus on osa samanaikaisia rangaistuksia ja hänen joukkueensa täytyy pelata vajaalukuisena maalivahdin lisärangaistuksen takia, näitä lisärangaistuksia kärsimään nimetty pelaaja voi olla kuka tahansa rikkoneen joukkueen valmentajan, kapteenin välityksellä, nimeämä pelaaja."},{"id":"27.2","title":"ISO RANGAISTUS MAALIVAHDILLE","content":"Maalivahti ei kärsi rangaistusaitiossa hänelle tuomittua isoa rangaistusta, vaan hänet poistetaan ottelusta, mutta sen sijaan ison rangaistuksen kärsii välittömästi toinen pelin katkaisuhetkellä jäällä ollut saman joukkueen pelaaja. Pelaajan nimeää valmentaja kapteenin välityksellä eikä tällaista sijasta voi vaihtaa. Kun maalivahdille tuomitaan iso rangaistus ja pelirangaistus, joihin sovelletaan samanaikaisten rangaistusten sääntöä vastajoukkueen pelaajan ison rangaistuksen kanssa, joukkueen ei tarvitse asettaa sijaista kärsimään maalivahdin rangaistuksia rangaistusaitioon, koska maalivahti poistetaan pelistä ottelun loppuajaksi. Jos maalivahdille tuomitaan samassa ottelussa kaksi (2) käytösrangaistusta (mikä johtaa automaattiseen pelirangaistukseen), maalivahti poistetaan pelistä ottelun loppuajaksi ja hänen tilalleen jäällä tulee toinen joukkueen pelaaja tai normaali korvaava maalivahti, jos hän on käytettävissä. Tällaiselle toiselle pelaajalle sallitaan maalivahdin täysi varustus."},{"id":"27.3","title":"KÄYTÖSRANGAISTUS MAALIVAHDILLE","content":"Jos jäällä olevalle maalivahdille tuomitaan käytösrangaistus, tämän rangaistuksen kärsii toinen pelin katkaisuhetkellä jäällä ollut saman joukkueen pelaaja. Pelaajan nimeää valmentaja kapteenin välityksellä eikä tällaista sijasta voi vaihtaa."},{"id":"27.4","title":"PELIRANGAISTUS MAALIVAHDILLE","content":"Jos maalivahdille tuomitaan pelirangaistus, hänen paikkansa jäällä ottaa toinen joukkueen pelaaja tai normaali korvaava maalivahti, jos hän on käytettävissä, ja tällaiselle toiselle pelaajalle sallitaan maalivahdin täysi varustus. 74"},{"id":"27.5","title":"MAALIALUEELTA POISTUMINEN","content":"Maalivahdille, joka poistuu maalialueensa välittömästä läheisyydestä pelaajien yhteenottoon aikana, tuomitaan pieni rangaistus. Kuitenkin, jos pelaajien yhteenotto tapahtuu hänen maalialueellaan tai sen läheisyydessä, päätuomarin tulee ohjata maalivahti neutraaliin paikkaan eikä maalivahdille tuomita rangaistusta maalialueensa välittömästä läheisyydestä poistumisesta. Vastaavasti, jos maalivahti on laillisesti maalialueensa välittömän läheisyyden ulkopuolella menossa pelaajapenkilleen vaihtaakseen ylimääräiseen korvaavaan kenttäpelaajaan, ja maalivahti tällöin joutuu osalliseksi pelaajien väliseen yhteenottoon, ei maalivahdille tuomita pientä rangaistusta maalialueelta poistumisesta. Lisäksi pelikatkon aikaan maalivahti ei saa mennä pelaajapenkkinsä luo vaihtaakseen mailaa tai varustetta, tai huoltamaan sitä, tai loukkaantumisen takia, tai saamaan ohjeita, ellei hän ensin saa päätuomarilta lupaa siihen. Muussa tapauksessa joukkueen täytyy välittömästi (ilman viivettä) vaihtaa maalivahti korvaavaan maalivahtiin tai joukkueelle tuomitaan joukkuerangaistus. → Sääntö 63 (Pelin viivyttäminen)"},{"id":"27.6","title":"OSALLISTUMINEN PELIIN KESKIVIIVAN YLITYKSEN JÄLKEEN","content":"Jos maalivahti osallistuu millään tavoin peliin (tarkoituksellisesti pelaa kiekkoa tai taklaa vastustajaa), kun hän on ylittänyt keskiviivan, hänelle tuomitaan pieni rangaistus. Tätä sääntöä sovellettaessa määräävänä tekijänä on kiekon asema."},{"id":"27.7","title":"MAALIVAHDIN RAJATTU ALUE","content":"Maaliviivan takana maalivahti ei saa pelata kiekkoa rajatun alueen ulkopuolella. Maalivahdille tuomitaan pieni rangaistus pelin viivyttämisestä, jos hän pelaa kiekkoa maaliviivan takana nimetyn alueen ulkopuolella. Määräävänä tekijänä on kiekon asema. Maalivahdille ei tuomita rangaistusta, jos maalivahti pelaa kiekkoa pitäen luistinkosketuksen maalialueeseen. Asianomainen puolisuunnikkaan muotoinen alue on merkitty kummankin maalin taakse. Viivat kulkevat vinosti maaliviivasta päätylaitaan kummankin maalin takana. Alueen ulkomitta on 6,80 metriä maaliviivalla ja 8,60 metriä päätylaidalla. → Lisätietoja: Liite VI – Infografiikka."}]},"28":{"number":"28","title":"TÄYDENTÄVÄ KURINPITO","sections":[{"id":"28.1","title":"TÄYDENTÄVÄ KURINPITO","content":"Asiaankuuluva elin voi oman harkintansa mukaan tutkia minkä tahansa tilanteen, joka liittyy mihinkä tahansa SJL:n alaisuudessa pelattuun otteluun, mukaan lukien seurojen järjestämät harjoitusottelut ja turnaukset. Asiaankuuluva elin voi tuomita lisäkurinpitorangaistuksia kaikista rikkeitä, joita pelaaja, maalivahti, valmentaja tai joukkueen toimihenkilö on tehnyt ennen ottelua, ottelun aikana tai sen jälkeen, olipa päätuomari tuominnut jäähyä tällaisesta rikkeestä tai ei."}]},"29":{"number":"29","title":"TUOMARISTON KÄSIMERKIT","sections":[]},"30":{"number":"30","title":"TUOMARISTON NIMEÄMINEN","sections":[{"id":"30.1","title":"TUOMARISTON NIMEÄMINEN","content":"Erotuomareiden nimeämisestä sarjaotteluihin vastaa tasojen 4-6 ja 8 osalta SJL ja tasojen 1-3 osalta SJTL:n paikallinen jäsenyhdistys SJL:n antamien ohjeiden mukaisesti. Erotuomareiden nimeämisestä harjoitus- ja turnausotteluihin vastaa tasoista 6 ja 8 SJL ja tasoista 1-5 SJTL:n paikallinen jäsenyhdistys SJL:n antamien ohjeiden mukaisesti. Tarkempi määritelmä: Yhteistoimintasopimus"}]},"31":{"number":"31","title":"PÄÄTUOMARIT","sections":[{"id":"31.1","title":"ASU JA VARUSTEET","content":"Kaikkien päätuomareiden (ja erotuomarien) tulee käyttää mustia housuja, SJL:n hyväksymää virallista tuomaripaitaa, IIHF:n hyväksymään mustaa muokkaamatonta visiirillistä kypärää, mustaa kaulasuojaa (pakollinen 1.7.2025 lähtien) ja hyväksyttyä pilliä."},{"id":"31.2","title":"NÄKEMYSEROT","content":"Päätuomareilla on ottelun yleisjohto, ja heillä on täysi määräysvalta ottelun muuhun tuomaristoon ja toimitsijoihin sekä pelaajiin, ottelun aikana mukaan lukien pelikatkot, ja kaikissa näkemyseroissa päätuomareiden päätös on lopullinen. Jos kyseessä on näkemysero peliajasta tai rangaistusten päättymisestä, niin päätuomarin käsiteltyä asia, päätuomarin päätös on lopullinen. Päätuomari voi käyttää videotuomaristoa apuna lopullisen päätöksen tekemisessä. → Sääntö 37 (Videotarkistus)"},{"id":"31.3","title":"ALOITUKSET","content":"Toinen päätuomari suorittaa aloituksen kunkin erän alkamiseksi. Linjatuomarit suorittavat kaikki muut aloitukset."},{"id":"31.4","title":"YLEISET TEHTÄVÄT","content":"Päätuomareiden tehtävänä on määrätä sellaisia rangaistuksia, mitä säännöt kustakin rikkeestä edellyttävät ja he tekevät kiistanalaisista maaleista lopullisen päätöksen jäällä. Päätuomarit voivat konsultoida linjatuomareita ennen päätöksen tekoa. Päätuomarien ei pidä katkaista peliä sääntöihin 83 (paitsio) tai 81 (pitkä) liittyen. Näiden sääntöjen kohdalla rikkomuksesta päättäminen on linjatuomareiden tehtävä, ellei jonkun yllättävän syyn takia linjatuomareilla ei ole mahdollisuutta toimia, jolloin päätuomareiden oletetaan tekevän linjatuomareiden tehtävät siihen asti, kunnes peli on katkaistu.  Lisätietoja: IIHF:n Tuomariston käsikirja ja linjaukset (IIHF Game Official Handbook and Guidelines) sekä IIHF:n toimintaohjekirja (Operation Procedure Manual (OPM))."},{"id":"31.5","title":"MAALIT","content":"Päätuomarit ilmoittavat hallin äänentoistojärjestelmän avulla ilmeisen maalin sääntöjenmukaisuuteen liittyvät asiat. 78 → Sääntö 78 (Maalit) Päätuomarit ilmoittavat maalin tekijän nimen tai numeron sekä myös ilmoittavat, jos joku pelaaja ansaitsee syöttöpisteen maaliin. Jos käytettävissä, niin päätuomarit ilmoittavat ainoastaan maalin tekijän ja kirjuri tilastohenkilöstön avustuksella vahvistaa maalin tekijän ja mahdolliset syöttäjät. Maalin tekijä ja mahdolliset syöttäjän kuulutetaan äänentoistojärjestelmän avulla. Tilanteissa, joissa päätuomari hylkää maalin jokin sääntörikkeen takia, hän ilmoittaa hylkäämisen syyn kirjurille, joka huolehtii, että päätuomarin päätös kuulutetaan äänentoistojärjestelmän avulla."},{"id":"31.6","title":"TOIMITSIJAT","content":"Päätuomarin tulee ennen ottelun alkamista varmistaa, että nimetyt toimitsijat ovat oikeilla paikoillaan sekä varmistaa, että ajanotto- ja merkinantolaitteet ovat kunnossa."},{"id":"31.7","title":"RANGAISTUKSET","content":"Jokainen sääntörike, josta yksittäinen rangaistus tuomitaan, täytyy kuuluttaa äänentoistojärjestelmän avulla asiallisesti siten, kun päätuomari on syyn ilmoittanut. Kun samassa pelitilanteessa tuomitaan rangaistuksia kummallekin joukkueelle, vierasjoukkueen rangaistus kuulutetaan ensin."},{"id":"31.8","title":"PELAAJIEN PELIASUT","content":"Päätuomareiden tehtävänä on valvoa, että kaikki pelaajat ovat asianmukaisesti pukeutuneet peliasuun, ja että hyväksyttyjä varusteita käytetään koko ottelun ajan."},{"id":"31.9","title":"RAPORTIT","content":"Päätuomarin täytyy raportoida asiankuuluvalle elimelle nopeasti ja yksityiskohtaisesti seuraavien tapahtumien olosuhteet: (I) Pelirangaistuksen tuomitseminen; (II) Aina kun pelaaja, maalivahti tai joukkueen toimihenkilö osallistuu kiistaan katsojan kanssa; (III) Mikä tahansa epätavallinen tilanne, joka tapahtuu jäällä tai sen ulkopuolella, ennen peliä, pelin aikana tai sen jälkeen. (IV) Kaikki tuomariston raportointiohjeissa mainitut tilanteet (mm. loukkaantuminen yms.) (V) Ottelussa havaittu teko tai tuomarille raportoitu epäilys epäasiallisesta tai syrjivästä käytöksestä  Lisätietoja - Raportointiohjeet: http://www.finhockey.fi/index.php/tuomarille/raportointi OSA 5 – TUOMARISTO"},{"id":"31.10","title":"OTTELUN JA ERIEN ALKAMINEN JA LOPPUMINEN","content":"Päätuomarit tai ajanottaja käskee joukkueet jäälle määrättynä aikana ennen ottelun alkamista ja ennen kunkin erän alkamista. Jos jostakin syystä ottelun alku siirtyy yli 15 minuuttia tai on jokin liiallinen viivästys SJL:n hyväksymän erätauon jälkeen, päätuomarien täytyy raportoida viivästyksen syy ja myöhästymisen aiheuttanut joukkue (joukkueet). Päätuomareiden pitää pysyä jäällä kunkin erän jälkeen, kunnes kaikki pelaajat ovat poistuneet pukuhuoneisiinsa. Joukkueiden tulo ja poistuminen jäältä:  Lisätietoja: SJL:n kilpailusäännöt"},{"id":"31.11","title":"KYKENEMÄTÖN JATKAMAAN","content":"Jos päätuomari sattumalta poistuu jäältä tai loukkaantuu siten, ettei kykenee täyttämään tehtäväänsä pelin ollessa käynnissä, peli katkaistaan automaattisesti. SJL sarjoissa, tuomarin loukkaantuessa peliä jatketaan seuraavasti: 4T-järjestelmä – Päätuomarin loukkaantuessa jatketaan 3:n tuomarin järjestelmällä. Linjatuomarin loukkaantuessa jatketaan kahdella päätuomarilla ja yhdellä linjatuomarilla. 3T-järjestelmä - Päätuomarin loukkaantuessa jatketaan 2T järjestelmällä ja linjatuomarin loukkaantuessa jatketaan yhdellä päätuomarilla ja yhdellä linjatuomarilla. 2T-järjestelmä – Jatketaan yhdellä erotuomarilla Jos paikalla on esim. seuraavan ottelun tuomaristoa, voidaan loukkaantunut tuomari korvata uudella, mutta tämä ei saa viivästyttää ottelun jatkumista."}]},"32":{"number":"32","title":"LINJATUOMARIT","sections":[{"id":"32.1","title":"ASU JA VARUSTEET","content":"Kaikkien linjatuomarien tulee käyttää mustia housuja, SJL:n hyväksymää virallista tuomaripaitaa, IIHF:n hyväksymään mustaa muokkaamatonta visiirillistä kypärää, mustaa kaulasuojaa (pakollinen 1.7.2025 lähtien) ja hyväksyttyä pilliä."},{"id":"32.2","title":"ALOITUKSET","content":"Linjatuomari suorittaa aina kaikki muut aloitukset paitsi aloituksen kunkin erän alkamiseksi."},{"id":"32.3","title":"YLEISET TEHTÄVÄT","content":"Linjatuomari on yleisesti vastuussa paitsioiden ja pitkien tuomitsemisesta. → Sääntö 81 (Pitkä) → Sääntö 83 (Paitsio) Linjatuomarit voivat katkaista pelin myös monissa muissa tilanteissa, kuten todetaan Säännöissä 32.4 ja 33.5.  Lisätietoja: IIHF:n Tuomariston ohjekirja (Game Official Procedure Manual (OPM)). 80"},{"id":"32.4","title":"RAPORTOINTI PÄÄTUOMARILLE","content":"Linjatuomari antaa päätuomareille tulkintansa kaikista tilanteista, jotka ovat saattaneet tapahtua pelin aikana. Linjatuomari voi keskeyttää pelin ja ilmoittaa tuomareille näkemästään tilanteesta, kun: (I) Kun mailansa menettänyt tai rikkonut pelaaja vastaanottaa mailan sääntöjen vastaisesti → Sääntö 10 (Mailat) (II) Kun joukkueen toimihenkilö häiritsee tuomaristoa → Sääntö 39 (Sopimaton käytös tuomaristoa kohtaan) (III) Kun joku tunnistettava pelaaja pelaajapenkiltä tai rangaistusaitiosta mailallaan tai vartalollaan estää kiekon liikettä tai vastustajaa → Sääntö 56 (Estäminen) (IV) Jos tapahtuu rike liian monta pelaajaa jäällä → Sääntö 74 (Liian monta pelaajaa jäällä) (V) Kun pelaajapenkiltä tai rangaistusaitiosta heitetään esineitä jäälle → Sääntö 75 (Epäurheilijamainen käytös) (VI) Kun maalivahti pelaa kiekkoa maalin takana olevan merkityn alueen ulkopuolella. ➔ Sääntö 63 – Pelin viivyttäminen Linjatuomari raportoi pelikatkolla kaikki seuraaviin tilanteisiin johtaneet olosuhteet: (I) Tilanteet, joista voidaan tuomita 2+2 ja 2+10 min (II) Isot rangaistukset → Sääntö 20 (Isot Rangaistukset) (III) Käytösrangaistukset → Sääntö 22 (Käytösrangaistukset) (IV) Pelirangaistukset → Sääntö 23 (Pelirangaistukset) (V) Sopimaton käytös tuomaristoa kohtaan → Sääntö 39 (Sopimaton käytös tuomaristo kohtaan) (VI) Tuomariston fyysisen koskemattomuuden loukkaaminen → Sääntö 40 (Tuomariston fyysisen koskemattomuuden loukkaaminen) (VII) Epäurheilimainen käytös → Sääntö 75 (Epäurheilijamainen käytös) Jos linjatuomari näkee hyökkäävän joukkueen pelaajan tekemän rikkeen (edellä kuvatut, eikä päätuomari havaitse rikettä) ennen hyökkäävän joukkueen tekemää maalia, linjatuomari raportoi näkemänsä päätuomarille, maali hylätään ja asianmukainen rangaistus tuomitaan. Linjatuomarin tulee katkaista peli välittömästi ja raportoida päätuomareille, kun: (I) Kun on ilmeistä, että vastustaja loukkaantuminen aiheutui korkeasta mailasta, joka jäi päätuomareilta huomaamatta, ja joka edellyttää kaksinkertaisen pienen rangaistuksen tuomitsemista. → Sääntö 60 (Korkea maila) Poikkeustulkinta- ja toimintaohje SJL:n sääntökirjan sääntöön 32.4. RAPORTOINTI PÄÄTUOMARILLE Ottelussa syntyy tilanne, jossa linjatuomarin näkemyksen mukaan tulisi tuomita jokin seuraavista rangaistuksista: 2+2` korkea maila, 2+10`, 2+2+10` tai 5+PR ja päätuomarit eivät tilanteeseen reagoi ja rikkonut joukkue tekee hyväksyttävän maalin tilanteesta pitää suorittaa videotarkistus. Koska edellä mainitut linjatuomarin raportoimat rikkeet hylkäävät maalin, tämä raportoitu rike on päätuomareiden toimesta varmennettava videolta: 1. Jos videotarkistuksen tilanteessa on rike, jonka rangaistus on jokin edellä mainituista, maali hylätään ja rangaistus tuomitaan. OSA 5 – TUOMARISTO 2. Jos videotarkistus ei kumoa (esim. tilanne ei näy videolta) linjatuomarin näkemystä tilanteesta, maali hylätään ja rangaistus tuomitaan. 3. Jos videotarkistuksen tilanteessa ei ole päätuomarin mielestä rikettä, josta tulisi tuomita jokin edellä mainituista rangaistuksista tilanteesta ei tuomita rangaistusta ja maali hyväksytään. Tämä poikkeussääntö on voimassa vain tilanteessa, jossa videotarkistuksenalaista rangaistustilannetta seuraa ”rikkoneen” joukkueen tekemä maali. Säännön poikkeustulkinta on johdonmukainen muiden mahdollisten pienten rangaistuksien näkemyserojen kanssa. Sääntökirjan mukaan, maalia edeltävä, viheltämättä jäänyt pieni rangaistus (pois lukien epäasiallinen käytös tuomaristoa kohtaan), ei kumoa maalia jälkikäteen, eikä tilanteesta ole mahdollista suorittaa videotarkistusta."},{"id":"32.5","title":"PELIN KATKAISEMINEN","content":"Linjatuomarin tulee katkaista peli: (I) Kun linjatuomari huomaa, että pelaaja on loukkaantunut vakavasti eikä kumpikaan päätuomari huomaa tätä. → Sääntö 8 (Loukkaantuneet pelaajat) (II) Kun rangaistuslaukauksen suorittamista on häirinnyt katsoja heittämällä jotain jäälle. → Sääntö 24 (Rangaistuslaukaus) (III) Rangaistuslaukauksen tuomitsemiseksi. → Sääntö 53 (Varusteiden heittäminen) (IV) Kun tapahtuu maalivahdin liian aikainen vaihto. → Sääntö 71 (Maalivahdin liian aikainen vaihto) (V) Jos tapahtuu rike liian monta pelaajaa jäällä. → Sääntö 74 (Liian monta pelaajaa jäällä) (VI) Aloitusrikkeen takia aloituksen uusimiseksi. → Sääntö 76 (Aloitukset) (VII) Kun aloituksessa millä alueella tahansa jompikumpi aloittaja pelaa kiekkoa kädellään aloituksen voittamiseksi. → Sääntö 76 (Aloitukset) (VIII) Kun syntyy maali, jota päätuomarit eivät ole huomanneet. → Sääntö 78 (Maalit) (IX) Kun pelaaja pelaa kiekon kädellään kanssapelaajalleen muulla alueella kuin puolustusalueellaan ja kumpikaan päätuomari ei ole tätä huomannut. → Sääntö 79 (Käsisyöttö) (X) Kun kiekkoa pelataan yli normaalin hartiatason olevalla mailalla ja kumpikaan päätuomari ei ole tätä huomannut. → Sääntö 80 (Kiekon pelaaminen korkealla mailalla) (XI) Kun jompikumpi joukkue tekee pitkän. → Sääntö 81 (Pitkä) (XII) Siniviivalla tapahtuvan paitsiosäännön rikkomisesta. → Sääntö 83 (Paitsio) (XIII) Kun sääntöjenvastainen pelaaja / henkilö estää kiekon liikettä. → Sääntö 5 (Joukkue), Sääntö 74 (Liian monta pelaajaa jäällä), → Sääntö 78 (Maalit) ja → Sääntö 84 (Jatkoajan toiminnot) (XIV) Kun kiekko on pelialueen ulkopuolelle tai pelaamattomissa. → Sääntö 85 (Kiekko pelialueen ulkopuolella)"},{"id":"32.6","title":"KYKENEMÄTÖN JATKAMAAN","content":"Jos linjatuomari sattumalta poistuu jäältä tai loukkaantuu siten, ettei kykenee täyttämään tehtäväänsä pelin ollessa käynnissä, peli katkaistaan automaattisesti. → Ottelua jatketaan säännön 31.11. mukaisesti 82 JÄÄKIEKON SÄÄNTÖKIRJA - SJL 2025-2026 OSA 5 – TUOMARISTO"}]},"33":{"number":"33","title":"KIRJURI","sections":[{"id":"33.1","title":"YLEISET TEHTÄVÄT","content":"Ennen tilastoitavien sarjaottelun alkua ottelun kirjuri vähintään 60 minuuttia ennen ottelun alkua. Kirjuri varmistaa myös, että joukkueen kapteeni(C) ja varakapteeni(t) (A) on merkitty kokoonpanoihin. Kirjuri merkitsee pöytäkirjaan tehdyt maalit, maalintekijät ja mahdolliset syöttäjät sekä merkitsee kaikki ne pelaajat, jotka todellisuudessa pelasivat ottelussa. Tilastojen ja merkinnät tehdään sääntökirjan ja SJL:n tulospalveluohjeiden mukaisesti. Ottelun päätyttyä kirjuri varmistaa, että ottelun tuomaristo tarkistaa ja allekirjoituksellaan viimeistelee pöytäkirjan. Lisätietoja: Tilastointi- ja tulospalveluohjelman (TiTu) käyttöohje ja Tulospalveluohje Harjoitusottelussa sekä ei tilastoitavissa sarjaotteluissa kirjuri saa kummankin joukkueen joukkueenjohtajalta allekirjoitetun ottelukokoonpanolistan ja laatii listojen mukaisen käsipöytäkirjan. Joukkueiden on toimitettava allekirjoitetut kokoonpanolistat vähintään 60 minuuttia ennen ottelun alkua. Kirjuri ja ottelun tuomaristo allekirjoittavat käsipöytäkirjan ottelun päätyttyä ja allekirjoitetut ottelukokoonpanolistat sekä alkuperäinen pöytäkirja toimitetaan kotijoukkueen joukkueenjohtajalle. Mikäli harjoituspelissä vastustajana on ulkomaalainen joukkue, tulee ottelusta tehdä kansainvälinen ottelupöytäkirja ja käyttää rangaistusmerkinnöissä kansainvälisiä rangaistuslyhenteitä."},{"id":"33.2","title":"MAALIT JA SYÖTÖT","content":"Päätuomarit ilmoittavat maalintekijän nimen tai numeron sekä myös maalin mahdolliset syöttäjät. Mitään muutoksia mihinkään pisteisiin liittyen ei oteta huomioon, ellei joukkueen kapteeni ole esittänyt pyyntöä ottelun aikana tai pyyntöä ei ole esitetty joukkueen edustajan toimesta välittömästi ottelun jälkeen ennen kuin ottelun tuomaristo on allekirjoittanut pöytäkirjan. Ottelun päätyttyä kirjuri tarkastaa sekä valmistelee pöytäkirjan tuomariston allekirjoituksia varten. Tuomaristo kuittaa ja sulkee pöytäkirjan 15 min pelin päätyttyä. Pöytäkirjan sulkemisen jälkeen muutoksia pelaajia koskeviin tilastoihin ei tehdä. Tilanteissa, joissa maalitarkastelu suoritetaan videotuomariston toimesta ja maali hyväksytään aiemmasta pelitilanteesta, kirjuri merkitsee pöytäkirjaan maalin ja syöttöjen osalta maalin todellisen syntyajan. Jos peliajasta on epäselvää, niin asia tarkistetaan videotuomaristolta. Asiasta informoidaan myös ajanottajaa, jotta hän säätää pelikellon ja rangaistuskellot vastaavasti. Maalintekijäksi merkitään maalin tehneen joukkueen pelaaja, joka viimeiseksi koski kiekkoon ennen sen maaliin menemistä. → Sääntö 78 (Maalit) Syöttöpiste merkitään pelaajalle tai pelaajille (enintään kaksi), joka koski kiekkoon ennen maalitekijää sillä edellytyksellä, että puolustavan joukkueen pelaaja ei pelaa tai hallitse kiekkoa välillä. Päätuomarin tuomitsemiin maaleihin (ts. tilanteisiin, joissa maali hyväksytään, vaikka kiekko ei mene maaliin) voidaan merkitä myös syöttäjät, jos päätuomari sitä mieltä, että heille olisi normaalissa maalitilanteessa annettu syöttöpiste. Kun maali tehdään erän viimeisellä minuutilla, jolloin pelikellossa näkyy vielä sekunnin kymmenyksiä, pyöristetään maalintekoaika pöytäkirjassa lähimpään, maalitilannetta edeltäneeseen sekuntiin. Lisätietoja: http://www.finhockey.fi/index.php/tuomarille/item/6114-tulospalvelukorjaukset"},{"id":"33.3","title":"PELAAVA KOKOONPANO","content":"OSA 5 – TUOMARISTO Tilastoitavissa Sarjaotteluissa joukkueet tekevät ja kuittaavat ottelukokoonpanonsa sekä toimihenkilönsä TiTuun viimeistään tuntia (1h) ennen ottelua. Järjestelmä tarkistaa, että jokaisella pelaajalla on voimassa oleva pelipassi ja toimihenkilöillä voimassa oleva toimihenkilörekisteröinti. Mikäli kokoonpanoon tehdään muutoksia alle tunti ennen ottelua, tulee muuttuneesta tiedosta ilmoittaa toimitsijoille. Ottelupöytäkirjaan ei tilastoitavissa sarjoissa saa lisätä pelaajia käsin, vaan kaikki pelaajat lisätään järjestelmän kautta joukkueen toimesta. Jos pelaajaa ei pysty lisäämään pöytäkirjaan, on pelaaja edustuskelvoton, eikä saa pelata ottelussa. Toimitsijat pystyvät muuttamaan kokoonpanoissa vain pelaajanumeroa tai kapteenistotietoja. Lisätietoja: Tilastointi- ja tulospalveluohjelman (TiTu) käyttöohje ja Tulospalveluohje Harjoitusotteluissa ja ei tilastoitavissa sarjaotteluissa joukkueenjohtajat toimittavat kirjurille allekirjoitetut ottelukokoonpanot viimeistään tuntia (1h) ennen ottelun alkua. Mikäli kokoonpanoon tehdään muutoksia alle tunti ennen ottelua, tulee muuttuneesta tiedosta ilmoittaa toimitsijoille. Kirjuri laatii kokoonpanolistojen mukaisen käsipöytäkirjan. Kirjurin täytyy raportoida asiaankuuluvalle elimelle, jos jompikumpi valmentaja ei toimi näiden suositeltujen toimintaohjeiden mukaisesti."},{"id":"33.4","title":"SIJAINTI","content":"Kirjuri tulee sijoittaa toimitsija-aitoon vastapäätä pelaajapenkkejä ja hänellä tulee tästä paikasta olla hyvä näköala kentälle. SJL sarjoissa toimitsija-aitio voi sijaita myös pelaajapenkkien välissä, hallin olosuhteista riippuen."},{"id":"33.5","title":"RANGAISTUKSET","content":"Rangaistusaition valvojien tulee avustaa kirjuria ja peliajanottajaa jäällä olevien pelaajien numeroiden kirjaamisessa, jos maalivahdille tuomitaan rangaistus, tai pelaaja poistetaan pelistä. Kirjurin täytyy myös pitää silmällä pelaajapenkkejä pelaajien yhteenoton aikana ja kirjata ylös, jos joku pelaaja lähtee jäälle pelaajapenkiltään tai rangaistusaitiosta, sekä näiden pelaajien lähtöjärjestys."}]},"34":{"number":"34","title":"PELIAJANOTTAJA","sections":[{"id":"34.1","title":"YLEISET TEHTÄVÄT","content":"Peliajanottaja kirjaa ottelun kunkin erän alku- ja loppuajan. Ottelun aikana peliajanottaja käynnistää pelikellon kiekon pudotuksesta ja katkaisee kellon kuullessaan tuomariston vihellyksen tai maalin syntyessä. Peliajanottaja huolehtii, että äänentoistojärjestelmän avulla kuulutetaan: (I) kun ensimmäistä ja toista erää on jäljellä yksi (1) minuutti; (II) kun kolmatta erää on jäljellä kaksi (2) minuuttia. Käytössä pitää olla käsikello oikean peliajan määrittämiseksi, jos sähköinen ajanottojärjestelmä vikaantuu."},{"id":"34.2","title":"ERÄTAUOT","content":"Jotta katsojat olivat tietoisia erätauon kulumisesta, peliajanottaja käyttää sähköistä kelloa näyttämään erätauon jäljellä olevan ajan. Kello käynnistyy erätauon etenemiseksi välittömästi erän päätyttyä. Erätauon pituus määritellään SJL kilpailusääntöjen mukaisesti. 84 Jos erätaukoon liittyen tapahtuu epätavallista viivästymistä mistä syystä tahansa, (esim. tappelun, areenan rakenteiden, jään tai kaukalon rakenteiden takia) on tärkeää käyttää harkintaa kellon käynnistämisen suhteen. Erätauoilla pelaajien verryttely jäällä on kielletty, vain pelaavat maalivahdit ja erän aloittavat kentälliset voivat tulla / jäädä erätauon jälkeen jäälle aloitusta varten, muiden pelaajien on mentävä suoraan vaihtopenkeilleen. Erätauon pituus on ohjeellinen. Erätauon pituus voi olla lyhyempi, mikäli joukkueet ja erotuomaristo niin sopivat (ei Mestiksessä). Niissä sarjoissa, joissa erätauko on määritelty näissä säännöissä, on myös jää kunnostettava erätauon aikana. Erätauko voi olla määrättyä pidempi vain siinä tapauksessa, että olosuhteet ovat vaaralliset pelaajille ja tuomareille (esim. kaukalorakenteissa korjattavaa). Jäällä oleva vesi ei ole syy erätauon pidentämiselle. Erätaukojen maksimipituudet on mainittu sarjamääräyksissä. → Valtakunnalliset sarjat ja niiden tiedot"},{"id":"34.3","title":"JATKOAJAN TOIMINNOT","content":"Alkusarja- tai karsintavaiheessa ajanottaja asettaa pelikelloon peliajaksi viisi (5) minuuttia. Jatkoerä alkaa viipymättä koko jääalueen puhdistuksen jälkeen. • Ennen jatkoaikaa pidetään max. 3 minuutin tauko. • Kaikissa sarjoissa pelataan 3-3 vastaan. • Joukkueet eivät vaihda päätyä jatkoajalle (sama kuin 3. erässä) ➔ Sääntö 63 – Jatkoajan toiminnot  Lisätietoja: IIHF:n kilpailusäännöt (IIHF Sport Regulations)."},{"id":"34.4","title":"MERKINANTOLAITEET","content":"Jos hallia ei ole varustettu automaattisella merkinantolaitteella tai jos tällainen laite on epäkunnossa, peliajanottaja ilmoittaa kunkin erän päättymisestä puhaltamalla pilliin."},{"id":"34.5","title":"ERIEN ALKAMINEN","content":"Peliajanottajan tulee ilmoittaa päätuomareille ja pelaaville joukkueille ottelun sekä kunkin erän alkamisesta, ja päätuomarien tulee aloittaa ottelu viipymättä."},{"id":"34.7","title":"PELIAJAN VARMISTAMINEN","content":"Uusittavien aloitusten takia syntyneet mahdolliset virheelliset peli- tai rangaistuskellojen käynnit korjataan niin hyvin kuin mahdollista (maaotteluissa virheellinen aika on korjattava aina pelikelloon). Otteluissa, joissa on käytössä videotarkastus, asiasta voidaan konsultoida videotuomaristoa, jotta varmistutaan peliajan oikeellisuudesta. Mikäli pelikellon virheellisen ajan korjaaminen uusittavien aloitusten takia on työlästä, voidaan pelikelloa seisottaa korjattavan ajan mukainen aika ennen käynnistämistä. Mikäli uusittavien aloitusten yhteydessä tuomitaan uusia rangaistuksia, on pelikello palautettava aina oikeaan aikaan ennen uusien rangaistusten syöttämistä pelikelloon. Jos peliajan suhteen on näkemyseroja, niin asia siirretään päätuomareiden ratkaistavaksi ja heidän päätöksensä on lopullinen. Päätuomarit voivat käyttää videotuomaristoa apunaan lopullisen päätöksen tekemisessä.→ Sääntö 37.6 (Videotarkistus peliajan varmistamiseksi) OSA 5 – TUOMARISTO Peliaika tulee aina varmistaa käyttämällä varakelloa (sekuntikello). Jos pelikello vikaantuu pelin käydessä, tuomaristo voi katkaista pelin, jos kummallakaan joukkueella ei ole ilmeistä maalintekotilannetta, tai antaa pelin jatkua seuraavaan lailliseen pelikatkoon. Peliajanottajan ja videotuomariston yhteistyöllä pelikello asetetaan oikeaa aikaan. Tilanteessa, jossa videotarkistuksessa todetaan maalin syntyneen ennen pelikatkoa, videotuomaristo informoi peliajanottajaa ja kirjuria oikeasta ajasta ja siitä, kuinka paljon pelikelloa pitää siirtää taaksepäin."}]},"35":{"number":"35","title":"RANGAISTUSAITION VALVOJA","sections":[{"id":"35.1","title":"YLEISET TEHTÄVÄT","content":"Rangaistusaition valvoja kirjaa kaikki tuomariston tuomitsemat rangaistukset paperille, mukaan lukien rangaistujen pelaajien numerot, tuomitut rangaistukset, kunkin rangaistuksen kesto ja aika, jolloin rangaistus tuomittiin. Rangaistusaition valvoja informoi rangaistuja pelaajia kunkin rangaistuksen oikeasta päättymisajasta. Jos pelikello on epäkunnossa, käytetään sekuntikelloa määrittämään kunkin rangaistuksen päättyminen. Muutoin pelikellossa näkyvät rangaistukset ovat virallinen ajanottolaite kaikille niille rangaistuksille, joiden takia joukkueella on jäällä vähemmän kuin viisi (5) kenttäpelaajaa. Pelaaja voidaan vapauttaa rangaistusaitiosta ainoastaan, kun pelikello niin osoittaa tai säännöt muutoin edellyttävät. Jokaisen tuomitun rangaistuksen syy kuulutetaan äänentoistojärjestelmän avulla siten kuin päätuomari on syyn ilmoittanut. Kun samassa pelitilanteessa tuomitaan rangaistuksia kummallekin joukkueelle, vierasjoukkueen rangaistus kuulutetaan ensin. Tilanteissa, joissa yhdelle (1) pelaajalle tuomitaan samalla pelikatkolla useita pelirangaistuksia, ainoastaan yksi (1) pelirangaistus kuulutetaan. Käytösrangaistuksia ja samanaikaisia toisensa kumoavia isoja rangaistuksia ei aseteta ajanottolaitteeseen (rangaistuskello), mutta kyseisiä rangaistuja pelaajia informoidaan ennakolta ja pelaaja päästetään pois rangaistusaitiosta rangaistuksensa päättymistä seuraavalla pelikatkolla. Kun pelaajalle tuomitaan käytösrangaistus muiden rangaistusten lisäksi, käytösrangaistus alkaa vasta, kun kaikki muut rangaistukset on kärsitty (tai ne ovat maalin takia päättyneet). Jos rangaistu pelaaja lähtee rangaistusaitiosta ennen rangaistuksensa päättymistä, rangaistusaition valvojan täytyy merkitä peliaika ylös ja ilmoitettava asiasta päätuomarille ensimmäisen tilaisuuden tullen. Rangaistusaition valvojan tehtävänä on varmistaa, että rangaistut pelaajat palaavat rangaistusaitioon ennen kuin seuraavan erän ensimmäinen aloitus suoritetaan. Jos rangaistu pelaaja ei ole rangaistusaitiossa, rangaistusaition valvojan pitää ilmoittaa asiasta päätuomarille ja estää pelin jatkuminen ennen kuin rangaistu pelaaja on rangaistusaitiossa."},{"id":"35.2","title":"VARUSTEET","content":"Manuaalisten sekuntikellojen tulee olla käytettävissä oikean rangaistusajan määrittämiseksi, jos ajanottojärjestelmä menee epäkuntoon. 86"},{"id":"35.3","title":"MAALIVAHDIN RANGAISTUKSET","content":"Jos maalivahtia rangaistaan, rangaistuksen kärsii joukkueen joku toinen pelaaja, joka oli jäällä pelin katkaisuhetkellä. Tässä yhteydessä kommunikointi kirjurin ja / tai tilastointihenkilöstön kanssa on tärkeää, koska he voivat informoida rangaistusajanottajaa, ketkä pelaajat olivat jäällä, jotta varmistutaan, että oikea pelaaja kärsii rangaistuksen."},{"id":"35.4","title":"RANGAISTUSLAUKAUS","content":"Kirjurin tulee kirjata pöytäkirjaan jokainen tuomittu rangaistuslaukaus, rangaistuslaukauksen aiheuttanut pelaaja, rangaistuslaukauksen aiheuttaneen rikkeen syy, rangaistuslaukauksen suorittaja ja rangaistuslaukauksen tulos."},{"id":"35.5","title":"RANGAISTUSKELLO","content":"Peliajanottajan vastuulla on kaiken aikaa huolehtia, että kärsittävät rangaistukset asetetaan oikein pelikelloon, ja hänen täytyy informoida päätuomareita, jos rangaistusaikojen ja virallisen peliajan välillä on eroa, ja hänen täytyy tehdä tarvittavat päätuomareiden määräämät korjaukset. Kun toisen joukkueen kahdelle pelaajalle ja yhdelle vastajoukkueen pelaajalle tuomitaan rangaistuksia samaan aikaan, kirjurin pitää tiedustella päätuomarin välityksellä, minkä rangaistuksen joukkue haluaa kärsittäväksi rangaistuskelloon."},{"id":"35.6","title":"RAPORTIT","content":"Jos pelaajalle tuomitaan rangaistus, jonka seurauksena on automaattinen ottelusta poistaminen, tämä täytyy rangaistuksen tuomitsemishetkellä kommunikoida päätuomarin kanssa, jotta varmistutaan, että pelirangaistus tuomitaan. Kun rangaistuksia tuomitaan erän viimeisellä minuutilla, jolloin pelikellossa näkyy vielä sekunnin kymmenyksiä, pyöristetään rangaistuksen alkamisaika pöytäkirjassa lähimpään pelikatkoa edeltäneeseen sekuntiin."},{"id":"35.7","title":"MAILAN MITTAUS","content":"Rangaistusajanottajalla pitää olla IIHF:n virallinen mailan mittalaite ja mittanauha, jotta se on päätuomareille saatavilla pelin aikana. Kirjurin tulee myös kirjata erilliselle paperille jokaisen päätuomareiden ottelun aikana suorittaman mailamittauksen yksityiskohdat ja tulokset."},{"id":"35.8","title":"PELIAJAN VAHVISTAMINEN","content":"Jos maali tuomitaan videotarkistuksen avulla, kun pelitilanne on jatkunut pidemmälle, peliajanottajan täytyy muuttaa mahdollisten käynnissä olevien rangaistusten rangaistusajat tilanteen mukaiseksi. Kello palautetaan maalin syntyhetken mukaiseen aikaan. Vastaavasti jos tilanteessa ollut siirretty rangaistusvihellys tuomitaan, niin sen aika muutetaan maalin mukaiseksi."}]},"37":{"number":"37","title":"VIDEOTARKISTUS","sections":[{"id":"37.1","title":"VIDEOTUOMARISTO","content":"Videotuomaristoa ei ole käytössä SJL sarjoissa."},{"id":"37.2","title":"MAALITARKISTUKSEN MENETTELYT","content":"OSA 5 – TUOMARISTO Kun tuomaristo suorittaa videotarkistuksen, kuuluttaja kuuluttaa, että tilanne tarkistetaan videolta. Sitten kun videotarkistus on suoritettu ja todettu maalin syntyneen, maali kuulutetaan normaaliin tapaan. Jos videotarkistuksessa todetaan, että maali pitää hylätä, päätuomari viestii toimitsijalle syyn maalin hylkäämiselle, joka kuulutetaan. Kun tuomaristo tarkistaa mahdollista maalia, jonka jälkeen pelikello on käynyt eteenpäin, eikä tuomaristo ole katkaissut peliä mahdollisen maalin syntymisen jälkeen ja tarkistuksesta selviää, että kyseessä on hyväksyttävä maali, pelikello (mukaan lukien rangaistuskellot, jos niitä on käynnissä) asetetaan maalin syntyhetken mukaiseen aikaan. Jos tarkistuksen tulos on, että maalia ei syntynyt, pelikellon ajan asettamista ei tarvita. Vain yksi maali voidaan hyväksyä yhdellä pelikatkolla. Jos joukkue A teki ilmeisen maalin ja myöhemmin videotarkistuksessa sen vahvistaa, ei yhtään joukkue A:n maalin ja pelikatkon välillä syntynyttä joukkue B:n maalia voi hyväksyä. Jos joukkue A:n maali todetaan syntyneen sääntöjen vastaisesti (toisin sanoen havaittavan potkuliikkeen seurauksena), maalia ei hyväksytä videotarkastuksen toimesta, eikä myöskään joukkue B:n maalia voida hyväksyä, koska peli olisi pitänyt katkaista joukkue A:n ilmeisen maalin takia. Peliaika palautetaan (pelikello ja rangaistuskellot, jos niitä on käynnissä) joukkue A:n ilmeisen maalin tekohetkeen, hyväksytään maali tai ei. Kaikki tämän välisenä aikana (joukkue A:n ilmeinen maali ja todellinen pelikatko) ilmoi
