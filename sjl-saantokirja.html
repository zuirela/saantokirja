. Mikä on linjatuomarin tulkinta? Jos linjatuomari tulkitsee tilanteen paitsioksi, niin, mistä on seuraava aloitus?","answer":"Linjatuomarin on tulkittava tällainen tilanne paitsioksi. Seuraava aloitus on toisesta B-joukkueen puolustusalueen aloituspisteestä (osuma maalivahtiin). Säännöt 83.1 ja 83.6"},{"id":"83.15","rule_number":"83","question":"A11 syöttää kiekon juuri siniviivan yläpuolelta toista siniviivaa kohti. Kiekko osuu matkalla B14 ja päätyy lopulta A14, joka on paitsiossa. Mistä on seuraava aloitus?","answer":"Syöttökohtaa (tässä tilanteessa puolueettomalta alueelta) lähinnä olevasta aloituspisteestä. Sääntö 83.6 HAKEMISTO PELIN VIRTAUS"},{"id":"83.16","rule_number":"83","question":"B4 syöttää kiekon omalta puolustusalueeltaan. Kiekon liike hidastuu matkalla B6:lle, koska se osuu A7. Tämä aiheuttaa B6 ajautumisen paitsioon. Mistä on seuraava aloitus?","answer":"Lähimmästä aloituspisteestä alueelta, josta kiekko syötettiin (eli tässä tapauksessa B:n puolustusalueen aloituspiste). Sääntö 83.6"},{"id":"83.17","rule_number":"83","question":"A-joukkueen puolustaja laukoo ”roikkukiekon” puolustusalueeltaan B:n puolustusalueelle. A:n laitahyökkääjä on paitsioasemassa ja hän paineistaa kovasti B:n puolustajaa, kun he kisaavat siitä kumpi pääsee kiekolle. Hyvää harkintaa käyttäen, linjatuomari katkaisee pelin ennen kuin pelaajat ajautuvat kontaktiin tai kumpikaan koskee kiekkoon. Mistä on seuraava aloitus?","answer":"Vaikka hyökkääjä ei missään vaiheessa pelaakaan kiekkoa, seuraava aloitus suoritetaan lähimmästä sen alueen aloituspisteestä, mistä kiekko alun perin lauottiin. Sääntö 83.6"},{"id":"83.18","rule_number":"83","question":"Kiekko on lauottu hyökkäysalueelle ja linjatuomarilla on käsi ylhäällä siirretyn paitsion merkiksi. Linjatuomari viheltää pilliinsä, koska hyökkääjä jatkaa kiekon perään luistelua (on jo ohittanut p-pisteiden tason). On tulkittavissa, ettei pelaaja ollut tietoinen olevansa paitsioasemassa. Mistä on seuraava 1 aloitus? 0","answer":""},{"id":"83.20","rule_number":"83","question":"A-joukkueelle ollaan tuomitsemassa siirrettynä rangaistusta. B11 laukoo kiekon hyökkäysalueelleen ja syntyy siirretty paitsiotilanne. Kiekko kimpoaa A:n pelaajasta ulos pelialueelta. Mistä on seuraava aloitus?","answer":"Toisesta A-joukkueen puolustusalueen aloituspisteestä."},{"id":"83.21","rule_number":"83","question":"A-joukkue yrittää purkaa kiekon omalta puolustusalueeltaan ”vippaamalla” sen ylös ilmaan. B:n puolustaja yrittää pitää kiekon hyökkäysalueellaan, mutta päätyy lyömään kiekon kädellä puolueettoman alueen puolelta takaisin hyökkäysalueelle. Linjatuomari nostaa käden ylös siirretyn paitsion merkiksi, koska alueella oli hyökkäävän joukkueen pelaajia. Yksi näistä pelaajista pelaa tarkoituksellisesti kiekkoa. Peli vihelletään nyt poikki kahdesta syystä: käsisyöttö ja paitsio (tahallinen). Mikä rike on ns. vahvempi ja mistä on seuraava aloitus?","answer":"Rikkoneelle joukkueelle annetaan mahdollisimman vähän alueellista etua eli tahallinen paitsio ja seuraava aloitus suoritetaan toisesta B:n puolustusalueen aloituspisteestä. HAKEMISTO PELIN VIRTAUS"},{"id":"83.22","rule_number":"83","question":"A41 lyö kiekon kädellä puolueettomalta alueelta hyökkäysalueelle aiheuttaen siirretyn paitsiotilanteen. A46 luistelee alueelle B:n puolustajan ohi ja pelaa kiekkoa. Mikä on tuomio ja mistä seuraava aloitus?","answer":"Tahallinen paitsio ja seuraava aloitus toisesta A:n puolustusalueen aloituspisteestä. Säännöt 83.7 ja 76.2"},{"id":"83.23","rule_number":"83","question":"A-joukkueelle on tulossa siirrettynä rangaistus. B-joukkueella on kiekko hallinnassaan ja heille vihelletään tahallinen paitsio. Mistä on seuraava aloitus?","answer":"Toisesta A:n puolustusalueen aloituspisteestä. Sääntö 83.7 (Myös 76.2 ja 15.5 – ei ole yksi poikkeuksista) HAKEMISTO PELIN VIRTAUS"},{"id":"83.24","rule_number":"83","question":"Linjatuomari on nostanut kätensä ylös A-joukkueen siirretyn paitsion vuoksi. Linjatuomarin mielestä A16 on tietoinen siitä, että paitsio on päällä. Luistellessaan siniviivaa kohti aikomuksenaan puhdistaa alueen, mutta ennen kuin ehtii sen tekemään, A16 päättää huitaista mailalla kiekollista B3 mailaan. B3 menettää hetkellisesti kiekon hallinnan. Miten linjatuomarin kuuluu toimia?","answer":"Linjatuomarin kuuluu katkaista peli ja tuomita tilanne tahalliseksi paitsioksi. Sääntö 83.7"},{"id":"83.25","rule_number":"83","question":"A-joukkue on ottanut maalivahdin pois maaliltaan. B-joukkue laukoo kiekon hyökkäysalueelleen aiheuttaen siirretyn paitsiotilanteen. Siirretyn paitsion ollessa käynnissä B:n pelaajat yrittävät puhdistaa aluetta, eivätkä paineista A-joukkuetta millään tavoin. A17 syöttää kiekon kulmauksesta maalin eteen ja se osuu A18 pohkeeseen, kimmoten siitä suoraan A:n tyhjään maaliin. Kiekon mennessä maaliin siirretty paitsio on edelleen päällä. Mikä on tuomio?","answer":"Maali. Sääntö 83.4"},{"id":"83.26","rule_number":"83","question":"A-joukkue laukoo kiekon B:n maalille. Linjatuomari nostaa käden ylös siirretyn paitsion merkiksi. B:n maalivahti yrittää purkaa kiekon maalin 11 00 takaa, mutta sähläilee jotain ja kiekko menee omaan maaliin. Hyökkäävän joukkueen pelaaja(t) eivät ole vielä ehtineet puhdistaa aluetta, mutta eivät myöskään paineista maalivahti millään tavoin. Hyväksytäänkö maali? O S","answer":""},{"id":"83.28","rule_number":"83","question":"A11 syöttää kiekon juuri oman siniviivansa takaa joukkuekaverilleen, joka seisoo, molemmat jalat puolueettoman alueen puolella, toisella (hyökkäys) siniviivalla. Pelaaja saa syötön lapaansa niin, että maila on siniviivan yli, hyökkäysalueen puolella. Toinen A:n pelaaja on kokonaan hyökkäysalueen puolella, joka aiheuttaa sen, että peli vihelletään poikki paitsion vuoksi. Mistä on seuraava aloitus?","answer":"Vaikka tätä ehdittykään nostaa siirrettynä käteen, koska kiekko tuli alueen puolelle lapaan välittömästi, sitä ei myöskään kuljetettu alueelle. Siksipä seuraava aloitus suoritetaan lähimmästä sen aloituspisteestä, mistä kiekko syötettiin. Sääntö 83.6"},{"id":"83.29","rule_number":"83","question":"Juuri, kun kiekko on menossa hyökkäysalueelle, hyökkääjä hyppää ilmaan siniviivan kohdalla. Onko tämä paitsio?","answer":"Hyppäävän pelaajan luistimet täytyy olla omalla puolella (= siniviivan etureunasta ylöspäin) ennen kuin kiekko alueelle menee. Sääntö 83.1 HAKEMISTO PELIN VIRTAUS"},{"id":"83.30","rule_number":"83","question":"Pelataan 2. erää. A20 laukoo kiekon hyökkäysalueelleen ja linjatuomarilla nousee käsi ylös siirretyn paitsion merkiksi. A21 on hyökkäysalueella ja etenee pelaajapenkkiään kohti ja nousee lopulta laidalle (kohdasta, joka on hyökkäysalueen puolella) ja lopulta pelaajapenkille. Missä vaiheessa A21 tulkitaan olevan pois jäältä, alue ns. puhtaaksi ja hyökkäävän joukkueen pelaajat voivat taas edetä alueelle?","answer":"A21 tulkitaan olevan pois jäältä, kun kumpikaan luistimista ei enää kosketa jäätä ja linjatuomari tulkitsee hänen poistuneen pelialueelta. Jos A21 poistuisi jäältä pelaajapenkin ovesta, tulkitaan hänen olevan pois jäältä, kun takajalka on kokonaan pois jäältä. HUOM! Pelaaja ei voi kumota paitsiotilannetta niin, että nousee vaan laidalle hyökkäysalueella (jalat ilmassa, mutta kentän puolella) ja odottaa kiekon menemistä alueelle ja pudottautuu sitten takaisin jäälle. Tällainen tilanne on paitsio. Sääntö 83.3"},{"id":"83.31","rule_number":"83","question":"Pelataan 2. erää. B22 yrittää poistua hyökkäysalueeltaan ennen kuin joukkuekaverinsa ehtii laukomaan kiekon alueelle. B22 luistelee sitä pelaajapenkin osaa kohti, joka on hyökkäysalueen puolella ja hyppää ilmaan pelaajapenkkiä kohti juuri, kun kiekko ylittää siniviivan. A22 on edelleen ilmassa, eikä siis penkillä. Mikä on tuomio?","answer":"Tämä on siirretty paitsio siihen asti, kun linjatuomarin mielestä B22 on poistunut jäältä ja mennyt pelaajapenkilleen. Toki, jos muita hyökkäävän joukkueen pelaajia on edennyt alueelle ennen B22 poistumista, siirretty paitsio pysyy päällä. Sääntö 83.3"},{"id":"83.32","rule_number":"83","question":"Pelataan 2. erää. B-joukkueen laukoo kiekon hyökkäysalueelleen aiheuttaen siirretyn paitsion tilanteen. B23 on paitsiossa, mutta poistuu pelaajapenkilleen kohdasta, joka on hyökkäysalueen puolella. Samanaikaisesti, B26 tulee jäälle hyökkäysalueen puolelta. Mikä on tuomio?","answer":"Siirretty paitsio pysyy päällä siihen asti, kun kaikki B-joukkueen pelaajat ovat puhdistaneet alueen. Sääntö 83.3"},{"id":"83.33","rule_number":"83","question":"Pelataan 2. erää. B-joukkueen laukoo kiekon hyökkäysalueelleen aiheuttaen siirretyn paitsiotilanteen. B23 on paitsiossa, mutta poistuu pelaajapenkilleen kohdasta, joka on hyökkäysalueen puolella. Samanaikaisesti, B26 tulee jäälle puolueettoman alueen puolelta. Mikä on tuomio?","answer":"Jos kukaan toinen B-joukkueen pelaaja ei edennyt (tai jo ollut siellä) hyökkäysalueelle ennen B23 poistumista jäältä, siirretty paitsio kumoutuu ja hyökkäävän joukkueet saavat taas edetä alueelle. Sääntö 83.3 HAKEMISTO PELIN VIRTAUS"},{"id":"83.34","rule_number":"83","question":"A-joukkue laukoo kiekon hyökkäysalueelleen aiheuttaen siirretyn paitsiotilanteen. A31 kiirehtii siniviivaa kohti, yrittäen puhdistaa alueen niin nopeasti kuin mahdollista. Hän hyppää ilmaan noin puoli metriä ennen siniviivaa ja ”laskeutuu” siniviivan päälle. Missä vaiheessa tulkitaan A31 puhdistaneen alueen?","answer":"A31 katsotaan puhdistaneen alueen sillä hetkellä, kun luistin koskettaa siniviivaa. Jos joku toinen A-joukkueen pelaaja menee alueelle, kun A31 on ilmassa, siirretty paitsio pysyy päällä. Sääntö 83.3 (I)"},{"id":"83.35","rule_number":"83","question":"A-joukkue laukoo kiekon hyökkäysalueelleen aiheuttaen siirretyn paitsiotilanteen. A32 kiirehtii siniviivaa kohti, yrittäen puhdistaa alueen niin nopeasti kuin mahdollista. Hän liu’uttaa jalkansa juuri ja juuri siniviivan päälle. Missä vaiheessa tulkitaan A32 puhdistaneen alueen?","answer":"Siinä vaiheessa, kun A32 luistin koskettaa siniviivaa (3-ulotteinen tulkinta ei ole käytössä näissä tilanteissa). Jos joku toinen A- joukkueen pelaaja menee alueelle ennen A32 viivakosketusta, siirretty paitsio pysyy päällä. Sääntö 83.3 (I)"},{"id":"83.36","rule_number":"83","question":"A67 kuljettaa kiekkoa keskialueen läpi. A4 on hyökkäyssiniviivalla. Kun A67 kuljettaa kiekkoa ja luistelee joukkue B:n pelaajan ohi siniviivalla, joukkueen A4 oikea jalka, joka oli keskialueella, nousee ilmaan. Oikea jalka leijuu siniviivan yläpuolella ja vasen jalka on hyökkäysalueella, kun kiekko ylittää siniviivan. Mikä on linjatuomarin päätös?","answer":"Tämä ei ole paitsio. Sääntö 83.1."},{"id":"83.37","rule_number":"83","question":"A67 kuljettaa kiekkoa keskialueen läpi. A4 uskoo olevansa hyökkäyssiniviivalla. Kun A67 kuljettaa kiekkoa ja luistelee B joukkueen pelaajan ohi siniviivalla, A4 tajuaa, että molemmat jalat ovat hyökkäysalueella. A4 nostaa nopeasti oikean jalan siniviivan yläpuolelle juuri, kun A67 ylittää kiekon kanssa siniviivan. Mikä on linjatuomarin päätös?","answer":"Tämä ei ole paitsio. Sääntö 83.1."},{"id":"83.38","rule_number":"83","question":"A67 kuljettaa kiekkoa keskialueen läpi. A4 on juuri hyökkäysalueen sisäpuolella (molemmat luistimet hyökkäysalueella). Kun A67 lähestyy hyökkäyssiniviivaa, kiekko heitetään kulmaan, ja linjatuomari osoittaa siirretyn paitsion. A4 tajuaa olevansa paitsiossa ja kurottaa yhden jalan taaksepäin, heilauttaen sen siniviivan yli, ja jatkaa sitten kiekon tavoittelua. Mikä on linjamiehen päätös?","answer":"Siirretty paitsio pysyy päällä ja jos A4 jatkaa peliä peli pysäytetään paitsiona. A4 ei koskettanut luistimellaan siniviivaa nollatakseen paitsiotilanteen. Sääntö 83.3. HAKEMISTO PELIN VIRTAUS"},{"id":"83.39","rule_number":"83","question":"Pelaaja vastaanottaa syötön puolueettomalla alueella juuri ennen hyökkäyssiniviivansa. Ennen kuin pelaajan luistimet ylittävät siniviivan, hän menettää hetkellisesti kiekon hallinnan ja luistimet menevät lopulta hyökkäysalueelle ennen kiekkoa. Onko tämä paitsio?","answer":"On. Pelaajalla ei ole kiekko hallinnassaan, kun se menee vastaanoton jälkeen taaksepäin (luistimet siksi alueella ensin), eikä kiekko jatka eteenpäin menevää liikettä pelaajan mukana."},{"id":"83.40","rule_number":"83","question":"Pelaaja on hyppäämässä vaihdosta jäälle suoraan hyökkäysalueen puolelle. Pelaajalla on yksi jalka laidan yli, kun kiekko menee hyökkäysalueelle. Onko tämä paitsio?","answer":"Ei ole. Pelaajan tulkitaan olevan jäällä, kun molemmat luistimet ovat siellä. Sääntö 74.1"},{"id":"83.41","rule_number":"83","question":"Pelaaja on hyppäämässä hyökkäysalueeltaan vaihtoon pelaajapenkilleen. Kun hänen toinen jalkansa on pelaajapenkin puolella ja toinen jalka 1 on vielä ilmassa, hänen joukkuekaverinsa luistelee kiekon kanssa hyökkäysalueelle. Onko tämä paitsio? 0","answer":""}],"84":[{"id":"84.2","rule_number":"84","question":"A10 ja B4 tuomitaan samanaikaiset pienet rangaistukset 3. erässä ajassa 19:10 (erää jäljellä 0:50). Kun erää on jäljellä 0:10 (eli ajassa 19:50), A17 tuomitaan pieni rangaistus. Mikä on pelaajavahvuus jäällä jatkoajan alussa ja sen aikana?","answer":"A10 ja B4 ei kärsitä kellossa. Jatkoaika aloitetaan pelaamalla 3 vs. 4. Ensimmäisellä pelikatkolla (jos lisärangaistuksia ei ole tuomittu) A17 rangaistuksen päättymisen jälkeen, peliä jatketaan 3 vs. 3. Säännöt 19.1 ja 84.3 . HAKEMISTO PELIN VIRTAUS"},{"id":"84.3","rule_number":"84","question":"Kun varsinaista peliaikaa on jäljellä 1:30, tuomitaan seuraavat rangaistukset: A10 2´ A6 2´ A12 2+2´ B2 2´ Mikä on pelaajavahvuus jäällä, kun jatkoaika alkaa? Mikä on pelaajavahvuus vihellyksen jälkeen, kun jatkoaikaa on pelattu 1:01","answer":"Jatkoaika aloitetaan 3 vs. 5. Ensimmäisen vihellyksen jälkeen, kun on pelattua 1:01, peliä jatketaan 3 vs. 4 (Olettaen, että A10 tai A6 ei kumottu yhdessä B2 rangaistuksen kanssa.) Sääntö 84.3"},{"id":"84.4","rule_number":"84","question":"Runkosarjaottelun 3.erän loppupuolella tuomitaan A11 ja B17 pieni rangaistus (2´). Mikä on pelaajavahvuus jäällä, kun jatkoaika alkaa?","answer":"Koska nämä ovat samanaikaisia rangaistuksia, ne eivät mene kelloon enää jatkoajalla. Jatkoaika aloitetaan 3 vs. 3. Ensimmäisellä pelikatkolla rangaistusten päättymisen jälkeen pelaajat päästetään pois rangaistusaitiosta. Sääntö 84.3"},{"id":"84.5","rule_number":"84","question":"Voittomaalikisan aikana maalivahti lähtee alueeltaan ennen kuin suorittaja koskee kiekkoon. Miten päätuomarin kuuluu toimia? Entä, jos maalivahti tekee sen toisen kerran?","answer":"Ensimmäisellä kerralla päätuomari antaa suorituksen jatkua. Jos ei tule maalia, suoritus uusitaan. Jos maalivahti tekee rikkomuksen uudestaan, ja ei tule maali, suoritus uusitaan. Sen lisäksi maalivahdille tuomitaan käytösrangaistus (10´). Maalivahdin saamaa käytösrangaistusta täytyy mennä kärsimään pelaaja, joka ei ole vielä kisaan osallistunut, eikä näin ollen voi osallistuakaan enää. Säännöt 24.4 ja 84.4"},{"id":"84.6","rule_number":"84","question":"Ensimmäisestä yrityksestä voittomaalikisassa tulee maali ja sen jälkeen maalivahdille tuomitaan käytösrangaistus (10´). Voiko maalivahti jatkaa torjumista tässä kisassa? Miten päätuomari toimii tilanteessa?","answer":"Kyllä, maalivahti voi jatkaa torjumista kyseisessä voittomaalikilpailussa. Maalivahdin saamaa käytösrangaistusta täytyy mennä kärsimään pelaaja, joka ei ole vielä kisaan osallistunut, eikä näin ollen voi osallistuakaan enää. Säännöt 27.3 ja 84.4 HAKEMISTO PELIN VIRTAUS"},{"id":"84.7","rule_number":"84","question":"Yksi minuutti jäljellä jatkoajassa. Seuraavat rangaistukset määrätään: A3 – pieni rangaistus A17 – pieni rangaistus ja 10 minuutin käytösrangaistus A31 (maalivahti) – pieni rangaistus ja 10 minuutin käytösrangaistus (pieni rangaistus kärsitään pelaajalla A44, käytösrangaistus pelaajalla A16) B7 – pieni rangaistus B2 – pieni rangaistus ja 10 minuutin käytösrangaistus Peli päättyy tasan jatkoajan jälkeen. Ketkä pelaajista saavat osallistua rangaistuslaukauskilpailuun ja ketkä eivät? Mihin sääntöön tämä perustuu?","answer":"Yksikään pelaajista ei ole käytettävissä rangaistuslaukauskilpailuun. (Sääntö 84.4 kohta III) 1 0"},{"id":"84.8","rule_number":"84","question":"O S Voittomaalikisan suorituksen aikana suorittaja yrittää harhauttaa maalivahdin, kaatuu ja liukuu päin maalivahtia. Kiekko ei mene A maaliin, mutta maalivahti loukkaantuu. Joukkue vaihtaa varamaalivahdin maalille torjumaan seuraavaa yritystä. Sallitaanko tälle · P maalivahdille lämmittelyä? E L","answer":""},{"id":"84.10","rule_number":"84","question":"A10 ja B4 tuomitaan pienet rangaistukset väkivaltaisuudesta 3. erässä ajassa 19:10 (erää jäljellä 0:50). Mikä on pelaajavahvuus jäällä, kun jatkoaika alkaa?","answer":"Joukkueet aloittavat jatkoajan pelaamalla 3 vs. 3. Sääntö 84"},{"id":"84.11","rule_number":"84","question":"Kun varsinaista peliaikaa on jäljellä 1:40, tuomitaan A14 pieni rangaistus (2´). Varsinaisen peliajan päättyessä, tuomitaan A3 2´ huitomisesta ja 2´ väkivaltaisuudesta. Sen lisäksi tuomitaan B24 2´ väkivaltaisuudesta. 1) Mikä on pelaajavahvuus jäällä, kun jatkoaika alkaa? 2) Mikä on pelaajavahvuus, kun A14 rangaistus päättyy? 3) Mikä on pelaajavahvuus ensimmäisen pelikatkon jälkeen, kun jatkoaikaa on pelattu yksi minuutti.","answer":"1) Jatkoaika aloitetaan 3 vs. 5. HAKEMISTO PELIN VIRTAUS 2) A14 rangaistuksen päättyessä, hän tulee jäälle ja pelaajavahvuus on nyt 4 vs. 5. 3) Ensimmäisellä pelikatkolla, pelaajavahvuus ”päivitetään” 3 vs. 4. Seuraava pelikatkon jälkeen, kun A:n viimeinen rangaistus on päättynyt, pelaajavahvuus muutetaan 3 vs. 3. Sääntö 84.3"},{"id":"84.12","rule_number":"84","question":"Molempien joukkueiden pelaajalle tuomitaan 2´samassa ajassa jatkoajalla. Miten jatketaan?","answer":"3 vs. 3 (ei laiteta kelloon). Pääsevät jäälle seuraavalla pelikatkolla rangaistusajan päättymisen jälkeen. Sääntö 84.3"},{"id":"84.13","rule_number":"84","question":"Joukkueet pelaavat jatkoajalla 3 vs 3, kun A-joukkueelle on tulossa siirrettynä rangaistus. B-joukkueen maalivahti menee pelaajapenkilleen, jotta hänet voidaan vaihtaa ylimääräiseen kenttäpelaajaan. B-joukkue syöttää tahattomasti (ja ilman A:n vaikutusta/painostusta) kiekon niin, että se menee omaan maaliin. Voiko A-joukkue voittaa pelin tällä tavoin?","answer":"Voi. Sääntö 84.2"},{"id":"84.14","rule_number":"84","question":"A8 on aiemmin ottelussa varoitettu pelipaidan laittamisesta takapuolelta housun kauluksen sisään. A8 noudattaa tätä loppupelin ajan, eikä rangaistusta ole tarvetta tuomita. Ottelu etenee lopulta voittomaalikisaan. A8 (tietäen, että häntä on aiemmin siitä varoitettu) 1 0 laittaa jälleen pelipaitaa housuihin lähestyessään keskiympyrää ja aloittamaan voittomaalikisan suoritusta. Miten päätuomarit toimivat tällaisessa tilanteessa? O S","answer":""}],"85":[{"id":"85.2","rule_number":"85","question":"Hyökkäävän joukkueen pelaaja laukoo kiekon hyökkäysalueelleen. Toinen hyökkäävän joukkueen pelaaja etenee alueelle ennen kiekkoa aiheuttaen siirretyn paitsiotilanteen. Lauottu kiekko osuu maalitolppaan ja kimpoaa siitä ulos pelialueelta. Mistä on seuraava aloitus?","answer":"Alkuperäistä laukausta lähinnä olevasta puolueettoman alueen aloituspisteestä. Sääntö 83.6 HAKEMISTO PELIN VIRTAUS"},{"id":"85.3","rule_number":"85","question":"Jos pelaaja laukoo kiekon niin, että se osuu ylärimaan ja kimpoaa siitä suoraan ulos pelialueelta, niin mistä on seuraava aloitus?","answer":"Säännöt 85.1 ja 85.5 toteavat, että siltä alueelta, mistä kiekko lauottiin."},{"id":"85.4","rule_number":"85","question":"A-joukkue pelaa ylivoimaa hyökkäysalueellaan. A11 laukoo kiekon ja se kimpoaa ylärimasta suojalasiin, joka rikkoutuu. Kiekko tipahtaa jäälle ja ennen kuin päätuomari ehtii katkaista pelin, kahden pelaajan kamppailu (vartalot suojalasiin) rikkoo suojalasin lopullisesti. Mistä on seuraava aloitus?","answer":"B-joukkueen puolustusalueen aloituspisteestä. Säännöt 85.1 ja 85.5 HAKEMISTO PELIN VIRTAUS"},{"id":"85.5","rule_number":"85","question":"Hyökkäävälle joukkueelle (A) on tulossa siirrettynä rangaistus heidän hyökkäysalueellaan. Puolustavan (B) joukkueen pelaaja laukoo kiekon yli suojalasin ulos pelialueelta. Mistä on seuraava aloitus?","answer":"B-joukkueen puolustusalueen aloituspisteestä, kiekon ulos pelialueelta laukoneelle pelaajalle tuomitaan myös rangaistus pelin viivyttämisestä. Säännöt 85.1 ja 63.2"},{"id":"85.6","rule_number":"85","question":"Puolustava joukkueen pelaaja ”vippaa” kiekon ylös ilmaan puolustusalueeltaan ja kiekko osuu pelikelloon (kuutioon). Onko tämä rangaistus pelin viivyttämisestä?","answer":"Ei. Jäähy tulee siitä, kun laukoo kiekon suojalasin yli ulos pelialueelta. Säännöt 63.2 ja 85.1 HAKEMISTO PELIN VIRTAUS"},{"id":"85.7","rule_number":"85","question":"A-joukkueen pelaaja laukoo kiekon hyökkäysalueelleen juuri puolueettoman alueen puolelta, siniviivan takaa. Laukaus on korkea ja se osuu suoraan suojalasiin, joka rikkoutuu. Mistä on seuraava aloitus?","answer":"Lähimmästä sen alueen aloituspisteestä, mistä kiekko lauottiin. Kiekko lauottiin puolueettomalta alueelta, joten sieltä kuuluu suorittaa myös seuraava aloitus. Säännöt 85.1 ja 85.5"},{"id":"85.8","rule_number":"85","question":"A-joukkue pelaaja vajaalukuisena. A12 laukoo kiekon omalta puolustusalueelta toiseen päähään. Kiekko osuu suojalasiin ja päätyy maalin päälle (verkolle). Päätuomari katkaisee pelin. Mistä on seuraava aloitus?","answer":"Laukausta lähinnä olevasta A-joukkueen puolustusalueen aloituspisteestä. Säännöt 85.1 ja 85.5"},{"id":"85.9","rule_number":"85","question":"A11 ylittää punaviivan kiekon kanssa. Ennen kuin hän ehtii siniviivalle, hän laukoo kiekon. Kiekko osuu ylärimaan ja menee ulos pelialueelta. Mistä on seuraava aloitus? 1 0","answer":"O Lähimmästä sen alueen aloituspisteestä, mistä kiekko lauottiin. Säännöt 85.1 ja 85.5 S A ·"},{"id":"85.11","rule_number":"85","question":"Hyökkäävän joukkueen sentteri voittaa päätyalueen aloituksen, mutta kiekko menee samalla suoraan ulos pelialueelta. Mistä on seuraava aloitus?","answer":"Samalta pisteeltä. Sääntö 85.1"},{"id":"85.12","rule_number":"85","question":"Puolustavan joukkueen pelaaja laukoo kiekon puolustusalueeltaan. Kiekko menee puolueettoman alueen puolelta vastustajan pelaajapenkin avoimesta ovesta sisään. Mistä on seuraava aloitus?","answer":"Seuraava aloitus suoritetaan lähimmästä puolueettoman alueen aloituspisteestä, mistä kiekko meni avoimesta ovesta vastustajan pelaajapenkille. Samanlaista tulkintaa käytetään myös silloin, kun kiekko osuu pelaajapenkillä olevan hanskaan, joka ”roikkuu” pelialueen puolella. Sääntö 85.1 HUOM! Jos sama tilanne tapahtuisi niin, että kiekko menee ulos pelialueelta puolustavan joukkueen avoimesta pelaajapenkin ovesta, seuraava aloitus suoritetaan puolustusalueen aloituspisteestä. Sääntö 85.1 HAKEMISTO PELIN VIRTAUS"},{"id":"85.13","rule_number":"85","question":"A-joukkue yrittää purkaa kiekkoa omalta alueeltaan. A:n puolustaja laukoo kiekon ulos puolustusalueeltaan, mutta suoraan heidän pelaajapenkin avoimesta ovesta sisään. Mistä on seuraava aloitus?","answer":"A:n puolustusalueen aloituspisteestä. Sääntö 85.1"},{"id":"85.14","rule_number":"85","question":"Pelataan 2. erää. A-joukkue purkaa kiekko puolustusalueeltaan samalla, kun B-joukkue tekee pelaajavaihtoja. Kiekko osuu avonaiseen pelaajapenkin oveen ja kimpoaa takaisin jäälle. Lähimpänä oleva linjatuomari katkaisee pelin välittömästi. Mistä on seuraava aloitus?","answer":"B:n pelaajapenkkiä lähimpänä olevasta puolueettoman alueen aloituspisteestä. Sääntö 85.1"},{"id":"85.15","rule_number":"85","question":"A-joukkueen puolustaja tuo kiekkoa pois puolustusalueeltaan. Heti (puolustus) siniviivan ylityksen jälkeen, hän yrittää syöttää laitahyökkääjälle. Syötön aikana B-joukkue on vaihtamassa pelaajiaan ja puolustajien vaihtoon tarkoitettu ovi on avoinna. Jos syöttö menee B:n pelaajapenkin avoimesta ovesta sisään, mistä on seuraava aloitus? 1 0","answer":"B:n pelaajapenkkiä lähimpänä olevasta puolueettoman alueen aloituspisteestä. Sääntö 85.1 O S A"},{"id":"85.16","rule_number":"85","question":"· P E L A-joukkue on hyökkäysalueellaan. Maalin ympärillä on iso ”hässäkkä”. Sen yhteydessä maalikehikkoon tulee kontaktia myös ja se I N nousee ilmaan, mutta pysyy vielä joustotapeissaan. Kiekko lauotaan maalille maalin takaa, ilmassa olevan maalikehikon alta. Miten V tuomareiden pitää toimia, jos tällaista tapahtuu? I R T","answer":""},{"id":"85.17","rule_number":"85","question":"Pelaajat kamppailevat kiekosta maalin läheisyydessä. Sen yhteydessä maalikehikko siirtyy hieman eteenpäin ja lopulta kiekko menee maaliin sen takapuolelta. Mitä tuomariston kuuluu tehdä?","answer":"Jos tuomaristo havaitsee, että kiekko menee maalin alta (joko sivusta tai takaa) tai verkon läpi (sivusta/takaa), peli tulee katkaista välittömästi. Seuraava aloitus suoritetaan lähimmästä sen alueen aloituspisteestä, missä peli katkaistiin. Sääntö 85.2"},{"id":"85.18","rule_number":"85","question":"B-joukkue laukoo kiekon omalta kenttäpuoliskoltaan toista päätyä kohti ja aiheuttaa pitkän tilanteen. Kiekko osuu matkalla tuomariin, mutta jatkaa edelleen matkaa toiseen päätyyn. Onko pitkä edelleen voimassa?","answer":"Kyllä 85.1 ja 85.4 HAKEMISTO PELIN VIRTAUS"},{"id":"85.19","rule_number":"85","question":"Pelaaja laukoo kiekon hyökkäysalueellaan. Se osuu samalla alueella olevaan tuomariin ja kimpoaa suoraan ulos pelialueelta. Mistä on seuraava aloitus?","answer":"Sen alueen lähimmästä aloituspisteestä, missä kiekko osui tuomariin. Sääntö 85.4"},{"id":"85.20","rule_number":"85","question":"Puolustavan joukkueen pelaaja yrittää purkaa kiekon pois puolustusalueeltaan. Pelaaja laukoo kiekon ja se osuu linjatuomari olkapäähän, kimmoten siitä pelaajapenkille. Linjatuomari seisoi osumahetkellä puolueettoman alueen puolella, juuri siniviivan yläpuolella. On selvää, että kiekko olisi päätynyt pelaajapenkille ilman osumista linjatuomaria olkapäähän. Mistä on seuraava aloitus?","answer":"Puolueettoman alueen aloituspisteestä, puolustavan joukkueen siniviivan läheisyydestä. Kun kiekko osuu tuomariin ja kimpoaa siitä pelialueen ulkopuolelle, on seuraava aloitus sen alueen lähimmästä aloituspisteestä, missä kiekko tuomariin osui. Sääntö 85.4"},{"id":"85.21","rule_number":"85","question":"B8 laukoo kiekon omalta puolustusalueeltaan ja se osuu puolueettomalla alueella olevaan tuomariin ja kimpoaa ulos pelialueelta. Mistä on seuraava aloitus? 1 0","answer":"Kun kiekko osuu tuomariin ja kimpoaa siitä pelialueen ulkopuolelle, on seuraava aloitus sen alueen lähimmästä aloituspisteestä, missä kiekko O S tuomariin osui. Sääntö 85.4 A · P"},{"id":"85.23","rule_number":"85","question":"A16 on puolustusalueellaan ja B4 paineistaa häntä. A16 laukoo kiekon aina toiseen päätyyn asti. Kiekko on ilmassa koko matkan ja osuu lopulta ylärimaan ja kimpoaa siitä pelialueen ulkopuolelle. Mistä on seuraava aloitus?","answer":"Lähimmästä A-joukkueen puolustusalueen aloituspisteestä, mistä kiekko lauottiin. Sääntö 85.1"},{"id":"85.24","rule_number":"85","question":"A-joukkueen puolustava pelaaja yrittää pitkää ”lättysyöttöä” omalta puolustusalueeltaan joukkuekaverille, joka on (hyökkäys) siniviivalla. Syöttö kimpoaa ulos pelialueelta B:n pelaajasta, joka on osumahetkellä punaviivan em. siniviivan välissä. Mistä on seuraava aloitus?","answer":"Seuraava aloitus suoritetaan puolueettoman alueen aloituspisteestä, B:n puolustusalueen ulkopuolelta. Sääntö 85.1 Ja, jotta ollaan linjassa muiden sääntötulkintojen kanssa, niin aloituspaikan pitää antaa B:lle mahdollisimman alueellista etua. HAKEMISTO PELIN VIRTAUS"},{"id":"85.25","rule_number":"85","question":"B84 laukoo kiekon omalta puolustusalueeltaan. Kiekko osuu puolueettomalla alueella olevaa linjatuomaria ja kimpoaa ulos pelialueelta. Mistä on seuraava aloitus?","answer":"Lähimmästä puolueettoman alueen aloituspisteestä, missä kiekko linjatuomariin osui. Sääntö 85.4"},{"id":"85.26","rule_number":"85","question":"Pelaaja yrittää laukoa pitkää kiekkoa omalta puolustusalueeltaan. Kiekko osuu matkalla tuomariin, joka on puolueettomalla alueella. Mistä on seuraava aloitus?","answer":"Lähimmästä puolueettoman alueen aloituspisteestä, missä kiekko tuomariin osui. Sääntö 85.4"},{"id":"85.27","rule_number":"85","question":"A-joukkueen pelaaja laukoo kiekon omalta puolustusalueeltaan B:n pelaajapenkin avoimesta ovesta sisään. Kyseinen ovi on hyökkäysalueen puolella. Mistä on seuraava aloitus?","answer":"1 0 Kun kiekko menee vastustajan pelaajanpenkin avoimesta ovesta sisään, seuraava aloitus pitää suorittaa, lähinnä tätä pelaajapenkkiä olevasta, puolueettoman alueen aloituspisteestä. O S A"},{"id":"85.28","rule_number":"85","question":"· B-joukkue on hyökkäysalueellaan. B3 laukoo kiekon viivasta maalille. B4 ohjaa kiekkoa korkealla mailalla. Kiekko osuu ohjauksesta ylärimaan P E ja menee siitä suoraan ulos pelialueelta. Mistä on seuraava aloitus? L I N V I R","answer":""},{"id":"85.29","rule_number":"85","question":"Hyökkäävän joukkueen puolustaja laukoo kiekon maalille juuri siniviivan alapuolelta, hyökkäysalueelta. Kiekko jää jumiin maaliverkolle muovisen lipareen ja verkon väliin. Mistä on seuraava aloitus?","answer":"Aloitus jää toiseen hyökkäysalueen aloituspisteeseen. Sääntö 85.5"},{"id":"85.30","rule_number":"85","question":"Kiekko osuu televisiokameraan, joka on suojalasin yläpuolella. Kiekko pysyy sen vuoksi pelialueella. Tuomitaanko tästä rangaistus pelin viivyttämisestä, jos kiekko lauottiin puolustustavan pelaajan toimesta hänen puolustusalueeltaan?","answer":"Ei rangaistusta ja pelin annetaan jatkua. Sääntö 85.1"},{"id":"85.31","rule_number":"85","question":"Hyökkäävän joukkueen pelaaja pelaa kiekkoa korkealla mailalla hyökkäysalueellaan ja kiekko menee suoraan ulos pelialueelta. Mistä on seuraava aloitus?","answer":"Toisesta puolueettoman alueen aloituspisteestä. Hyökkäävä joukkue ei saa saavuttaa etua sääntöjenvastaisesta tavasta pelata kiekkoa. Säännöt 80.2 ja 85.5 HAKEMISTO PELIN VIRTAUS"},{"id":"85.32","rule_number":"85","question":"Hyökkäävän joukkueen pelaaja lyö ilmassa olevaa kiekkoa kädellä hyökkäysalueellaan ja kiekko menee suoraan ulos pelialueelta. Mistä on seuraava aloitus?","answer":"Toisesta puolueettoman alueen aloituspisteestä. Hyökkäävä joukkue ei saa saavuttaa etua sääntöjenvastaisesta tavasta pelata kiekkoa. Säännöt 79.3 ja 85.5"},{"id":"85.33","rule_number":"85","question":"Pelaaja laukoo kiekon jäätä pitkin ja se menee jäälle hylätyn hanskan sisälle. Katkaistaanko peli?","answer":"Kyllä. Seuraava aloitus suoritetaan lähimmästä aloituspisteestä, missä peli katkaistiin. Sääntö 85.2 HAKEMISTO PELIN VIRTAUS"}],"86":[{"id":"86.1","rule_number":"86","question":"Mikä rangaistus tuomitaan joukkueelle, jos he eivät ole jäällä, kun erätauon aika on nollaantunut pelikellosta ja 2./3. erän tai jatkoajan pitäisi alkaa?","answer":"Joukkuerangaistus (JR). Sääntö 86.2"},{"id":"86.2","rule_number":"86","question":"Pelikello näyttää, että erätaukoa on jäljellä 30 sekuntia, eikä kotijoukkueesta näy merkkiäkään, että olisivat tulossa toisen erän alkuun. Miten, jos yhtään mitenkään, kuuluu tuomariston toimia ja mikä on minimivaatimus joukkueelle, että välttävät rangaistuksen tällaisessa tilanteessa?","answer":"Tuomariston kuuluu toimia ennakoivasti ja kommunikoida kyseisen joukkueen henkilöstölle tai jopa mennä joukkueen pukuhuoneen tienoille varoittamaan, että nyt olisi aika tulla jatkamaan peliä. Kuitenkin, jos he edelleen ovat myöhässä jäällä, kuuluu joukkuerangaistus tuomita. Sääntö 86.2 1 0"},{"id":"86.3","rule_number":"86","question":"O S Ottelun alussa, kun pelikelloon pyörähtää 0:00, vierasjoukkue ei ole jäällä, eikä näytä olevan edes tulossa jäälle. Tuomitaanko tästä A rangaistus? · P","answer":""}],"87":[{"id":"87.1","rule_number":"87","question":"Aloituksen aikana laitahyökkääjä tulee ympyrään liian aikaisin ja linjatuomari varoittaa rikkoneen joukkueen sentteriä. Tämän jälkeen puolustava joukkue pyytää aikalisää. Pitääkö tämän aikalisäpyynnön tulla ennen kuin linjatuomari viheltää pilliinsä toisen yrityksen merkiksi?","answer":"Aikalisää ei myönnetä aloitusrikkeen jälkeen. Sääntö 87.1"},{"id":"87.2","rule_number":"87","question":"Aloitusta ollaan juuri suorittamassa A-joukkueen puolustusalueella. Linjatuomari varoittaa A:n sentteriä aloitusrikkeestä. B-joukkue pyytää tämän jälkeen aikalisää. Annetaanko se?","answer":"Aikalisää ei myönnetä aloitusrikkeen jälkeen. Sääntö 87.1 HAKEMISTO PELIN VIRTAUS"},{"id":"87.3","rule_number":"87","question":"A-joukkueen hyväksi on tuomittu rangaistuslaukaus. Päätuomarit ovat muistuttaneet niin laukojaa kuin maalivahtia heidän velvollisuuksistaan suorituksen aikana. Nyt B-joukkue ilmaisee linjatuomarille haluavansa aikalisän. Miten linjatuomarin kuuluu toimia?","answer":"Linjatuomari kertoo aikalisää pyytäneelle joukkueelle, että sitä ei voida heille enää myöntää, koska päätuomarit ovat jo ohjeistaneet rangaistuslaukaukseen osalliset. Sääntö 87.1"},{"id":"87.4","rule_number":"87","question":"A-joukkueen hyväksi tuomitaan rangaistuslaukaus. Ennen kuin päätuomari ehtii edes ilmoittamaan sitä toimitsija-aitiolle, B-joukkueen kapteeni pyytää aikalisää. Myönnetäänkö se heille tällä kertaa?","answer":"Kyllä. Pyyntö tehtiin ennen kuin päätuomarit ovat ohjeistaneet laukojan ja torjuvan maalivahdin. Sääntö 87.1"},{"id":"87.5","rule_number":"87","question":"A-joukkueen hyväksi on tuomittu rangaistuslaukaus. Päätuomari ilmoittaa rangaistuksen toimitsija-aitioon. Kun päätuomari on matkalla maalille, B-joukkueen kapteeni pyytää aikalisää. Myöntääkö päätuomari sen heille? 1 0","answer":"O Kyllä. Pyyntö tehtiin ennen kuin päätuomarit ovat ohjeistaneet laukojan ja torjuvan maalivahdin. Sääntö 87.1 S A ·"},{"id":"87.7","rule_number":"87","question":"A-joukkueen hyväksi on tuomittu rangaistuslaukaus. Kun tuomaristo ja pelaajat ovat paikoillaan ja valmiina suoritusta varten, B-joukkueen valmentaja haluaa aikalisän. Voiko valmentaja toimia näin?","answer":"Ei. Aikalisää ei myönnetä enää sen jälkeen, kun päätuomarit ovat ohjeistaneet laukojan ja torjuvan maalivahdin. Sääntö 87.1"},{"id":"87.8","rule_number":"87","question":"Pelataan 3. erän loppupuolta ja seuraava aloitus suoritetaan A-joukkueen puolustusalueelta. A:n maalivahti on loukannut itseään ja hän jättää jään. A-joukkue korvaa hänet varamaalivahdillaan. Kun varamaalivahti on matkalla maalille, pyytää B-joukkueen valmentaja aikalisää. Kun ajanottajaa on informoitu B:n aikalisästä, on A-joukkueen pelaaja samalla ottanut pari kiekkoa pelaajapenkiltään ja menee lämmittämään heidän varamaalivahtiaan, joka jäälle vaihdettiin. Miten tuomaristo hoitaa tilanteen? Tuomitaanko A-joukkueelle rangaistus?","answer":"Aikalisän aikana ei sallita maalivahdin lämmittämistä kiekolla. Jos tämä jatkuu päätuomarin varoituksen/kehoituksen jälkeen, rikkoneelle joukkueelle tuomitaan rangaistus pelin viivyttämisestä. Sääntö 87.1 HAKEMISTO PELIN VIRTAUS"},{"id":"87.9","rule_number":"87","question":"Voiko mainoskatkon pitää maalin jälkeen?","answer":"Ei, katso sääntö 87.2. SJL HUOM: kts. Mestiksen sarjakohtaiset määräykset"},{"id":"87.10","rule_number":"87","question":"Ottelua, jossa mahdollinen jatkoaika pelataan 3 vs. 3, on jäljellä enää 16 sekuntia. B-joukkueelle tuomitaan pieni rangaistus. A- joukkue pyytää aikalisää ja se heille myönnetään. Juuri, kun aikalisä on loppumassa, pyytää B-joukkue nyt aikalisää. Myönnetäänkö se heille?","answer":"Ei. Yksi aikalisä (mainoskatko) / pelikatko. Sääntö 87"},{"id":"87.11","rule_number":"87","question":"A-joukkue tekee maalin. Seuranneen pelikatkon loppupuolella B-joukkueen valmentaja pyytää aikalisää saadakseen aikaa miettimiseen, että haastaako maalin vai ei.","answer":"Maalia seuranneella katkolla voi pyytää aikalisää, mutta katkon jälkeen ei pysty enää käynnistämään valmentajan haastoa. Sääntö 87 ja 38 SJL HUOM: Ei haastoa käytössä"}],"14":[{"id":"14.1","rule_number":"14","question":"Maalivahdin patjat vaativat säätämistä. Onko maalivahdilla lupa mennä pelaajapenkille vai pitääkö hänen pysyä maalillaan?","answer":"Maalivahti voi mennä pelaajapenkille tuomariston luvalla korjaamaan patjojaan, kunhan se ei aiheuta merkittävää viivytystä pelin jatkumiseen. Jos se aiheuttaa merkittävän viivytyksen, tulee maalivahti korvata varamaalivahdilla seuraavaan pelikatkoon asti. Sääntö 14.1 0 3 O S A · V A R U S T E E T HAKEMISTO OSA 04 RANGAISTUSLAJIT 0 4 O S A · R A N G A I S T U L A J I T RANGAISTUSLAJIT"}],"202":[{"id":"202.1","rule_number":"202","question":"Pelaaja pelaa ilman kaulasuojusta junioripelissä. Tulkitaanko tilannetta säännön 12 vai säännön 202.7 mukaan?","answer":"Kaikista varustesäännön noudattamatta jättämisestä junioripelissä rangaistaan säännön 202.7 mukaisesti, ei vain junioreiden erityisten varustesääntöjen mukaan. HAKEMISTO OSA 11 S E K A L A I S T A 1 1 S E K A L A I S T A SEKALAISTA M 1 Maalivahti menettää kiinniottokäsineensä pelin käydessä. Katkaistaanko peli? VASTAUS Jos päätuomarin mielestä tilanne aiheuttaa välittömän loukkaantumisriskin, on peli katkaistava. Päätuomari voi antaa pelin jatkua, jos vastustajalla on välitön maalintekotilanne tai ovat pääsemässä maalintekotilanteeseen. Näissä tilanteissa tärkeintä on tuomarin pelisilmä ja maalaisjärki. Suoraa vastausta et tähän löydä sääntökirjasta. M 2 Peli lähtee pois päätyalueelta. Linjatuomari huomaa, että maali on pois paikoiltaan (alueella, mistä peli lähti pois). Linjatuomari ei kuitenkaan tiedä, miten tai miksi maali on pois paikoiltaan. Miten hänen kuuluu toimia? VASTAUS Linjatuomari voi puhaltaa pilliinsä, jos maalikehikko on kokonaan pois paikoiltaan, eikä päätuomarit sitä havaitse. HUOM!! Ei kuitenkaan silloin, kun hyökkääjällä on mahdollinen ”act of shooting”- tilanne, eikä silloin, kun puolustava joukkue lähtee alueelta pois kiekon kanssa. Silloin pilliin, kun peli pyörii päädyssä. Tämä ”pelastaa” päätuomarit kiusalliselta tilanteelta, kun peli vaan jatkuu maalin ollessa pois paikoiltaan. On tärkeää, että tiedostamme kuka hallitsee kiekkoa, kun puhallamme pilliin. Ja vieläkin tärkeämpää on se, että meillä olisi tietoa siitä, miten ja miksi maali pois paikoiltaan lähti. 1 1 M 3 S Ottelu on ratkennut ja sitä on jäljellä enää muutama sekunti. Jäälle syntyy ”kahakka”, johon linjatuomarit yrittävät mennä väliin. Tietäen, että E K ottelua on jäljellä vain muutama sekunti, kukaan tuomareista ei puhalla pilliin. Ajanottaja pysäyttää kuitenkin pelikellon niin, että peliaikaa jää A L jäljelle 1,2 sekuntia. Mitä tuomaristo tekee? A I S VASTAUS T A Rangaistusten tuomitsemisen jälkeen päätuomareiden kuuluu ilmoittaa ajanottajalle, ettei peliä oltu katkaistu ja pyytää häntä ”juoksuttamaan” pelikello nollaan. Tämä ennaltaehkäisee mahdollisia tulevia yhteenottoja. M 4 A-joukkue laukoo kiekon hyökkäysalueelleen. Linjatuomari nostaa käden ylös siirretyn paitsion merkiksi. Laukaus menee maalia kohti ja maalivahti torjuu kiekon. Lasketaanko tämä tilastoihin maalia kohti ammutuksi laukaukseksi, vaikka tiedetään, ettei A-joukkue voi tehdä maalia tällaisesta tilanteesta? VASTAUS Kyllä, tämä lasketaan laukaukseksi maalia kohti. Kuitenkin, jos kiekko menee maaliin, niin se hylätään ja tilastoihin ei tule merkintää laukauksesta maalia kohti. HAKEMISTO INTERNATIONAL ICE HOCKEY FEDERATION Brandschenkestrasse 50, PO-Box 8027 Zurich, Switzerland Phone +41 44 562 22 00 E- mail office@iihf.com www. IIHF.com IIHF – Version 1.0, kesäkuu 2025"}]},"meta":{"rules_count":90,"situations_count":555,"version":"2025-2026"}};

// Video links config (add your own)
const VIDEO_LINKS = {
  // Example: "46": [{ title: "Tappelu – käsimerkit", url: "https://youtube.com/..." }],
};

// ─── STATE ───
let currentView = 'home';
let currentRuleNum = null;
let searchFilter = 'all';
let allRuleNums = [];
let searchTimeout = null;

// Build sorted rule list
allRuleNums = Object.keys(DB.rules).sort((a,b) => parseInt(a)-parseInt(b));

// ─── INIT ───
function init() {
  buildNav();
  buildHome();
  setupEvents();
}

// ─── NAV ───
function buildNav() {
  const container = document.getElementById('nav-content');
  let html = '';
  
  DB.parts.forEach(part => {
    const situationCount = part.rules.reduce((n,r) => n + (DB.situations[r]?.length||0), 0);
    html += `<div class="nav-part" id="nav-part-${part.number}">
      <div class="nav-part-header" onclick="togglePart('${part.number}')">
        <span class="nav-part-num">OSA ${part.number}</span>
        <span class="nav-part-title">${part.title}</span>
        <span class="nav-part-chevron">▼</span>
      </div>
      <div class="nav-rules">`;
    
    part.rules.forEach(rNum => {
      const rule = DB.rules[rNum];
      if (!rule) return;
      const sitCount = DB.situations[rNum]?.length || 0;
      html += `<div class="nav-rule" id="nav-rule-${rNum}" onclick="openRule('${rNum}')">
        <span class="nav-rule-num">${rNum}</span>
        <span class="nav-rule-title">${rule.title}</span>
        ${sitCount > 0 ? `<span class="nav-situation-badge">${sitCount}</span>` : ''}
      </div>`;
    });
    
    html += `</div></div>`;
  });
  
  container.innerHTML = html;
}

function togglePart(num) {
  const el = document.getElementById('nav-part-' + num);
  el.classList.toggle('expanded');
}

// ─── HOME ───
function buildHome() {
  const container = document.getElementById('home-parts');
  const icons = ['🏒','👕','🛡️','⚠️','👮','💥','🏑','📋','⏱️','♀️','🏆'];
  let html = '';
  
  DB.parts.forEach((part, idx) => {
    const ruleCount = part.rules.length;
    const sitCount = part.rules.reduce((n,r) => n + (DB.situations[r]?.length||0), 0);
    html += `<div class="home-part-card" onclick="openPartRules('${part.number}')">
      <div class="home-part-icon">${icons[idx]||'📄'}</div>
      <div class="home-part-info">
        <div class="home-part-name">${part.title}</div>
        <div class="home-part-meta">${ruleCount} sääntöä · ${sitCount} tilannetta</div>
      </div>
      <span class="home-part-arrow">›</span>
    </div>`;
  });
  
  document.getElementById('stat-rules').textContent = DB.meta.rules_count;
  document.getElementById('stat-situations').textContent = DB.meta.situations_count;
  document.getElementById('stat-parts').textContent = DB.parts.length;
  
  container.innerHTML = html;
}

function openPartRules(partNum) {
  const part = DB.parts.find(p => p.number === partNum);
  if (part && part.rules.length > 0) {
    openRule(part.rules[0]);
    // Expand nav part
    const navPart = document.getElementById('nav-part-' + partNum);
    if (navPart) navPart.classList.add('expanded');
  }
}

// ─── RULE VIEW ───
function openRule(ruleNum) {
  ruleNum = String(ruleNum);
  currentRuleNum = ruleNum;
  const rule = DB.rules[ruleNum];
  if (!rule) return;
  
  // Update nav active state
  document.querySelectorAll('.nav-rule.active').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-rule-' + ruleNum);
  if (navEl) {
    navEl.classList.add('active');
    // Expand parent part
    const part = navEl.closest('.nav-part');
    if (part) part.classList.add('expanded');
    // Scroll nav to show active rule
    setTimeout(() => navEl.scrollIntoView({behavior:'smooth', block:'nearest'}), 100);
  }
  
  // Update header
  document.getElementById('rule-badge').textContent = 'SÄÄNTÖ ' + ruleNum;
  document.getElementById('rule-title').textContent = rule.title;
  
  // Prev/Next
  const idx = allRuleNums.indexOf(ruleNum);
  const prevBtn = document.getElementById('prev-rule-btn');
  const nextBtn = document.getElementById('next-rule-btn');
  if (idx > 0) {
    const prevNum = allRuleNums[idx-1];
    prevBtn.disabled = false;
    prevBtn.onclick = () => openRule(prevNum);
    prevBtn.textContent = '← ' + prevNum + '. ' + (DB.rules[prevNum]?.title || '');
    prevBtn.textContent = prevBtn.textContent.substring(0, 28) + (prevBtn.textContent.length > 28 ? '…' : '');
  } else {
    prevBtn.disabled = true;
    prevBtn.textContent = '← Edellinen';
  }
  if (idx < allRuleNums.length - 1) {
    const nextNum = allRuleNums[idx+1];
    nextBtn.disabled = false;
    nextBtn.onclick = () => openRule(nextNum);
    nextBtn.textContent = nextNum + '. ' + (DB.rules[nextNum]?.title || '') + ' →';
    nextBtn.textContent = (nextBtn.textContent.length > 28 ? '…' : '') + nextBtn.textContent.substring(Math.max(0, nextBtn.textContent.length-28));
  } else {
    nextBtn.disabled = true;
    nextBtn.textContent = 'Seuraava →';
  }
  
  // Build body
  let bodyHTML = '';
  
  // Sections
  if (rule.sections.length > 0) {
    rule.sections.forEach(sec => {
      bodyHTML += `<div class="section-card" id="sec-${sec.id}">
        <div class="section-header" onclick="toggleSection('${sec.id.replace('.','_')}')">
          <span class="section-id">${sec.id}</span>
          <span class="section-title">${sec.title}</span>
          <span class="section-chevron">▼</span>
        </div>
        <div class="section-content">${escHtml(sec.content)}</div>
      </div>`;
    });
  }
  
  // Situations
  const situations = DB.situations[ruleNum] || [];
  if (situations.length > 0) {
    bodyHTML += `<div class="situations-section">
      <div class="situations-header">
        <span class="situations-label">📋 Tilannekäsikirja</span>
        <span class="situations-count">${situations.length} tilannetta</span>
      </div>`;
    
    situations.forEach(sit => {
      bodyHTML += `<div class="situation-card" id="sit-${sit.id.replace('.','_')}">
        <div class="situation-q-header" onclick="toggleSituation('${sit.id.replace('.','_')}')">
          <span class="situation-num">${sit.id}</span>
          <span class="situation-q-text">${escHtml(sit.question)}</span>
          <span class="situation-chevron">▼</span>
        </div>
        <div class="situation-answer">
          <div class="situation-answer-label">Vastaus</div>
          <div class="situation-answer-text">${escHtml(sit.answer)}</div>
        </div>
      </div>`;
    });
    
    bodyHTML += `</div>`;
  }
  
  // Video links
  const videos = VIDEO_LINKS[ruleNum] || [];
  if (videos.length > 0) {
    bodyHTML += `<div class="video-section">
      <div class="video-header"><span class="video-label">🎬 Videomateriaali</span></div>`;
    videos.forEach(v => {
      bodyHTML += `<a class="video-link" href="${v.url}" target="_blank" rel="noopener">
        <span class="video-icon">▶️</span>
        <span>${escHtml(v.title)}</span>
      </a>`;
    });
    bodyHTML += `</div>`;
  }
  
  if (!bodyHTML) {
    bodyHTML = '<p style="color:var(--text-muted);font-size:0.82rem;padding:20px 0;">Ei alakohtia tässä säännössä.</p>';
  }
  
  document.getElementById('rule-body').innerHTML = bodyHTML;
  
  // Show rule view
  setView('rule');
  
  // Scroll to top
  window.scrollTo(0, 0);
  
  // Close sidebar on mobile
  if (window.innerWidth < 768) closeSidebar();
}

function toggleSection(id) {
  const el = document.getElementById('sec-' + id.replace('_','.'));
  if (el) el.classList.toggle('expanded');
}

function toggleSituation(id) {
  const el = document.getElementById('sit-' + id);
  if (el) el.classList.toggle('expanded');
}

// ─── SEARCH ───
function performSearch(query) {
  const results = document.getElementById('search-results');
  const info = document.getElementById('search-info');
  
  if (!query || query.length < 2) {
    results.innerHTML = '<div class="search-empty"><div class="search-empty-icon">🔍</div>Kirjoita hakusana tai sääntönumero</div>';
    info.textContent = '';
    return;
  }
  
  const q = query.toLowerCase().trim();
  const matches = [];
  
  // Check if it's a rule number search
  const numSearch = q.match(/^\d+(\.\d+)?$/);
  
  // Search rules
  if (searchFilter === 'all' || searchFilter === 'rules') {
    Object.values(DB.rules).forEach(rule => {
      if (numSearch) {
        if (rule.number === q || rule.number.startsWith(q)) {
          matches.push({ type: 'rule', rule, score: 100, snippet: rule.sections[0]?.content?.substring(0,120) || '' });
        }
        return;
      }
      
      let score = 0;
      let snippet = '';
      
      // Title match
      if (rule.title.toLowerCase().includes(q)) {
        score += 50;
        snippet = rule.title;
      }
      
      // Section matches
      rule.sections.forEach(sec => {
        if (sec.title.toLowerCase().includes(q)) { score += 30; if (!snippet) snippet = sec.title; }
        if (sec.content.toLowerCase().includes(q)) {
          score += 15;
          if (!snippet) {
            const idx = sec.content.toLowerCase().indexOf(q);
            snippet = '...' + sec.content.substring(Math.max(0,idx-40), idx+100) + '...';
          }
        }
      });
      
      if (score > 0) matches.push({ type: 'rule', rule, score, snippet });
    });
  }
  
  // Search situations
  if (searchFilter === 'all' || searchFilter === 'situations') {
    Object.values(DB.situations).flat().forEach(sit => {
      if (numSearch) {
        if (sit.id === q || sit.id.startsWith(q) || sit.rule_number === q) {
          matches.push({ type: 'situation', sit, score: 100, snippet: sit.question.substring(0,120) });
        }
        return;
      }
      
      let score = 0; let snippet = '';
      if (sit.question.toLowerCase().includes(q)) {
        score += 30;
        const idx = sit.question.toLowerCase().indexOf(q);
        snippet = '...' + sit.question.substring(Math.max(0,idx-30), idx+100) + '...';
      }
      if (sit.answer.toLowerCase().includes(q)) { score += 20; if (!snippet) snippet = sit.answer.substring(0,120); }
      if (score > 0) matches.push({ type: 'situation', sit, score, snippet });
    });
  }
  
  // Sort by score
  matches.sort((a,b) => b.score - a.score);
  const shown = matches.slice(0, 50);
  
  info.textContent = `${matches.length} tulosta haulle "${query}"`;
  
  if (shown.length === 0) {
    results.innerHTML = '<div class="search-empty"><div class="search-empty-icon">😕</div>Ei tuloksia. Kokeile eri hakusanaa.</div>';
    return;
  }
  
  let html = '';
  shown.forEach(m => {
    if (m.type === 'rule') {
      const r = m.rule;
      const snip = highlightText(m.snippet, q);
      html += `<div class="search-result-item" onclick="openRule('${r.number}'); showView('rule');">
        <div class="search-result-rule">
          <span class="search-result-badge">Sääntö ${r.number}</span>
          <span class="search-result-title">${highlightText(r.title, q)}</span>
        </div>
        ${snip ? `<div class="search-result-snippet">${snip}</div>` : ''}
      </div>`;
    } else {
      const sit = m.sit;
      const rule = DB.rules[sit.rule_number];
      const snip = highlightText(m.snippet, q);
      html += `<div class="search-result-item" onclick="openRule('${sit.rule_number}'); showView('rule'); setTimeout(()=>{ const el=document.getElementById('sit-${sit.id.replace('.','_')}'); if(el){el.classList.add('expanded'); el.scrollIntoView({behavior:'smooth',block:'start'});} },300);">
        <div class="search-result-rule">
          <span class="search-result-badge situation">Tilanne ${sit.id}</span>
          <span class="search-result-title">${rule ? rule.title : ''}</span>
        </div>
        ${snip ? `<div class="search-result-snippet">${snip}</div>` : ''}
      </div>`;
    }
  });
  
  results.innerHTML = html;
}

function highlightText(text, query) {
  if (!text || !query) return escHtml(text || '');
  const escaped = escHtml(text);
  const q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(escHtml(query).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), m => `<mark class="search-highlight">${m}</mark>`);
}

// ─── VIEW MANAGEMENT ───
function setView(view) {
  currentView = view;
  document.getElementById('home-view').style.display = view === 'home' ? 'block' : 'none';
  document.getElementById('rule-view').style.display = view === 'rule' ? 'block' : 'none';
  document.getElementById('search-view').style.display = view === 'search' ? 'block' : 'none';
  
  document.querySelectorAll('.bottom-nav-btn').forEach(b => b.classList.remove('active'));
  if (view === 'home') document.getElementById('bnav-home')?.classList.add('active');
  else if (view === 'rule') document.getElementById('bnav-rules')?.classList.add('active');
  else if (view === 'search') document.getElementById('bnav-search')?.classList.add('active');
}

function showHome() { setView('home'); window.scrollTo(0,0); }
function showSearch() {
  setView('search');
  setTimeout(() => document.getElementById('search-input').focus(), 100);
}
function showRulesList() {
  if (currentRuleNum) setView('rule');
  else if (allRuleNums.length > 0) openRule(allRuleNums[0]);
}
function showView(v) { setView(v); }

// ─── SIDEBAR ───
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('active');
  document.getElementById('menu-toggle').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('menu-toggle').classList.remove('open');
}

// ─── EVENTS ───
function setupEvents() {
  document.getElementById('menu-toggle').addEventListener('click', () => {
    if (document.getElementById('sidebar').classList.contains('open')) closeSidebar();
    else openSidebar();
  });
  
  document.getElementById('overlay').addEventListener('click', closeSidebar);
  
  document.getElementById('search-toggle').addEventListener('click', showSearch);
  
  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => performSearch(e.target.value), 250);
  });
  
  document.getElementById('search-clear').addEventListener('click', () => {
    document.getElementById('search-input').value = '';
    performSearch('');
  });
  
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      searchFilter = chip.dataset.filter;
      performSearch(document.getElementById('search-input').value);
    });
  });
  
  document.getElementById('rule-back').addEventListener('click', () => {
    setView('home');
    window.scrollTo(0,0);
  });
  
  // Initialize search with empty
  performSearch('');
}

// ─── UTILS ───
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── START ───
init();
</script>
