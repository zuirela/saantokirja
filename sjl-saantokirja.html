essa ja molemmat joukkueet kieltäytyvät pelaamasta kiekkoa. Mikä on päätuomarin päätös ja mistä seuraava aloitus?","answer":"Päätuomari katkaisee pelin ja seuraava aloitus suoritetaan toisesta A-joukkueen puolustusalueen aloituspisteestä. Säännöt 72.5 ja 76.2. HAKEMISTO MUUT RIKKEET"},{"id":"72.4","rule_number":"72","question":"A-joukkue pelaa vajaalla ja on juuri laukonut kiekon toiseen päähän. Sen jälkeen päätuomarilla nousee käsi ylös A24 siirretyn huitomisrangaistuksen vuoksi. Kun kiekko on B-joukkueen maaliviivan takana, B:n puolustaja ja A:n hyökkääjä seisoskelevat kiekon vieressä, eikä kumpikaan yritä pelata sitä. Mitä päätuomari tekee?","answer":"Päätuomari katkaisee pelin, kun huomaa, ettei kumpikaan yritä pelata kiekkoa. Sitten päätuomari tuomitsee A24 2´huitomisesta ja seuraava aloitus suoritetaan toisesta A-joukkueen puolustusalueen aloituspisteestä. Peliä jatketaan 3 vs. 5. Säännöt 72.5 ja 76.2"},{"id":"72.5","rule_number":"72","question":"Puolustavan joukkueen pelaaja lyö kiekon ilmasta kädellään/korkealla mailalla puolustusalueeltaan puolueettomalle alueelle ja molempien joukkueiden pelaajat kieltäytyvät pelaamasta kiekkoa. Mitä tapahtuu? Mistä on seuraava aloitus?","answer":"Päätuomari katkaisee pelin ja määrää seuraavaksi aloituspaikaksi lähimmän pisteen, missä peli katkaistiin. Säännöt 72,2 ja 72.3. Perustelu on se, että joukkue, jonka pelaaja pelasi kiekkoa sääntöjenvastaisesti (lyömällä ilmasta) ei voi pelata kiekkoa. Vain ei rikkonut joukkue voi ja, jos he siitä kieltäytyvät, aloitus jää sen alueen lähimmälle pisteelle, missä peli katkaistiin."},{"id":"72.6","rule_number":"72","question":"Puolustavan joukkueen pelaaja lyö kiekon ilmasta kädellään/korkealla mailalla puolustusalueeltaan toiseen päätyyn asti. Linjatuomari nostaa käden ylös mahdollisen pitkän merkiksi. Molemmat joukkueet kieltäytyvät pelaamasta kiekkoa. Mitä tapahtuu ja mistä on seuraava aloitus?","answer":"Päätuomari katkaisee pelin, kun puolustavan joukkueen pelaaja kieltäytyy pelaamasta kiekkoa ja seuraava aloitus suoritetaan lähimmästä puolustusalueen aloituspisteestä (kiekkoa pelaamasta kieltäytyneen joukkueen päädystä). Säännöt 72.4 ja 81.2 Perustelu on se, että joukkue, jonka pelaaja pelasi kiekkoa sääntöjenvastaisesti (lyömällä ilmasta) ei voi pelata kiekkoa, koska seuraava aloitus suoritettaisiin heidän puolustusalueeltaan. Vain ei rikkonut joukkue voi ja, jos he siitä kieltäytyvät (ehkä yrittävät pelata sekunteja kellosta pois), aloitus jää sen alueen lähimmälle pisteelle, missä peli katkaistiin."}],"73":[{"id":"73.1","rule_number":"73","question":"A-joukkueen valmentaja hermostuu pelitilanteesta, joka tapahtuu 1.erän loppupuolella. Valmentaja ei suostu tuomaan joukkuettaan takaisin jäälle, kun 2. erää ollaan aloittamassa. Päätuomari kehoittaa valmentajaa tuomaan joukkueensa jäälle, jotta peli voi jatkua. Kuinka paljon aikaa valmentajalle annetaan? Mitä ratkaisuja päätuomari tekee, jos joukkue palaa sallitun ajan puitteissa takaisin?","answer":"Kun joukkuetta on ohjeistettu palaamaan jäälle ja aloittamaan peli, on heillä viisi (5) minuuttia aikaa toimia näin tai ottelu katsotaan keskeytetyksi ja asia raportoidaan asiankuuluvalle elimelle. Jos he palaavat takaisin aikarajan sisällä, heille tuomitaan joukkuerangaistus (JR) pelin viivyttämisestä. Sääntö 73.3"}],"74":[{"id":"74.1","rule_number":"74","question":"2. erässä joukkue suorittaa pelaajavaihdon niin, että jäältä lähtevä pelaaja on menossa pelaajapenkilleen hyökkäysalueen puolelta ja jäälle tuleva pelaaja puolueettomalta alueelta (molemmat omista ”ovista”). Molemmat pelaajat ovat nyt jäällä 1,5m sisällä pelaajapenkistä. Jos jäälle tullut pelaaja pelaa nyt kiekkoa, onko kyseessä liikaa pelaajia jäällä?","answer":"On ja joukkueelle tulee tuomita 2´(JR). Sääntö 74 HAKEMISTO MUUT RIKKEET"},{"id":"74.2","rule_number":"74","question":"Voidaanko maalivahti vaihtaa ”lennosta” (= peli on käynnissä ja jäällä oleva maalivahti vaihdetaan varamaalivahtiin)?","answer":"Sääntö 74.1 toteaa: ” Pelaajia voidaan vaihtaa milloin tahansa pelin käydessä pelaajapenkiltä...”. Eli kyllä, maalivahtejakin voi vaihtaa lennosta. Tähän on kuitenkin kaksi poikkeusta: a. Jos varamaalivahti vaihdetaan jäälle pelikatkolla, voi vaihdon suorittaa takaisin vasta seuraavalla pelikatkolla. Sääntö 8.2 b. Jos joukkue päättää vaihtaa torjuvaa maalivahti rangaistuslaukaukseen, täytyy tämän maalivahdin jäädä peliin seuraavaan pelikatkoon saakka. Sääntö 24.2 On huomattava, että säännön 82.1 viimeinen kappale koskee maalivahdin vaihtamista pelikatkolla, eikä ole siis sovellettavissa kysymyksessä esitettyyn skenaarioon."},{"id":"74.3","rule_number":"74","question":"Joukkue vaihtaa maalivahtinsa ylimääräiseen kenttäpelaajaan ottelun loppupuolella. A-joukkueen pelaajapenkin lähellä ylimääräinen kenttäpelaaja on astunut jäälle, kun maalivahti on 1,5m rajan sisäpuolella. Kiekko lauotaan laitaa pitkin pelaajapenkin eteen. Maalivahti ottaa kiekon kiinni ja pudottaa sen jäähän juuri kentälle tulleelle pelaajalle. Mikä on toimintaohje tuomaristolle?","answer":"Peli tulee katkaista välittömästi ja A-joukkueella tuomitaan joukkuerangaistus (JR), liikaa pelaajia jäällä. Sääntö 74.1"},{"id":"74.4","rule_number":"74","question":"A-joukkue vaihtaa pelaajiaan sääntöjenmukaisesti pelin käydessä. A17 tulee jäälle ja on jo pois pelaajapenkiltään osallistuakseen peliin. A21 on menossa pois jäältä, mutta ei ole vielä ehtinyt mennä ovesta sisään, kun kiekko osuu hänen vahingossa. Onko tämä rangaistus?","answer":"Ei ole. Sääntö 74.1"},{"id":"74.5","rule_number":"74","question":"Missä tilanteissa joukkueen hyväksi tuomitaan rangaistuslaukaus (RL) vastustajan pelin viivyttämisen vuoksi viimeisen kahden minuutin, jatkoajan aikana tai kun aika on riittämätön rangaistuksen kärsimiseen kokonaan?","answer":"Kahdessa tilanteessa. 1) maalin tahallinen siirtäminen, sääntö 63.3) tahallinen sääntöjenvastainen vaihto, sääntö 74.4"},{"id":"74.6","rule_number":"74","question":"Voiko maalivahdin korvata ylimääräisellä kenttäpelaajalla jatkoajalla?","answer":"Kyllä, maalivahdin voi korvata ylimääräisellä kenttäpelaajalla. Sääntö 74. ja 84.2 HAKEMISTO MUUT RIKKEET"},{"id":"74.7","rule_number":"74","question":"A-joukkueella on kiekko hallinnassaan hyökkäysalueellaan (B:n puolustusalueella). B-joukkue pelaa yhden pelaajan verran vajaalukuisena ja A-joukkue on vaihtanut maalivahtinsa ylimääräiseen kenttäpelaajaan. Päätuomari nostaa käden ylös B-joukkueen siirretyn rangaistuksen merkiksi. Siirretyn rangaistuksen aikana yksi ylimääräinen A-joukkueen pelaaja ”hyppää” pelaajapenkiltä mukaan peliin. Mitä rangaistuksia tuomitaan? Mikä on pelaajavahvuus jäällä? Mistä on seuraava aloitus?","answer":"B-joukkueelle tulossa ollut siirretty rangaistus tuomitaan ja A-joukkueelle tuomitaan joukkuerangaistus (JR), liian monta pelaajaa jäällä. Nämä samanaikaisia rangaistuksia (kumoutuvia), joten ne eivät mene kelloon ja peliä jatketaan 5 vs. 4. Seuraava aloitus suoritetaan lähimmästä sen alueen aloituspisteestä, missä peli katkaistiin näiden samanaikaisten rangaistusten vuoksi. Sääntö 76.2"},{"id":"74.8","rule_number":"74","question":"Päätuomarilla on käsi ylhäällä B-joukkueen liian monta pelaajaa jäällä joukkuerangaistuksen vuoksi. Siirretyn rangaistuksen aikana kuudes pelaaja poistuu jäältä ja heille jää oikea määrä (viisi) pelaajia jäälle. Nyt kuitenkin B-joukkue tekee saman vaihtorikkeen, kun siirretty rangaistus jatkuu edelleen. Tämä tapahtuu ottelun 2. erässä. Mitä rangaistuksia tuomitaan?","answer":"Sääntö 17 ja 74 – Joukkueelle tuomitaan kaksi joukkuerangaistusta, koska nämä ovat kaksi erillistä tapahtumaa. 0"}],"75":[{"id":"75.1","rule_number":"75","question":"Pelaaja ei onnistu tekemään maalia läpiajosta. Hän luistelee turhautuneena pelaajapenkkiään kohden ja huitaisee mailalla voimakkaasti laitaan. Maila rikkoontuu kahteen osaan niin, että varsi ja lapa lentävät pelialueelle. Vastustaja on murtautumassa läpi keskialueella ja lentävät mailan kappaleet aiheuttavat hänelle kiekon menetyksen (ja/tai loukkaantumisen). Miten tuomariston kuuluu toimia? Tuomitaanko rangaistuksia?","answer":"Tähän on useita mahdollisuuksia sääntöjen puolesta puuttua. Päätuomarin tulee käyttää hyvää harkintakykyä ja maalaisjärkeä tilannetta arvioitaessa ja lopullisen päätöksen (rangaistuksien suhteen) tekemisessä. Tässä muutamia vaihtoehtoja, joiden pohjalta päätuomari voi ratkaisun tehdä: Sääntö 53.2 – pieni rangaistus estämisestä Sääntö 53.7 – rangaistuslaukaus (RL) Sääntö 53.8 – Tuomita maali ei rikkoneen hyväksi Sääntö 60.3 – kaksinkertainen pieni rangaistus korkeasta mailasta (2+2´) Sääntö 75.2 – pieni rangaistus epäurheilijamaisesta käytöksestä"},{"id":"75.2","rule_number":"75","question":"0 Pelaaja on kärsimässä pientä rangaistusta kampituksesta. 30s kärsimisen jälkeen pelaaja käyttää herjaavaa kieltä tuomaria kohtaan 9 rangaistusaitiosta. Pelaajalle tuomitaan nyt lisäksi 2´epäurheilijamaisesta käytöksestä. Pitääkö joukkueen asettaa sijainen O rangaistusaitoon kärsimään tätä pientä rangaistusta vai lisätäänkö se aiemmin tuomittuun, käynnissä olevaan rangaistukseen? S A","answer":"M Uusi rangaistus lisätään, aiemmin tuomittuun, käynnissä olevaan rangaistukseen, eikä sijaista tarvita. Säännöt 75.2 ja 39 U U T R"},{"id":"75.3","rule_number":"75","question":"I K Valmentaja heittää vesipullon jäälle. Mitä teet? K E E","answer":""},{"id":"75.4","rule_number":"75","question":"Voiko hyökkäävä pelaaja seisoa vastustajan maalivahdin edessä ja pitää kättään/hanskaansa tai mailaa suoraan maalivahdin näkökentän/naaman edessä tarkoituksenaan estää maalivahtia näkemästä kiekkoa/pelitilannetta?","answer":"Ei. Tätä pidetään epäurheilijamaisena käytöksenä ja siitä kuuluu tuomita pieni rangaistus säännön 75 perusteella, jos päätuomari (t) tämän havaitsee."},{"id":"75.5","rule_number":"75","question":"A-joukkue on tehnyt pitkän kiekon. Pelaajat ja tuomaristo järjestäytyvät nopeasti seuraavaan aloitukseen. A-joukkueen pelaajapenkiltä lentää vesipullo jäälle (puolueettomalle alueelle), mutta sen havainnut linjatuomari ei ole varma, kuka sen sieltä jäälle pudotti/heitti. Miten tuomariston kuuluu toimia?","answer":"Tuomitaan joukkuerangaistus (JR) epäurheilijamaisesta käytöksestä. Säännöt 53.3, 75.3, 32.4 ja 81.4. Nyt pelaajavaihdot ovat sallittuja myös A:lle, koska he joutuivat alivoimalle. HAKEMISTO MUUT RIKKEET"},{"id":"75.6","rule_number":"75","question":"Pelaaja tekee säädyttömään eleen tappelun jälkeen ollessaan matkalla rangaistusaitioon. Mikä rangaistus tuomitaan?","answer":"Pelirangaistus. Sääntö 75.5 SJL HUOMIO: 5+PR"},{"id":"75.7","rule_number":"75","question":"Tuomari näkee, kun pelaaja ”nuolaisee” vastustajaa. Mitä, jos mitään, kuuluu tuomita?","answer":"Ihan minimissään, tällaiseen eleen tehneelle pelaajalle tuomitaan pieni rangaistus epäurheilijamaisesta käytöksestä. Sääntö 75.2."},{"id":"75.8","rule_number":"75","question":"Yksi tuomareista huomauttaa pelaajalle, ettei roikota jalkoja laidalla kentän puolella, kun odottaa vaihtoa. Huomautuksen jälkeen pelaaja ei muuta toimintaansa, vaan roikottaa jalkoja edelleen samalla tavalla. Mitä, jos mitään, tuomariston kuuluu tehdä? 0 9","answer":"O Kenelle tahansa pelaajalle, joka kieltäytyy noudattamasta tuomariston (PT+LT) ohjeistusta voidaan tuomita pieni rangaistus S A epäurheilimaisesta käytöksestä. Jos käytös jatkuu, käytösrangaistus (10´) ja edelleen jatkuessa PR. Sääntö 75.2 M U U T R I K K E E T HAKEMISTO OSA 10 PELIN VIRTAUS 1 0 O S A · P E L I N V I R T A U S PELIN VIRTAUS"}],"76":[{"id":"76.1","rule_number":"76","question":"Hyökkäävän joukkueen pelaaja lyö kiekkoa ilmasta kädellä puolueettomalta alueelta hyökkäysalueelle aiheuttaen siirretyn paitsiotilanteen. Hyökkäysalueella oleva joukkuekaveri pelaa tarkoituksellisesti kiekkoa siirretyn paitsiotilanteen aikana. Peli katkaistaan kahden rikkeen johdosta (käsisyöttö ja paitsio). Mistä on seuraava aloitus?","answer":"Seuraava aloitus suoritetaan toisesta rikkoneen joukkueen puolustusalueen aloituspisteestä. Sääntö 76.2"},{"id":"76.2","rule_number":"76","question":"A-joukkueen pelaaja luistelee kiekon kanssa pois omalta puolustusalueeltaan siniviivan yli puolueettomalle alueelle. Peli katkaistaan, koska toisaalla käynnistyy tappelu. Yhdelle pelaajalle molemmista joukkueista tuomitaan 5+PR tappelusta. Mistä on seuraava aloitus?","answer":"Seuraava aloitus suoritetaan lähimmästä puolueettoman alueen aloituspisteestä, A-joukkueen siniviivalta. Sääntö 76.2"},{"id":"76.3","rule_number":"76","question":"11 00 Hyökkäävän joukkueen pelaaja yrittää syöttää kiekkoa joukkuekaverilleen puolueettomalla alueella. Kiekko kimpoaa puolustavan joukkueen pelaajasta pelialueelta ulos. Kiekko osuu hänen mailaansa puolueettoman alueen aloituspisteen ja puolustussiniviivan välissä. Mistä on seuraava aloitus? O","answer":"S A Vaikka sääntö sanookin, että seuraavan aloituspaikan pitää olla lähin ja vähiten alueellista etua antava, sanoo se myös, että kun · P pelikatko tulee puolueettomalla alueella, seuraava aloitus suoritetaan myös puolueettomalta alueelta. Säännöt 76.2 ja 85.1 E Maalaisjärkeä käyttäen seuraava aloitus suoritetaan tässä tapauksessa siniviivan yläpuolelta, puolueettoman alueen aloituspisteestä, L I vaikka se nyt tarjoaakin rikkoneelle joukkueelle hieman alueellista etua. Et löydä tätä nimenomaista vastausta sääntökirjasta. N V I R"},{"id":"76.5","rule_number":"76","question":"Joukkue A:lle vihelletään pitkä kiekko. Takimmainen linjatuomari näkee, että kiekko on muuttanut suuntaa vastustajajoukkueen pelaajasta, mutta etummainen linjatuomari ei huomaa vihellyksen perumista ja viheltää pitkän kiekon. Pelin päätyttyä hyökkäävä pelaaja taklaa puolustavaa pelaajaa laitataklauksen arvoisesti, ja päätuomari antaa tilanteesta pienen rangaistuksen laitataklauksesta. Tämän jälkeen takimmainen linjatuomari kumoaa pitkän kiekon vihellyksen, ja hyökkäävä pelaaja vetoaa siihen, että pitkä kiekko oli peruttu, koska hän näki kiekon muuttaneen suuntaa neutraalialueella.","answer":"Pieni rangaistus laitataklauksesta määrätään edelleen. Seuraava aloitus suoritetaan rangaistun joukkueen puolustusalueella. (Säännöt 41.1 ja 76.2)"},{"id":"76.6","rule_number":"76","question":"A-joukkueelle on tulossa siirrettynä rangaistus. B-joukkue laukoo kiekon hyökkäysalueelleen ja linjatuomarilla nousee käsi ylös siirretyn paitsion merkiksi. Lauottu kiekko kimpoaa A-joukkueen pelaajasta pelialueen ulkopuolelle. Mistä on seuraava aloitus? HAKEMISTO PELIN VIRTAUS","answer":"Toisesta A-joukkueen puolustusalueen aloituspisteestä. Säännöt 76.2 ja 83.5"},{"id":"76.7","rule_number":"76","question":"A11 ollaan tuomitsemassa siirrettynä rangaistusta huitomisesta. Kiekko on vapaana B-joukkueen puolustusalueen kulmauksessa ja molempien joukkueiden pelaajat kieltäytyvät pelaamasta kiekkoa. Mikä on päätuomarin päätös? Mistä suoritetaan seuraava aloitus?","answer":"Päätuomari katkaisee pelin ja seuraava aloitus suoritetaan toisesta A-joukkueen puolustusalueen aloituspisteestä. Säännöt 72.5 ja 76.2"},{"id":"76.8","rule_number":"76","question":"A11 ollaan tuomitsemassa siirrettynä rangaistusta huitomisesta. Kiekko on vapaana B-joukkueen puolustusalueen kulmauksessa ja molempien joukkueiden pelaajat kieltäytyvät pelaamasta kiekkoa. Mikä on päätuomarin päätös? Mistä suoritetaan seuraava aloitus?","answer":"Seuraava aloitus suoritetaan toisesta B-joukkueen puolustusalueen aloituspisteestä. Sääntö 76.2"},{"id":"76.9","rule_number":"76","question":"A-joukkue laukoo kiekon toiseen päähän ja sen seurauksena vihelletään pitkä. Pitkän kiekon vihellyksen jälkeen B89 käännähtää ympäri ja huitaisee A50 niin, että hänelle tuomitaan pieni rangaistus. Mistä on seuraava aloitus?","answer":"Toisesta B-joukkueen puolustusalueen aloituspisteestä (rangaistuksen vuoksi). Sääntö 76.2"},{"id":"76.10","rule_number":"76","question":"A-joukkueelle on tulossa siirrettynä rangaistus. B-joukkue vaihtaa maalivahdin liian aikaisin ja peli katkaistaan linjatuomarin toimesta. Mistä on seuraava aloitus?","answer":"Seuraava aloitus suoritetaan toisesta A-joukkueen puolustusalueen aloituspisteestä. Maalivahdin liian aikainen vaihto ei kuulu niihin kolmeen poikkeukseen, jotka rangaistuksen jälkeiseen aloituspaikkaan vaikuttavat. Säännöt 71.1 ja 76.2"},{"id":"76.11","rule_number":"76","question":"Kun 3. erää on jäljellä 4:59, A-joukkueelle tuomitaan iso rangaistus ja B-joukkueelle pieni rangaistus. Miten nämä näkyvät kellossa? Mistä suoritetaan seuraava aloitus?","answer":"A-joukkueen rangaistuskellossa näkyy 3:00 (iso rangaistus) ja B-joukkueen rangaistuskellossa ei ole mitään. Seuraava aloitus suoritetaan toisesta A-joukkueen puolustusalueen aloituspisteestä. Säännöt 19.4 ja 76.2 HAKEMISTO PELIN VIRTAUS"},{"id":"76.12","rule_number":"76","question":"A-joukkueelle on tulossa siirrettynä rangaistus. B-joukkueella on kiekko hallinnassaan hyökkäysalueellaan ja sitä yritetään syöttää taaksepäin viivaan. Kiekko kuitenkin valuu aina toiseen päähään asti ja linjatuomarin virheen vuoksi tilanteesta vihelletään pitkä. Mistä on seuraava aloitus?","answer":"Toisesta A-joukkueen puolustusalueen aloituspisteestä (heille ollaan tuomitsemassa rangaistusta). Ainoa seuraus oli, ettei B-joukkueella ollut mahdollista hyödyntää ylimääräistä hyökkääjää, koska linjatuomari vihelsi virheellisesti pitkän. Sääntö 76.2"},{"id":"76.13","rule_number":"76","question":"Hyökkäävälle joukkueelle on tulossa siirrettynä rangaistus hyökkäysalueella. Puolustavan joukkueen pelaaja laukoo kiekon suojalasin yli ulos pelialueelta. Mistä on seuraava aloitus?","answer":"Seuraava aloitus suoritetaan toisesta kiekon suojalasin yli laukoneen joukkueen puolustusalueen aloituspisteestä. Heille tuomitaan myös rangaistus, pelin viivyttäminen – kiekko katsomoon. Säännöt 76.2, 85.1 ja 63.2"},{"id":"76.14","rule_number":"76","question":"Ottelu on alkamassa. Ennen kuin päätuomari ehtii pudottaa kiekon, pelaajalle tuomitaan pieni rangaistus. Mistä on seuraava aloitus? 1 0","answer":"O Keskiympyrästä. Sääntö 76.2 S A · P"},{"id":"76.16","rule_number":"76","question":"Puolustavan joukkueen pelaaja yrittää purkaa kiekon pois puolustusalueeltaan. Hyökkäävän joukkueen puolustaja on juuri siniviivan alla hyökkäysalueellaan ja lyö kiekkoa ilmasta korkealla mailalla. Kiekko tipahtaa jäähän siniviivan alle hyökkäysalueen puolelle. Molempien joukkueiden pelaajat kieltäytyvät pelaamasta kiekkoa. Mistä on seuraava aloitus?","answer":"Seuraava aloitus suoritetaan toisesta puolustusalueen aloituspisteestä, missä kiekko oli, kun peli katkaistiin. Koska hyökkäävä joukkue pelasi kiekkoa sääntöjenvastaisesti korkealla mailalla, ainoastaan puolustava joukkue voi ”laillisesti” pelata kiekkoa. He kieltäytyivät pelaamasta, joten sen vuoksi aloitus myös jää heidän alueelleen. Säännöt 72.3, 76.2 ja 80.1 HAKEMISTO PELIN VIRTAUS"},{"id":"76.17","rule_number":"76","question":"A-joukkueelle tuomitaan pieni rangaistus heidän hyökkäysalueellaan. Seuraava aloitus suoritetaan toisesta A-joukkueen puolustusalueen aloituspisteestä. Ennen kuin peli jatkuu, B-joukkueen pelaaja ottaa pienen rangaistuksen. Vaihtuuko aloituspaikka?","answer":"Kyllä. Alkuperäisen pelikatko syy oli tuomita A-joukkueelle rangaistus. Pelikatko syntyi B:n puolustusalueella. Koska molempia joukkueita rangaistaan samalla pelikatkolla, seuraava aloituspaikka on lähin aloituspiste alueella, missä peli katkaistiin (tässä tapauksessa B:n puolustusalueella). Sääntö 76.2"},{"id":"76.18","rule_number":"76","question":"Pelaaja laukoo kiekon toiseen päätyyn omalta puolustusalueeltaan ja pitkä kiekko on tulossa. Matkalla kiekko kuitenkin osuu tuomariin puolueettomalla alueella ja menee siitä suoraan vastustajan maaliin. Maalia ei tietenkään hyväksytä, mutta mistä suoritetaan seuraava aloitus?","answer":"Vaikka tähän ei tarkkaa vastausta säännöistä löydykään, seuraava aloitus tulee suorittaa lähimmästä puolueettoman alueen aloituspisteestä, missä kiekko tuomariin osui. Tämä on johdonmukaista sääntöjen 76.2 ja 85.4 kanssa, kun kiekko kimpoaa tuomarista ulos pelialueelta."},{"id":"76.19","rule_number":"76","question":"A-joukkue pelaa hyökkäysalueellaan. Kiekko nousee ilmaan ja A-joukkueen pelaaja lyö sitä mailalla. Päätyalueella oleva päätuomari ”vossaa” mahdollisen korkean mailan, mutta keskialueella oleva päätuomari on eri mieltä ja puhaltaa pelin poikki korkean mailan vuoksi. Mistä on seuraava aloitus?","answer":"Jos näin tapahtuu, tuomareiden tulee katkolla varmistaa, että oikea päätös jää voimaan (korkea vai ei). Jos päädytään siihen, että kiekkoa pelattiin korkealla mailalla, seuraava aloitus suoritetaan puolueettoman alueen aloitus pisteestä (A-joukkueen hyökkäyssiniviivalta). Jos päädytään siihen, että kyseessä oli virheellinen vihellys, seuraava aloitus suoritetaan lähimmästä sen alueen aloituspisteestä, missä kiekko oli, kun peli katkaistiin. Säännöt 80.2 ja 76.2"},{"id":"76.20","rule_number":"76","question":"Linjatuomari puhaltaa pilliin seuraavan aloituksen alkamisen (5 sekuntia) merkiksi puolustusalueella. Puolustavan joukkueen sentteri poistuu pisteeltä jutellakseen joukkuekaverille. Viisi sekuntia on kulunut ja puolustavan joukkueen sentteri ei ole vielä takaisin pisteellä. Mikä on toimintaohje linjatuomarille tällaisessa tilanteessa?","answer":"Jos sentteri ei ole aloituspisteen lähistöllä ja viisi sekuntia on kulunut, linjatuomari pudottaa kiekon välittömästi. Jos sentteri menee pitämään palaveria, kieltäytyy tulemasta pisteelle, kun näin ohjeistetaan tai on vaan hidas tullakseen sinne ajoissa, kiekko pudotetaan. Jos sentteri yrittää rytmittää aloitusta, häntä varoitetaan ja sitä käsitellään aloitusrikkeenä. Sääntö 76.4 SJL HUOMIO: Ei pudoteta kiekkoa tyhjään jäähän, varoitetaan ja jatkosta rangaistaan, jos tarvetta."},{"id":"76.21","rule_number":"76","question":"Joukkueet ovat järjestäytyneet päätyalueen aloitukseen ja aloittavan linjatuomarin takana on myös asemoituneena molempien joukkueiden pelaaja. Linjatuomarin takana oleva hyökkäävän joukkueen pelaaja on malttamaton ja tulee aloitusympyrän sisäpuolelle (noin metrin) ennen kuin kiekkoa on ehditty pudottamaan. Hän kuitenkin pysähtyy nopeasti ja on ”pakittamassa” omalle paikalleen, kun linjatuomari pudottaa kiekon. Puolustavan joukkueen sentteri voittaa aloituksen selvästi ja sääntöjenmukaisesti ja kiekko menee hänen joukkuekaverilleen. Miten tuomaristo toimii?","answer":"Hyvää harkintaa ja maalaisjärkeä käyttäen, tuomariston ei ole syytä tässä tilanteessa katkaista peliä, koska hyökkäävä joukkue ei saanut etua ”höntyilystään”. Usein kuitenkin tämä höntyily on havaittavissa ennen kiekon pudottamista, jolloin siihen täytyy varoituksella puuttua. Säännöt 76.3, 76.5 ja 76.6 HAKEMISTO PELIN VIRTAUS"},{"id":"76.22","rule_number":"76","question":"Kun joukkueelle tuomitaan rangaistus pelin viivyttäminen – rike aloitustapahtumassa, kuka kärsii rangaistuksen?","answer":"Se on joukkuerangaistus, joten sen voi kärsiä kuka tahansa nimetty pelaaja (paitsi mv). Säännöt 17.1 ja 76.6"},{"id":"76.23","rule_number":"76","question":"A-joukkueen sentteriä on varoitettu päätyalueen aloituksessa. Sen jälkeen A-joukkueen laitahyökkääjä tulee aloitusympyrään liian aikaisin ja heille tuomitaan toisen aloitusrikkeen johdosta rangaistus. Kuka kärsii tämän joukkuerangaistuksen?","answer":"Kuka tahansa pelaaja (paitsi maalivahti). Säännöt 17.1 ja 76.6"},{"id":"76.24","rule_number":"76","question":"Mitä toimintaohjetta tuomaristo noudattaa, kun: - päätuomari on suorittanut vaihdonvalvonnan loppuun - aloittava linjatuomari on puhaltanut pilliinsä ja odottanut viisi sekuntia - puolustavan joukkueen pelaajat hidastelevat saapumistaan aloituspisteelle ja ovat vielä vastustajan puolella.","answer":"Kun puolustavalla joukkueella kestää seuraavaan aloitukseen saapuminen ja he ovat vielä vastustajan puolella, kun viisi sekuntia on kulunut, eikä linjatuomari voi tällöin pudottaa kiekkoa, tulee päätuomarin varoittaa rikkoneen joukkueen valmentajaa. Kaikista seuraavista samankaltaisista rikkeistä pelin aikana, joukkueelle tuomitaan joukkuerangaistus. Säännöt 76.6 ja 82.2 SJL HUOMIO: Ei pudoteta kiekkoa tyhjään jäähän. HAKEMISTO PELIN VIRTAUS"},{"id":"76.25","rule_number":"76","question":"Linjatuomari valmistelee aloitusta A-joukkueen puolustusalueella. Hän puhaltaa pilliin merkiksi siitä, että viiden sekunnin kuluessa pelaajien tulisi olla valmiina ja paikoillaan. Viiden sekunnin jälkeen yksi A-joukkueen pelaajista on vielä matkalla aloituspisteelle ja on vastustajan puolella. Tämä on ensimmäinen tällainen rike joukkueelta pelin aikana. Mitä tuomaristo tekee?","answer":"Päätuomari varoittaa joukkuetta ja jatkossa samanlaisesta rikkomuksesta tuomitaan joukkuerangaistus. Linjatuomari ei varoita sentteriä tässä tilanteessa. Sääntö 76.6"},{"id":"76.26","rule_number":"76","question":"Aloitusta ollaan suorittamassa A-joukkueen puolustusalueella. Vaihtotapahtuma on valmis ja linjatuomari puhaltaa pilliinsä. Sen jälkeen linjatuomari huomaa, ettei A-joukkueella ole tarpeeksi pelaajia jäällä. Miten linjatuomarin kuuluu toimia?","answer":"Linjatuomari raportoi keskialueella olevalle päätuomarille asiasta, joka sitten kehottaa rikkonutta joukkuetta laittamaan oikean määrän pelaajia jäälle. Ja jos on tarpeellista, niin joukkueen valmentajalle annetaan varoitus (esim taktinen viivyttely tms.). Seuraavasta samanlaisesta rikkomuksesta tuomitaan joukkuerangaistus pelin viivyttämisestä. Sääntö 76.7"},{"id":"76.27","rule_number":"76","question":"1 0 Ennen B-joukkueen puolustusalueella tapahtuvaa aloitusta, kun joukkueet pelaavat 5 vs. 5, tuomaristo huomaa, että B-joukkueella on vain neljä pelaajaa jäällä. Mitä tuomaristo tekee? Mitä tapahtuisi, jos A-joukkueella olisi vain neljä pelaajaa jäällä? O S","answer":""},{"id":"76.29","rule_number":"76","question":"Puolustavalle joukkueelle on tulossa siirrettynä rangaistus heidän puolustusalueellaan. Heti, kun he koskevat kiekkoon peli katkaistaan ja maalinedustalle syntyy kahakka. Hyökkäävän joukkueen viivapelaajat menevät vihellyksen jälkeen aloitusympyrän uloimman kaaren tason yli. Ainoa rangaistus tuomitaan puolustavalle joukkueelle. Mistä on seuraava aloitus?","answer":"Lähimmästä puolueettoman alueen aloituspisteestä. Sääntö 76.2"},{"id":"76.30","rule_number":"76","question":"Peli pyörii päätyalueella ja maalivahti peittää lopulta kiekon aiheuttaen pelikatkon. Katkolla syntyy yhteenotto ja hyökkäävän joukkueen viivapelaaja menee aloitusympyrän uloimman kaaren tason yli. Vain puolustavalle joukkueelle tuomitaan tilanteesta rangaistus. Mistä on seuraava aloitus?","answer":"Lähimmästä puolueettoman alueen aloituspisteestä. Sääntö 76.2"},{"id":"76.31","rule_number":"76","question":"Seuraava aloitus on A-joukkueen puolustusalueelta. Vaihtoproseduuri on valmis ja linjatuomari puhaltaa pilliinsä käynnistääkseen aloituksen. 1 0 B-joukkueella (joka pelaa täysilukuisena) on vain neljää pelaajaa jäällä. Sentteri on omalla paikallaan valmiina aloitukseen. Mitä linjatuomari tekee? O S","answer":""},{"id":"76.33","rule_number":"76","question":"Tarvitseeko kiekon olla fyysisesti pudotettu tuomarin toimesta, jotta voidaan määrätä aloitusrike?","answer":"Ei. Itse pudotus ei aina liity siihen, syyllistyykö pelaaja aloitusrikkeeseen vai ei. Sääntö 76.6"},{"id":"76.34","rule_number":"76","question":"Päätuomari nostaa käden ylös A-joukkueen siirretyn rangaistuksen merkiksi (väkivaltaisuus) heidän puolustusalueellaan, kun A:n ja B:n pelaaja kamppailee maalin edessä. Peli siirtyy sitten puolueettomalle alueelle, missä pelikin katkaistaan. Nyt kaikki pelaajat ryntäävät takaisin A-joukkueen puolustusalueelle (maalin taakse) takaisin ja syntyy kahakka. Alkuperäisen rangaistuksen lisäksi tuomitaan vain samanaikaiset rangaistukset väkivaltaisuudesta molemmille joukkueille. Mistä on seuraava aloitus?","answer":"Koska alkuperäinen tuomio oli A-joukkueelle väkivaltaisuudesta (tämä 2´menee kelloon) ja hyökkäävän joukkueen pelaajat menivät aloitusympyrän uloimman kaaren tason yli, seuraava aloitus suoritetaan puolueettoman alueen aloituspisteestä, A-joukkueen puolustusalueen ulkopuolelta. Sääntö 76.2 HAKEMISTO PELIN VIRTAUS"},{"id":"76.35","rule_number":"76","question":"A-joukkueelle on tulossa siirrettynä rangaistus heidän hyökkäysalueellaan. B-joukkue lähtee tuomaan kiekkoa ylös ja etenevät lopulta hyökkäysalueelleen. B-joukkueen hyökkääjä aiheuttaa A:n puolustajan törmäämisen omaan maalivahtiin ja B:lle tuomitaan myös pieni rangaistus. Mistä on seuraava aloitus?","answer":"Lähimmästä A-joukkueen puolustusalueen aloituspisteestä. Kun sääntöjä on rikottu molempien joukkueiden pelaajien toimesta aiheuttaen pelikatkon, seuraava aloitus suoritetaan sen alueen lähimmästä aloituspisteestä, missä peli katkaistiin. Sääntö 76.2"},{"id":"76.36","rule_number":"76","question":"Aloituksen aikana, sentteri peittää kiekon kädellään ja käyttää lopulta sitä voittaakseen aloituksen. Kumpi rangaistus tuomitaan: pelin viivyttäminen- rike aloitustapahtumassa (sääntö 76.4) vai kiekon sulkeminen käteen (sääntö 67.2)?","answer":"Pelin viivyttäminen - rike aloitustapahtumassa. Sääntö 76.4"},{"id":"76.37","rule_number":"76","question":"A-joukkue on unohtanut merkitä yhden pelaajan kokoonpanoon. A-joukkue tekee maalin ja tämä kyseinen pelaaja on jäällä sen aikana. Päätuomari lähestyy toimitsija-aitiota ilmoittaakseen maalin ja häntä informoidaan edustuskelvottomasta pelaajasta. Maali hylätään ja pelaaja 1 poistetaan ottelusta. Onko seuraava aloitus kuitenkin keskiympyrästä? 0","answer":""},{"id":"76.39","rule_number":"76","question":"Maalin hylätään, koska kiekko kimposi suoraan tuomarista maaliin. Mistä on seuraava aloitus?","answer":"Lähimmästä sen alueen aloituspisteestä, missä kiekko tuomariin osui. Sääntö 76.2"},{"id":"76.40","rule_number":"76","question":"Hyökkäävän joukkueen pelaaja tekee selkeän potkuliikkeen kiekkoon ja se menee maaliin. Maali hylätään. Mistä on seuraava aloitus?","answer":"Lähimmästä puolueettoman alueen aloituspisteestä (hyökkäävän joukkueen ”rike”, sääntöjenvastainen maali). Sääntö 76.2"},{"id":"76.41","rule_number":"76","question":"Puolustavan joukkueen sentteri menee alas polvilleen suorittaakseen aloituksen. Onko tämä sallittua?","answer":"Ei, tämä ei ole sallittua. Sääntö 76.4 sanoo: ” Aloittavien pelaajien tulee olla suoraan vastakkain...” HAKEMISTO PELIN VIRTAUS"},{"id":"76.42","rule_number":"76","question":"Molemmat sentterit nojaavat aloituksessa eteenpäin niin, että heidän päänsä ovat vierekkäin, melkeinpä korva korvaa vasten. Pitäisikö tämän olla sallittua? Mitä linjatuomarin kuuluisi tehdä? Missä kohdassa sääntökirjaa annetaan linjatuomarille ohjeet tällaiseen tilanteeseen?","answer":"Tämän ei pidä olla sallittua. Linjatuomarin tuli ohjeistaa molempia pelaajia siirtymään taaksepäin. Jos jompi kumpi/molemmat ei tätä ohjeistusta noudata, tulee linjatuomarin antaa varoitus. Sääntö 76.4 antaa määritelmän aloittavan pelaajan asemoitumiseen. Linjatuomarin tehtäviin kuuluu huolehtia, että näitä rajoja noudatetaan ja verbaalisesti ohjeistaa/johtaa pelaajia. Jos he eivät noudata näitä ohjeita, niin annetaan varoitus."},{"id":"76.43","rule_number":"76","question":"Molemmat sentterit nojaavat aloituksessa eteenpäin niin, että kypärät osuvat yhteen. Pitäisikö tämän olla sallittua? Miten linjatuomarin kuuluu toimia?","answer":"Tämä ei ole luvallista. Linjatuomarin tulee varoittaa välittömästi sentteriä, joka tämän kontaktin aiheutti. Jos tätä on vaikea määrittää, linjatuomarin tulee varoittaa molempia. Säännöt 76.4 ja 76.6"},{"id":"76.44","rule_number":"76","question":"Toinen senttereistä ottaa erittäin matalan aloitusasennon, jalat leveällä ja mailaote alhaalla mailassa. Miten linjatuomari voi varmistua siitä, että pelaaja 1 0 osallistuu aloitukseen reilusti? O S A","answer":"· P E Linjatuomarin tulee varmistaa, että tämä kyseinen sentteri: L 1) seisoo suoraan kasvot suunnattuna vastustajan kenttäpäätyä kohti I N 2) jalat ovat sääntöjenmukaisesti jäämerkintöjen suhteen ja noin mailan mitan päässä vastustajasta V I 3) ei ryntää vastustajan ”alueelle” keskilinjan yli millään vartalon osalla R T 4) lapa on aloituspisteen valkoisella alueella jäässä A U S"},{"id":"76.45","rule_number":"76","question":"Sentteri käyttää kättään voittaakseen aloituksen. Aloitus suorittava linjatuomari huomaa tämän ja puhaltaa pilliinsä välittömästi ja raportoi tapahtuman päätuomarille. Pelikellosta kului muutama sekunti. Mitä toimenpiteitä tulee tehdä?","answer":"Päätuomari tuomitsee pienen rangaistuksen pelin viivyttämisestä - rike aloitustapahtumassa ja huolehtii, että peliajanottaja asettaa kellon oikeaan. Sääntö 76.4"},{"id":"76.46","rule_number":"76","question":"Peli katkaistaan B-joukkueen puolustusalueella B-joukkueelle tuomitun pienen rangaistuksen vuoksi. Seuraavaa aloitusta ollaan suorittamassa toisesta B:n puolustusalueen aloituspisteestä. Aloitusprosessin aikana linjatuomari varoittaa A-joukkueen sentteriä, joka sitten kohdistaa linjatuomaria kohtaan herjaavaa ja halveksuvaa kieltä. Linjatuomari tuomitsee pienen rangaistuksen epäurheilijamaisesta käytöksestä. Mistä on seuraava aloitus?","answer":"Seuraava aloitus jää edelleen B:n puolustusalueelle, koska molempia joukkueita rangaistiin samalla pelikatkolla. Sääntö 76.2 HAKEMISTO PELIN VIRTAUS"},{"id":"76.47","rule_number":"76","question":"Aloituksen aikana linjatuomari pudottaa kiekon tahattomasti niin, että se osuu jään kautta toista sentteriä hanskaan. Miten linjatuomarin kuuluu toimia?","answer":"Jos hän tämän havaitsee, on linjatuomarin syytä katkaista peli välittömästi ja suorittaa aloitus uudestaan niin, että se on reilu molemmille senttereille. Sääntö 76.6"},{"id":"76.48","rule_number":"76","question":"A-joukkueelle tuomitaan pieni rangaistus. Seuraava aloitus suoritetaan A-joukkueen puolustusalueelta. Kumman aloituspisteen linjatuomari valitsee?","answer":"Tämä ei ole linjatuomarin valinta. Ei rikkonut- joukkue valitsee, kummasta aloituspisteestä peliä jatketaan. Sääntö 76.2"},{"id":"76.49","rule_number":"76","question":"B-joukkueelle tuomitaan rangaistus. A-joukkue päättää, että seuraava aloitus suoritetaan aloituspisteestä B:n maalivahdin oikealta puolelta. Ennen kuin aloitusta ehditään käynnistää, toinen joukkueista pyytää aikalisää. Voiko joukkue vaihtaa vielä aloituksen puolta aikalisän jälkeen? 1 0","answer":"Koska aikalisä myönnettiin, prosessi aloituspaikan valinnan suhteen alkaa alusta eli kyllä, A-joukkue voi halutessaan valita nyt B:n O maalivahdin vasemmanpuoleisen aloituspisteen. Sääntö 76.2 S A ·"},{"id":"76.51","rule_number":"76","question":"Aloituksen aikana toinen senttereistä pudottautuu yhdelle polvelle jäähän ja voittaa aloituksen. Onko tämä sallittua?","answer":"Tämä ei ole sallittua. Koska senttereiden pitää olla aloitusasennossa paikallaan, eivät he voi pudottautua polvilleen. Sentteriä, joka pudottautuu polvilleen, varoitetaan ja aloitus uusitaan"},{"id":"76.52","rule_number":"76","question":"Aloituksessa toinen senttereistä pudottautuu yhdelle polvelle jäähän, mutta häviää aloituksen. Tarvitseeko linjatuomarin puuttua asiaan?","answer":"Ei, koska rikkeen tehnyt sentteri hävisi aloituksen. LT antaa pelin jatkua. HAKEMISTO PELIN VIRTAUS"},{"id":"76.53","rule_number":"76","question":"A-joukkueelle on tuomittu pieni rangaistus, joka sallii B-joukkueen valita aloituksen suorituspaikan seuraavassa aloituksessa. Mikä on proseduuri pelaajien vaihtamisessa ja aloituspuolen valinnassa?","answer":"Joukkueen B on valittava aloituspaikka osana vaihtoprosessiaan, eikä heillä ole lupaa piilottaa sijaintia joukkueelta A. Kun joukkue B valitsee aloituspaikan osana vaihtojaan, joukkue A asettaa pelaajansa jäälle. Tässä prosessissa ei saisi olla pitkää viivettä, ja tuomariston on varmistettava, ettei joukkue A viivytä peliä. HAKEMISTO PELIN VIRTAUS"}],"77":[{"id":"77.1","rule_number":"77","question":"Erän loppupuolella (30 sekuntia jäljellä) kiekko lauotaan suojalasiin ja se rikkoutuu niin, ettei se ole enää turvallinen pelin jatkamiselle. Jäähallin huoltohenkilökunta ryntää jäälle vaihtaakseen suojalasin. Miten päätuomareiden kuuluu toimia? Yksi valmentaja sanoo, että haluavat odottaa ja, että suojalasi korjataan. Toimitaanko valmentajan toiveen mukaan? Mihin sääntöön perustat toimintasi?","answer":"Päätös suojalasin korjaamisesta tai korjaamatta jättämisestä kuuluu päätuomarille. Koska erää on enää jäljellä vain 30 sekuntia, olisi maalaisjärjellä ajateltuna järkevintä lähettää joukkueet pukuhuoneisiinsa ja aloittaa erätauko. Jäljellä oleva 30 sekuntia pelataan sitten pois seuraavan erän alussa. Päätuomareiden tulee ottaa huomioon myös muita asioita päätöstä tehdessään. Jos on esimerkiksi rangaistuksia käynnissä, auttaako ”tuore” jää toista joukkuetta tms. Sääntö 77.3 Tärkein periaate pitää kuitenkin olla se (korjausta miettiessä), että voiko peliä jatkaa turvallisesti! HAKEMISTO PELIN VIRTAUS"}],"78":[{"id":"78.1","rule_number":"78","question":"Maalikehikkoa työnnetään eteenpäin puolustajan toimesta juuri, kun hyökkääjä on laukomassa kiekkoa maaliin. Hyväksytäänkö maali?","answer":"Tilanteeseen vaikuttaa kaksi tekijää. Jos maalikehikon tapit pysyvät paikoillaan ja kiekko menee maaliin, maali hyväksytään. Jos maalikehikko työnnetään pois paikoiltaan ja se aiheuttaa sen, ettei kiekko mene maaliin, voidaan maali hyväksyä, jos päätuomarin mielestä kiekko olisi mennyt maaliin, maalikehikon ollessa normaalilla paikallaan. Säännöt 78.4 ja 63.7"},{"id":"78.2","rule_number":"78","question":"Maalinedushässäkän aikana puolustavan joukkueen pelaaja potkaisee selkeästi kiekkoa ja se menee omaan maaliin. Hyväksytäänkö maali?","answer":"Hyväksytään. Sääntö 78.4"},{"id":"78.3","rule_number":"78","question":"Pelaajalle tuomitaan kumoutuva rangaistus (ei näy siis kellossa). Rangaistu pelaaja loukkaantuu ja hän menee pukuhuoneeseensa. Rangaistusajan päättymisen jälkeen, mutta ennen seuraavaa pelikatkoa, loukkaantunut pelaaja palaa pelaajapenkilleen. Voiko pelaaja osallistua peliin (vaihtaa lennosta) vai pidettäisiinkö häntä sääntöjenvastaisesti (edustuskelvoton) jäällä olevana?","answer":"Kyseinen pelaaja olisi edustuskelvoton. Sijaisen täytyy ensin päästä sääntöjenmukaisesti pois rangaistusaitiosta. Säännöt 8.1, 68.1 ja 78.5"},{"id":"78.4","rule_number":"78","question":"A-joukkueen pelaaja on rangaistusaitiossa ja rangaistusaition valvoja päästää hänet vahingossa jäälle ennen hänen rangaistusaikansa päättymistä. A-joukkueella on kiekko hallussa hyökkäysalueellaan, kun päätuomarilla nousee käsi ylös B-joukkueen siirretyn rangaistuksen merkiksi. Ennen kuin peli ehditään katkaista, A-joukkue tekee maalin ja liian aikaisin rangaistusaitiosta päässyt A:n pelaaja on myös jäällä. Seuranneella pelikatkolla päätuomarille ilmoitetaan, että A:n pelaaja on päästetty virheellisesti liian aikaisin takaisin jäälle. Mikä on päätuomarin ratkaisu?","answer":"A-joukkueen maali hylätään. B-joukkueelle siirrettynä tulossa ollut rangaistus tuomitaan. A-joukkueen pelaajan pitää mennä takaisin rangaistusaitioon kärsimään rangaistuksensa loppuun. A-joukkueelle ei tuomita lisärangaistuksia, koska kyseessä oli rangaistusaition valvojan tekemä virhe. Sääntö 68.5. Katso myös säännöt 78.5 (IV), 70.4, 35.1 ja 70.9 HAKEMISTO PELIN VIRTAUS"},{"id":"78.5","rule_number":"78","question":"Hyökkäävä joukkue vyöryttää peliä hyökkäysalueellaan. Maalivahti kaatuu tahattomasti maalikehikkoa kohti ja aiheuttaa toisen joustotapin irtoamisen reiästä. Linjatuomari havaitsee tilanteen, mutta kumpikaan päätuomareista ei tilanteeseen reagoi. Ennen kuin linjatuomari saa informoitua päätuomarille asiasta, hyökkäävän joukkueen pelaaja laukoo kiekon maaliin. Hyväksytäänkö maali?","answer":"Maali tulee hylätä. Linjatuomari, joka irtoamisen havaitsi, pitäisi katkaista peli, jos ei saa informoitua asiasta päätuomareita pelin käydessä. Kaikki tämä pitäisi pyrkiä tekemään ennen kuin maali ehtii syntyä. Sääntö 78.5"},{"id":"78.6","rule_number":"78","question":"B-joukkueelle ollaan tuomitsemassa siirrettynä rangaistusta. A-joukkueen puolustajalla on kiekko hallinnassaan omalla siniviivalla. B:n pelaaja antaa A:n puolustajalla mailahäirintää (osumatta kiekkoon) ja sen häirinnän seurauksena kiekko menee A:n maaliin. Onko tämä ns. hyvä maali?","answer":"Ei ole. Maali hyväksytään siirretyn rangaistuksen aikana vain siinä tapauksessa, jos rikkonut joukkue ei vaikuta oman maalin syntymiseen millään tavoin. Sääntö 78.5"},{"id":"78.7","rule_number":"78","question":"Maalinedushässäkän aikana päätuomari kadottaa kiekon näkökentästään ja on puhaltamassa pilliin katkaistakseen pelin, mutta kiekko 1 0 tuleekin esille ja ylittää maaliviivan. TV- hidastukset osoittavat selvästi, että kiekko on ylittänyt maaliviivan ennen pillin ääntä. O Mikä on päätuomarin päätös? Voiko tilanteen tarkastaa videoilta? S A","answer":"· Maalia ei hyväksytä. Tilanteessa on inhimillinen tekijä mukana pilliin viheltämisessä. Päätuomari voi tulkita, että peli on katkennut, vaikka ei P E ole vielä ”fyysisesti” ehtinyt/voinut jostain syystä pilliin puhaltaakaan. Tämän vuoksi päätuomarin näkemys/tulkinta on määräävänä tekijänä: L I olisiko kiekko ylittänyt maaliviivan ennen hänen vihellystään vai kuuluiko pelin olla ns. poikki. N Tätä tilannetta ei voi tarkistaa videoilta. Sääntö 37.3 Päätuomari kuitenkin informoi joukkueita ja kuuluttajaa, ettei maalia voida hyväksyä, V I koska peli oli vihelletty poikki ennen kuin kiekko ylitti maaliviivan. Tämä myös kuulutetaan hallissa. R T Säännöt 31.2, 37.3 ja 78.5 (XII) A U S SJL HUOMIO: Maali hyväksytään, jos se ei ole sääntöjen vastainen ja tuomaristo ei ole ehtinyt viheltää peliä poikki."},{"id":"78.8","rule_number":"78","question":"Hyökkäävän joukkueen pelaaja kamppailee tilasta maalinedustalla ja menettää kypäränsä. Viivalta tulee laukaus ja kiekko menee jäässä olevan kypärän sisään. Pelaaja, joka on ilman kypärää, laukoo kypärän (kiekko siellä sisällä) maaliin ennen vihellystä. Hyväksytäänkö maali?","answer":"Ei ja pelaajalle pitää tuomita rangaistus osallistumisesta peliin ilman kypärää. Sääntö 9.6 HAKEMISTO PELIN VIRTAUS"},{"id":"78.9","rule_number":"78","question":"A-joukkue pelaa ylivoimalla. Maalinedushässäkän aikana B:n maalilla vaikuttaa siltä, että A on tehnyt maalin. Peli kuitenkin jatkuu, koska kukaan tuomaristosta ei ole varma siitä syntyikö maali vai ei. Pelin jatkuessa A-joukkueelle on tulossa siirrettynä rangaistus. Peli katkaistaan ja rangaistus tuomitaan. Mikä on päätuomarin päätös, jos päädytään siihen, että aiemmin syntyi maali?","answer":"Jos varmistustaan siitä, että A teki maalin, B-joukkueen rangaistus päättyy. A-joukkueelle tulossa ollut rangaistus tuomitaan normaaliin tapaan. Pelikello asetetaan aikaan, jolloin maali syntyi. Sääntö 37.2"},{"id":"78.10","rule_number":"78","question":"A-joukkue tekee maalin, jota kukaan tuomaristosta ei havaitse. Peli katkaistaan vasta sitten, kun B-joukkueelle tuomitaan pieni rangaistus. Mitä toimintaohjetta tuomaristo noudattaa tässä tilanteessa? Jos videotarkistus osoittaa, että maali tulee hyväksyä, tuomitaanko B:n rangaistus silti?","answer":"Jos videotarkistuksen jälkeen on selvää, että A:n maali tulee hyväksyä, pelikello asetetaan siihen aikaan, jolloin kiekko ylitti maaliviivan. B- joukkueelle ei tuomita rangaistusta, koska heitä vastaan tehtiin maali. Sääntö 37.2"},{"id":"78.11","rule_number":"78","question":"1 0 Päätuomari on kulmauksessa ja kiekko syötetään nopeasti sieltä samasta kulmauksesta maalin eteen. Päätuomari kadottaa näkyvyyden kiekkoon ja sen seurauksena päätuomari puhaltaa pilliinsä. Kun peli on katkaistu, päätuomari huomaa, että kiekko on maalissa (minkä vuoksi päätuomari ei enää O kiekkoa nähnytkään). Voiko tämän tilanteen tarkistaa videoilta? S A","answer":""},{"id":"78.13","rule_number":"78","question":"Erittäin tiukan maalitilanteen jälkeen linjatuomari on suorittamassa aloitusta toisesta päätyalueen aloituspisteestä. Kiekon pudottamisen jälkeen, videotuomarin summeri soittaa ja hän haluaisi lisää aikaa tarkistaa tilanteen. Miten toimitaan?","answer":"Kun kiekko on pudotettu, ei maalitilannetta voi enää sen jälkeen tarkastella. Tiukoissa maalitilanteissa tuomariston tulee käyttää tarpeeksi aikaa tehdäkseen oikean ratkaisun, eikä linjatuomari kiirehdi pudottamaan kiekkoa ennen kuin tämä päätös on valmis. Sääntö 37.2 SJL HUOMIO: Ei videotuomaria käytössä. HAKEMISTO PELIN VIRTAUS"},{"id":"78.14","rule_number":"78","question":"B-joukkueen maalin edessä on ruuhka. Yksi A-joukkueen pelaajista alkaa tuulettamaan, kun luulee, että kiekko meni maaliin. Päätuomari ei ole kuitenkaan tällaista havainnut. Peli jatkuu ja nyt B-joukkue tekee maalin. Päätuomarille ilmoitetaan, että aiempaa tilannetta tarkistetaan videoilta. Videoilta selviää, että A-joukkue todellakin teki maalin, mutta kyseessä oli selkeä potkuliike A-joukkueen hyökkääjän toimesta. B- joukkueen maali taas on sääntöjenmukaisesti tehty. Mikä on päätuomarin päätös?","answer":"A-joukkueen maali tehtiin sääntöjenvastaisesti ja se hylätään. Koska pelin kuuluu katketa siihen tilanteeseen, ei myöskään B-joukkueen maalia voida hyväksyä. Pelikello täytyy asettaa aikaan, jolloin A-joukkueen (hylätty) maali syntyi. Sääntö 37.2 HUOM! SJL→ päätuomarin päätös mennä videoille ja se tulee tehdä, kun tiukan tilanteen jälkeen tulee katko/peli on ”neutraalissa” paikassa."},{"id":"78.15","rule_number":"78","question":"A-joukkue johtaa peliä maalilla ottelun loppuhetkillä. B-joukkue vaihtaa maalivahtinsa ylimääräiseen kenttäpelaajaan. A-joukkue saa kiekon haltuunsa puolustusalueellaan ja purkaa mailalla (nakkaa) sen korkealle ilmaan ja puolueettomalle alueelle. Kun kiekko jatkaa matkaansa toiseen päähän, A-joukkueen pelaaja tekee rikkeen, jonka päätuomari näkee ja nostaa käden ylös siirretyn rangaistuksen merkiksi. Kiekko jatkaa edelleen matkaansa ja menee lopulta B:n tyhjään maaliin. Hyväksytäänkö maali?","answer":"Ei hyväksytä. Sääntö 78.5 (”Siirretyn rangaistuksen aikana rikkonut joukkue ei voi....”) Tässä tapauksessa päätuomari viheltää pilliin siinä vaiheessa, kun näkee, että kiekko on menossa tyhjään maaliin (ei odota sen fyysisesti menevän maaliin), eikä pelaajia ole lähettyvillä ja tuomitsee A:lle rangaistuksen."},{"id":"78.16","rule_number":"78","question":"Ottelu on tilanteessa 3-2 ja sitä on jäljellä 3:30. Molempien joukkueiden pelaajat kamppailevat kovaa ja yrittävät voittaa tilaa maalivahdin edessä. Kun kamppailu jatkuu, yksi pelaajista ottaa kontaktin maalikehikkoon ja joustotappi nousee ylöspäin. Nyt toinen tolppa on ihan joustotapin pään varassa aiheuttaen sen, että maalikehikko on normaalia ylempänä. Hyökkäävän joukkueen pelaaja laukoo viivasta ”lämärin” ja kiekko menee yläriman kautta maaliin. Laukaus ei olisi todennäköisesti mennyt maaliin, jos maalikehikko ei olisi noussut ylemmäs normaalilta paikaltaan. Hyväksytäänkö maali?","answer":"Maalikehikon katsotaan olevan oikealla paikallaan, kun vähintään osa kummastakin joustotapista on tolpan sisällä. Joustotapit voivat taipua, mutta niin kauan, kun ainakin osa joustavasta tapista on vielä jääreiässä ja maalipylväässä (kontaktiketju), maalikehikon katsotaan olevan paikallaan. Sääntö 78.4. HAKEMISTO PELIN VIRTAUS"},{"id":"78.17","rule_number":"78","question":"A-joukkueen maalinedustalla on ruuhkaa. Päädyssä oleva päätuomari (R1) on keskittynyt seuraamaan kiekkoa ja näyttää maalia, kun näkee kiekon menevän maaliviivan yli. A:n maalivahti protestoi välittömästi tilannetta ja vetoaa siihen, että hänen torjuntatyötään häirittiin ruuhkan yhteydessä. Kun R1 on menossa ilmoittamaan maalia toimitsijoille, tuomaristo pitää palaverin erotuomarialueella. Kolme muuta tuomariston jäsentä ovat vakuuttuneita siitä, että maali pitäisi hylätä, koska maalivahdin torjuntatyöskentelyä häirittiin hyökkääjän toimesta. Toinen linjatuomareista on vielä sitä mieltä, että maalivahtia häirinnyt B47 ansaitsisi tarkoituksellisesta häirinnästään pienen rangaistuksen maalivahdin estämisestä. Miten päätuomari toimii tilanteessa?","answer":"Maali tulee hylätä, mutta rangaistuksia ei tuomita, koska kumpikaan päätuomareista ei havainnut hyökkääjän rikettä. Sääntö 78.5"},{"id":"78.18","rule_number":"78","question":"A-joukkueelle on tulossa siirrettynä rangaistus (tässä tapauksessa rangaistuslaukaus). B-joukkueen maalivahti menee pelaajapenkilleen ja hänet vaihdetaan ylimääräiseen kenttäpelaajaan. B-joukkue laukoo kiekon vahingossa omaa päätyä kohti ja kiekko menee tyhjään maaliin. Tuomitaanko B-joukkueen hyväksi kuitenkin rangaistuslaukaus?","answer":"Vain yksi maali voidaan hyväksyä yhdellä pelikatkolla (Sääntö 37.2). A-joukkueelle tuomitaan maali, koska B-joukkue teki (ilman rikkoneen joukkueen vaikutusta) oman maalin. Siirrettynä tulossa ollut RL muuttuu nyt pieneksi rangaistukseksi, joka kärsitään normaaliin tapaan. 1 0"},{"id":"78.19","rule_number":"78","question":"O Joukkue A on ylivoimalla, koska joukkueen B pelaaja kärsii pientä rangaistusta. Joukkueelle A on tulossa siirrettynä pieni rangaistus. Joukkue B ottaa S maalivahdin pois saadakseen lisähyökkääjän kentälle. He laukovat vahingossa kiekon omaan maaliinsa. Mitä tilanteessa tulee tapahtua? A ·","answer":""},{"id":"78.20","rule_number":"78","question":"T A Maali tehdään kolmannen erän loppusummerin soidessa. Erotuomari hyväksyy maalin, koska kiekko ylitti maaliviivan ennen ajan päättymistä, mutta U S ajanottajalla ei ollut mahdollisuutta pysäyttää pelikelloa ennen ajan loppumista. Onko aloitus tarpeen maalin vahvistamiseksi?","answer":"Ei. Vaikka erotuomari katsoo, että aika ei ole päättynyt, kun kiekko ylitti maaliviivan, aloitusta ei tarvitse suorittaa, jos pelikellossa on 00.00. Tässä tapauksessa, jos maali vahvistetaan videotarkistuksella, aloitusta ei tarvita, jos videotarkistus osoittaa, että kiekko ylitti maaliviivan alle sekunti ennen ajan loppumista."}],"79":[{"id":"79.1","rule_number":"79","question":"A-joukkue yrittää purkaa kiekkoa puolustusalueeltaan nostamalla/vippaamalla sen ilmaan. B-joukkueen puolustava pelaaja yrittää pitää kiekon alueella, mutta päätyykin lyömään kiekkoa puolueettoman alueen puolelta takaisin hyökkäysalueelle. Linjatuomarilla nousee käsi siirretyn paitsion merkiksi, koska alueelle oli hyökkäävän joukkueen pelaajia. Yksi näistä B:n pelaajista pelaa tarkoituksellisesti (tietäen, että paitsio ja käsisyöttö ovat päällä) kiekkoa. Peli vihelletään poikki kahdesta syystä: tahallinen paitsio ja käsisyöttö. Minkä mukaan mennään, kun mietitään seuraavaa aloituspaikkaa?","answer":"Rikkoneelle joukkueella tulee antaa mahdollisimman vähän alueellista etua. Sen vuoksi tahallinen paitsio on tässä ”vahvempi” ja seuraava aloitus suoritetaan toisesta B-joukkueen puolustusalueen aloituspisteestä. Sääntö 83.6 HAKEMISTO PELIN VIRTAUS HAKEMISTO PELIN VIRTAUS"},{"id":"79.2","rule_number":"79","question":"A34 pelaa kiekkoa kädellään puolustusalueella suunnaten kiekon joukkuekaverilleen. Tämä pelaa kiekkoa mailallaan puolueettomalla alueella. Silti, pelaajan molemmat luistimet ovat edelleen selvästi puolustusalueen puolella. Katkaistaanko peli käsisyötön vuoksi?","answer":"Kyllä. Kiekon asema on määräävä tekijä. Tässä tapauksessa kiekko oli puolueettomalla alueella. Sääntö 79.2"},{"id":"79.3","rule_number":"79","question":"A-joukkueen pelaaja on syvällä omalla puolustusalueellaan ja yrittää syöttää kiekkoa joukkuekaverilleen, joka on siniviivan lähellä. Kiekko kimpoaa matkalla ja nousee ylös ilmaan. A:n pelaaja, jonka luistimet ovat selvästi puolueettoman alueen puolella lyö ilmassa olevaa kiekkoa (joka on edelleen A:n puolustusalueella) takaisin joukkuekaverilleen. Miten tuomariston kuuluu toimia?","answer":"Annetaan pelin jatkua. Kiekon asema on määräävä tekijä. Sääntö 79.2"},{"id":"79.4","rule_number":"79","question":"A-joukkueen pelaaja menettää mailansa juuri oman puolustusalueensa sisäpuolella. Pelaaja lyö kiekon kädellään puolueettomalle alueelle. Kiekko kimpoaa vastustajan vartalosta toiselle A-joukkueen pelaajalle, joka on puolueettomalla alueella. Miten tuomareiden kuuluu toimia?","answer":""},{"id":"79.6","rule_number":"79","question":"Hyökkääjä lyö kiekkoa kädellään. Kiekko osuu vastustajan maalivahtia rintaan ja kimpoaa takaisin peliin toiselle hyökkääjälle. Tuomariston pitää: a. antaa pelin jatkua, koska rikkonut joukkue saa pidettyä kiekon hallinnassaan. b. katkaista peli heti, kun kiekko osuu maalivahtiin. c. katkaista peli heti, kun toinen hyökkäävän joukkueen pelaaja pelaa kiekkoa. d. antaa pelin jatkua ja, jos lopulta tulee maali, niin hyväksyä se.","answer":"Sääntö 79.1 eli c."},{"id":"79.7","rule_number":"79","question":"Joukkueen A pelaaja lyö kiekkoa kädellään hyökkäysalueella. Kiekko kimpoaa minkä tahansa pelaajan mailasta tai vartalosta (myös hänen omastaan) ja menee joukkuetoverille. Onko tämä sallittua?","answer":"Ei. Peli tulee katkaista ja aloitus suoritetaan keskialueelta. Se, että kiekko kimpoaa mistä tahansa (mailasta, vartalosta, joukkuetoverista, vastustajasta tai tuomarista), ei mitätöi käsisyöttöä. Ainoa tapa, jolla käsisyöttö mitätöityy, on se, että joko pelaaja itse, joka pelasi kiekkoa kädellään, tai vastustaja saa kiekon haltuunsa ja kontrolliinsa – silloin peliä voidaan jatkaa. HAKEMISTO PELIN VIRTAUS"}],"80":[{"id":"80.1","rule_number":"80","question":"Puolustavan joukkueen pelaaja yrittää purkaa kiekon ulos puolustusalueeltaan. Hyökkäävän joukkueen viivapelaaja, joka on juuri hyökkäysalueensa sisäpuolella, napauttaa kiekkoa korkealla mailalla ja kiekko tipahtaa hyökkäysalueelle jäähän. Molemmat joukkueet kieltäytyvät pelaamasta kiekkoa. Mistä on seuraava aloitus?","answer":"Seuraava aloitus suoritetaan toisesta sen päätyalueen aloituspisteestä, missä kiekko oli, kun peli katkaistiin. Hyökkäävä joukkue pelasi kiekkoa sääntöjenvastaisesti korkealla mailalla, on puolustava joukkue ainoa, joka voi sääntöjenmukaisesti kiekkoon koskea/pelata sitä. He kieltäytyvät näin tekemästä, joten aloituskin jää sitten heidän alueelleen. Säännöt 72.3, 76.2 ja 80.1"},{"id":"80.2","rule_number":"80","question":"B-joukkueen pelaaja pelaa kiekkoa korkealla mailalla. Kiekko kimpoaa A-joukkueen pelaajan rinnasta peliin. Voiko toinen B- joukkueen pelata nyt kiekkoa, kun se kerran osui A-joukkueen pelaajaan?","answer":"Ei, peli pitää katkaista, jos näin tapahtuu. Kimpoaminen ei ole sama asia kuin kontrollissa tai hallita kiekkoa. Sääntö 80.1"},{"id":"80.3","rule_number":"80","question":"Kiekko lauotaan maalia kohti ja se kimpoaa ylös ilmaan A-joukkueen puolustusalueella. A49 yrittää purkaa kiekon alueelta pois, käyttäen korkeaa mailaa. Kun kiekko on edelleen ilmassa, B37 pelaa myös kiekkoa korkealla mailalla ja kiekko menee nyt A- joukkueen pelaajalle, joka lähtee luistelemaan sen kanssa toista päätyä kohti. Mikä on tuomio, jos on yhtään mikään?","answer":"B37 korkealla mailalla pelaamista ei pidetä kiekon kontrolloimisena, joten peli katkaistaan heti, kun A-joukkueen pelaaja kiekkoa pelaa alkuperäisen A49 korkealla mailalla pelaamisen jälkeen. Seuraava aloitus suoritetaan toisesta A-joukkueen puolustusalueen aloituspisteestä. Säännöt 80.1 ja 80.2"},{"id":"80.4","rule_number":"80","question":"A-joukkue on hyökkäysalueellaan. Kiekko irtoaa jäästä ja A-joukkueen pelaaja napauttaa sitä ilmasta mailallaan. Päätyalueella oleva päätuomari ”pesee pois” mahdollisen korkean mailan, mutta puolueettomalla alueella oleva päätuomari on eri mieltä ja viheltää pelin poikki korkealla mailalla pelaamisen vuoksi. Mistä on seuraava aloitus?","answer":"Jos näin tapahtuu, tuomareiden täytyy varmistaa, että päädytään lopulta oikeaan ratkaisuun. Jos päädytään siihen, että kyseessä oli korkea maila, seuraava aloitus suoritetaan puolueettoman alueen aloituspisteestä, A:n hyökkäysalueen ulkopuolelta. Jos päädytään siihen, että peli katkaistiin virheellisesti, seuraava aloitus suoritetaan sen alueen lähimmästä aloituspisteestä, missä kiekko oli, kun peli katkaistiin. Säännöt 80.2, 80.4 ja 76"},{"id":"80.5","rule_number":"80","question":"Hyökkäävän joukkueen pelaaja pelaa kiekkoa korkealla mailalla yläriman yläpuolelta, mutta hartiatason alapuolelta. Kiekko kimpoaa siitä joukkuekaverin jalkaan ja menee vastustajan maaliin. Maali vai ei?","answer":"Ei maalia. Sääntö 80.3"},{"id":"80.6","rule_number":"80","question":"Hyökkäävä pelaaja (A12) pitää mailaa kädessään niin, että lapa on selvästi yläriman yläpuolella. Kiekko lauotaan maalia kohti ja se osuu A12 mailan varteen, joka on vyötärön korkeudella, ja kiekko menee lopulta maaliin. Pitääkö maali hylätä korkean mailan takia? HAKEMISTO PELIN VIRTAUS","answer":"Ei. Tämä ns. hyvä maali. Määräävänä tekijänä on kiekon osumakohta. Sääntö 80.3"},{"id":"80.7","rule_number":"80","question":"A-joukkueen pelaaja makaa jäässä B-joukkueen maalin edessä saatuaan poikittaisesta mailasta. Jäässä maatessaan pelaaja osuu kiekkoon olkapään yläpuolella olevalla mailalla ja kiekko menee maaliin. Hyväksytäänkö maali vai hylätäänkö ja aloitus puolueettomalle alueelle?","answer":"Me tiedämme, ettei maalia voi tehdä koskemalla kiekkoon mailalla (normaalin) olkapään yläpuolen korkeudelta. Tässä tapauksessa pelaaja ei normaalissa peliasennossaan, koska hän makasi jäässä. Tiedämme kuitenkin myös sen, ettei maalia voi tehdä yläriman yläpuolelta. Se onkin määräävä tekijä tässä tapauksessa. Tilanne voi myös vaatia videotarkistuksen, kun yritetään määrittää kiekon tarkkaa osumakohtaa. Sääntö 80.3"},{"id":"80.8","rule_number":"80","question":"Puolustusalueellaan oleva pelaaja pelaa kiekkoa korkealla mailalla, normaalin olkapääkorkeuden yläpuolelta. Kiekko kimpoaa hänen joukkueensa maalivahtiin ja menee siitä maaliin. Tuomitaanko vastustajan hyväksi maali?","answer":"Kyllä. Sääntö 80.3 11"},{"id":"80.10","rule_number":"80","question":"A-joukkue laukoo kiekon hyökkäysalueelleen ja syntyy siirretty paitsiotilanne. Kun siirretty paitsio on päällä, B-joukkueen pelaaja pelaa kiekkoa korkealla mailalla ja hänen joukkuekaverinsa koskee sen jälkeen kiekkoon. Mistä on seuraava aloitus?","answer":"Toisesta B-joukkueen puolustusalueen aloituspisteestä. Sääntö 80.2"},{"id":"80.11","rule_number":"80","question":"Hyökkäävän joukkueen laitahyökkääjä etenee hyökkäysalueelleen ja laukoo kiekon sinne. Kiekko pomppaa maalin takana laidasta maaliverkon päälle ja jää siihen. Hyökkäävän joukkueen sentteri yrittää mailallaan saada kiekon takaisin peliin maaliverkolta. Kiekko tuleekin jäälle ja sentteri etenee maalin etupuolelle tehden maalin. Onko tämä ns. hyvä maali?","answer":"Jos osumakohta ei ollut olkapääkorkeuden yläpuolella, kun pelaaja sai kiekon ”vapaaksi”, tulkitaan tämä hyväksi maaliksi. Koska kiekkoon ei myöskään koskettu yläriman yläpuolella olevalla mailalla ennen sen laukomista maaliin, on meillä kyseessä hyvä maali. Sääntö 80 HAKEMISTO PELIN VIRTAUS"},{"id":"80.12","rule_number":"80","question":"A-joukkue pelaa ylivoimaa hyökkäysalueellaan, kun A:n pelaaja pelaa kiekkoa korkealla mailalla. Kiekko menee B-joukkueen maalivahdille, joka peittää kiekon. Mistä on seuraava aloitus?","answer":"Seuraava aloitus on toisesta B-joukkueen puolustusalueen aloituspisteestä. Sääntö 80.1 (I)"},{"id":"80.13","rule_number":"80","question":"Hyökkääjä pelaa kiekon korkealla mailalla (osumakohta yläriman yläpuolella) maalin ja maali hylätään. Mistä on seuraava aloitus?","answer":"Lähimmästä puolueettoman alueen aloituspisteestä, heidän hyökkäysalueensa ulkopuolelta (hyökkäävän joukkueen rike). Säännöt 76.2 ja 80.4"},{"id":"80.14","rule_number":"80","question":"Rangaistuslaukausta suorittamassa oleva pelaaja etenee maalia kohti kiekkoa ”veivaillen”. Yhdessä kohtaa pelaajan lähestyessä maalia, kiekko nousee veivaillessa olkapääkorkeuden yläpuolelle ennen kuin pelaaja laukoo kiekkoa maalia kohti. Mitä tapahtuu?","answer":"Tuomari viheltää pilliin ja RL on päättynyt (ei maalia). Sääntö 80.1"},{"id":"80.15","rule_number":"80","question":"Joukkueen A pelaaja koskee kiekkoon mailalla, joka on normaalin olkapään korkeuden yläpuolella. Kiekko kimpoaa vastustajasta ja menee toiselle joukkueen A pelaajalle. Saako peli jatkua?","answer":"Ei. Peli tulee katkaista ja aloitus suoritetaan. Se, että kiekko kimpoaa mistä tahansa (mailasta, vartalosta, joukkuetoverista, vastustajasta tai tuomarista), ei mitätöi korkealla mailalla pelatun kiekon rikettä. Ainoa tapa, jolla tämä rike mitätöityy, on se, että vastustaja saa kiekon haltuunsa ja kontrolliinsa – silloin peliä voidaan jatkaa."}],"81":[{"id":"81.1","rule_number":"81","question":"A-joukkue laukoo kiekon omalta kenttäpuoliskoltaan (punaisen takaa) B-joukkueen puolustusalueelle ja takalinjatuomari nostaa käden ylös pitkän merkiksi. Samalla etulinjatuomari nostaa käden ylös siirretyn paitsion merkiksi, kun kiekko ohittaa siniviivan. A-joukkueen pelaaja ei yritä ”puhdistaa” hyökkäysaluettaan ja lähtee kiekon perään. Linjatuomarin mielestä on selvää, että B-joukkueen pelaaja pääsee kiekolle ensimmäisenä. Katkaiseeko linjatuomari pelin paitsion vuoksi vai antaako hän B-joukkueen pelaajalle mahdollisuuden saavuttaa P-pisteen tason ensin ja viheltää sitten pitkän?","answer":"Yllä kuvatussa tilanteessa linjatuomarin tulee antaa B-joukkueen pelaajan saavuttaa P-pisteen taso ja viheltää sitten pitkä. Kunhan linjatuomarin mielestä ei ole vaaraa fyysiselle kontaktille hyökkäävän pelaajan toimesta. HUOM! Jos kuitenkin linjatuomarin mielestä paitsiossa oleva hyökkäävän joukkueen pelaaja ehtii kiekolle ensin tai on mahdollista, että ajautuu fyysiseen kontaktiin vastustajan kanssa, linjatuomarin tulee katkaista peli ja tuomita paitsio. Säännöt 81.1 ja 83.3 HAKEMISTO PELIN VIRTAUS"},{"id":"81.2","rule_number":"81","question":"Kiekko lauotaan omalta kenttäpuoliskolta toiseen päätyyn ja linjatuomari nostaa käden ylös mahdollisen pitkän merkiksi. Kiekko osuu maalitolppaan ja menee sitten maalin sivulle, maaliviivan taakse. Onko pitkän tilanne edelleen päällä?","answer":"Kyllä, pitkän tilanne on edelleen ns. päällä, koska kiekko ei osunut vastustajaan millään tavoin. Säännöt 81.1 ja 81.5"},{"id":"81.3","rule_number":"81","question":"B-joukkue laukoo kiekon omalta kenttäpuoliskoltaan ja syntyy pitkän tilanne. Kiekko osuu matkalla tuomariin ja jatkaa matkaansa toiseen päätyyn. Onko pitkän tilanne edelleen voimassa?","answer":"Kyllä, pitkän tilanne on päällä. Säännöt 81.1 ja 85.4"},{"id":"81.4","rule_number":"81","question":"A-joukkueelle ollaan tuomitsemassa siirrettynä rangaistusta. B-joukkue tekee pitkän kiekon. Seuraavaa aloitusta ollaan suorittamassa A- joukkueen toisesta puolustusalueen aloituspisteestä. Ennen kuin kiekko on tiputettu, B-joukkue syyllistyy rikkeeseen, josta tuomitaan pieni rangaistus. Mistä on seuraava aloitus tässä tapauksessa? 1 0","answer":"Vaikka tähän ei ole varsinaista sääntöä, jota lainata, viittauksena käytetään pitkän sääntöä (81.2). Koska molemmille joukkueille tuomitaan O S rangaistuksia samalla pelikatkolla, eivät säännöt 15.5 ja 76.2 aloituspaikkaan liittyen (kun yhtä joukkuetta rangaistaan), päde. Siksipä A seuraavan aloituspaikan määrää pelikatkon alkuperäinen syy, joka oli B-joukkueen pitkä kiekko. Seuraava aloitus suoritetaan toisesta B- · joukkueen puolustusalueen aloituspisteestä (A-joukkueen valinta). P E L I"},{"id":"81.6","rule_number":"81","question":"A-joukkue tekee pitkän. Luistelukilpailun jälkeen syntyy pelikatkolla tappelu. Molemmille tappelijoille tuomitaan 5+PR ja muita rangaistuksia ei tuomita. Koska rangaistuksia tuomittiin, voiko A-joukkue (vaikka pitkän tekivätkin) suorittaa pelaajavaihtoja?","answer":"Ei voi. Tappelusta tuomittiin isot rangaistukset molempien joukkueiden pelaajalla, eikä niillä ole vaikutusta pelaajavahvuuteen jäällä. A- joukkue (joka teki pitkän) voi vaihtaa ainoastaan rangaistun pelaajan tilalle toisen pelaajan. B-joukkue voi puolestaan halutessaan vaihtaa vaikka koko kentällisen. Säännöt 81.4 ja 82.1"},{"id":"81.7","rule_number":"81","question":"A-joukkue tekee pitkän ja B-joukkue on saanut pelaajavaihtonsa valmiiksi. Aloitusta ollaan juuri suorittamassa A-joukkueen puolustusalueelta, kun huomataan, että suojalasi on rikki. Otteluun tulee pitkähkö viivytys ennen kuin sitä pystytään jatkamaan. Sallitaanko nyt myös A-joukkueen tehdä pelaajavaihtoja pitkähkön viivytyksen vuoksi?","answer":"Ei. Ainoastaan silloin, kun tuomitaan rangaistus, joka vaikuttaa jomman kumman joukkueen pelaajavahvuuteen jäällä, on vaihtaminen pitkän tehneelle joukkueelle mahdollista. Sääntö 81.4 HAKEMISTO PELIN VIRTAUS"},{"id":"81.8","rule_number":"81","question":"Linjatuomarin viheltämän pitkän jälkeen hyökkäävä joukkue on tehnyt pelaajavaihtonsa ja he ovat valmiina aloitukseen. Hyökkäävä joukkue syyllistyy kuitenkin pienen rangaistuksen arvoiseen rikkeeseen ja samalla myös puolustavan joukkueen pelaajalle tuomitaan pieni rangaistus. Mistä on seuraava aloitus ja saavatko molemmat joukkueet tehdä pelaajavaihtoja?","answer":"Seuraava aloitus suoritetaan samasta päätyalueen aloituspisteestä, mistä sitä oltiin pitkän jälkeen suorittamassa. Sääntö 81.2 Molemmat joukkueet voivat korvata rangaistut pelaajat, mutta muita vaihtoja ei sallita. Säännöt 81.4 ja 82.1"},{"id":"81.9","rule_number":"81","question":"A-joukkue laukoo kiekon toiseen päähän ja pitkä on tulossa. Kiekko kuitenkin muuttaa suuntaa, kun se osuu B:n pelaajaan A:n hyökkäysalueella. Nyt kuitenkin, ennen kuin kiekko ylittää punaviivan se muuttaa suuntaa uudestaan A-joukkueen pelaajasta. Onko tämä pitkä?","answer":"Ei. Kiekko osuu vastustajan pelaajaan. sääntö 81.5"},{"id":"81.10","rule_number":"81","question":"Takalinjatuomari nostaa käden ylös mahdollisen pitkän merkiksi. Kiekko menee ihan päätylaitaan asti, josta se kimpoaa maaliverkolle (maalin taakse). Maalivahti huitaisee sitten maaliverkkoa (ei kuitenkaan osu kiekkoon) ja kiekko tulee takaisin jäälle. Onko tämä edelleen pitkä?","answer":"Ei ole. Sääntö 81.5 HAKEMISTO PELIN VIRTAUS"},{"id":"81.11","rule_number":"81","question":"Kun 3. erää on jäljellä 4:35, A-joukkue laukoo pitkän. Kun peli vihelletään poikki, tilanteen yhteydessä A11 tuomitaan 5+PR laitataklauksesta ja B12 2+10´. Mistä on seuraava aloitus? Mitä rangaistuksia menee kelloon? Voiko A-joukkue tehdä pelaajavaihtoja?","answer":"Seuraava aloitus on A-joukkueen puolustusalueelta. A-joukkue pelaa yhden pelaajan verran vajaalukuisena. Heidän rangaistuskelloon menee kolme (3) minuuttia, koska 3. erää on jäljellä alle viisi minuuttia. A-joukkue voi vaihtaa pelaajia, koska pelaajavahvuus jäällä muuttuu. Säännöt 19.4, 81.2 ja 81.4"},{"id":"81.12","rule_number":"81","question":"B-joukkueen maalivahti luistelee pelaajapenkkiään kohti ja häntä ollaan vaihtamassa ylimääräiseen kenttäpelaajaan, kun erää on jäljellä 40 sekuntia. A-joukkue laukoo kiekon toista päätyä kohti ja kiekko menee ihan, vaihtoon menossa olevan, maalivahdin vierestä. Maalivahti antaa kiekon mennä ja jatkaa luistelemista pelaajapenkkiä kohti. Mikä on linjatuomarin tulkinta tässä tilanteessa?","answer":"Pitkän tilanne on edelleen päällä. Sääntö 81.3"},{"id":"81.13","rule_number":"81","question":"Maalinedusruuhkan aikana puolustavan joukkueen pelaaja lyö ilmassa olevaa kiekkoa kädellään ja kiekko menee aina toiseen päätyyn asti. 11 00 Onko tämä pitkä? O","answer":"S Kyllä. Sääntö 81.1 A · P E"},{"id":"81.15","rule_number":"81","question":"B-joukkueelle ollaan tuomitsemassa siirrettynä rangaistusta. A-joukkue tekee pitkän. Kun peli katkaistaan pitkän vuoksi (ja rangaistuksen myös), mistä on seuraava aloitus? Koska A-joukkue teki pitkän, voivatko he tässä tilanteessa vaihtaa pelaajiaan?","answer":"Seuraava aloitus on toisesta B-joukkueen puolustusalueen aloituspisteestä. Säännöt 76.2 ja 81.2 A-joukkue voi tehdä pelaajavaihtoja, koska pelaajavahvuus jäällä muuttuu. Sääntö 81.4"},{"id":"81.16","rule_number":"81","question":"B-joukkueen pelaaja yrittää syöttää puolustusalueeltaan joukkuekaverilleen, joka on juuri punaviivan takana. A-joukkueen pelaajalla on mahdollisuus pelata kiekkoa, mutta B-joukkueen pelaaja (jolle kiekko on tulossa) nostaa A:n pelaajan mailaa aiheuttaen sen, että kiekko menee aina toiseen päätyyn asti. Mikä on tulkinta?","answer":"Normaalisti, jos vastustajalla on mahdollisuus pelata kiekkoa, pitkän tilanne ns pestään pois. Mutta tässä tapauksessa, koska B:n pelaaja nostaa A:n mailaa, estäen näin häntä pelaamasta kiekkoa, pitkän tilanne B-joukkueelle on edelleen päällä. sääntö 81.1 HAKEMISTO PELIN VIRTAUS"},{"id":"81.17","rule_number":"81","question":"B12 on kiekko hallinnassaan hyökkäysalueellaan. Hän yrittää syöttää kiekkoa joukkuekaverilleen, joka on juuri siniviivan sisäpuolella, hyökkäysalueella. A23 kurottaa mailallaan ja katkaisee syötön niin, että kiekko menee aina toiseen päätyyn asti, B-joukkueen puolustusalueelle. Onko tämä pitkä?","answer":"Ei ole (kimpoaminen vs laukominen). Sääntö 81.5"},{"id":"81.18","rule_number":"81","question":"Kiekko lauotaan toista päätyä kohti ja takalinjatuomari nostaa käden ylös mahdollisen pitkän merkiksi. Ennen kuin etulinjatuomari pystyy tekemään päätöstä siitä, kumman joukkueen pelaaja pääsee todennäköisesti ensimmäisenä kiekolle, osuu kiekko jäälle (maaliviivan yläpuolelle) hylättyyn mailaan. Onko pitkän tilanne edelleen voimassa?","answer":"Kiekko ei mennyt maaliviivan yli, joten etulinjatuomari pesee pitkän pois ja peli jatkuu. Sääntö 81.5"},{"id":"81.19","rule_number":"81","question":"Miten linjatuomari päättää pitkän jälkeisen aloituspisteen?","answer":"Ei rikkonut- joukkue ilmoittaa linjatuomarille, kummalta puolelta haluavat aloittaa hyökkäysalueellaan. Sääntö 81.2 1 0"}],"82":[{"id":"82.1","rule_number":"82","question":"A-joukkue tekee pitkän. Luistelukilpailun jälkeen syntyy pelikatkolla tappelu. Molemmille tappelijoille tuomitaan 5+PR ja muita rangaistuksia ei tuomita. Koska rangaistuksia tuomittiin, voiko A-joukkue (vaikka pitkän tekivätkin) suorittaa pelaajavaihtoja?","answer":"Ei voi. Tappelusta tuomittiin isot rangaistukset molempien joukkueiden pelaajalla, eikä niillä ole vaikutusta pelaajavahvuuteen jäällä. A- joukkue (joka teki pitkän) voi vaihtaa ainoastaan rangaistun pelaajan tilalle toisen pelaajan. B-joukkue voi puolestaan halutessaan vaihtaa vaikka koko kentällisen. Säännöt 81.4 ja 82.1"},{"id":"82.2","rule_number":"82","question":"Kun erää on jäljellä 12 sekuntia, linjatuomari varoittaa molempia senttereitä aloituksessa. Kun linjatuomari on pudottamassa kiekkoa, hyökkäävän joukkueen laitahyökkääjä tulee aloitusympyrään liian aikaisin (kiekkoa ei ole vielä pudotettu). Viivalla oleva linjatuomari seuraa tilanteen loppuun asti ja lopputulema on, että hyökkäävä joukkue saa kiekon haltuunsa. Hän puhaltaa sen jälkeen pilliinsä virheellisen aloituksen vuoksi. Mitä tuomaristo tekee?","answer":"Hyökkäävälle joukkueelle tuomitaan joukkuerangaistus pelin viivyttämisestä – rike aloitustapahtumassa. Sääntö 76.6 Pelikello korjataan myös oikeaan aikaan, jos tilanne sitä vaatii. Sääntö 76.8 Nyt, kun hyökkäävää joukkuetta rangaistaan, seuraava aloitus suoritetaan heidän puolustusalueeltaan. Sääntö 76.2 Koska tilanne vaikuttaa joukkueiden pelaajavahvuuteen jäällä, vaihdot ovat nyt sallittuja. Sääntö 82.1"},{"id":"82.3","rule_number":"82","question":"Mitä toimintaohjetta tuomaristo noudattaa, kun: - päätuomari on suorittanut vaihdonvalvonnan loppuun - aloittava linjatuomari on puhaltanut pilliinsä ja odottanut viisi sekuntia - puolustavan joukkueen pelaajat hidastelevat saapumistaan aloituspisteelle ja ovat vielä vastustajan puolella","answer":"Kun puolustavalla joukkueella kestää seuraavaan aloitukseen saapuminen ja he ovat vielä vastustajan puolella, kun viisi sekuntia on kulunut, eikä linjatuomari voi tällöin pudottaa kiekkoa, tulee päätuomarin varoittaa rikkoneen joukkueen valmentajaa. Kaikista seuraavista samankaltaisista rikkeistä pelin aikana, joukkueelle tuomitaan joukkuerangaistus. Säännöt 76.6 ja 82.2"},{"id":"82.4","rule_number":"82","question":"Kun pelikello näyttää 9:52 1.erässä, A-joukkue hidastelee aloitukseen saapumista (yli viisi sekuntia on mennyt siitä, kun linjatuomari on viheltänyt pilliinsä). He ovat vielä tässä vaiheessa vastustajan puolella. Mitä päätuomari tekee?","answer":"Pelaajia, jotka hidastelevat ja jotka ovat vielä vastustajan puolella, kun pitäisi olla jo ryhmittyneenä aloitukseen saavat päätuomarilta varoituksen. Tämän saman varoituksen saa myös A-joukkueen valmentaja. Linjatuomari ei tässä tilanteessa varoita rikkoneen joukkueen sentteriä aloituksessa. Jatkossa samanlaisesta rikkomuksesta joukkueelle tuomitaan joukkuerangaistus. Sääntö 82.2"},{"id":"82.5","rule_number":"82","question":"Sama joukkue syyllistyy samanlaiseen rikkomukseen (kuin tilanteessa 82.4), kun 3. erää on jäljellä 1:52. Miten nyt toimitaan?","answer":"Viimeisen kahden minuutin aikana ja milloin tahansa jatkoajalla, säännön 82.2 kohdat VI ja VII eivät ole voimassa. Joukkueille annetaan riittävästi aikaa järjestäytyä aloitukseen. Sääntö 82.2 (IX) HAKEMISTO PELIN VIRTAUS"},{"id":"82.6","rule_number":"82","question":"Maali siirtyy tahattomasti pois paikoiltaan puolustavan joukkueen toimesta. Voidaanko seuranneella pelikatkolla pitää mainoskatko? Jos kyllä, voiko puolustava joukkue vaihtaa pelaajiaan mainoskatkon jälkeen?","answer":"Mainoskatka ei pidetä säännön 87.2. mukaisesti. Puolustava joukkue ei saa tehdä pelaajavaihtoja. Sääntö 63.8"}],"83":[{"id":"83.1","rule_number":"83","question":"Puolueettomalla alueella oleva hyökkäävän joukkueen pelaaja yrittää laukoa kiekkoa hyökkäysalueelleen. Hyökkäävä pelaaja laukoo sen ilmaan ja puolustavan joukkueen pelaaja (joka luistelee takaperin) lyö kiekkoa kädellä ilmasta. Kun pelaaja lyö kiekkoa, on hänen molemmat luistimensa vielä juuri ja juuri puolueettomalla alueella. Lyöty kiekko jatkaa matkaansa suuntaan, josta se oli alun perin lauottu. Kiekko ottaa kierteen ja pomppaa takaisin hyökkäysalueelle, missä hyökkäävän joukkueen pelaaja jo on (ennen kiekkoa siis). Onko tämä siirretty paitsio?","answer":"Jos linjatuomarin mielestä alkuperäinen laukaus luo kiekolle sen hyökkäysaluetta kohti menevän liikkeen, tulee hänen nostaa käsi ylös siirretyn paitsion merkiksi. Kuitenkin, jos linjatuomarin mielestä puolustavan pelaajan toimet aiheuttavat kiekon menemisen 1 0 hänen puolustusalueelleen, tulkitaan se ”on side” – tilanteeksi ja peli jatkuu. Sääntö 83.3 O S A"},{"id":"83.3","rule_number":"83","question":"A18 laukoo kiekon puolustusalueeltaan pois. Kiekon saa puolueettomalla alueella A23, juuri siniviivan yläpuolella. B18 taklaa A23 samalla, kun hän kiekon haltuunsa saa. Taklaus aiheuttaa sen, että kiekko palaa takaisin A:n puolustusalueelle ja siellä on edelleen B:n pelaajia, jotka eivät ole ehtineet sieltä poistua. Voivatko nämä pelaajat pelata nyt kiekkoa sääntöjenmukaisesti hyökkäysalueellaan?","answer":"Eivät voi. Linjatuomarin täytyy nostaa käsi ylös siirretyn paitsion merkiksi heti, kun kiekko menee taklauksen jälkeen takaisin alueelle. Sääntö 83.2"},{"id":"83.4","rule_number":"83","question":"B16 on puolustusalueellaan ja yrittää purkaa kiekon pois sieltä. Kiekko osuu selvästi puolueettomalla alueella olevaa B23, mutta häntä häiritään/taklataan A12 toimesta ja kiekko palautuu takaisin B:n puolustusalueelle. Mikä on linjatuomarin tuomio?","answer":"Siirretty paitsio on päällä. ”Kaikki hyökkäävän pelaajan toimet, jotka aiheuttavat kiekon palautuksen puolueettomalta alueelta puolustusalueelle. jne.” Sääntö 83.2 HAKEMISTO PELIN VIRTAUS"},{"id":"83.5","rule_number":"83","question":"Puolustavan joukkueen pelaaja luistelee kiekon kanssa pois puolustusalueeltaan. Siniviivan ylityksen jälkeen häntä taklataan ja kiekko palautuu sen vuoksi takaisin puolustusalueelle, missä on edelleen hyökkäävän joukkueen pelaajia. Onko tämä siirretty paitsio?","answer":"On. Sääntö 83.2"},{"id":"83.6","rule_number":"83","question":"A-joukkue laukoo kiekon omalta kenttäpuoliskoltaan (punaisen takaa) B-joukkueen puolustusalueelle ja takalinjatuomari nostaa käden ylös pitkän merkiksi. Samalla etulinjatuomari nostaa käden ylös siirretyn paitsion merkiksi, kun kiekko ohittaa siniviivan. A-joukkueen pelaaja ei yritä ”puhdistaa” hyökkäysaluettaan ja lähtee kiekon perään. Linjatuomarin mielestä on selvää, että B-joukkueen pelaaja pääsee kiekolle ensimmäisenä. Katkaiseeko linjatuomari pelin paitsion vuoksi vai antaako hän B-joukkueen pelaajalle mahdollisuuden saavuttaa P-pisteen tason ensin ja viheltää sitten pitkän?","answer":"Yllä kuvatussa tilanteessa linjatuomarin tulee antaa B-joukkueen pelaajan saavuttaa P-pisteen taso ja viheltää sitten pitkä. Kunhan linjatuomarin mielestä ei ole vaaraa fyysiselle kontaktille hyökkäävän pelaajan toimesta. HUOM! Jos kuitenkin linjatuomarin mielestä paitsiossa oleva hyökkäävän joukkueen pelaaja ehtii kiekolle ensin tai on mahdollista, että ajautuu fyysiseen kontaktiin vastustajan kanssa, linjatuomarin tulee katkaista peli ja tuomita paitsio. Säännöt 81.1 ja 83.3"},{"id":"83.7","rule_number":"83","question":"Linjatuomari nostaa käden ylös A-joukkueen siirretyn paitsion merkiksi. Alueen puhdistamisen sijaan, A14 päättää taklata B14, joka on tulossa kiekon kanssa pois omalta puolustusalueeltaan. Linjatuomari on varma siitä, että A14 tiesi, että siirretty paitsio on päällä. Mistä on seuraava aloitus?","answer":"Peli katkaistaan heti, kun näyttää siltä, että hyökkäävän joukkueen pelaaja on ottamassa fyysistä kontaktia puolustavan joukkueen pelaajaan. Jos tämä linjatuomarin mielestä tapahtuu tietäen, että paitsio on päällä, on perusteet tuomita tahallinen paitsio ja näin ollen aloitus menee A:n puolustusalueelle. Säännöt 83.3 ja 83.6"},{"id":"83.8","rule_number":"83","question":"A-joukkueella on siirretty paitsiotilanne päällä. A11 on ainoa paitsioasemassa oleva pelaaja ja hän päättää mennä vaihtoon. Pelaajapenkin ovi on hyökkäysalueen puolella ja kentälle tuleva pelaaja tulee jäälle samasta ovesta. Pysyykö siirretty paitsiotilanne päällä?","answer":"Jos vaihtoon menevä pelaaja jättää jään ennen kuin jäälle tuleva pelaaja tulee jäälle (tai hän menee suoraan puolueettomalle alueelle), tulkitaan alue puhdistetuksi, jos siellä ei muita hyökkäävän pelaajia ole. Jos vaihtavat pelaajat ovat yhtä aikaa hyökkäysalueen puolella, pysyy siirretty paitsio päällä. Sääntö 83.3"},{"id":"83.9","rule_number":"83","question":"Hyökkäävän joukkueen pelaaja laukoo kiekon hyökkäysalueelleen. Toinen hyökkäävän joukkueen pelaaja etenee alueelle ennen kiekkoa, aiheuttaen siirretyn paitsiotilanteen. Lauottu kiekko osuu maalitolppaan ja kimpoaa siitä pelialueen ulkopuolelle. Mistä on seuraava aloitus?","answer":"Lähimmästä puolueettoman alueen aloituspisteestä, mistä kiekko alun perin lauottiin. Sääntö 83.6 HAKEMISTO PELIN VIRTAUS"},{"id":"83.10","rule_number":"83","question":"Hyökkäävä joukkue laukoo kiekon hyökkäysalueelleen. Yksi hyökkäävän joukkueen pelaajista on alueella ennen kiekkoa ja linjatuomari nostaa käden ylös siirretyn paitsion merkiksi. Pelaaja, joka oli paitsiossa, tulee alueelta pois ja linjatuomari laskee kätensä. Alkuperäinen laukaus päätyy lopulta maaliin. Koska linjatuomarin käsi oli alhaalla ennen kuin kiekko ylitti maaliviivan, hyväksytäänkö maali? Olisiko sillä merkitystä, jos kiekko osuisi vielä matkalla puolustavan joukkueen pelaajaan ja kimpoaisi siitä maaliin?","answer":"Ei hyväksytä. Maali ei voi syntyä tässä tilanteessa, vaikka se kimpoaisikin jostain, koska tilanne oli alun perin (siirretty) paitsio. Se tosiasia, että linjatuomari on laskenut kätensä ennen kuin kiekko maaliin menee, ei muuta tulkintaa. Sääntö 83.4"},{"id":"83.11","rule_number":"83","question":"A-joukkue ”heittää” (mailalla) kiekon hyökkäysalueelleen ja yksi heidän pelaajistaan on paitsioasemassa. Paitsiossa oleva pelaaja puhdistaa alueen ja sen jälkeen lauottu kiekko osuu B:n puolustajaan ja kimpoaa siitä maaliin. Mikä on tuomio?","answer":"Maalia ei hyväksytä. Sääntö 83.4"},{"id":"83.12","rule_number":"83","question":"A13 laukoo kiekon punaviivan jälkeen hyökkäysalueelleen. Linjatuomari nostaa käden ylös siirretyn paitsion merkiksi. Lauottu kiekko 1 0 menee suoraan maaliin. Tiedämme, että maali pitää hylätä, mutta mistä on seuraava aloitus?","answer":"O Seuraava aloitus suoritetaan lähimmästä sen alueen aloituspisteestä, mistä laukaus lähti. Sääntö 83.4 S A · P"},{"id":"83.14","rule_number":"83","question":"A-joukkue on hyökkäysalueellaan. A16 laukoo kiekon maalille. Kiekko hipaisee maalivahdin olkapäätä ja menee sitten laitaa pitkin pois alueelta aina A:n puolustusalueelle asti. B17 on ennen kiekkoa alueella ja on saamassa kiekko haltuunsa ja pääsemässä läpiajoon
