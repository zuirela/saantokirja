olisi tullut katkaista (käsisyötön vuoksi) pelikellon ajassa 1:45. Mitä tapahtuu seuraavaksi?","answer":"Pelikello siirretään aikaan 1:45. A-joukkueen pelaaja, joka oli kärsimässä rangaistusta, palaa takaisin rangaistusaitioon ja kärsii rangaistuksensa loppuun (0:07 rangaistuskelloon). Seuraava aloitus suoritetaan puolueettoman alueen aloituspisteestä, A-joukkueen puolustusalueen ulkopuolelta. SJL HUOMIO: Valmentajan haasto ei käytössä"},{"id":"38.10","rule_number":"38","question":"Peli pyörii A-joukkueen puolustusalueella B-joukkueen kontrolloidessa kiekkoa. B-joukkueen pelaajat syöttelevät kiekkoa toisilleen ja tekevät lopulta maalin. A-joukkue haastaa tilanteen, koska heidän mielestään tuomaristo ei havainnut, että kiekko kävi ennen maalin syntyä pelialueen ulkopuolella (pelaajapenkin päässä olevassa kaarevassa suojalasissa). Mitä tapahtuu seuraavaksi?","answer":"Tuomaristo suorittaa videotarkistuksen selvittääkseen sen, että olisiko peli tullut katkaista ennen maalin syntyä. Jos olisi, maali hylätään ja seuraava aloitus suoritetaan puolueettomalta alueelta. Jos videotarkistuksenkin jälkeen on selvää, ettei pelin katkaisulle ollut perusteita, maali hyväksytään ja A-joukkueelle tuomitaan pieni rangaistus (2´) pelin viivyttämisestä. HUOM! ”Missattu” pelin katkaisu hyökkäysalueella, joka johtaa maaliin, voi pitää sisällään: käsisyöttö (sääntö 79), kiekon pelaaminen korkealla mailalla (sääntö 80) ja kiekko pelialueen ulkopuolella (sääntö 85). Muita erikoisia tapahtumia voidaan myös tarkistaa, kuten esimerkiksi kiekon osuminen pelikelloon, yleisö estää kiekon liikkeitä. Maalaisjärkeä tulee kuitenkin käyttää. SJL HUOMIO: Valmentajan haasto ei käytössä"},{"id":"38.11","rule_number":"38","question":"Hyökkäävän joukkueen sentteri pelaa hyökkäysalueen aloituksessa kiekkoa kädellä, mutta tuomaristo ei tätä havaitse. Kiekko menee kädellä pelaamisen seurauksena suoraan sentterin joukkuekaverille, joka tekee maalin. Puolustava joukkue haastaa tilanteen, koska HAKEMISTO TUOMARISTO heidän mielestään peli olisi pitänyt katkaista. Onko tämä onnistunut haasto?","answer":"On. Vaikka kyseinen tapahtuma on ”missattu” rangaistus, on se myös missattu pelin katkaisu tuomaristolta (käsisyöttö). Säännöt 38.2 (b) ja 38.10 SJL HUOMIO: Valmentajan haasto ei käytössä 0 5 O S A · T U O M A R I S T O HAKEMISTO TUOMARISTO"},{"id":"38.12","rule_number":"38","question":"Kiekko lauotaan puolueettomalta alueelta hyökkäysalueelle. Ennen kuin kiekko menee siniviivan yli, osuu se pelaajapenkin laidan yli roikkuvaan hanskaan (puolueettomalla alueella). Tuomaristo ei havaitse osumaa ja peli jatkuu. Lopulta kiekon pysyessä hyökkäysalueella, hyökkäävä joukkue tekee maalin. Puolustava joukkue haluaa haastaa tilanteen, koska heidän mielestään peli olisi kuulunut katkaista (koska kiekko osui laidan yli roikkuvaan hanskaan). Onko tämä haasto voitettavissa?","answer":"Ei, tämä ei ole onnistunut haasto. Havaitsematta jääneen pelin katkaisun tulee tapahtua hyökkäysalueella. Sääntö 38.2 Tässä tapauksessa osuma hanskaan tapahtui puolueettomalla alueella. SJL HUOMIO: Valmentajan haasto ei käytössä"},{"id":"38.13","rule_number":"38","question":"Kiekko lauotaan puolueettomalta alueelta hyökkäysalueelle. Kiekko menee siniviivan yli ja osuu sen jälkeen pelaajapenkin laidan yli roikkuvaan hanskaan (hyökkäysalueella). Tuomaristo ei havaitse osumaa ja peli jatkuu. Lopulta kiekon pysyessä hyökkäysalueella, hyökkäävä joukkue tekee maalin. Puolustava joukkue haluaa haastaa tilanteen, koska heidän mielestään peli olisi kuulunut katkaista (koska kiekko osui laidan yli roikkuvaan hanskaan). Onko tämä haasto voitettavissa?","answer":"Kyllä. Tässä tapauksessa osuma hanskaan tapahtui hyökkäysalueen puolella. Hyökkäysalueella tapahtuneen, havaitsematta jääneen pelikatkon, voi haastaa. Sääntö 38.2 SJL HUOMIO: Valmentajan haasto ei käytössä"},{"id":"38.14","rule_number":"38","question":"Puolustavan joukkueen pelaaja pelaa kiekkoa korkealla mailalla puolustusalueellaan. Kun hänen joukkuekaverinsa koskee kiekkoon, tuomaristo ei jostain syystä katkaise peliä. Peli jatkuu ja lopulta hyökkäävä joukkue tekee maalin. Peli olisi pitänyt katkaista puolustavan joukkueen korkean mailan takia. Onko tämän haastaminen voitettavissa?","answer":"Ei. Havaitsematta jääneen pelikatkon aiheuttaja oli puolustava joukkue. Sääntö 38.2 (II) SJL HUOMIO: Valmentajan haasto ei käytössä"},{"id":"38.15","rule_number":"38","question":"Hyökkäävän joukkueen pelaaja lyö kiekkoa ilmasta kädellään puolueettomalta alueelta hyökkäysalueelle. Hänen joukkuekaverinsa koskee kiekkoon (ensimmäisenä) hyökkäysalueella, mutta tuomaristo ei jostain syystä katkaise peliä. Peli jatkuu ja hyökkäävä joukkue tekee maalin. Peli olisi pitänyt katkaista käsisyötön takia. Onko tämä haasto voitettavissa?","answer":"On. Peli pitäisi katkaista silloin, kun joukkuekaveri kiekkoon koski. Tämä tapahtui hyökkäysalueen puolella, joten sen voi haastaa. Sääntö 38.2 (II) SJL HUOMIO: Valmentajan haasto ei käytössä HAKEMISTO TUOMARISTO"},{"id":"38.16","rule_number":"38","question":"Hyökkäävä joukkue laukoo kiekon hyökkäysalueelle ennen keskiviivaa, pitkää kiekkoa ei tuomita. Lopulta, kun kiekko pysyy hyökkäysalueella, hyökkäävä joukkue tekee maalin. Puolustava joukkue haluaa haastaa maalin väittäen, että kiekon ylityksestä olisi pitänyt viheltää jäähy. Onko tämä haaste voitettavissa?","answer":"Ei, pitkän kiekon tilanne ei ole tarkistettavissa ”missatun katkon” säännön mukaisesti. Sääntö 38.2 b SJL HUOMIO: Valmentajan haasto ei käytössä"},{"id":"38.17","rule_number":"38","question":"A-joukkue tekee maalin. Seuranneen pelikatkon loppupuolella B-joukkueen valmentaja pyytää aikalisää. Voiko B-joukkue päättää valmentajan haastosta aikalisän aikana?","answer":"Joukkue voi pyytää aikalisän maalin jälkeen, mutta sen jälkeen he eivät voi käynnistää valmentajan haastoa. Sääntö 38 ja 87 0 5 SJL HUOMIO: Valmentajan haasto ei käytössä O S A · T"}],"39":[{"id":"39.2","rule_number":"39","question":"A11 ja B13 tuomitaan samanaikaiset pienet rangaistukset. Kun peli jatkuu A11 käyttää herjaavaa kieltä tuomaristoa kohtaan. Mitä rangaistuksia hänelle tuomitaan ja pitääkö jonkun toisen A-joukkueen pelaajan mennä rangaistusaitioon?","answer":"Koska joukkueet pelaavat 5-5, toisen pelaajan A-joukkueesta täytyy mennä rangaistusaitioon kärsimään A11 pientä käytösrangaistusta. A11 vapautuu pelikatkolla molempien rangaistusten päätyttyä. Sääntö 39"},{"id":"39.3","rule_number":"39","question":"Pelaaja käyttää herjaavaa kieltä päätuomaria kohtaan, kun ottelu on päättynyt. Mitä pelaajalle tuomitaan ja minkä säännön mukaan?","answer":"Pelin jälkeen tapahtuvaan sopimattomaan käytökseen tuomaristoa kohtaan puututaan joko käytösrangaistuksella (10´), tai pelirangaistuksella (PR) ). Sääntö 39.2 huomautus + (katso myös sääntö 39.5 (II)) HAKEMISTO TUOMARISTO"},{"id":"39.4","rule_number":"39","question":"Pelaaja on kärsimässä pientä rangaistusta kampituksesta. Kärsittyään 30 s rangaistusta, pelaaja käyttää herjaavaa kieltä tuomaristoa kohtaan rangaistusaitiosta. Pelaajalle tuomitaan nyt lisäksi pieni käytösrangaistus (2´). Pitääkö toisen pelaajan mennä rangaistusaitioon kärsimään lisärangaistus vai lisätäänkö uusi rangaistus pelaajan aiempaan rangaistukseen?","answer":"Jos rangaistulle pelaajalle tuomitaan lisäksi rangaistus epäurheilijamaisesta käytöksestä joko ennen tai jälkeen, kun hän on alkanut kärsimään alkuperäistä rangaistustaan, lisärangaistuksena tullut pieni rangaistus lisätään alkuperäisen rangaistuksen aikaan ja ne kärsitään peräkkäin. Säännöt 75.2 ja 39.2 (VI)"},{"id":"39.5","rule_number":"39","question":"Summeri soi ottelun päättymisen merkiksi. Hävinneen joukkueen apuvalmentaja jää seisoskelemaan pelaajapenkin oven eteen ja käyttää halventavaa/rienaavaa kieltä tuomaristoa kohtaan. Mikä rangaistus tuomitaan tälle kyseiselle valmentajalle?","answer":"Hänelle tuomitaan pelirangaistus (PR). Sääntö 39.5 (II)"},{"id":"39.6","rule_number":"39","question":"0 Sääntöjenmukaisen kamppailun aikana pelaajan maila rikkoutuu. Tilanteesta ei olla tuomitsemassa rangaistusta. Pelaaja, jonka maila 5 rikkoutuu, on eri mieltä ja alkaa huutamaan päätuomarille. Kun hän on hylkäämässä rikkoutunutta mailaansa, hän päättää heittää sen O suojalasin yli katsomoon. S A Mikä on päätuomarin ratkaisu? · T","answer":""},{"id":"39.8","rule_number":"39","question":"Valmentaja käyttää herjaavaa ja halventavaa kieltä päätuomaria kohtaan. Kielenkäytöstä alkaa tulla kovaäänistä ja henkilökohtaista. Lähellä olevan linjatuomarin mielestä siitä kuuluisi tuomita joukkuerangaistus (JR). Linjatuomarin täytyy odottaa seuraavaa pelikatkoa raportoidakseen tapahtuman päätuomarille. Mitä tapahtuu, jos rikkonut joukkue tekee maalin ennen pelikatkoa? a. Maali hylätään ja sen vuoksi myöskään joukkuerangaistusta ei tuomita? b. Maali hylätään ja joukkuerangaistus tuomitaan? c. Maali hyväksytään ja joukkuerangaistus tuomitaan? d. Maali hyväksytään, eikä rangaistuksia tuomita?","answer":"b. Maali hylätään ja tuomitaan joukkuerangaistus. Säännöt 32.4 ja 39.3 HAKEMISTO TUOMARISTO"},{"id":"39.9","rule_number":"39","question":"Mikä rangaistus tuomitaan pelaajalle, joka heittää mailan/osan siitä/jonkin muun esineen pelialueen ulkopuolelle protestoidakseen tuomariston päätöstä?","answer":"Pelaajalle tuomitaan pieni rangaistus epäurheilijamaisesta käytöksestä (2´) + pelirangaistus (PR). Säännöt 53.2, 53.5, 39.4 ja 39.5"}],"40":[{"id":"40.1","rule_number":"40","question":"Sentterinä pelaavaa A16 on aiemmin varoitettu aloitustapahtumassa linjatuomarin toimesta. Valmistautuessa uuteen aloitukseen ja vastustajan lähestyessä aloituspistettä, A16 huitaisee tarkoituksellisesti linjatuomarin käteen. Pelaaja on selvästi turhautunut aiemmin saamaansa varoitukseen. Miten linjatuomarin kuuluu toimia?","answer":"Raportoida asia päätuomarille (jos hän ei sitä havaitse) ja pelaajalla pitää tuomitaan pelirangaistus (PR). Sääntö 40.1 SJL HUOMIO: 5+PR"},{"id":"40.2","rule_number":"40","question":"Päteekö sääntö 40 myös toimitsijoiden fyysisyyden koskemattomuuden loukkaamiseen?","answer":"Kyllä. HAKEMISTO OSA 06 F YYSISE T RIKK EET 0 6 O S A · F Y Y S I S E T R I K K E E T FYYSISET RIKKEET"}],"41":[{"id":"41.1","rule_number":"41","question":"Pitkän tilanteessa takalinjatuomari havaitsee, että kiekko osuu matkalla puolustavan joukkueen pelaajaan. Etulinjatuomari ei tätä huomaa, eikä myöskään takalinjatuomarin wash out- merkkiä ja viheltää pitkän. Tilanteen päätteeksi hyökkäävä pelaaja vie taklauksen loppuun ja sen seurauksena puolustavan joukkueen pelaaja ”lentää” laitaan. Päätuomari nostaa käden ylös pienen rangaistuksen merkiksi laitataklauksesta. Nyt sitten takalinjatuomari muuttaa pitkän ratkaisun ja hyökkäävä pelaaja vetoaa tähän, että tiesi pitkän tulevan kumotuksi, koska näki kiekon osuvan vastustajaan puolueettomalla alueella.","answer":"Pieni rangaistus laitataklauksesta tuomitaan edelleen ja seuraava aloitus suoritetaan rikkoneen joukkueen toisesta päätyalueen aloituspisteestä. Säännöt 41.1 ja 76.2 SJL HUOMIO: 2+10"}],"42":[{"id":"42.1","rule_number":"42","question":"00 Oikein vai väärin? Ryntäys voidaan tuomita vain siinä tapauksessa, kun pelaaja ottaa kolmen tai useamman luistelupotkun vauhdit ennen 66 taklausta tai kun luistimet irtoavat jäästä taklausta suorittaessa. O","answer":""}],"43":[],"44":[{"id":"44.1","rule_number":"44","question":"A16 kuljettaa kiekkoa B-joukkueen puolustusalueelle. B4 luistelee takaperin alentaen vartaloasemaansa yrittäessään taklata lonkalla A16. B4 vartalo on sen verran alhaalla, että taklaus osuu A16 polvien seudulle. Onko tämä sääntöjenmukainen taklaus?","answer":"Ei. Tästä kuuluu tuomita rangaistus leikkaamisesta. Sääntö 44 HAKEMISTO FYYSISET RIKKEET"}],"45":[{"id":"45.1","rule_number":"45","question":"Voiko kyynärpäätaklauksesta tuomita ison rangaistuksen, vaikka kohde ei loukkaannukaan?","answer":"Kyllä voi. Sääntö 45.3"}],"46":[{"id":"46.1","rule_number":"46","question":"Kaksi pelaajaa (A6 ja B12) aloittavat tappelun (molemmat halukkaita siihen). A44 osallistuu tappeluun kolmantena pelaajana. A44 alkaa sitten tappelemaan B12 kanssa. Mitä tuomitaan, jos A44 (joka oli kolmas pelaaja tappelussa) tulkitaan toisen tappelun yllyttäjäksi/aloitteentekijäksi?","answer":"Jos A44 tulkitaan toisen tappelun yllyttäjäksi/aloitteentekijäksi, tuomitaan seuraavat rangaistukset: A6 5+PR tappelusta A44 5 tappelusta +PR (kolmas mies) B12 5+PR ensimmäisestä tappelusta ja 5´toisesta tappelusta. A-joukkue pelaa 2min vajaalukuisena. SJL HUOMIO: pelkkä 5 min rangaistus ei käytössä. A44 saa 5+PR tappelusta + PR (kolmas mies kiistassa.)"},{"id":"46.2","rule_number":"46","question":"Kaksi B-joukkueen pelaajaa tulevat yhdessä tönimään A-joukkueen pelaajaa pelikatkolla. A:n pelaaja yrittää lyödä yhden kerran ”vastuksena” tönimiselle, muttei ole halukas tappelemaan. B:n pelaaja päättää kuitenkin lyödä vielä A:n pelaajaa ainakin viisi kertaa. Voiko päätuomari tuomita A:n pelaajalle pienen rangaistuksen väkivaltaisuudesta ja B:n pelaajalle 5+PR tappelusta? Onko tämä soveliasta säännön 46 noudattamista?","answer":"Kyllä, tämä on säännön 46 puitteissa olevaa puuttumista. Sääntö antaa päätuomarille erittäin laajan liikkumavaran rangaistusten tuomitsemiseen."},{"id":"46.3","rule_number":"46","question":"A16 aloittaa tappelun B13 vastaan. B13 menettää paitansa tappelun aikana. Tappelu jatkuu ja nyt B13 tulee hyökkäävä osapuoli. Vaikka A16 katsotaan tappelun aloittajaksi/yllyttäjäksi, saako B13 myös rangaistuksen hyökkäävänä osapuolena olemisestaan?","answer":"Kyllä. Sääntö 46.4 HAKEMISTO FYYSISET RIKKEET"},{"id":"46.4","rule_number":"46","question":"Kun 3.erää on jäljellä 5:01, kiekko lauotaan B-joukkueen puolustusalueelle ja B44 saa sen haltuunsa päädyssä laidan lähellä. A94 ”tööttää” B44 selän puolelta laitaan aiheuttaen verta vuotavan ”vekin” B44 kasvoihin. Päätuomarilla on käsi ylhäällä siirretyn 5+PR merkiksi, mutta ennen kuin hän ehtii katkaista peliä, B49 poistaa kypäränsä ja lähtee puolustamaan joukkuekaveriaan. B49 aloittaa tappelun A94 kanssa, joka ei ole halukas tappelemaan. Mitä rangaistuksia tuomitaan ja mikä on joukkueiden pelaajavahvuus jäällä tilanteen jälkeen?","answer":"A94 tuomitaan 5+PR laitataklauksesta (tai selästä taklaamisesta) ja 5+PR tappelusta. B49 tuomitaan pieni rangaistus (2´) tappelun aloittamisesta/siihen yllyttämisestä, 5+PR tappelusta ja pieni rangaistus epäurheilimaisesta käytöksestä (2´), kypärän poistamisesta. Peliä jatketaan 4 vs. 4. Säännöt 46 ja 19.1 SJL HUOMIO: Kypärän pois ottaminen 10 min KR"},{"id":"46.5","rule_number":"46","question":"Samalla, kun summeri soi 1.erän päättymisen merkiksi, tulee taklaus, joka kerää kaikki jäällä olevat pelaajat yhteen. Tulee kahakka, josta syntyy yksi tappelu kahden pelaajan välille, jotka eivät olleet osallisina alkuperäisessä kontaktitilanteessa. Mitä rangaistuksia tuomitaan näille 0 kahdelle pelaajalle? He olivat molemmat halukkaita tappelemaan. 6","answer":"O Molemmille tuomitaan 5+PR. Sääntö 46.9 S A · F"},{"id":"46.7","rule_number":"46","question":"a. A11 ja B22 tiputtavat hanskansa ja aloittavat tappelun ennen kuin kiekko ehditään tiputtamaan 3.erän alkamiseksi. Mitä rangaistuksia tuomitaan? b. A11 ja B22 tiputtavat hanskansa ja aloittavat tappelun ennen kuin kiekko ehditään pudottamaan paitsion jälkeen. Mitä rangaistuksia tuomitaan?","answer":"a. molemmille 5+PR, sääntö 46.9 b. molemmille 5+PR, sääntö 46.10 SJL HUOMIO: Hanskan pois ottaminen aiheuttaa aina 10 min KR muiden tuomittavien rangaistusten lisäksi HAKEMISTO FYYSISET RIKKEET"},{"id":"46.8","rule_number":"46","question":"Pelaaja A6 on aloitteellinen tappelussa B12 kanssa ennen erän alkua. Mitä rangaistuksia tuomitaan?","answer":"A6 saa pienen rangaistuksen aloitteellisuudesta + 5+PR tappelusta. B12 tuomitaan 5+PR tappelusta."},{"id":"46.9","rule_number":"46","question":"A12 tuomitaan iso ja pieni rangaistus tappelusta 2. erän alkupuolella. Toisessa vaihdossaan päästyään takaisin jäälle, A-joukkue tekee maalin. Maalia ilmoittamassa olleelle päätuomarille kerrotaan, että A12 olisi pitänyt tuomita pelirangaistus aiemmasta isosta rangaistuksesta, koska se oli hänen toinen isonsa pelissä. Miten päätuomari toimii?","answer":"Päätuomarin tulee hylätä maali, koska maalin tehneellä joukkueella oli edustuskelvoton pelaaja jäällä (sääntö 5.2) ja tuomita A12 pelirangaistus. (sama tilanne kuin 46.8.) SJL HUOMIO: pelkkä 5 min rangaistus ei käytössä 0"},{"id":"46.10","rule_number":"46","question":"6 A4 ja B7 ryhtyvät tappelemaan. A4 on teippiä käsissään (ranteen alapuolella). Mitä rangaistuksia tuomitaan, jos A4 aiheuttaa B7 loukkaantumisen tappelussa? O S A","answer":""},{"id":"46.13","rule_number":"46","question":"A-joukkueelle (A18) tuomitaan pieni rangaistus (2´) laitataklauksesta 1.erän päättyessä. Tämä aiheuttaa myös kahakan jäälle. Tästä kahakasta ei kuitenkaan tuomita rangaistuksia. Kun joukkueet palaavat jäälle aloittamaan 2.erää, B-joukkueen pelaaja sanoo jotain A18, joka on luistelemassa rangaistusaitioon. Lopulta he pudottavat hanskansa ja alkavat tappelemaan. Tilanne synnyttää myös HAKEMISTO FYYSISET RIKKEET toisen tappelun. Mitä rangaistuksia tuomitaan?","answer":"Kaikille osallisille 5+PR tappelusta. Sääntö 46.10"},{"id":"46.14","rule_number":"46","question":"Pelaajapenkillään oleva pelaaja osallistuu jäällä tapahtuvaan tappeluun. Mitä hänelle tuomitaan?","answer":"PR + muut mahdolliset rangaistukset, mitä tilanne vaatii (esim. 5+PR tappelusta, jos aktiivinen). Sääntö 46.11"},{"id":"46.15","rule_number":"46","question":"Pelaaja lyö raukkamaisesti vastustajaa (joka ei yhtään odota iskua). Mitä tuomitaan?","answer":"5+PR. Sääntö 46.5"},{"id":"46.16","rule_number":"46","question":"A16 ollaan tuomitsemassa 5+PR laitataklauksesta. B11 lähtee kostamaan/puolustamaan oman joukkueen pelaaajaa ja he (A16 ja 0 B11) päätyvät tappelemaan. B15 osallistuu kolmantena pelaajana tappeluun. Tuomitaanko B15 pelirangaistus (PR)? 6","answer":""},{"id":"46.18","rule_number":"46","question":"B14 yrittää houkutella A12 tappeluun kahakan aikana, mutta A12 ei ole halukas tähän. B14 päättää silti lyödä raukkamaisesti A12 kasvoihin ja aiheuttaa samalla hänelle vamman. Mitä tuomitaan B14?","answer":"5+PR. Sääntö 46.5 HAKEMISTO FYYSISET RIKKEET"}],"47":[{"id":"47.1","rule_number":"47","question":"Voiko päällä iskemisestä tuomita ison rangaistuksen, vaikka kohde ei loukkaantuisikaan?","answer":"Päällä iskemisestä tai sen yrityksestä tuomitaan 5+PR. Sääntö 47.4"}],"48":[{"id":"48.1","rule_number":"48","question":"Päätuomari havaitsee, kun pelaaja taklaa vastustajaa. Päätuomarin mielestä, perustuen siihen, miltä taklaus hänen kulmasta katsottuna näyttää (sight line), pelaa kohdistaa taklauksen vastustajan päähän ja suurin osa kontaktista myös osuu päähän. Kun päätuomari nostaa käden ylös siirretyn pienen rangaistuksen merkiksi, tulee hänelle tunne, ettei taklaus ollut mitenkään ”törkeä”. Pääosuma kuitenkin löytyy, joten hän pysyy tuomionsa takana. Kuitenkin, kun peli katkaistaan, on selvää, että taklauksen kohde loukkaantuu tilanteessa. Pitääkö päätuomarin nyt muuttaa rangaistus 5+PR?","answer":"Tällainen taklaus aiheuttaa usein kahakan jäälle. Sen jälkeen, kun kahakka on selvitetty, tuomariston tulee kerääntyä yhteen ja käydä keskustelu taklauksesta. Jos kaikki ovat sitä mieltä, ettei taklaus ollut mitenkään törkeä, pysytään alkuperäisessä tuomiossa. Kuitenkin, jos esimeriksi toisesta kulmasta (sight line) tilannetta katsonut tuomariston jäsen on sitä mieltä, että taklaus oli ylikova/törkeä, tuomitaan palaverin jälkeen 5+PR). SJL HUOMIO: 2+10 on pienin mahdollinen rangaistus"}],"49":[{"id":"49.1","rule_number":"49","question":"Maalinedusruuhkan aikana A-joukkueen päädyssä, B:n pelaaja potkaisee kiekkoa. Kiekko kimpoaa toisen B-joukkueen pelaajan mailasta maalivahdin patjaan ja siitä maaliin. Hyväksytäänkö maali?","answer":"Kyllä, hyvä maali. Sääntö 49.2 (II) toteaa: ”Jos hyökkäävän pelaajan potkaisema kiekko kimpoaa jonkin pelaajan (pois lukien maalivahti) mailasta maaliin, maali hyväksytään.” Osumalla maalivahtiin ei tässä ole merkitystä, koska ennen sitä, kontakti pelaajan mailaan löytyy potkun jälkeen."},{"id":"49.2","rule_number":"49","question":"Kiekko on paikallaan jäällä. Pysäytysliikkeen aikana hyökkäävä pelaaja liikauttaa paikallaan olevaa kiekkoa luistimellaan, mikä saa sen liikkumaan ja menemään maaliin. Onko tämä hyväksyttävä maali?","answer":"Koska kiekko on täysin paikallaan jäällä ja hyökkäävä pelaaja sitten liikauttaa kiekon maaliin pysäytysliikkeellä, tämä katsotaan erilliseksi potkuliikkeeksi. Maali hylätään. Säännöt 37.4 ja 49.2. HAKEMISTO FYYSISET RIKKEET"}],"50":[{"id":"50.1","rule_number":"50","question":"EI TILANNETTA.","answer":""}],"51":[{"id":"51.1","rule_number":"51","question":"Maalinedusruuhkan aikana maalivahti lyö/iskee kilpikäsineellään vastustajaa päähän. Mitä tuomitaan?","answer":"Jos päätuomarin mielestä teko voi todennäköisesti johtaa vastustajan loukkaantumiseen (= voima/teho), tuomitaan 5+PR. Muussa tapauksessa voi päätuomari puuttua myös 2´ väkivaltaisuudella. Sääntö 51."}],"52":[],"53":[{"id":"53.2","rule_number":"53","question":"A-joukkue pelaa vajaalukuisena yhden pienen rangaistuksen takia. A:n maalivahti on maalialueensa ulkopuolella yrittäen pelaten kiekkoa, mutta menettää sen hallinnan. B-joukkue saa kiekon hallintaansa ja on laukomassa sitä tyhjään maaliin. A:n maalivahti heittää mailansa laukomassa olevaa B:n pelaajaa kohti. Siitä huolimatta B onnistuu maalinteossa. Mitä tapahtuu rangaistukselle, joka oli tulossa siirrettynä maalivahdille mailan heittämisestä (joka olisi siis ollut RL)?","answer":"B-joukkueen tekemä maali päättää kellossa olevan pienen rangaistuksen. B:n maalivahdille siirrettynä tulossa ollut rangaistus (RL) tuomitaan nyt pienenä rangaistuksena (2´) ja B:n tulee laittaa sijainen, joka oli jäällä pelin katkaisuhetkellä, kärsimään sitä. Sääntö 53.2 (katso myös sääntö 15.4)"},{"id":"53.3","rule_number":"53","question":"A14 menettää mailansa puolustusalueellaan. A18 käyttää omaa mailaa apunaan ja liu’uttaa A14 mailan hänen jalkojensa juureen. A14 nostaa mailan jäästä välittömästi. Onko tämä rangaistus?","answer":"Ei, tämä ei ole rangaistava teko, mikäli liukuva maila ei häiritse kiekkoa tai vastustajaa. Sääntö 10.3 ja 53.2"},{"id":"53.4","rule_number":"53","question":"Pelaaja nakkaa mailansa pelialueen ulkopuolelle protestina tuomittuun rangaistukseen. Mitä hänelle tuomitaan?","answer":"Hänelle tuomitaan pieni rangaistus epäurheilijamaisesta käytöksestä (2´) + pelirangaistus (PR). Säännöt 53.2 (IV) ja 53.5 (katso myös sääntö 39.5 (V))"},{"id":"53.5","rule_number":"53","question":"A17 on kiekko hallinnassa hyökkäysalueellaan. Puolustavan joukkueen pelaaja heittää mailansa tai rikkoutuneen mailan A17 kohti. Tästä kuuluu tuomita RL. Kenen kuuluu suorittaa tuomittu RL?","answer":"Sen voi suorittaa kuka tahansa valmentajan tai kapteenin nimeämä ei rangaistu pelaaja. Sääntö 24.3"},{"id":"53.6","rule_number":"53","question":"A-joukkue pelaa vajaalukuisena. A15 ajaa takaa kiekollista B-joukkueen pelaajaa A:n maalin takaa, sieltä kulmaukseen ja edelleen laitaa pitkin aloituspisteiden ”viiksien” kohdalle. A15 luistelureitillä on sattumalta rikkinäinen maila. A15 laukoo rikkinäisen mailan lapaosan kiekollista B:n pelaajaa kohti, osuen häntä nilkkaan. Mikä on tuomio tässä tilanteessa?","answer":"Pelin annetaan jatkua (päätuomarilla käsi ylhäällä siirretyn rangaistuksen (RL) merkiksi). Jos B-joukkue ei onnistu maalinteossa ennen pelin katkaisua, tuomitaan heidän hyväksi rangaistuslaukaus (RL). Sääntö 53.7 HAKEMISTO FYYSISET RIKKEET"},{"id":"53.7","rule_number":"53","question":"Peli pyörii A-joukkueen hyökkäysalueella. Jäällä on hanska siniviivan tuntumassa. A16 on kiekko hallinnassaan ja hän valmistautumassa syöttämään sen joukkuekaverilleen. B14 laukoo jäällä olevan hanskan kiekkoa kohti ja kiekko karkaakin sen vuoksi A16 lavasta. Kumpikaan päätuomareista ei havaitse tilannetta, mutta linjatuomari havaitsee. Miten linjatuomarin kuuluu toimia tilanteessa?","answer":"Linjatuomarin tulee katkaista peli ja raportoida päätuomarille tapahtumasta. Päätuomari sitten tuomitsee rangaistuslaukauksen A-joukkueen hyväksi. Sääntö 32.5 (III)"},{"id":"53.8","rule_number":"53","question":"A9 on kiekko hallinnassaan hyökkäysalueellaan. Samalla, kun hän menettää kiekon hallinnan, B3 heittää mailan kiekon suuntaan. Mikä on tuomio?","answer":"Jos A-joukkue ei onnistu maalinteossa, tuomitaan heidän hyväksi rangaistuslaukaus (RL). Sääntö 53.7"},{"id":"53.11","rule_number":"53","question":"Päätuomarilla on käsi ylhäällä A-joukkueen siirretyn pienen rangaistuksen (2´) merkiksi. B-joukkueen maalivahti on vaihdettu ylimääräiseen kenttäpelaajaan. B13 syöttää kiekon taaksepäin omaa maalia kohti, mutta B10 ei saa syöttöä kiinni. Kiekko on nyt matkalla tyhjään maaliin. B10 heittää hädissään mailansa puolueettomalta alueelta kiekkoa kohti (kiekko on jo B:n puolustusalueella). a. Mikä on päätuomarin tuomio, jos B10 heittämä maila osuu kiekkoon ja estää sen menemisen maaliin? b. Mikä on päätuomarin tuomio, jos B10 heittämä maila ei osu kiekkoon, mutta kiekko menee silti ohi maalista?","answer":"a. A-joukkueen hyväksi tuomitaan maali. Peli katkaistaan heti, kun maila osuu kiekkoon. Siirrettynä kädessä ollut pieni rangaistus A:lle tuomitaan. Säännöt 53.8 ja 78.5 b. Peli katkaistaan heti, kun kiekko menee maalin ohi eli varmistutaan siitä, ettei maalia synny. A-joukkueelle tuomitaan siirrettynä kädessä ollut pieni rangaistus ja B10 (joka heitti mailana) tuomitaan pieni rangaistus estämisestä. Maila heitettiin kiekon suuntaan, muttei osuttu siihen tai vaikutettu sen liikkeeseen, siksi pieni rangaistus. Sääntö 53.2 (I) HAKEMISTO FYYSISET RIKKEET"},{"id":"53.12","rule_number":"53","question":"A11 menettää mailansa puolustusalueellaan. A23 käyttää omaa mailaansa liu’uttaakseen A11 mailan hänelle takaisin. A11 poimii mailan heti käteensä. Mitä tuomariston kuuluu tehdä?","answer":"Ei, tämä ei ole rangaistava teko, mikäli liukuva maila ei häiritse kiekkoa tai vastustajaa."},{"id":"53.13","rule_number":"53","question":"B17 laukoo omalla puolustusalueellaan jäässä olevan hanskan kiekkoa hallussa pitävää hyökkääjää, A14 kohti. Mikä on toimintaohje ja tuomio?","answer":"Annetaan pelin jatkua, kunnes B-joukkue saa kiekon hallintaansa. Jos maalia ei ennen sitä synny, tuomitaan rangaistuslaukaus (RL) A- joukkueen hyväksi. Sääntö 53.7"},{"id":"53.14","rule_number":"53","question":"A-joukkue vaihtaa maalivahtinsa ylimääräisen kenttäpelaajaan. B-joukkue saa riistettyä kiekon siniviivalla ja lähtee hyökkäämään tyhjää maalia kohti. A18 mailansa kiekkoa kuljettavaa B16 kohti. Mikä on päätuomarin ratkaisu? 0","answer":""},{"id":"53.17","rule_number":"53","question":"Pelaaja luistelee jäässä olevan rikkinäisen mailan ohi ja ”neppaa” sen omalla mailallaan korkealle ilmaan ja osa mailasta lentää lopulta katsomoon. Mitä, jos mitään, pelaajalle tuomitaan?","answer":"Pelaajalle tuomitaan käytösrangaistus (10´). Sääntö 53.4 SJL HUOMIO: tulkinta käytössä vain, jos teko arvioidaan vahingoksi HAKEMISTO FYYSISET RIKKEET"},{"id":"53.18","rule_number":"53","question":"Maalivahti on menettänyt mailansa maalin taakse. Joukkuekaveri tönäisee mailan mailallaan tai jalallaan takaisin maalin eteen ja maalivahti noutaa mailan. Tuomitaanko rangaistus?","answer":"Ei, tämä ei ole rangaistava teko, mikäli liukuva maila ei häiritse kiekkoa tai vastustajaa. Jos häiritsee, tuomitaan 2 min rangaistus. HAKEMISTO OSA 07 R A J O I T T A V A T R I K K E E T 0 7 O S A · R A J O I T T A V A T R I K K E E T RAJOITTAVAT RIKKEET"}],"54":[],"55":[{"id":"55.1","rule_number":"55","question":"A13 laukoo kiekon kohti vastustajan maalia juuri siniviivan alapuolelta hyökkäysalueellaan. B19 blokkaa laukauksen ja kiekko kimpoaa A13 ohi puolueettomalle alueelle. B19 luistee A13 ohi puolueettomalle alueelle ja on pääsemässä läpiajoon, kun saa irtokiekon haltuun. B19 koukataan takaapäin ja päätuomari nostaa käden ylös siirretyn rangaistuksen (rangaistuslaukaus) merkiksi. Sekunti sen jälkeen, kun päätuomari on nostanut käden ylös, erä loppuu. Vaikka B19 ei olisi koukattu, hänellä ei olisi ollut aikaa tarpeeksi luistella hyökkäysalueelleen ja maalipaikkaan. Kun tämä fakta otetaan huomioon, tuomitaanko B-joukkueen hyväksi RL?","answer":"Ei, koukkaajalle tuomitaan pieni rangaistus (2´). Koska aika oli loppumassa, ei B-joukkueelta viety kohtuullista maalintekotilannetta ja näin ollen kaikki RL:n tuomitsemiseen vaadittavat kriteerit eivät täyty. Säännöt 24.8 (III), 55.2, 55.3 ja 55.5."}],"56":[{"id":"56.2","rule_number":"56","question":"A4 on kiekko hallinnassaan ja hän etenee hyökkäysalueelle. Hän on laukaisemassa kiekkoa maalia kohti, mutta hänen mailansa menee rikki. Kiekko päätyy B3, jolla on 1 vs 1 tilanne puolueettomalla alueella. A4 heittää turhautuneena rikkinäisen mailan osan laitaan. Osa kimpoaa laidasta ja osuu puolueettomalla alueella B3, jonka seurauksena hän menettää kiekon. Mikä on ratkaisu jäällä?","answer":"A4 tuomitaan pieni rangaistus (2´). Säännöt 53.2 ja 56.2 (VI)"},{"id":"56.3","rule_number":"56","question":"A10 rangaistus on juuri päättynyt. Hän on astumassa pois rangaistusaitiosta, kun kiekko lauotaan ja se menee rangaistusaition edestä. A10 on vielä toinen luistin rangaistusaitiossa, kun hän ohjaa kiekon toiseen suuntaan. Onko tämä sääntöjen mukaan sallittua?","answer":"Ei. A10 pitää tuomita pieni rangaistus (2´) estämisestä. Sääntö 56.2 (VIII)"},{"id":"56.4","rule_number":"56","question":"A-joukkue on vaihtanut maalivahdin ylimääräiseen kenttäpelaajaan. B2 riistää kiekon puolustussiniviivallaan ja lähtee etenemään 0 7 tyhjää maalia kohti. Pelaajapenkillään oleva A8 tarttuu B10 paidasta kiinni A:n pelaajapenkin edustalla. Miten tuomaristo toimii?","answer":""},{"id":"56.6","rule_number":"56","question":"A-joukkueen maalivahti venyttää maalialueensa toiselta laidalta toiselle torjuakseen kiekon. Tätä tehdessään maalivahti menettää kiinniottokäsineensä. Tiedämme, ettei pelin katkaiseminen ole välttämätöntä, koska päätuomarin mielestä loukkaantumisriski ei ole ilmeinen/vastustajalla on välitön maalintekotilanne/ tulossa maalintekotilanne. Miten toimitaan, jos vastustaja laukoo maalivahdin kiinniottokäsineen kulmaukseen?","answer":"Rikkoneelle pelaajalle tuomitaan pieni rangaistus (2´) estämisestä. Sääntö 56.2 (V) HAKEMISTO RAJOITTAVAT RIKKEET"},{"id":"56.7","rule_number":"56","question":"Pelaajapenkillään oleva pelaaja kurkottaa mailalla laidan yli kentän puolelle ja pelaa kiekkoa sen mennessä pelaaja-aition ohi. Heti sen jälkeen pelaaja vaihdetaan jäälle. Onko tämä sallittua?","answer":"Ei ole. Pelaajalle tuomitaan pieni rangaistus estämisestä. Säännöt 56.2 (VII) ja 74.1"},{"id":"56.8","rule_number":"56","question":"Puolueettomalla alueella oleva pelaaja laukoo rikkoutuneen mailan osan puolueettomalla alueella olevaa kiekollista vastustajaa kohti. Mikä rangaistus, jos mikään, tuomitaan rikkoneelle pelaajalle?","answer":"Pieni rangaistus (2´) estämisestä. Säännöt 56.2 (VI) ja 53.2 (I)"},{"id":"56.9","rule_number":"56","question":"Puolustavan joukkueen pelaaja menettää mailansa puolustusalueellaan siniviivan lähellä. Pelaaja lähtee luistelemaan omaa maaliansa kohti (ilman mailaa) jatkaakseen puolustustehtäviään. Siniviivalla oleva hyökkäävän joukkueen pelaaja laukoo jäässä olevan mailan pois tieltään puolueettomalle alueelle. Tuomitaanko hyökkäävän joukkueen pelaajalle rangaistus estämisestä? 0 7","answer":"O Hyökkäävän joukkueen pelaajalle kuuluu tuomita rangaistus siinä tapauksessa, jos hän, päätuomarin mielestä, siirtää jäässä olevan S A mailan estääkseen sen menettäneen pelaajan saamasta sitä takaisin. Tässä tapauksessa pelaaja siirsi sen vaan pois tieltään. Sääntö 56.2 · R A J O I T"}],"57":[{"id":"57.2","rule_number":"57","question":"A13 riistää kiekon B25:lta B-joukkueen puolustusalueella. B25 käännähtää ja kampittaa A13, joka on nyt puolueettomalla, eikä hänellä ole vastustajia ohitettavanaan ennen maalille pääsyä. Kampitus aiheuttaa A13 kaatumisen jäähän ja kiekon menetyksen. Mikä on tuomio?","answer":"RL. Sääntö 24.8 HAKEMISTO RAJOITTAVAT RIKKEET"},{"id":"57.3","rule_number":"57","question":"Hyökkäävän joukkueen pelaaja on läpiajossa ja häntä rikotaan takaapäin. Päätuomari nostaa käden ylös siirretyn rangaistuksen (rangaistuslaukaus) merkiksi. Rikotun pelaajan joukkuekaveri saa kuitenkin kiekon haltuunsa ja pääsee maalintekotilanteeseen. Tuomitaanko tilanteesta silti rangaistuslaukaus (RL)?","answer":"Ei. Säännön 24.8 ”henki” on se, että joukkueelle palautetaan kohtuullinen maalintekotilanne, joka on rikkeellä viety. Jos rikotun pelaajan joukkuekaveri saa kohtuullisen maalintekotilanteen, ei RL tuomita, mutta asiaankuuluva rangaistus tuomitaan rikkoneelle pelaajalle, jos tilanteesta ei tehdä maalia."},{"id":"57.4","rule_number":"57","question":"A13 laukoo kiekon kohti vastustajan maalia juuri siniviivan alapuolelta hyökkäysalueellaan. B19 blokkaa laukauksen ja kiekko kimpoaa A13 ohi puolueettomalle alueelle. B19 yrittää luistella A13 ohi, he ovat molemmat nyt puolueettomalla alueella. A13 koukkaa B19, koska hän huomaa, että B19 on pääsemässä läpiajoon. Tilanteen jatkuessa A13 luistelee B19 kiinni ja koukkaa häntä uudestaan, vieden kohtuullisen maalintekotilanteen. Mikä on päätuomarin ratkaisu?","answer":"B-joukkueen hyväksi tuomitaan RL ja A13 tuomitaan lisäksi pieni rangaistus (2´) koukkaamisesta. Rangaistus kärsitään siitä huolimatta tehdäänkö RL:sta maalia tai ei. Sääntö 24.6 HUOM! Kahden RL:n tuomitsemiseen tarvitaan kaksi erillistä tilannetta, joissa ”kriteerit” täyttyvät. Esimerkiksi: pelaajaa rikotaan takaapäin läpiajossa ja ennen pelikatkoa rikkoneen joukkueen pelaaja sulkee kiekon maalialueellaan. Tässä tapahtuu kaksi erillistä rikettä, joissa molemmissa oikea tuomio on RL. Esitetyssä tilanteessa vain toinen rikkeistä täyttää kaikki RL:een vaadittavat kriteerit. Ensimmäinen koukku ei lopulta vie kohtuullista maalintekotilannetta, koska pelaaja pääsi vielä jatkamaan läpiajoon (sääntö 24.8). Siksi siitä tuomitaan pieni rangaistus (2´). Jälkimmäisessä koukussa kriteerit täyttyvät ja siksi siitä tuomitaan RL. HAKEMISTO OSA 08 MAILARIKKEET 0 8 O S A · M A I L A R I K K E E T MAILARIKKEET"}],"58":[{"id":"58.1","rule_number":"58","question":"Pelaaja käyttää mailan päätä estääkseen vastustajan liikettä jäällä. Mikä rangaistus tästä tuomitaan?","answer":"Pieni rangaistus (2´) kiinnipitämisestä tai koukkaamisesta. Säännöt 54 ja 55"},{"id":"58.2","rule_number":"58","question":"A23 ja B16 ovat takertuneina toisiinsa ja mutisevat jotain toisilleen A-joukkueen puolustusalueella. Kun he lopulta irrottautuvat ja ovat matkalla omille pelaajapenkeilleen, A23 yrittää tarkoituksellisesti iskeä mailan päällä rajusti B16 keskivartaloon, mutta ei lopulta kuitenkaan osu häneen. Päätuomarit eivät havaitse tapahtumaa, mutta toinen linjatuomareista havaitsee. Mitä rangaistuksia LT voi tässä antaa vai voiko antaa mitään? Mikä on toimintaohje?","answer":"Rangaistus yrityksistä lyödä vastustajaa mailan päällä on kaksinkertainen pieni rangaistus (sääntö 58.2). Kaksinkertaiset pienet rangaistukset (muut kuin korkean mailan rangaistukset) eivät kuitenkaan ole niiden rikkomusten luettelossa, joista linjatuomari voi raportoida. Jos tämä teko olisi tapahtunut esimerkiksi tappelussa, niin säännön 32.4 0 alkulause olisi sopiva: \"Linjatuomarin tulee antaa erotuomareille 8 näkemys kaikista pelin aikana mahdollisesti tapahtuneista tapahtumista.\" Erotuomarit voisivat sitten ottaa nämä tiedot O S huomioon päättäessään, mitä rangaistuksia määrätä tappelun jälkeen. A · M SJL HUOMIO: Mailan päällä lyömisen yrityksestä kuuluu tuomita kaksinkertainen pieni rangaistus + käytösrangaistus A I L A R I K K E E"}],"59":[],"60":[{"id":"60.1","rule_number":"60","question":"A20 yrittää pelata kiekon taaksepäin aloituksessa puolustusalueellaan. Hän osuu samalla mailanpäällään vastustajan ”sentteriä” (B10) kasvoihin. B10 pudottautuu välittömästi jäähän ja jäälle tulee verilammikko. Peli katkaistaan. Kumpikaan päätuomareista ei nähnyt, mitä tapahtui. Linjatuomari informoi päätuomareita tapahtumasta. Mikä on päätuomareiden päätös? Mistä on seuraava aloitus?","answer":"Konsultoituaan linjatuomaria (joka tilanteen näki), jos on ilmiselvää, että kyseessä oli ns. pelitilanne ja vahinko, kun molemmat pelaajat olivat kyyristyneenä aloitukseen, ei tilanteesta tuomita rangaistusta. Seuraava aloitus suoritetaan lähimmältä puolueettoman alueen aloituspisteeltä, A- joukkueen puolustusalueen ulkopuolelta. Säännöt 60.1 ja 8.1 HAKEMISTO MAILARIKKEET"},{"id":"60.2","rule_number":"60","question":"Pelaaja turhautuu epäonnistuttuaan läpiajossa. Hän luistelee pelaajapenkkiänsä kohti ja ja lyö mailan laidan reunaan. Maila rikkoutuu kahteen osaan ja sekä lapa, että varsi ”lentävät” pelialueelle. Mailan osat osuvat puolueettomalla alueella läpiajoon murtautumassa olevaan vastustajaan, aiheuttaen kiekon menetyksen (ja mahdollisen loukkaantumisen). Miten tuomariston kuuluu toimia? Tuomitaanko rangaistuksia?","answer":"Tilannetta arvioitaessa tuomaristolla on useampikin sääntökohta käytettävänään. Hyvä ”judgementti” ja maalaisjärki on tärkeää, kun lopullista tuomiota antaa. Ohessa muutamia mahdollisuuksia: Sääntö 53.2 – Pieni rangaistus (2´) estämisestä Sääntö 53.7 – Rangaistuslaukaus (RL) Sääntö 53.8 – Tuomitaan maali Sääntö 60.3 – Kaksinkertainen pieni rangaistus (2+2´) korkeasta mailasta Sääntö 75.2 – Pieni rangaistus (2´) epäurheilijamaisesta käytöksestä SJL HUOMIO: Rangaistusta skaalatessa 2 tai 5+PR mahdollinen (ei 2+2)"},{"id":"60.3","rule_number":"60","question":"Hyökkäävä pelaaja (A12) pitää mailaa kädessään niin, että lapa on selvästi yläriman yläpuolella. Kiekko lauotaan maalia kohti ja se osuu A12 mailan varteen, joka on vyötärön korkeudella, ja menee lopulta maaliin. Pitääkö maali hylätä korkean mailan takia?","answer":"Ei. Tämä ns. hyvä maali. Määräävänä tekijänä on kiekon osumakohta. Sääntö 80.3"},{"id":"60.4","rule_number":"60","question":"Linjatuomari havaitsee, kun A20 maila ”hieraisee” B6 leukaa. Linjatuomari ei näe, että se kuitenkaan aiheuttaa loukkaantumista. Päätuomarit eivät korkeaa mailaa havaitse.","answer":"Peli jatkuu. Tämä on ns. missattu rangaistus."},{"id":"60.5","rule_number":"60","question":"Linjatuomari näkee, kun A20 osuu B6 kasvoihin. Kumpikaan päätuomareista ei reagoi tapahtumaan. Linjatuomari on varma, että B6 loukkaantui tilanteessa.","answer":"Linjatuomarin tulee katkaista peli välittömästi ja informoida päätuomareita tapahtumasta. Päätuomarit tuomitsevat sen perusteella A20:lle 2+2´korkeasta mailasta. Sääntö 32.4 SJL HUOMIO: Mahdollisuus myös 5+PR"},{"id":"60.6","rule_number":"60","question":"A32 on saanut osumaa vastustajan mailasta aiemmin pelissä. Se aiheutti ”vekin” hänen silmäkulmaansa ja tilanteesta tuomittiin B56 2+2´korkeasta mailasta. Myöhemmin samassa pelissä A32 saa B61 mailasta ja aiemmin tullut vekki aukeaa uudestaan. Mikä rangaistus tuomitaan B61:lle? HAKEMISTO MAILARIKKEET","answer":"B61 tuomitaan 2+2´korkeasta mailasta. Sääntö 60.3 SJL HUOMIO: Mahdollisuus myös 2 tai 5+PR"},{"id":"60.7","rule_number":"60","question":"Pelaaja osuu poikittaisen mailan liikettä käyttäen vastustajaa kasvoihin, aiheuttaen hänelle haavan. Koska kontakti otettiin hartiatason yläpuolella olevalla mailalla, onko mahdollista tuomita vain 2+2´korkeasta mailasta vai, koska kyseessä oli poikittaisen mailan liike, voidaanko tuomita 5+PR poikittaisesta mailasta?","answer":"Vaikkakin korkean mailan määritelmä on, että kontakti otetaan hartiatason yläpuolella, varomaton poikittainen maila voidaan (ja pitää) tuomita poikittaisena mailana. Tässä tilanteessa päätuomari voi valita 2+2´korkean mailan ja 5+PR poikittaisen väliltä. Säännöt 59 ja 60. SJL HUOMIO: Tuomitaan 5+PR päähän kohdistuneesta taklauksesta"},{"id":"60.8","rule_number":"60","question":"Pelaaja virittää ja laukoo kiekon maalia kohti. Saatossa maila osuu vastustajaa kasvoihin aiheuttaen vamman. Mikä rangaistus 0 8 tuomitaan? O","answer":"S A Laukaisutilanteessa ei tuomita rangaistusta, jos maila osuu toista pelaajaa kasvoihin. Sääntö 60.1. · M A SJL HUOMIO: Pelaaja vastuussa mailastaan ja rangaistus tuomitaan SJL skaalan mukaisesti I L A R I K"},{"id":"60.9","rule_number":"60","question":"K E Välittömästi sen jälkeen, kun B-joukkue onnistuu tekemään maalin, A2 laukoo turhautuneena kiekon toiseen päähän. Laukauksen saatossa E T maila osuu B4, aiheuttaen leukaan vekin. Miten tuomariston kuuluu toimia?","answer":"A2:lle tuomitaan 2+2 korkeasta mailasta. Säännöt 60.1 ja 60.3 SJL HUOMIO: Rangaistus tuomitaan SJL skaalan mukaisesti"},{"id":"60.10","rule_number":"60","question":"Pelaaja yrittää laukoa kiekkoa, mutta epäonnistuu ja ei osu kiekkoon. Laukauksen saatto osuu kuitenkin vastustajaa kasvoihin, aiheuttaen niihin vamman. Mikä on tuomio?","answer":"Laukaisutilanteessa ei tuomita rangaistusta, jos maila osuu toista pelaajaa kasvoihin. Sääntö 60.1. SJL HUOMIO: Pelaaja vastuussa mailastaan ja rangaistus tuomitaan SJL skaalan mukaisesti HAKEMISTO MAILARIKKEET"},{"id":"60.11","rule_number":"60","question":"Pelaaja saa osumaa kasvoihinsa vastustajan mailasta vahinkotilanteessa. Päätuomari nostaa käden siirretyn rangaistuksen merkiksi ylös. Ennen kuin peli ehditään katkaista rikottu pelaaja menee vaihtoon. Nyt, kun pelaaja on pois jäältä, voiko päätuomari käydä katkolla pelaajapenkillä tarkistamassa pelaajan kunnon, että onko tullut vammaa jne?","answer":"Voi (ja pitääkin). Kuitenkin, jos pelaaja poistuu pelaajapenkiltä pukuhuoneeseen, ei silloin tarkistusta tehdä ja tulkitaan tilanne jäällä nähdyn mukaan. Sääntö 60.3"},{"id":"60.12","rule_number":"60","question":"Päätuomari nostaa käden ylös siirretyn (korkean mailan) rangaistuksen merkiksi. Päätuomari tarkastaa heti katkolla rikotun pelaajan kunnon ja näkee vekin leuassa. Päätuomari päättää tuomita 2+2´ korkeasta mailasta. Rikkoneen joukkueen valmentaja haluaa, että päätuomari tarkastaa tilanteen videolta. Onko päätuomari velvollinen tekemään sen?","answer":"Ei. Päätuomarilla ei ole velvollisuutta tarkistaa tätä videolta. Kuitenkin jos on kyseessä epäselvyys siitä, oliko kasvoihin osunut maila oman vai vastustajan olisi hyvä tarkistaa tilanne videolta. Sääntö 60. 0 8 O"}],"61":[{"id":"61.2","rule_number":"61","question":"B:n pelaaja antaa painetta A:n kiekolliselle pelaajalle. B:n pelaaja pääsee lähelle ja huitaisee A:n pelaajaa alakäden yläpuolelle, osuen mailaan. Tuomitaanko tästä huitomisrangaistus?","answer":"Kyllä. Sääntöjenmukaisen mailapaineen tulee olla kontrolloitua ja osumakohta muualla kuin käsien toiminta-alueella. Sääntö 61.1"}],"62":[],"63":[{"id":"63.1","rule_number":"63","question":"Maalivahti tulee selvästi ulos maalialueeltaan (3 metriä) pienentääkseen laukaisukulmaa. Kun kiekko on laukaistu, maalivahti ottaa sen kiinni ja pudottaa kiekon välittömästi jäähän mailansa lähettyville pelatakseen sen joukkuekaverilleen. Kuitenkin, maalivahti huomaa, että hyökkäävä pelaaja on tulossa paineistamaan häntä ja päättääkin sulkea kiekon pelinkatkon aikaan saamiseksi. Tuomitaanko tästä maalivahdille rangaistus pelin viivyttämisestä?","answer":"Kyllä, koska kiekon sulkeminen ei ollut enää suoranaisesti osa torjuntaa. Säännöt 63.2 (I) ja (VI)"},{"id":"63.2","rule_number":"63","question":"Päätuomarilla on käsi ylhäällä A44 siirretyn pienen rangaistuksen vuoksi. A16 saa kiekon haltuunsa omalla puolustusalueellaan ja samalla, kun päätuomari katkaisee pelin, A16 laukoo kiekon yli suojalasin katsomoon. Miten päätuomarin kuuluu toimia tilanteessa?","answer":"Koska peli menee heti poikki, kun rikkonut joukkue saa kiekon hallintaansa, ei A16 tuomita (pelin viivyttäminen- kiekko katsomoon) rangaistusta. Sääntö 15.1 00 99"},{"id":"63.3","rule_number":"63","question":"OO Missä olosuhteissa rangaistusta ei tuomita, kun kiekko lauotaan omalta puolustusalueelta suoraan suojalasin yli rangaistusaitioon? SS AA MM","answer":"UU UU Kun kiekko ylittää suojalasin rangaistusaition kohdalla, missä suojalasi on matalammalla kuin muualla kaukalossa, ei rangaistuksia TT tuomita. Sääntö 63.2 (III) R R I K I K KK"},{"id":"63.5","rule_number":"63","question":"A8 ”vippaa” mailallaan kiekon korkealle puolustusalueeltaan ja kiekko osuu kellotauluun (kuutioon). Tuomitaanko rangaistus pelin viivyttämisestä?","answer":"Ei. Sääntö koskee sitä, kun kiekko lauotaan puolustusalueelta suojalasin yli ulos pelialueelta. Säännöt 63.2 (III) ja 85.1"},{"id":"63.6","rule_number":"63","question":"Linjatuomarin pudotettua kiekon A-joukkueen puolustusalueella, A:n sentteri voittaa selvästi aloituksen ja samalla aiheuttaa kiekon menemisen suoraan suojalasin yli ulos pelialueelta. Mikä on tulkinta?","answer":"Ei rangaistusta, koska kiekko meni suojalasin yli suoraan aloituksesta. Säännöt 85.1 ja 63.2 (III) HAKEMISTO MUUT RIKKEET"},{"id":"63.7","rule_number":"63","question":"Kun 3. erää on jäljellä 2:03 A-joukkue laukoo kiekon B:n puolustusalueelle. Kiekon ollessa B-joukkueen puolustusalueella, B6 siirtää tarkoituksellisesti maalin pois paikaltaan. Kiekkoon ei koske kukaan ennen kuin rikkoneen joukkue pelaaja ja peli katkaistaan, kun erää 3. erää on jäljellä 1:59. Päätuomari on tuomitsemassa rangaistuslaukausta (RL). B- joukkue kuitenkin väittää, että maali siirrettiin ajassa 2:03 ja peli olisi pitänyt katkaista heti ja tuomita pieni rangaistus (2´) RL:n sijaan. Mikä on päätuomarin päätös?","answer":"Pieni rangaistus tuomitaan, kun kuka tahansa pelaaja siirtää tarkoituksellisesti maalin pois paikaltaan. Päätuomarin tulee katkaista peli välittömästi, kun rikkonut joukkue saa kiekon hallintaansa. Sääntö 63.2 (IV) Rangaistuslaukaus (RL) tuomitaan, koska pientä rangaistusta ei pystytä ajan puolesta kärsimään kokonaan. Sääntö 63.6"},{"id":"63.8","rule_number":"63","question":"A-joukkueelle ollaan tuomitsemassa siirrettynä pientä rangaistusta. A:n maalivahti poistuu alueeltaan ja pelaa kiekkoa hänelle kielletyllä alueella (maaliviivan takana rajatun alueen ulkopuolella) saadakseen aikaan pelikatkon. Tuomitaanko maalivahdille lisäksi rangaistus kiekon pelaamisesta rajatun alueen ulkopuolella?","answer":"Kyllä, maalivahdille tuomitaan pieni rangaistus pelin viivyttämisestä (2´), siirrettynä tulossa olleen rangaistuksen lisäksi. Sääntö 27.8 (kts. myös sääntö 63.2 (VIII))"},{"id":"63.9","rule_number":"63","question":"A-joukkueelle on tulossa siirrettynä rangaistus. B-joukkue laukoo kiekon A:n puolustusalueelle. A:n maalivahti tulee ulos alueeltaan, aloitusympyröiden yläkaaren kohdille, sulkee kiekon suoraan kiinniottokäsineeseensä. Tuomitaanko siirrettynä olleen rangaistuksen lisäksi myös maalivahdille rangaistus?","answer":"Vaikka tätä ei usein tapahdukaan, sääntö 63.2 (VI) määrittää, että pieni rangaistus (2´) tuomitaan maalivahdille, joka lähtee alueeltaan ja sulkee kiekon katkaistakseen pelin. Niinpä sääntö vahvistaa sen, ettei maalivahti voi sääntöjenmukaisesti hallita/kontrolloida kiekkoa tällä tavalla ja häntä on siitä rangaistava, koska teko katkaisee pelin ennenaikaisesti. Jos maalivahti olisi vain pelannut kiekkoa mailalla, niin peli olisi katkaistu ja heille tuomittaisiin ainoastaan siirrettynä ollut rangaistus. Kuitenkin, tässä tapauksessa pelikatko ”haettiin” sääntöjenvastaisesti, joten maalivahtia on rangaistava."},{"id":"63.10","rule_number":"63","question":"Kun 3. erää on jäljellä alle kaksi minuuttia, puolustavan joukkueen pelaaja työntää tarkoituksellisesti maalin pois paikoiltaan. Mikä on tilanteeseen sopiva rangaistus?","answer":"Hyökkäävän joukkueen hyväksi tuomitaan rangaistuslaukaus (RL). Sääntö 63.6, ensimmäinen kappale HAKEMISTO MUUT RIKKEET"},{"id":"63.11","rule_number":"63","question":"Kun 3. erää on jäljellä 3:00, päätuomari nostaa käden ylös siirretyn rangaistuksen merkiksi (B3 huitominen). Ennen kuin peli ehditään katkaisemaan, B3 siirtää tarkoituksellisesti oman maalinsa pois paikaltaan. Miten päätuomari toimii?","answer":"Koska B3 rangaistukset tapahtuivat ja tuomitaan kysymyksessä kuvatussa järjestyksessä, pientä rangaistusta maalin siirtämisestä ei voi ajan puolesta kärsiä kokonaan. Siksi B3 tuomitaan 2´huitomisesta ja A-joukkueen hyväksi tuomitaan rangaistuslaukaus (RL). Sääntö 63.6"},{"id":"63.12","rule_number":"63","question":"Missä tilanteissa tuomitaan pienen rangaistuksen sijaan RL pelin viivyttämisestä, kun 3. erää on jäljellä alle kaksi minuuttia tai jatkoajalla?","answer":"1) maalin tahallinen siirtäminen, sääntö 63.6 2) tahallinen sääntöjenvastainen vaihto, sääntö 74.4"},{"id":"63.13","rule_number":"63","question":"A8 tuomitaan pieni rangaistus (2´), kun 3. erää on jäljellä 3:00. Kun 3.erää on jäljellä 2:30, A18 ollaan tuomitsemassa siirrettynä 2´ kampituksesta. Ennen kuin A-joukkue saa kiekkoa hallintaansa, A28 siirtää tahallisesti maalin estääkseen B-joukkueen maalintekoyrityksen. Mitä päätuomari tuomitsee tässä tilanteessa? 0 9","answer":"A18 tuomitaan 2´kampituksesta ja B-joukkueen hyväksi tuomitaan rangaistuslaukaus (RL). A28 rangaistusta ei ajan puolesta pystyisi O S kärsimään kokonaisuudessaan, koska kellossa on jo A8 ja A18 rangaistukset. Sääntö 63.6 A M U"},{"id":"63.14","rule_number":"63","question":"U Päätuomarilla on käsi ylhäällä hyökkäävän joukkueen siirretyn pienen rangaistuksen merkiksi. Maalinedusruuhkan aikana, T R päätuomari huomaa, kun puolustavan joukkueen pelaaja peittää maalialueella olevan kiekon kätensä alle ja pyyhkäisee sen sitten I K K pois maalialueelta. Tuomitseeko päätuomari tilanteesta rangaistuslaukauksen (RL)? E E T","answer":"Kyllä, RL tuomitaan. Säännöt 63.6 ja 67.4"},{"id":"63.15","rule_number":"63","question":"A-joukkueen maalivahti on ulkona maalialueeltaan pienentääkseen laukaisukulmaa. Ennen kuin maalivahti ehtii takaisin alueelleen, B-joukkue laukoo kiekon useita kertoja A:n maalia kohti. A7 seisoo maalialueella ja torjuu näitä B-joukkueen laukauksia. Yksi laukauksista osuu A7 ja kiekko nousee ilmaan, noin polven korkeudelle. B:n hyökkääjät ryntäävät nyt maalialuetta kohti yrittääkseen lyödä kiekkoa ilmasta maaliin. A7 ottaa kiekon käteensä, kääntyy välttääkseen maalille ryntäävät hyökkääjät, pudottaa kiekon mailansa lapaan ja laukoo sen pois puolustusalueelta. Onko tämä sallittua?","answer":"Ei ole. Päätuomarin tulee katkaista peli välittömästi ja tuomita B-joukkueen hyväksi rangaistuslaukaus (RL). Säännöt 63.6 ja 67.4 HAKEMISTO MUUT RIKKEET"},{"id":"63.16","rule_number":"63","question":"A-joukkueella on 2 vs. 1 – hyökkäys, kun toinen B:n pelaaja, joka yrittää takakarvata, syöksyy katkaistakseen syötön. Hän ei osu kiekkoon, vaan liukuu maaliin ja vahingossa aiheuttaa sen paikaltaan lähtemisen. Heti, kun maali on lähtenyt paikaltaan, kiekko ylittää maaliviivan kahden tapin väliseltä alueelta eli paikasta, jossa maali olisi normaalissa asemassaan ollut. Hyväksytäänkö maali?","answer":"Kyllä, tämä on ns. hyvä maali. Sääntö 63.7 : ”Tilanteessa, jossa maali siirtyy puolustavan pelaajan toimesta, joko tarkoituksellisesti tai vahingossa, ennen kuin kiekko ylittää maaliviivan kohdasta, joka on normaaliasemassaan olevien maalitolppien välissä, päätuomari voi hyväksyä maalin.”"},{"id":"63.17","rule_number":"63","question":"Maali tönäistään eteen kentälle päin puolustavan pelaajan toimesta juuri, kun hyökkäävä pelaaja on laukomassa kiekkoa maaliin. Hyväksytäänkö maali?","answer":"Tilanteessa tulee ottaa huomioon ja tarkastella kahta asiaa. Jos maalitolpat pysyvät tapeissa ja kiekko menee maaliin, maali hyväksytään. Jos maalikehikko on siirretty niin, ettei kiekko mene maaliin, voi päätuomari hyväksyä maalin, jos kiekko olisi mennyt maaliin sen ollessa normaalilla paikallaan. Säännöt 78.4 ja 63.7"},{"id":"63.18","rule_number":"63","question":"0 9 Maalivahti on jäällä, mutta ulkona maalialueeltaan. Vastustaja saa kiekon haltuunsa ja laukoo sen tyhjää maalia kohti. Juuri, kun kiekko on ylittämässä maaliviivaa, puolustava pelaaja siirtää maalin pois paikaltaan. Mikä on päätuomarin päätös?","answer":"Päätuomari tuomitsee maalin hyökkäävän joukkueen hyväksi. Sääntö 63.7"},{"id":"63.19","rule_number":"63","question":"Puolustava pelaaja yrittää paineistaa vastustajaa ja katkaisee syötön/laukauksen potkaisemalla kiekkoa. Kiekko menee potkusta suoraan yli suojalasin katsomoon. Tuomitaanko tilanteesta pieni rangaistus pelin viivyttämisestä?","answer":"Ei. Sääntö 63.2 (III) toteaa, että pelaajan tulee laukaista tai lyödä kädellä/mailalla kiekko suoraan yli suojalasin, jotta rangaistus voidaan tuomita."},{"id":"63.20","rule_number":"63","question":"Mikä rangaistus tuomitaan pelaajalle, joka tarkoituksellisesti siirtää oman maalin pois paikaltaan, kun 3.erää on jäljellä alle kaksi minuuttia tai jatkoajalla?","answer":"Ei-rikkoneen joukkueen hyväksi tuomitaan RL. Sääntö 63.6"},{"id":"63.21","rule_number":"63","question":"Maali siirtyy vahingossa pois paikoiltaan hyökkäävän pelaajan toimesta. Puolustavalla joukkueella on kiekko hallinnassaan ja he ovat pääsemässä pois omalta alueeltaan. Katkaistaanko peli, koska maali on pois paikoiltaan?","answer":"Ei. Pelin annetaan jatkua, kunnes ei-rikkonut joukkue menettää kiekon hallinnan. Seuraava aloitus suoritetaan lähimmästä aloituspisteestä, missä peli katkaistiin PAITSI, jos peli katkaistiin ei-rikkoneen joukkueen puolustusalueella. Tällöin aloitus suoritetaan toisesta puolueettoman alueen aloituspisteestä, ei- rikkoneen joukkueen puolustusalueen ulkopuolelta. Sääntö 63.4 HAKEMISTO MUUT RIKKEET"},{"id":"63.22","rule_number":"63","question":"B-joukkueella on 2 vs. 1- hyökkäys. Kun tilanne lähestyy A-joukkueen maalia, B26 syöttää B23:lle, joka on sitten laukaisemassa kiekkoa A- joukkueen maaliin. A4, joka on ns. poissa omalta työpaikaltaan, syöksyy tilanteeseen yrittääkseen katkaista syöttöä. Hän ei ehdi osumaan kiekkoon, mutta törmää maalikehikkoon, joka lähtee kokonaan irti tapeistaan. Kerro päätuomarin päätös, jos: a) B23 laukoo kiekon yläkulmaan, mutta ennen laukausta, maalikehikko oli irti tapeistaan. B23 oli kuitenkin laukomassa kiekkoa maaliin. b) B23 on edelleen kiekko lavassaan, kun A4 törmää maalikehikkoon ja aiheuttaen sen siirtymisen pois paikoiltaan.","answer":"a) B-joukkueelle voidaan tuomita maali, jos päätuomarin mielestä pelaajalla oli välitön maalintekotilanne. Jos on yhtään epäilystä, että ylittikö kiekko sääntöjenmukaisesti maaliviivan, voi päätuomari tarkistaa tilanteen videolta. Sääntö 63.7 HUOM! Jos A4 protestoi tätä mitenkään, tuomitaan hänelle 2´epäurheilijamaisesta käytöksestä b) JOS tulkitset A4 toiminnan täysin vahingoksi (hyvin epätodennäköistä) ja B23 ei ollut välitöntä maalintekotilannetta ennen kuin maalikehikko lähti pois paikoiltaan, niin EI tuomita MAALIA. Eikä myöskään rangaistusta tuomita. JOS tulkitset, että A4 toiminta oli tarkoituksellista ja B23 ei ollut välitöntä maalintekotilannetta, tuomitaan 2´pelin viivyttämisestä (sääntö 63.2 (IV)) TAI, jos pelataan 3. erän kahta viimeistä minuuttia/milloin tahansa jatkoajalla, tuomitaan rangaistuslaukaus B- joukkueen hyväksi."},{"id":"63.23","rule_number":"63","question":"A-joukkueen molemmat luistimet ovat puolueettomalla alueella. Hän kurottaa mailalla omalle puolustusalueelleen ja laukoo kiekon 0 lopulta suojalasin yli. Tuomitaanko rangaistus pelin viivyttämisestä? 9 O S A","answer":"M Kyllä. Kiekon asema on määräävä tekijä. Sääntö 63.2 (III) U U T"},{"id":"63.25","rule_number":"63","question":"A-joukkue laukoo kiekon suojalasin yli ulos pelialueelta. Kiekko irtoaa pelaajan lavasta muutaman senttimetrin heidän puolustussiniviivansa yläpuolelta. Mistä on seuraava aloitus?","answer":"Vaikka sääntö sanookin, että seuraava aloitus tulee suorittaa lähimmältä pisteeltä ja joka ei tuo rikkoneelle alueellista etua, niin toteaa sääntö myös sen, että kun pelikatko syntyy puolueettomalla alueella, niin seuraava aloituskin on puolueettomalta alueelta. Säännöt 76.2 ja 85.1 Maalaisjärjellä ajateltuna, esimerkin tilanteessa, seuraava aloitus on puolueettoman alueen aloituspisteeltä, lähinnä A-joukkueen puolustussiniviivaa. Olkoonkin, että A-joukkue hyötyy tästä alueellisesti puoli metriä. Tätä nimenomaista tulkintaa ei löydy sääntökirjasta."},{"id":"63.26","rule_number":"63","question":"A-joukkueen maali lähtee pois paikoiltaan ja A-joukkueella on kiekko hallinnassaan ja he lähtevät nostamaan sitä ns. ylös. Milloin peli katkaistaan (ja mistä aloitus) näissä eri skenaarioissa? a) B-joukkue on vastuullinen siihen, että maali lähti pois paikoiltaan? b) A-joukkue on vastuullinen siihen, että maali lähti pois paikoiltaan? c) A-joukkue on vastuullinen siihen, että maali lähti pois paikoiltaan, mutta päätuomari ei huomaa sitä ennen kuin A-joukkue on jo luistelemassa puolueettomalla alueella? A-joukkue on vastuullinen siihen, että maali lähti pois paikoiltaan, mutta päätuomari ei huomaa sitä ennen kuin A-joukkue on jo hyökkäysalueella 0 9","answer":"a) Kun A-joukkue menettää kiekon hallinnan. O b) Kun A-joukkue saa kiekon hallintaansa. Heidän puolustusalueeltaan aloitus. S A c) Seuraava aloitus puolueettoman alueen aloituspisteestä, A-joukkueen puolustussiniviivalta. Peli poikki heti, kun tilanteen havaitsee. M d) Seuraava aloitus puolueettomalta alueen aloituspisteestä, A-joukkueen hyökkäyssiniviivalta. U U T Sääntö 63.4 R I K K E"},{"id":"63.28","rule_number":"63","question":"B-joukkueen puolustavalta pelaajalta rikkoutuu maila hänen yrittäessään purkaa kiekko ulos omalta puolustusalueeltaan. Pelaaja pudottaa mailan jäähän, mutta kun vastustaja on saamassa kiekon, pelaaja kauhaisee kiekkoa hanskallaan niin, että se menee pelaajapenkin takana olevan suojalasin yli. Mikä on tuomio?","answer":"Pieni rangaistus pelin viivyttämisestä (2´). Sääntö 63.2 (III)"},{"id":"63.29","rule_number":"63","question":"B-joukkueen maalivahti torjuu laukauksen mailallaan. MV oli sivuttaisliikkeessä tolpalta toiselle ja torjunnan seurauksena kiekko menee hänen mailastaan suoraan suojalasin yli ulos pelialueelta. Pitääkö maalivahdille tuomita rangaistus pelin viivyttämisestä?","answer":"Ei. Maalivahti torjui kiekon, eikä varsinaisesti laukonut sitä suojalasin yli. Sääntö 63.2 puhuu tarkoituksellisuudesta. Maalivahdin torjuntoja ei tähän lasketa. HAKEMISTO MUUT RIKKEET"},{"id":"63.30","rule_number":"63","question":"Puolustava joukkueen pelaaja laukoo kiekon. Kiekko on menossa suojalasin yli ulos pelialueelta, mutta summeri soi kiekon ollessa ilmassa. Tuomitaanko pelaajalle rangaistus pelin viivyttämisestä?","answer":"Jos on selvää, että kiekko on ulkona pelialueelta (yli suojalasin) ennen kuin summeri ehtii soida, rangaistus tuomitaan normaalisti. Muussa tapauksessa ei rangaistusta tuomita. Sääntö 63.2"},{"id":"63.31","rule_number":"63","question":"Pelaaja on läpiajossa oman puolustusalueen ulkopuolella puolueettomalla alueella. Kun pelaaja pääsee hyökkäysalueelleen, maalivahti siirtää tarkoituksellisesti maalin pois paikaltaan. Mikä on tuomio?","answer":"Peli katkaistaan ja ei rikkoneen joukkueen hyväksi tuomitaan maali. Sääntö 63.7"},{"id":"63.32","rule_number":"63","question":"Puolustava joukkue siirtää tahattomasti/vahingossa oman maalin pois paikoiltaan. Mitä tapahtuu seuraavaksi?","answer":"0 Puolustava joukkue ei saa suorittaa pelaajavaihtoja (paitsi korvatakseen ylimääräinen hyökkääjä takaisin maalivahtiin, korvatakseen 9 loukkaantunut pelaaja tai jos tuomitaan rangaistus, joka vaikuttaa joukkueiden pelaajavahvuuteen). Seuraava aloitus suoritetaan puolustusalueelta ja ei rikkonut joukkue saa valita kummasta päätyalueen aloituspisteestä jatketaan. Sääntö 63.8"},{"id":"63.33","rule_number":"63","question":"Hyökkäävä joukkue laukoo kiekon punaviivan takaa hyökkäysalueelleen. Maalivahti peittää kiekon ja seurauksena on pelikatko. Mitä tapahtuu seuraavaksi?","answer":"Jatketaan samalla tavalla kuin edellisessä tilanteessa/kysymyksessä (63.32). Sääntö 63.8"},{"id":"63.34","rule_number":"63","question":"Puolustava pelaaja potkaisee kiekon puolustusalueella siten, että se menee lasin yli ja pois pelialueelta. Sovelletaanko tällöin pientä rangaistusta pelin viivyttämisestä?","answer":"Kyllä"},{"id":"63.35","rule_number":"63","question":"Hyökkäävän joukkueen pelaaja on läpiajossa. Hänet työnnetään maalivahdin päälle ja samalla maali myös irtoaa paikoiltaan. Samassa yhteydessä kiekko menee myös maaliin. Hyväksytäänkö maali?","answer":"Kyllä, koska puolustavan joukkueen pelaaja aiheutti kontaktin maalivahtiin ja maalin siirtymisen. Sääntö 63.7"},{"id":"63.36","rule_number":"63","question":"Hyökkäävän joukkueen pelaaja on läpiajossa. Hänet työnnetään maalivahdin päälle ja samalla maali myös irtoaa paikoiltaan. Heti kontaktin ja maalin siirtymisen jälkeen toinen hyökkäävän joukkueen pelaaja pelaa kiekon maaliin. Hyväksytäänkö maali?","answer":"Ei hyväksytä, koska toisella hyökkäävän joukkueen pelaajalla ei ollut välitöntä maalintekotilannetta, kun maali siirtyi pois paikoiltaan. Sääntö 63.7 HAKEMISTO MUUT RIKKEET"}],"64":[{"id":"64.1","rule_number":"64","question":"A17 yrittää saada vastustajalle rangaistusta korkeasta mailasta heilauttamalla päätään taaksepäin. Sinun näkemyksesi mukaan maila käynyt lähelläkään A17 kasvoja. Nostat käden ylös A17 siirretyn pienen rangaistuksen (säännön 64 mukaan) merkiksi. Miten rangaistus kuulutetaan?","answer":"”Huittisten Huiske pelaaja nro 17 Sauli Sohva, kahden minuutin rangaistus, syy sukeltaminen/rikkeen tehostaminen”"},{"id":"64.2","rule_number":"64","question":"Pelaaja on läpiajossa ja häntä koukataan takaapäin, mutta on selvää, että hän kaatuu helposti. Hän yrittää näin varmistaa, että tuomari antaa koukkaamisesta rangaistuksen. Jos olet päätuomarina varma, että pelaaja yrittää ”tehostaa” häneen kohdistunutta koukkua kaatumalla, mitä teet?","answer":"Koska pelaaja päätti alkaa tehostamaan rikettä kaatumalla, voidaan tulkita, että se kumoaa (RL) kriteerin, jonka mukaan häneltä vietiin kohtuullinen maalintekotilanne. Tämän vuoksi tuomitaan pieni rangaistus koukkaamisesta ja pieni rangaistus sukeltamisesta/rikkeen tehostamisesta. Säännöt 55 ja 64. 0 9 O S"}],"65":[],"66":[],"67":[{"id":"67.1","rule_number":"67","question":"A34 on omalla puolustusalueellaan ja ohjaa kädellään kiekon joukkuekaverilleen, joka pelaa kiekkoa niin, että maila (ja kiekko) on puolueettomalla alueella, mutta molemmat luistimet ovat edelleen puolustusalueella. Katkaistaanko peli käsisyötön vuoksi?","answer":"Kyllä. Määräävänä tekijänä on kiekon asema, joka tässä tapauksessa on puolueettomalla alueella. Sääntö 79.2"},{"id":"67.2","rule_number":"67","question":"Maalivahti nostaa kiekon jäästä kilpikädellään ja heittää sen samalla kilpikädellä joukkuekaverilleen, joka on laidan lähellä p-pisteen yläkaaren kohdalla. Tuomitaanko tästä rangaistus vai annetaanko pelin jatkua?","answer":"HAKEMISTO MUUT RIKKEET Tilanteesta tuomitaan maalivahdille pieni rangaistus (2´). Sääntö 67.3 (III)"},{"id":"67.3","rule_number":"67","question":"Päätuomarilla on käsi ylhäällä hyökkäävän joukkueen siirretyn rangaistuksen (2´) merkiksi. Maalinedusruuhkan aikana päätuomari havaitsee, että puolustavan joukkueen pelaaja peittää kiekon kädellään maalialueella ja pyyhkäisee sen pois sieltä. Tuomitseeko päätuomari rangaistuslaukauksen hyökkäävän joukkueen hyväksi?","answer":"Kyllä, tilanteesta tuomitaan RL. Säännöt 63.6 ja 67.4"},{"id":"67.4","rule_number":"67","question":"A-joukkueen maalivahti on ulkona maalialueeltaan pienentääkseen laukaisukulmaa. Ennen kuin maalivahti ehtii takaisin alueelleen, B-joukkue laukoo kiekon useita kertoja A:n maalia kohti. A7 seisoo maalialueella ja torjuu näitä B-joukkueen laukauksia. Yksi laukauksista osuu A7 ja kiekko nousee ilmaan, noin polven korkeudelle. B:n hyökkääjät ryntäävät nyt maalialuetta kohti yrittääkseen lyödä kiekkoa ilmasta maaliin. A7 ottaa kiekon käteensä, kääntyy välttääkseen maalille ryntäävät hyökkääjät, pudottaa kiekon mailansa lapaan ja laukoo sen pois puolustusalueelta. Onko tämä sallittua? 00 99","answer":"Ei ole. Päätuomarin tulee katkaista peli välittömästi ja tuomita B-joukkueen hyväksi rangaistuslaukaus (RL). Säännöt 63.6 ja 67.4 OO SS AA"},{"id":"67.6","rule_number":"67","question":"A-joukkue on vaihtanut maalivahtinsa ylimääräiseen kenttäpelaajaan. A-joukkueen puolustava pelaaja seisoo maalialueella, kun B-joukkueen laitahyökkääjä laukoo kiekon tyhjää maalia kohti. A:n puolustava pelaaja ottaa kiekon kädellä ilmasta kiinni (noin vyötärön korkeudella) ja pudottaa sen jäähän alueen ulkopuolelle. Mikä on päätuomarin päätös?","answer":"B-joukkueen hyväksi tuomitaan maali. Sääntö 67.5"},{"id":"67.7","rule_number":"67","question":"Maalivahti on matkalla pelaajapenkilleen, koska häntä ollaan vaihtamassa ylimääräiseen kenttäpelaajaan. Hän jättää mailansa maalin edustalle päätyalueen aloitusympyröiden väliin, ”viiksien” kohdalle. Kun maalivahti on pois jäältä, vastustaja saa kiekon haltuunsa ja laukoo sen tyhjää maalia kohti. Vaikka kiekko ei osukaan maalivahdin jäälle jättämään mailaan ja laukaus menee hieman ohi tyhjästä maalista, katkaiseeko päätuomari pelin ja tuomitsee maalin?","answer":"Jos päätuomarin mielestä maila jätettiin jäälle tarkoituksellisesti estämään kiekon menemistä tyhjään maaliin, tuomitsee hän maalin ei rikkoneen joukkueen hyväksi. Muissa tapauksessa tuomio on pieni rangaistus (2´). Sääntö 67.5 HAKEMISTO MUUT RIKKEET"},{"id":"67.8","rule_number":"67","question":"A-joukkue pelaa ylivoimalla. Kiekko puretaan toiseen päätyyn, aina A-joukkueen maalivahdille saakka. B-joukkue on vaihtamassa alivoimapelaajiaan, eikä näin ollen maalivahdilla ole minkäänlaista painetta vastustajan toimesta. A:n maalivahti peittää kiekon, koska hän selvästi haluaa pelikatkon. Päätuomari puhaltaa pilliinsä tuomitakseen maalivahdille 2´pelin viivyttämisestä. Maalivahti selittää heti katkolla, että peitti kiekon sen vuoksi, kun hänen polvisuojuksensa remmi oli auki ja hän halusi kiinnittää sen. Tuomaristo pitää palaverin ja päättää lopulta perua rangaistuksen. Peliä jatketaan A:n puolustusalueen aloituspisteestä, heidän jatkaen ylivoimalla. Oliko tämä tuomaristolta oikea tapa toimia?","answer":"Ei. Maalivahdille kuuluu tuomita 2´pelin viivyttämisestä. Auennut polvisuojan remmi ei riitä perusteeksi sille, että pelikatko olisi tarpeellinen. Sääntö 67.3"},{"id":"67.9","rule_number":"67","question":"Puolustavan joukkueen pelaaja makaa maalialueellaan. Kiekko on maalialueen ulkopuolella. Pelaaja ottaa/sulkee kiekon ja vetää sen vartalon alle, joka on maalialueen sisällä. Mikä on oikea tuomio?","answer":"2´ pelin viivyttämisestä. Kiekko oli maalialueen ulkopuolella, kun rike tapahtui. Sääntö 67.2"},{"id":"67.10","rule_number":"67","question":"0 Puolustavan joukkueen pelaaja makaa jäässä maalialueensa ulkopuolella. Pelaaja ottaa/sulkee kiekon ja vetää sen vartalonsa alle, 9 joka on maalialueen ulkopuolella. Mikä on oikea tuomio? O S","answer":""},{"id":"67.12","rule_number":"67","question":"Maalinedustalla on ”hirveä” hässäkkä. A-joukkueen puolustava pelaaja seisoo maalialueellaan maalivahdin takana. Maalivahti on jäässä, yrittäen päästä käsiksi kiekkoon. B-joukkue laukoo kiekon ja maalivahdin takana oleva puolustava pelaaja ottaa kiekon kiinni kädellään, joka oli asettuneena yläkulman kohdille. Sen jälkeen pelaaja heittää kiekon kulmaukseen. Mikä on päätuomarin päätös?","answer":"Rangaistuslaukaus (RL). Sääntö 67.4"},{"id":"67.13","rule_number":"67","question":"A6 ollaan tuomitsemassa siirrettynä rangaistusta (2´). A23 laittaa kätensä kiekon päälle suojatakseen sitä/estääkseen vastustajaa pääsemästä kiekkoon. Tuomitaanko myös A23 rangaistus säännön 67.2 (II) perusteella ja sitä kautta A 5.3 alivoimalle? Vai lasketaanko tämä tilanteeksi, jossa rikkonut joukkue saa kiekon haltuunsa siirretyn rangaistuksen aikana ja peli kuuluu katkaista heti ja tuomita vain alkuperäinen rangaistus?","answer":"Heti, kun A23 saa kiekon haltuunsa, vihelletään peli poikki ja tuomitaan A6 rangaistus. Ei muita rangaistuksia. Sääntö 15.1 HAKEMISTO MUUT RIKKEET"},{"id":"67.14","rule_number":"67","question":"Maalivahti on jäällä ja puolustava pelaaja seisoo oman joukkueensa maalialueella. Kiekko ammutaan kohti maalia ja se kimpoaa ilmaan. Tämä pelaaja, joka seisoo maalialueella, sulkee kiekon kädellään maalin yläriman yläpuolella ja heittää sen sitten maalin taakse. Tuleeko tilanteesta tuomita rangaistuslaukaus?","answer":"Ei. Tässä tilanteessa tulee tuomita pieni rangaistus kiekon sulkemisesta kädellä. Maalialue ulottuu vain yläriman korkeudelle. (Säännöt 1.7 ja 67.2)"}],"68":[{"id":"68.1","rule_number":"68","question":"Pelaajalle tuomitaan kumoutuva rangaistus, joka ei näy siis kellossa. Rangaistu pelaaja on loukkaantunut ja hän poistuu pukuhuoneeseen. Rangaistusajan päättymisen jälkeen pelaaja palaa pelaajapenkilleen, mutta pelissä ei ole vielä tullut katkoa. Voiko tämä pelaaja vaihtaa itsensä lennosta jäälle vai pidetäänkö häntä eduskelvottomana?","answer":"Tätä kyseistä pelaajaa pidetään edustuskelvottomana (sääntöjenvastaisesti jäällä), koska hänen rangaistustaan kärsimässä olevaa sijaista ei ole vielä päästetty sääntöjenmukaisesti rangaistusaitiosta. Säännöt 8.1, 68.1 ja 78.5 (IV) 0 9"},{"id":"68.3","rule_number":"68","question":"T A-joukkueen pelaaja on rangaistusaitiossa ja hän pääsee sieltä pois ennen rangaistusajan päättymistä rangaistusaition valvojan virheen vuoksi. A-joukkueen pelaajalla on kiekko hallinnassaan hyökkäysalueellaan, kun päätuomari nostaa käden ylös B-joukkueen siirretyn rangaistuksen johdosta. Ennen pelikatkoa, A-joukkue tekee maalin ja pelaaja, joka pääsi liian aikaisin rangaistusaitiosta, on myös jäällä. Pelikatkolla päätuomarille selviää, että on tapahtunut (aiemmin kuvailtu) virhe. Miten päätuomari toimii?","answer":"A-joukkueen maali hylätään. B-joukkueelle tulossa ollut rangaistus tuomitaan. Liian aikaisin rangaistusaitiosta päässyt A-joukkueen pelaaja palaa sinne takaisin kärsimään rangaistuksensa loppuun. Koska kyseessä oli rangaistusaition valvojan virhe, ei A-joukkueelle tuomita lisärangaistuksia. Sääntö 68.5 (katso myös Sääntö 78.5 (IV)), sääntö 70.4 (katso myös sääntö 35.1) ja sääntö 70.9"},{"id":"68.4","rule_number":"68","question":"Pelikatkolla tuomitaan A4 ja B2 2´väkivaltaisuudesta. Sen lisäksi B2 tuomitaan käytösrangaistus (10´). peliä jatketaan 5 vs. 5. Pienten rangaistusten umpeutumisen jälkeen, myöhemmin pelin käydessä, B2 lähtee rangaistusaitiosta valvojan virheen vuoksi. Kun B2 on jäällä, hänen joukkueensa tekee maalin. Hyväksytäänkö maali? Tuomitaanko B2 lisärangaistuksia?","answer":"Ei hyväksytä, B2 on sääntöjenvastaisesti jäällä oleva pelaaja. B2 palaa takaisin rangaistusaitioon kärsimään ”kymppinsä” loppuu, lisärangaistuksia ei tuomita (valvojan virhe). Sääntö 68.5"},{"id":"68.5","rule_number":"68","question":"HAKEMISTO MUUT RIKKEET 1.erässä ajassa 16:00 isomman ”hässäkän” jälkeen A4 tuomitaan iso rangaistus (5´) tappelusta, ilman pelirangaistusta. A4 rangaistus on osana muita rangaistuksia ja kaikki nämä kumoutuvat. A4 loukkaantuu tilanteessa ja menee pukuhuoneeseensa. Kun A4 palaa pelaajapenkilleen takaisin, peli on jatkunut jo jonkin aikaa ilman katkoja ja A4 rangaistus on myös umpeutunut ilman, että olisi tullut pelikatkoa. Valmentaja vaihtaa A4 lennosta jäälle, kun kello näyttää 10:30 1. erässä. A-joukkue tekeekin maalin A4 ollessa jäällä. Rangaistusaition valvoja informoi tuomareita tuomaristoa tapahtuneesta. Mikä on lopullinen päätös pelikatkolla?","answer":"Maali hylätään ja A-joukkueelle tuomitaan joukkuerangaistus (JR). A4 olisi pitänyt odottaa pelikatkoa ennen kuin palaa takaisin jäälle. Säännöt 68.2, 68.5 ja 78.5 (IV)"}],"69":[{"id":"69.1","rule_number":"69","question":"A11 on maalialueella ja ”screenaa” maalivahdin (=maalivahti törmää häneen) ja A-joukkue tekee maalin. Mikä on päätuomarin päätös?","answer":"Maali hylätään ja rangaistusta ei tuomita. Säännöt 69.1 ja 69.3"},{"id":"69.2","rule_number":"69","question":"0 A22 seisoo B-joukkueen maalin edessä niin, että toinen luistin on maalialueella. B:n maalivahti liukuu maalialueen läpi toiselta puolen toiselle ja ajautuu 9 samalla kontaktiin A22 kanssa. Kun kontakti on syntynyt, kiekko menee maaliin. Onko tämä ns. hyvä maali? Tuomitaanko mitään rangaistuksia? O S A M","answer":""},{"id":"69.3","rule_number":"69","question":"Voiko hyökkäävän joukkueen pelaaja seisoa maalin edessä ja pitää kättään/hanskaansa tai mailaa suoraan maalivahdin näkökentässä/naaman edessä, selkeästi tarkoituksenaan hankaloittaa maalivahdin mahdollisuuksia nähdä peliä/kiekkoa?","answer":"N Ei voi. Tällaisesta toiminnasta pitää tuomita 2´epäurheilijamaisesta käytöksestä (kun päätuomari teon havaitsee). Sääntö 75"},{"id":"69.4","rule_number":"69","question":"A33 ja B4 kamppailevat B-joukkueen maalin edustalla. A33 työntää B4 maalivahdin päälle juuri, kun kiekko on lauottu ja se menee maaliin. Mikä on päätuomarin päätös ja mitä rangaistuksia tuomitaan, jos mitään?","answer":"Maalia ei hyväksytä ja tarvittaessa A33 tuomitaan tilanteeseen soveltuva rangaistus. Lue sääntö 69.1 (viimeinen kappale)"},{"id":"69.5","rule_number":"69","question":"Maalivahti ottaa kontaktin, käyttäen liiallista voimaa tai yrittää tehostaa/”peilata” kontaktia, hyökkääjän kanssa, kun yrittää ottaa asemaa maalialueella. Näistä em. teoista mv:lle tuomittaisiin normaalisti rangaistus. Hyökkääjä poistuu alueelta, kun maali syntyy. Mikä on tuomio jäällä? Miten päätuomari kuuluttaa tilanteen?","answer":"Maalivahdille tuomitaan pieni rangaistus ja maali hylätään. Tässä esimerkissä hyökkääjä estää maalivahtia tekemästä työtään olemalla maalialueella. Kuulutetaan seuraavasti: ”Maalia ei hyväksytä maalivahdin häirinnän takia” (+ maalivahdin rangaistus). Säännöt 56, 78.5 ja taulukko 16: tilanne 6C HAKEMISTO MUUT RIKKEET"},{"id":"69.6","rule_number":"69","question":"Maalivahti ottaa kontaktin maalialueella hyökkääjään, yrittäessään asemoida itseään torjumaan. Hyökkääjä poistuu alueelta ennen kuin maali syntyy. Hyväksytäänkö maali?","answer":"Maali hylätään. Vaikka hyökkääjä lähteekin maalialueelta heti, kontakti vaikuttaa maalivahdin kykyyn puolustaa omaa maalia. Sääntö 69.3 HAKEMISTO MUUT RIKKEET"}],"70":[{"id":"70.1","rule_number":"70","question":"Ajassa 9:45 2. erässä A24 ja B6 välille syntyy tappelu. Tappelun aikana B5 lähtee rangaistusaitiosta, vaikka hänellä on vielä 0:45 koukkaamisesta tuomittua rangaistusta jäljellä. B5 ei aloita uutta tappelua, hän vain luistee tappelun läheisyydessä. Kun tappelu on ohi, mitä rangaistuksia tuomitaan ja mitä menee kelloon?","answer":"A24 ja B6, 5+PR tappelusta. B5 tuomitaan 2+PR. B-joukkueen on laitettava sijainen kärsimään B5 jäljellä olevaa ja uutta tuomittua pientä rangaistusta. B pelaa alivoimalla 2:45. Sääntö 70.4"},{"id":"70.2","rule_number":"70","question":"A-joukkueen pelaaja on rangaistusaitiossa ja hän pääsee sieltä pois ennen rangaistusajan päättymistä rangaistusaition valvojan virheen vuoksi. A- joukkueen pelaajalla on kiekko hallinnassaan hyökkäysalueellaan, kun päätuomari nostaa käden ylös B-joukkueen siirretyn rangaistuksen johdosta. Ennen pelikatkoa, A-joukkue tekee maalin ja pelaaja, joka pääsi liian aikaisin rangaistusaitiosta, on myös jäällä. Pelikatkolla päätuomarille selviää, että on tapahtunut (aiemmin kuvailtu) virhe. Miten päätuomari toimii?","answer":"A-joukkueen maali hylätään. B-joukkueelle tulossa ollut rangaistus tuomitaan. Liian aikaisin rangaistusaitiosta päässyt A-joukkueen pelaaja palaa sinne takaisin kärsimään rangaistuksensa loppuun. Koska kyseessä oli rangaistusaition valvojan virhe, ei A-joukkueelle 0 9 tuomita lisärangaistuksia. Sääntö 68.5 (katso myös Sääntö 78.5 (IV)), sääntö 70.4 (katso myös sääntö 35.1) ja sääntö 70.9 O S"},{"id":"70.4","rule_number":"70","question":"Kiekollinen B75 luistelee pää alhaalla. A15 tulee esiin ja ottaa olkapäällä kontaktin B75 rintaan. B75 lentää jäähän ja menettää kypäränsä (taklaus oli sääntöjenmukainen, ei kontaktia päähän tms.). B75 luistelee omalle pelaajapenkilleen jättäen jään. Peli jatkuu ja B75 tulee takaisin peliin ilman kypärää. Kerro päätuomarin/linjatuomarin päätökset, jos: a) tuomaristo havaitsee B75 tulevan takaisin peliin ilman kypärää. b) B-joukkue tekee maalin ennen kuin tuomaristo on ehtinyt puhaltaa pilliin katkaistakseen pelin, kun B75 tulee jäälle ilman kypärää.","answer":"a) Kun tuomaristo havaitsee, että B75 tulee peliin ilman kypärää, tulee peli katkaista heti, kun B-joukkue saa kiekon hallintaansa. B75 tuomitaan pieni rangaistus. Sääntö 9.6 b) Maali hylätään ja B75 tuomitaan pieni rangaistus. Sääntö 9.6 ja 70.9 HAKEMISTO MUUT RIKKEET"},{"id":"70.5","rule_number":"70","question":"A12 ja B6 ovat osallisena tappeluun, jonka seurauksena B6 tuomitaan iso rangaistus ilman pelirangaistusta. B6 loukkaantuu ja menee pukuhuoneeseen hoitamaan vammoja. Kun B6 palaa pelaajapenkilleen, isoa rangaistusta on vielä jäljellä. Peli jatkuu ilman katkoja ja B6 rangaistusaika umpeutuu. B:n valmentaja vaihtaa B6 lennosta jäälle. B6 suorittaa vaihdon ja vaihtaa lennosta takaisin pelaajapenkille. Vieläkään ei ole tullut pelikatkoa. Nyt B-joukkue tekee maalin. Hyväksytäänkö maali?","answer":"Teknisesti, B6 olisi pitänyt olla rangaistusaitiossa odottamassa rangaistusajan päättymisen jälkeistä pelikatkoa. B6 osallistui peliin sääntöjenvastaisesti jäällä olevana pelaajana, kun pelasi yhden vaihdon. Koska tätä ei huomattu vasta kuin pelikatkolla (B:n maali) ja koska B6 ei ollut jäällä, kun maali syntyi, maali tulee hyväksyä. B6 tuomitaan kuitenkin pieni rangaistus lähtemisestä rangaistusaitiosta liian aikaisin. Sääntö 70.4 SJL HUOMIO: Pelkkä 5 min ei mahdollinen."},{"id":"70.6","rule_number":"70","question":"A5 tuomitaan 2´ajassa 6:00. A5 lähtee rangaistusaitiosta liian aikaisin (oma virhe) ajassa 4:02 ja peli katkaistaan ajassa 3:00 B8 pienen rangaistuksen takia. Miten päätuomari toimii? 0","answer":""}],"71":[{"id":"71.2","rule_number":"71","question":"A-joukkue vaihtaa maalivahtinsa ylimääräiseen kenttäpelaajaan ottelun loppuhetkillä. Maalivahdin korvaava pelaaja tulee jäälle, kun maalivahti on yli 1,5m päässä pelaajapenkistään. B-joukkueella on kiekko hallinnassaan omalla kenttäpuoliskollaan siniviivan lähellä. He yrittävät pitkää syöttöä, jonka katkaisee A-joukkueen pelaaja, joka omalla kenttäpuoliskollaan (maalivahti on jo pois jäältä). Peli katkaistaan maalivahdin liian aikaisen vaihdon vuoksi. Pitääkö tällaisessa tilanteessa tuomita myös rangaistus? Mistä on seuraava aloitus?","answer":"Rangaistuksia ei tuomita. Seuraava aloitus suoritetaan lähimmästä aloituspisteestä, missä peli katkaistiin. Koska kiekko oli jo A- joukkueen kenttäpuoliskolla, niin keskiympyrästä ei ainakaan jatketa. Sääntö 71.1 HAKEMISTO MUUT RIKKEET"},{"id":"71.3","rule_number":"71","question":"A-joukkueelle ollaan tuomitsemassa siirrettynä rangaistusta. B-joukkue vaihtaa maalivahtinsa liian aikaisin. Peli katkaistaan linjatuomarin toimesta. Mistä on seuraava aloitus?","answer":"Toisesta A-joukkueen puolustusalueen aloituspisteestä, koska heille on tulossa rangaistus. Maalivahdin liian aikainen vaihto ei kuulu niihin kolmeen poikkeukseen, jotka rangaistuksen jälkeiseen aloituspaikkaan pätevät. Toki B-joukkue menettää ylimääräisen pelaajan etunsa, joka heillä normaalisti siirretyn rangaistuksen aikana olisi. Säännöt 71.1 ja 76.2 (katso myös sääntö 15.5)"},{"id":"71.4","rule_number":"71","question":"Tarvitseeko maalivahdin liian aikaista vaihtoa kuuluttaa?","answer":"Kyllä. Kuuluttajaa tulee ohjeistaa tallaisissa tilanteissa kuuluttamaan: ”Peli katkaistiin maalivahdin liian aikaisen vaihdon takia.” Sääntö 71.2"},{"id":"71.5","rule_number":"71","question":"A3 on syyllistynyt rikkeeseen hyökkäysalueellaan ja päätuomari on käsi ylhäällä siirretyn rangaistuksen merkiksi. B-joukkue ottaa maalivahtinsa pois vaihtaakseen hänet ylimääräiseen kenttäpelaajaan. Ennen kuin A-joukkue koskee kiekkoon, B-joukkueelle vihelletään maalivahdin liian aikainen vaihto. Mistä on seuraava aloitus? 0","answer":""}],"72":[{"id":"72.2","rule_number":"72","question":"A-joukkue on hyökkäysalueellaan ja pelaa kiekkoa korkealla mailalla. B-joukkue vain seisoskelee ja kieltäytyy pelaamasta kiekkoa. Molemmat joukkueet kieltäytyvät koskemasta kiekkoon. Mikä on tuomio?","answer":"Päätuomari katkaisee pelin ja seuraa aloitus suoritetaan toisesta (lähimmästä) B-joukkueen puolustusalueen aloituspisteestä. Sääntö 72.3"},{"id":"72.3","rule_number":"72","question":"A12 on tulossa siirrettynä rangaistus huitomisesta. Kiekko on vapaana B-joukkueen puolustusalueen kulmauks
